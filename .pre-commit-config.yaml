# Pre-commit hooks.
#
# To install (one-time per clone):
#   pip install pre-commit
#   pre-commit install
#
# After that, every `git commit` runs these hooks against the staged diff.
# A failing hook blocks the commit until the issue is fixed.
#
# This satisfies SECURITY.md item 7.3 (a pre-commit secret scanner blocks
# commits containing API key patterns).

repos:
  # Generic secret scanner — catches AWS keys, GitHub tokens, generic
  # high-entropy strings, and (with our custom rule below) Anthropic keys.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]

  # Hygiene: trailing whitespace, end-of-file newline, accidentally-large
  # files. Cheap to run and prevents the most common review-noise commits.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
