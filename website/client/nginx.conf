# nginx config for the production frontend image.
#
# Serves the built React app and proxies /api/* + /healthz to the backend
# container at the host name `backend` (defined by docker-compose).
# Streaming responses (SSE) are passed through with buffering off.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Apply the same security headers the FastAPI middleware adds in dev.
    # The backend re-applies them on its own responses; this covers the
    # static asset responses nginx serves directly.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # SPA fallback: any non-asset path goes back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend proxy. SSE-friendly: no buffering, long read timeouts.
    location ~ ^/(api|healthz) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events need these.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Allow the larger PDF uploads.
        client_max_body_size 50m;
    }
}