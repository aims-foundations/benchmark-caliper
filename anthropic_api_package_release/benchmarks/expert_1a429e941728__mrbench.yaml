  text: At the same time, even incorrect or incomplete guidance can lead to certain actions on the part of the student and
    can foster their curiosity, thus providing them with learning opportunities.
- id: Q86
  page: 8
  dimension: output_ontology
  text: This further demonstrates the need to treat the dimensions as independent.
- id: Q87
  page: 8
  dimension: output_content
  text: In terms of the other qualities of the Expert responses, they do not normally reveal the answer and tend to include
    scaffolding; however, there are a small number of instances where they failed to identify the mistake or its location.
- id: Q88
  page: 8
  dimension: output_content
  text: Overall, we conclude that human responses from Expert are significantly better than Novice.
- id: Q89
  page: 8
  dimension: output_form
  text: Our findings on the Tutor Tone align with those of Wang et al. (2024a) – in task-oriented conversations, AI tutors
    tend to be more Neutral than Encouraging.
- id: Q90
  page: 8
  dimension: output_ontology
  text: When we combine these two labels into "Non-offensive", the DAMR score reaches 100% as we observe no offensive responses
    from any LLMs or humans.
- id: Q91
  page: 8
  dimension: input_ontology
  text: We observe high scores for most of the LLMs on human-likeness, which demonstrates their capability to generate human-like
    output with minimal or no grammatical and fluency mistakes, showing the timely nature of our study, which focuses more
    on in-depth semantic and pedagogical aspects of tutor responses rather than only on superficial attributes like grammaticality
    and fluency.
- id: Q92
  page: 8
  dimension: input_content
  text: As discussed in Section 5.1, the conversational contexts in the Bridge dataset are typically very short (see Table
    7) and the dialogues are grounded in elementary math operations, so most models are able to identify the mistakes and
    their locations.
- id: Q93
  page: 8
  dimension: input_content
  text: However, they struggle to provide appropriate guidance without revealing the answer because the mistakes are generally
    related to quite basic operations like addition or multiplication, often in a one-step type of mathematical problems.
- id: Q94
  page: 8
  dimension: output_form
  text: Still, models like GPT-4 and Llama-3.1-405B are able to offer some reasonable guidance.
- id: Q95
  page: 8
  dimension: input_content
  text: In contrast, for MathDial, the contexts are longer, the mistakes are grounded in reasoning, and the responses are
    more structured.
- id: Q96
  page: 8
  dimension: output_content
  text: Yet, many LLMs do not meet the expectations for each dimension of the taxonomy, as discussed earlier.
- id: Q97
  page: 8
  dimension: input_content
  text: Combining both types of data in MRBench makes it both challenging and comprehensive.
- id: Q98
  page: 8
  dimension: output_content
  text: In summary, all LLMs and even human tutors lack some pedagogical abilities required for effective tutoring.
- id: Q99
  page: 8
  dimension: output_form
  text: While Llama-3.1-405B is the most effective, followed by Mistral and other state-of-the-art models, GPT-4 reveals the
    answer too quickly.
- id: Q100
  page: 8
  dimension: output_form
  text: Gemini is less coherent and accurate, and Sonnet focuses on human-likeness and encouraging tone but is less effective
    in other dimensions.
- id: Q101
  page: 8
  dimension: output_form
  text: Phi3 is the worst-performing model according to our analysis, as it fails to understand the context, while Llama-3.1-8B,
    despite being smaller, performs reasonably well.
- id: Q102
  page: 8
  dimension: output_content
  text: Human responses are also not perfect – Novice responses are ambiguous and short, whereas Expert responses are more
    focused on actionability and less on other dimensions.
- id: Q103
  page: 8
  dimension: input_ontology
  text: Overall, the proposed taxonomy precisely categorizes performance across 8 dimensions, reflecting the current state-of-the-art
    in AI tutors.
- id: Q104
  page: 8
  dimension: output_content
  text: Our study demonstrates that there is a considerable room for improvement in the pedagogical abilities of AI tutors.
- id: Q105
  page: 8
  dimension: output_content
  text: We also performed annotations using Prometheus2 and Llama-3.1-8B as critic LLMs.
- id: Q106
  page: 8
  dimension: output_form
  text: The correlation scores with human annotations are presented in Appendix Tables 5 and 6, respectively.
- id: Q107
  page: 8
  dimension: output_content
  text: Across both LLMs, it can be observed that most of the correlation scores are negative (except for the human-likeness
    dimension), indicating that the annotations from the LLMs are unreliable for the challenging pedagogical dimensions.
- id: Q108
  page: 8
  dimension: output_content
  text: Prometheus2 is not trained on our taxonomy dimensions, except for the general human-likeness dimension, where the
    model shows slightly better correlations with positive scores.
- id: Q109
  page: 8
  dimension: output_content
  text: We believe both LLMs have a limited understanding of rich pedagogical concepts, as they were not specifically trained
    on pedagogically rich datasets.
- id: Q110
  page: 8
  dimension: output_form
  text: At the same time, we acknowledge that the experiments presented in this work are preliminary
- id: Q111
  page: 9
  dimension: input_ontology
  text: This paper presents the first effort to unify AI tutor evaluation for the student mistake remediation task in the
    mathematics domain.
- id: Q112
  page: 9
  dimension: input_ontology
  text: Specifically, we propose an evaluation taxonomy with eight pedagogical dimensions based on the key learning sciences
    principles.
- id: Q113
  page: 9
  dimension: output_content
  text: We also release the MRBench benchmark with seven state-of-the-art LLM-as-tutors responses, along with gold human annotations.
- id: Q114
  page: 9
  dimension: output_form
  text: We also assess the feasibility of LLMs as evaluators in this context by correlating their judgements with human annotations,
