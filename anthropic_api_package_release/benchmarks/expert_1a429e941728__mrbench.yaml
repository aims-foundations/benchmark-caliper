- id: Q115
  page: 9
  dimension: output_ontology
  text: This study evaluates tutor response quality across the proposed eight dimensions independently.
- id: Q116
  page: 9
  dimension: output_ontology
  text: However, in practice, these dimensions may be inherently interrelated and may influence one another.
- id: Q117
  page: 9
  dimension: input_ontology
  text: The proposed taxonomy primarily focuses on the task of the student mistake remediation in the domain of mathematics.
- id: Q118
  page: 9
  dimension: input_ontology
  text: We acknowledge that the proposed taxonomy will need to be verified on and likely adapted if applied to other tasks
    such as concept learning, and to subjects other than mathematics.
- id: Q119
  page: 9
  dimension: output_ontology
  text: The current taxonomy and annotation scheme focus on the appropriateness of the tutor responses.
- id: Q120
  page: 9
  dimension: output_ontology
  text: However, one of the limitations is that it does not consider the tutoring dialogues' impact on the overall student
    learning.
- id: Q121
  page: 9
  dimension: output_ontology
  text: Specifically, the annotation pertains to the individual tutor turns within educational dialogues, which restricts
