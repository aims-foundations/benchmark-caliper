  text: we propose a unified evaluation taxonomy with eight pedagogical dimensions based on key learning sciences principles,
    which is designed to assess the pedagogical value of LLM-powered AI tutor responses grounded in student mistakes or confusions
    in the mathematical domain.
- id: Q2
  page: 1
  dimension: input_content
  text: We release MRBench – a new evaluation benchmark containing 192 conversations and 1,596 responses from seven state-of-the-art
    LLM-based and human tutors, providing gold annotations for eight pedagogical dimensions.
- id: Q3
  page: 1
  dimension: output_form
  text: We assess reliability of the popular Prometheus2 and Llama-3.1-8B LLMs as evaluators and analyze each tutor's pedagogical
    abilities, highlighting which LLMs are good tutors and which ones are more suitable as question-answering systems.
- id: Q4
  page: 1
  dimension: output_form
  text: General domain-agnostic natural language generation (NLG) metrics (Lin, 2004; Popovic´, 2017; Post, 2018; Gao et al.,
    2020; Liu et al., 2023) are not well-suited for this context, as most of them fail to account for pedagogical values and
    require gold references, which are often not available, especially in online interactions.
- id: Q5
  page: 1
  dimension: input_ontology
  text: Specifically, for the student mistake remediation task, we need to assess complex pedagogical aspects and abilities
    of such systems, ensuring that they provide students with sufficient, helpful, and factually correct guidance and do not
    simply reveal answers when a student makes a mistake.
- id: Q6
  page: 1
  dimension: output_content
  text: Kaushal Kumar Maurya, KV Aditya Srivatsa, Kseniia Petukhova and Ekaterina Kochmar. Mohamed bin Zayed University of
    Artificial Intelligence, Abu Dhabi, UAE.
- id: Q7
  page: 2
  dimension: output_form
  text: General domain-agnostic natural language generation (NLG) metrics like BLEU (Papineni et al., 2002), BERTScore (Lin,
    2004), DialogRPT (Gao et al., 2020), and so on have been used as proxies to measure the coherence and human-likeness of
    AI tutor responses.
- id: Q8
  page: 2
  dimension: output_form
  text: However, these metrics do not account for pedagogical values (Jurenka et al., 2024; Liu et al., 2024) and often require
    a ground truth answer to evaluate matching responses.
- id: Q9
  page: 2
  dimension: output_content
  text: For a given input dialogue, there can be multiple valid, pedagogically correct ground truth responses, making detection
    of the optimal answer non-deterministic (Tack and Piech, 2022; Al-Hossami et al., 2024).
- id: Q10
  page: 2
  dimension: output_form
  text: Additionally, these metrics can be easily manipulated; for instance, simple responses like "Hello" or "teacher:" (Baladón
    et al., 2023; Jurenka et al., 2024) can inflate scores.
- id: Q11
  page: 2
  dimension: output_form
  text: In this section, we first briefly overview and discuss the limitations of the existing general-purpose NLG metrics
    and then turn to pedagogically-oriented approaches to evaluation.
- id: Q12
  page: 3
  dimension: input_ontology
  text: In this work, we focus on educational dialogues between a student and a tutor in the mathematical domain. Specifically,
    the conversations are grounded in students' mistakes or confusions, and the AI tutor aims to respond in order to remediate
    such mistakes or confusions.
- id: Q13
  page: 3
  dimension: input_ontology
  text: Formally, let's define the conversation history between a tutor and a student as H = {(T1, S1),(T2, S2), . . . ,(Tt,
    St)}, where Ti represents the i-th response from the tutor, and Si represents the i-th response from the student. Let
    Sk denote the student's most recent k utterances, where k ∈ [1, ..., t], containing a mistake or confusion. Then the objective
    of the tutor is to provide the most appropriate response Tt+1 to address this mistake or confusion.
- id: Q14
  page: 3
  dimension: input_ontology
  text: The evaluation taxonomy detailed in Section 4 assesses the appropriateness of the Tt+1 response across eight key pedagogical
    dimensions.
- id: Q15
  page: 3
  dimension: input_ontology
  text: In this section, we first present our approach, narrowing the evaluation taxonomy down to eight measurable dimensions
    aligned with key pedagogical strategies (Jurenka et al., 2024; Hennessy et al., 2016). These dimensions are most suitable
    for the student mistake remediation task and are based on the learning sciences principles.
- id: Q16
  page: 3
  dimension: input_ontology
  text: We then dive into the details of each dimension and its relationship to previous research. An overview of the taxonomy
    is presented in Table 2.
- id: Q17
  page: 3
  dimension: input_ontology
  text: 'Encourage active learning (Chi and Wylie, 2014; Oakley and Sejnowski, 2021): The tutor should encourage students
    to actively participate in the discussion and practice rather than passively receive information. The tutor can achieve
    this by not revealing the answer immediately and scaffolding guidance.'
- id: Q18
  page: 3
  dimension: input_ontology
  text: 'Adapt to students'' goals and needs (King and South, 2017): The tutor should respond coherently by adapting to the
    current state and goals of the student''s learning rather than following a pre-defined learning path. In the context of
    student mistake remediation, this happens when the tutor identifies the mistake, pinpoints its location, and responds
    coherently.'
- id: Q19
  page: 3
  dimension: input_ontology
  text: 'Manage cognitive load and enhance metacognitive skills (Mayer, 2002; Dehaene, 2020; Cohen et al., 2021): The tutor
    should present the information in a structured manner, with elaboration and examples in manageably small chunks that enable
    the student to generalize their learning skills beyond the current problem. For the task at hand, this can be achieved
    by providing appropriate guidance.'
- id: Q20
  page: 3
  dimension: input_ontology
  text: 'Foster motivation and stimulate curiosity (Keller, 1987; Patall et al., 2008): The tutor'
- id: Q21
  page: 4
  dimension: input_ontology
  text: Since all dialogues in the dataset contain a mistake made by the student, a good-quality response from the tutor should
    include the relevant mistake identification.
- id: Q22
  page: 4
  dimension: input_ontology
  text: A good tutor response should not only notify the student of the committed error but also point to its location in
    the answer and outline what the error is to help the student remediate it in their subsequent response.
- id: Q23
  page: 4
  dimension: input_ontology
  text: Since most dialogues are relatively short and present contexts for the mistakes made early in the student's solution,
    a good tutor strategy is not to reveal the answer to the student immediately but rather provide helpful guidance.
- id: Q24
  page: 4
  dimension: input_ontology
  text: In addition to not revealing the answer immediately, a good tutor response should provide the student with relevant
    and helpful guidance, such as a hint, an explanation, or a supporting question.
- id: Q25
  page: 4
  dimension: input_ontology
  text: Once the guidance is provided to a student, it should be clear from a good tutor response what the student should
    do next; in other words, the tutor response should not be vague, unclear, or a conversation stopper.
- id: Q26
  page: 4
  dimension: input_ontology
  text: We postulate that a high-quality tutor's response should be logically consistent with the student's previous responses.
- id: Q27
  page: 4
  dimension: input_ontology
  text: In addition to addressing student mistakes, a good tutor should encourage them and avoid using toxic language, which
    is aligned with the care dimension in the evaluation schema of Wang et al. (2024a).
- id: Q28
  page: 4
  dimension: output_content
  text: This dimension is particularly critical for LLM-based AI tutors, as they often exhibit unpredictable behavior.
- id: Q29
  page: 4
  dimension: input_ontology
  text: Effective tutoring requires that students feel a connection with the tutor, which is more likely when the tutor's
    responses appear human-like rather than robotic.
- id: Q30
  page: 4
  dimension: output_ontology
  text: Although there are inherent interdependencies among the proposed dimensions of the taxonomy (e.g., a response that
    reveals the answer is less likely to be actionable, and vice versa), we explicitly instructed all annotators to treat
    each dimension as independent and orthogonal to minimize confounding factors and potential biases during the annotation
    process.
- id: Q31
  page: 5
  dimension: output_content
  text: The annotation team consisted of two male and two female annotators, with all four annotators holding at least a post-graduate
    degree in Computer Science and being proficient in English.
- id: Q32
  page: 5
  dimension: output_content
  text: We note that for this study, we do not require annotators to have direct teaching experience, as understanding of
    the mathematical tasks at the middle school level and being able to judge the responses from the perspective of a potential
    user of such AI tutors (or a student), rather than specifically a teacher, is sufficient.
- id: Q33
  page: 5
  dimension: output_content
  text: To control the annotation workflow and ensure quality, we opted not to use public annotation outsourcing platforms
    such as Prolific or MTurk, which allowed us to implement rigorous training protocols and a robust validation mechanism
    for the annotations.
- id: Q34
  page: 5
  dimension: output_content
  text: First, we provided all annotators with comprehensive training, including an interactive training document (see Section
    C for more details) and oral instructions.
- id: Q35
  page: 5
  dimension: output_content
  text: Following this, we conducted validation pilot study to evaluate the annotation quality and the annotators' understanding
    of the instructions before rolling out the large-scale human evaluation detailed in Section 5.2.
- id: Q36
  page: 5
  dimension: output_content
  text: In this validation pilot study, all four annotators iteratively reviewed the annotation scheme and guidelines.
- id: Q37
  page: 5
  dimension: output_content
  text: Each annotator also independently labeled the same eight randomly sampled dialogues – four from each of the two datasets
    (Bridge and MathDial) – across the eight dimensions of the evaluation taxonomy.
- id: Q38
  page: 5
  dimension: output_content
  text: Given that each dialogue contained multiple responses from both LLMs and humans, and each response was annotated across
    eight evaluation dimensions, this resulted in a total of 544 annotations per annotator.
- id: Q39
  page: 5
  dimension: output_form
  text: To measure inter-annotator agreement, we computed Fleiss' kappa value, which for this annotation experiment equals
    0.65, indicating substantial agreement.
- id: Q40
  page: 5
  dimension: input_ontology
  text: None of the annotators identified any additional or redundant dimensions necessary for student mistake remediation.
- id: Q41
  page: 5
  dimension: input_content
  text: We have compiled mistake remediation benchmark, MRBench, from the Bridge (Wang et al., 2024a) and MathDial (Macina
