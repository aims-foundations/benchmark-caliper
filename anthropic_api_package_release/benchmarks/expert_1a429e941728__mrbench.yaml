- id: Q122
  page: 9
  dimension: output_form
  text: In this study, we limit the LLM-based evaluation to two LLMs as critics, using the evaluation prompt presented in
    Figure 6.
- id: Q123
  page: 9
  dimension: output_form
  text: The results obtained with these LLMs are not encouraging, as detailed in Section 6.
- id: Q124
  page: 9
  dimension: output_content
  text: Although we do not foresee any ethical risks, we acknowledge that this work relies on the outputs from LLMs, and there
