# Sub-Saharan Africa - Regional Context for Validity Analysis

name: "Sub-Saharan Africa"
abbreviation: "SSA"

countries:
  major:
    - Nigeria
    - Ethiopia
    - Kenya
    - Tanzania
    - South Africa
    - Ghana
    - Senegal
    - Rwanda
    - Uganda
    - Cameroon
    - Democratic Republic of Congo
    - Mozambique
    - Angola
  note: "54 countries total across the continent; enormous linguistic and cultural diversity."

languages:
  major:
    - Swahili (East Africa)
    - Hausa (West Africa)
    - Yoruba (Nigeria)
    - Igbo (Nigeria)
    - Amharic (Ethiopia)
    - Zulu (South Africa)
    - Xhosa (South Africa)
    - Twi/Akan (Ghana)
    - Wolof (Senegal)
    - Kinyarwanda (Rwanda)
    - Lingala (DRC)
    - Shona (Zimbabwe)
    - Somali (Somalia)
  colonial:
    - English (anglophone Africa)
    - French (francophone Africa)
    - Portuguese (lusophone Africa)
    - Arabic (North/East Africa overlap)
  note: "Over 2,000 languages spoken across the continent. Many languages are low-resource with minimal NLP tooling."

writing_systems:
  scripts:
    - Latin alphabet (most written African languages)
    - Ge'ez/Ethiopic script (Amharic, Tigrinya)
    - Arabic script (Hausa in some regions, Swahili historically)
    - N'Ko script (Manding languages, West Africa)
  note: "Most African languages use Latin-based orthographies, but with additional characters and diacritics."

literacy_rates:
  Nigeria: 0.62
  Ethiopia: 0.52
  Kenya: 0.82
  Tanzania: 0.78
  South_Africa: 0.95
  Ghana: 0.79
  Senegal: 0.52
  Rwanda: 0.73
  Uganda: 0.77
  DRC: 0.77
  note: "Significant variation. Urban rates much higher than rural. Youth literacy improving rapidly."

cultural_norms_notes: |
  - Ubuntu philosophy (Southern/East Africa): communal ethics, "I am because we are"
  - Oral tradition remains strong; storytelling and proverbs central to knowledge transmission
  - Extended family and clan systems central to social organization
  - Religious diversity: Christianity, Islam, and indigenous spiritual practices
  - Age-based respect hierarchies common across many cultures
  - Code-switching between indigenous languages and colonial languages is ubiquitous
  - Humor, irony, and indirect communication styles vary enormously across ethnic groups
  - Concept of "face" and social harmony important in many cultures

infrastructure_notes: |
  - Mobile-first internet access dominant; smartphone penetration growing rapidly
  - Feature phones still widely used; SMS/USSD interfaces important
  - Electricity access varies: near-universal in South Africa, much lower in rural areas elsewhere
  - Internet bandwidth and reliability lower than Global North averages
  - Speech interfaces particularly important given lower literacy rates and oral traditions
  - Medical imaging equipment often lower specification (e.g., MRI below 1.5T in West Africa)

domain_specific_notes: |
  - Healthcare: Tropical diseases (malaria, tuberculosis, HIV) require specialized knowledge
    absent from Global North medical benchmarks. Traditional medicine practices widespread.
  - Legal: Mix of common law (anglophone), civil law (francophone), customary law, and
    Islamic law. Very different from Global North legal frameworks.
  - Education: Varied curricula, many in colonial languages. Indigenous language education
    expanding but uneven.
  - Agriculture: Dominant economic sector; agricultural AI applications highly relevant
  - Commerce: Mobile money (M-Pesa) and informal markets; cash-based transactions common
