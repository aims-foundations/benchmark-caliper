  internet_access_by_country:
    Qatar: '[NEEDS VERIFICATION — broadband/mobile penetration for school teachers]'
    Egypt: '[NEEDS VERIFICATION — school internet connectivity rates; urban vs. rural
      teacher access]'
    Saudi Arabia: '[NEEDS VERIFICATION]'
    Jordan: '[NEEDS VERIFICATION]'
    Lebanon: '[NEEDS VERIFICATION — infrastructure disruption context]'
    Morocco: '[NEEDS VERIFICATION]'
  device_access: '[NEEDS VERIFICATION — tablet/laptop/desktop prevalence among G10–12
    Arabic teachers in target countries]'
  infrastructure_mismatch_severity: LOWER — deployment is text-only MSA matching benchmark
    modality; no script mismatch or modality gap anticipated per elicitation
  lms_integration_context: '[NEEDS VERIFICATION — whether target schools use LMS platforms
    (e.g., Madrasati in Saudi Arabia, specific Jordanian or Egyptian ministry platforms)
