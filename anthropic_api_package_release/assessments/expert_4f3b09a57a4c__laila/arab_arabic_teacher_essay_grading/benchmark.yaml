  text: May Bashendy, Walid Massoud, Sohaila Eltanbouly, Salam Albatarni, Marwan Sayed, Abrar Abir, Houda Bouamor, Tamer Elsayed.
- id: Q8
  page: 1
  dimension: output_content
  text: Computer Science and Engineering Department, Qatar University and Carnegie Mellon University in Qatar.
- id: Q9
  page: 1
  dimension: input_content
  text: 'IRB Number: QU-IRB 159/2024-EA'
- id: Q10
  page: 1
  dimension: input_ontology
  text: Arabic AES research faces a significant data scarcity problem, as publicly available annotated datasets remain limited.
- id: Q11
  page: 1
  dimension: input_ontology
  text: Existing Arabic resources are often small in scale such as QAES (Bashendy et al., 2024), lack trait-specific annotations
    as in ZAEBAC (Habash and Palfreyman, 2022), or consist solely of unannotated essays such as ALC.
- id: Q12
  page: 2
  dimension: input_form
  text: 'Table 2: Comparison of LAILA with existing essay datasets. "Len" is average essay length in words; "HOL" indicates
    holistic scoring; "Eur" covers German, Italian, and Czech; "L1/L2" denotes native or second-language learners; "Public"
    here means freely available.'
- id: Q13
  page: 2
  dimension: output_ontology
  text: tailed trait-specific annotations that capture multiple dimensions of writing proficiency.
- id: Q14
  page: 2
  dimension: input_ontology
  text: 'We establish baseline AES results for Arabic under two evaluation setups: prompt-specific and cross-prompt.'
- id: Q15
  page: 2
  dimension: output_form
  text: We publicly release LAILA, including essays with holistic and trait-specific annotations. We also release the benchmarking
    code to support replication and future research.
- id: Q16
  page: 2
  dimension: input_ontology
  text: Section 2 reviews related work and existing AES datasets. Section 3 outlines the data collection design principles,
    while Section 4 describes the dataset construction process, including school and prompt selection, essay collection, and
    annotations.
- id: Q17
  page: 2
  dimension: input_content
  text: Research on AES has advanced considerably in English, supported by large-scale, publicly available datasets such as
    ASAP/ASAP++ (Mathias and Bhattacharyya, 2018), TOEFL11 (Blanchard et al., 2013), ELLIPSE (Crossley et al., 2023a), and
    PERSUADE (Crossley et al., 2023b).
- id: Q18
  page: 2
  dimension: input_ontology
  text: In contrast, other languages have far fewer resources. Some smaller datasets exist, including ACEA (Chinese; annotated
    but not public) (He et al., 2022), TCFLE-8 (French; public but with only holistic scores) (Wilkens et al., 2023), and
    MERLIN (German, Italian, and Czech; public but limited to holistic annotations) (Boyd et al., 2014). While useful for
    AES studies, their limited scale and annotation depth restrict their utility.
- id: Q19
  page: 2
  dimension: input_content
  text: Compared with English and other languages, Arabic AES lacks robust datasets. Few datasets have been developed, both
    public and proprietary, yet all face limitations in scale, annotation depth, or accessibility.
- id: Q20
  page: 3
  dimension: input_ontology
  text: The development of LAILA was guided by nine core design principles [D1–D9], each reflecting deliberate choices to
    ensure a high-quality, representative, and ethically sound resource for Arabic AES.
- id: Q21
  page: 3
  dimension: input_content
  text: '[D1] Ensuring Data Integrity: We designed LAILA to capture authentic, classroom-produced writing created without
    external assistance. This design choice preserves genuine linguistic variation, learner errors, and authentic complexities
    essential for real-world AES applications.'
- id: Q22
  page: 3
  dimension: input_content
  text: '[D2] Maximizing Diversity: To reflect the breadth of Arabic writing proficiency, LAILA was planned to collect essays
    from multiple educational institutions and student populations with diverse academic and demographic backgrounds. Prompts
    were intentionally varied across genres, ensuring cultural relevance and age appropriateness, thereby promoting model
    generalization and reducing bias.'
- id: Q23
  page: 3
  dimension: input_content
  text: '[D3] Achieving Gender Balance: We intentionally aimed to balance the number of essays from male and female students
    to promote fairness, reduce gender-based bias, support inclusive evaluation, and enhance model generalization.'
- id: Q24
  page: 3
  dimension: output_ontology
  text: '[D4] Supporting Full Trait Coverage: LAILA was built to capture multiple dimensions of writing quality through annotations
    of relevance, organization, vocabulary, style, development, mechanics, and grammar. This design supports fine-grained
    assessment and meaningful feedback.'
- id: Q25
  page: 3
  dimension: input_form
  text: '[D5] Ensuring Authentic Writing Conditions: To emulate real academic or high-stakes testing scenarios, LAILA was
    designed to collect essays written under timed conditions using a digital submission platform. This setup ensures consis'
- id: Q26
  page: 5
  dimension: input_form
  text: taining one persuasive and one explanatory prompt, along with a unique, pre-generated ID to maintain students' anonymity
    while enabling metadata tracking [D6]. We also configured a Microsoft Form for digital essay submission, set with a 65-minute
    time limit to enforce a time-restricted setup [D5].
- id: Q27
  page: 5
  dimension: input_content
  text: Data collection spanned one academic year through 27 school visits (24 initial, three follow-ups), by nine team members,
    to meet the target student count.
- id: Q28
  page: 5
  dimension: input_content
  text: Each visit, which lasted around six hours, was supported by at least two team members, an IT teacher, and proctoring
    teachers.
- id: Q29
  page: 5
  dimension: input_form
  text: The collected essays then underwent a cleaning process to ensure data quality before the annotation phase. First,
    we resolved duplicate and misidentified submissions, by correcting ID mismatches through manual verification and name
    cross-referencing. Next, a manual review eliminated submissions lacking meaningful content, e.g., irrelevant personal
    content. Lastly, essays with 10 or fewer words were excluded for being insufficient for AES analysis.
- id: Q30
  page: 5
  dimension: output_content
  text: The hired annotation team consisted of 6 annotators and 3 supervisors, all of whom were Arabic language teachers or
    lecturers with educational backgrounds.
- id: Q31
  page: 5
  dimension: output_content
  text: Five members of the team hold advanced degrees (MSc or PhD) in the Arabic language.
- id: Q32
  page: 5
  dimension: output_content
  text: The supervisors oversaw training, quality assurance, and dispute resolution, while the annotators performed the primary
    scoring tasks.
- id: Q33
  page: 5
  dimension: output_ontology
  text: All essays in LAILA dataset were scored using the Core Academic Skills Test (CAST) rubric [D7], developed by the Qatar
    University Testing Center (QUTC).
- id: Q34
  page: 5
  dimension: output_ontology
  text: 'The rubric covers 7 writing traits [D4]: Relevance (REL), Organization (ORG), Vocabulary (VOC), Style (STY), Development
    (DEV), Mechanics (MEC), and Grammar (GRA).'
- id: Q35
  page: 5
  dimension: output_ontology
  text: Additionally, a Holistic score (HOL) was computed as the sum of the 7 trait scores.
- id: Q36
  page: 5
  dimension: output_ontology
  text: Six traits (all but REL) were rated on a 6-point scale (0 = lowest, 5 = highest), while REL was rated on a 3-point
    scale (0 = not relevant, 1 = partially relevant, and 2 = fully relevant).
- id: Q37
  page: 5
  dimension: output_ontology
  text: Furthermore, if an essay received a REL score of 0, all other trait scores were set to 0, as irrelevant responses
    are not subject to further evaluation.
- id: Q38
  page: 6
  dimension: input_content
  text: 'LAILA comprises 7,859 essays collected across 8 distinct prompts: 3 explanatory and 5 persuasive (3,446 and 4,413
    essays, respectively).'
- id: Q39
  page: 6
  dimension: input_form
  text: Table 3 shows that the number of essays per prompt ranges from 500 to 1,181. Essay lengths demonstrate consistency
    across prompts, with an average of 171 words and a maximum of 706 words.
- id: Q40
  page: 6
  dimension: output_ontology
  text: Most traits follow a near-normal pattern on the 6-point scale, indicating overall positive essay quality. The REL
    scores show that 86% of the essays agree strongly with the prompt. In contrast, GRA and VOC show the highest percentage
    of score 1 at 16%, followed by MEC at 13%, highlighting that these traits pose the greatest challenges.
- id: Q41
  page: 6
  dimension: output_content
  text: To ensure consistency, 2 supervisors developed an annotation guidebook with detailed terminology, exemplars, and annotated
    practices for each prompt type. Annotators were required to review these materials and complete training sessions before
    formal annotation. Moderation sessions followed, where discrepancies were discussed and interpretations of the rubric
    were harmonized.
- id: Q42
  page: 6
  dimension: output_content
  text: The scoring process was conducted using the Assessment Gourmet Platform, which supports large-scale, anonymized essay
    scoring. The platform ensured that annotators were blinded to student identity [D6], while only supervisors had access
    to annotator metadata for monitoring purposes.
- id: Q43
  page: 6
  dimension: output_content
  text: The essays were randomly distributed among the annotators to minimize systematic bias, and the scoring sessions were
    capped to prevent annotators' fatigue. Each essay was independently scored by two annotators across all traits. If the
    difference in HOL scores between the two annotators was less than 6 points, the mean of the two scores was computed and
    then rounded down to the nearest integer; this rounded value was adopted as the final score for each trait. However, essays
    with large discrepancies between annotators (≥ 6 points difference in the HOL score) were flagged and escalated to a supervisor
    (a third annotator in this case), who provided the final adjudicated score and offered feedback to the annotators to improve
    alignment and consistency in subsequent batches of essays.
- id: Q44
  page: 6
  dimension: output_content
  text: We compute IAA using Quadratic Weighted Kappa (QWK) (Williamson et al., 2012) to assess agreement between the two
    main annotators (A1 and A2), prior to adjudication. Table 4 reports QWK per trait and prompt, with agreement strength
    following Landis and Koch (1977). Overall, IAA was substantial across prompts, with an average QWK ranging from 0.66 (P5)
    to 0.75 (P1), showing strong consistency.
- id: Q45
  page: 6
  dimension: output_content
  text: 'However, variability emerges by prompt and trait. In particular, P5 showed the lowest average agreement, noting that
    it has the highest percentage of essays that require a third annotator (A3: 23.3%; Table 3). This suggests greater initial
    disagreement'
- id: Q46
  page: 7
  dimension: input_ontology
  text: 'For each setup, we investigate two research questions in the context of Arabic AES: (RQ1) how do different categories
    of models compare in overall performance?, and (RQ2) which models achieve the best results across individual traits?.'
- id: Q47
  page: 7
  dimension: input_ontology
  text: Model Selection We selected a diverse set of models with varying architectures to establish strong baselines for LAILA.
    The selection criteria included code availability, ease of implementation, and coverage of SOTA Arabic and English models.
- id: Q48
  page: 7
  dimension: input_ontology
  text: 'The models fall into three categories: feature-based (FB), encoder-based, and large language models (LLMs). LLMs
    were evaluated in zero-shot and few-shot settings, and all models followed a multitask setup predicting holistic and trait
    scores jointly.'
- id: Q49
  page: 7
  dimension: input_ontology
  text: 'We selected 4 FB models: Linear Regression (LR), Random Forest (RF), Extreme Gradient Boosting (XGB), and a feedforward
    Neural Network (NN).'
- id: Q50
  page: 7
  dimension: input_ontology
  text: 'For encoder-based models, we fine-tuned two pre-trained SOTA systems: AraBERT (Antoun et al., 2020), combined with
    handcrafted features (Sayed et al., 2025), and AraT5 (Nagoudi et al., 2022), inspired by the strong performance of T5
    in English AES (Do et al., 2024).'
- id: Q51
  page: 7
  dimension: input_ontology
  text: 'For LLMs, we evaluated three Arabic-centric models: ALLaM (Bari et al., 2025), Command-R7B-Arabic (R7B) (Alnumay
    et al., 2025), and Fanar (Team et al., 2025), under zero-shot and few-shot (5-shot) settings.'
- id: Q52
  page: 7
  dimension: output_form
  text: For the prompt-specific experiments, we used 5-fold cross-validation using the predefined 5 splits. In each cross-validation
    iteration, one fold (20%) was used as the test set, and the remaining four folds were further split into training (70%)
    and development (10%) sets, with stratification applied to maintain consistent prompt distributions and ensure consistent
    evaluation across models.
- id: Q53
  page: 7
  dimension: input_ontology
  text: For encoder-based models, we employ the same AraBERT-based architecture, which performed strongly in Arabic AES (Sayed
    et al., 2025), along with two SOTA English AES models, ProTACT (Do et al., 2023) and MOOSE (Chen et al., 2025).
- id: Q54
  page: 8
  dimension: input_form
  text: We implemented the 816 handcrafted features introduced by Sayed et al. (2025) for Arabic AES, encompassing surface,
    readability, lexical, semantic, and syntactic aspects.
- id: Q55
  page: 8
  dimension: input_form
  text: These features were applied to the FB models, ProTACT, MOOSE, and AraBERT.
- id: Q56
  page: 8
  dimension: input_form
  text: To mitigate noise, we performed feature selection based on Pearson and Spearman correlations (Li and Ng, 2024), retaining
    features whose absolute correlation with any trait exceeded a predefined threshold for either metric.
- id: Q57
  page: 8
  dimension: input_form
  text: For MOOSE, however, we did not apply this explicit feature selection step.
- id: Q58
  page: 8
  dimension: output_form
  text: We evaluate model performance using QWK to measure agreement between human and model scores.
- id: Q59
  page: 8
  dimension: output_form
  text: Hyperparameters are tuned via Bayesian optimization with the Tree-structured Parzen Estimator algorithm (Bergstra
    et al., 2011), implemented using Optuna's TPESampler.
- id: Q60
  page: 8
  dimension: output_form
  text: We ran 20 trials with 5 startup trials and a fixed random seed of 11.
- id: Q61
  page: 8
  dimension: output_form
  text: The best configuration, selected based on average QWK on the development set, was used for final evaluation on the
    test data.
- id: Q62
  page: 9
  dimension: output_form
  text: FB models showed comparable performance, with only a 2-point difference between the top performer (XGB) and the lowest
    (NN), highlighting consistency of these feature-based approaches.
- id: Q63
  page: 9
  dimension: output_form
  text: Among encoder-based models, ProTACT exhibited the lowest performance overall, suggesting limited transferability from
    its English architecture, while AraBERT trailed XGB by 4.4 points.
- id: Q64
  page: 9
  dimension: output_form
  text: Notably, MOOSE achieved the highest performance among all evaluated cross-prompt models.
- id: Q65
  page: 9
  dimension: output_form
  text: For LLMs, few-shot prompting improved Fanar and R7B (+19 and +11.6 points), whereas ALLaM dropped by 7 points, indicating
    high sensitivity to prompt design.
- id: Q66
  page: 9
  dimension: output_form
  text: No single model consistently outperformed the others across individual traits.
- id: Q67
  page: 9
  dimension: output_form
  text: MOOSE performed best in REL, STY, and GRA traits.
- id: Q68
  page: 9
  dimension: output_form
  text: For the remaining traits, RF led in VOC and HOL, XGB in ORG, and Fanar (5) in DEV and MEC.
- id: Q69
  page: 9
  dimension: output_form
  text: Encoder-based models excel in prompt-specific tasks, approaching the IAA (Table 4), which indicates a close reach
    to the human performance.
- id: Q70
  page: 9
  dimension: output_form
  text: AraBERT exhibits the best performance overall in the prompt-specific setup with an average QWK performance of 0.74.
- id: Q71
  page: 9
  dimension: output_form
  text: 'However, its cross-prompt performance drops significantly (average QWK: 0.549), underscoring its ability to capture
    prompt-dependent patterns rather than generalizable features.'
- id: Q72
  page: 9
  dimension: input_ontology
  text: We note that the applicability of the prompt-specific setup is relatively limited due to reliance on target prompt
    essays that are labeled, which is often unavailable in practice.
- id: Q73
  page: 9
  dimension: output_form
  text: 'In the cross-prompt setup, while MOOSE achieves the highest average performance (average QWK: 0.597), we observe
    that classical FB models (XGB) remain remarkably competitive.'
- id: Q74
  page: 9
  dimension: output_form
  text: This confirms that handcrafted features capture prompt-independent linguistic properties that generalize better in
    the more challenging and realistic cross-prompt setup than some standard encoders.
- id: Q75
  page: 9
  dimension: output_form
  text: LLMs, specifically Fanar and R7B with few shots, exhibit consistent performance across both setups, indicating they
    capture general scoring criteria.
- id: Q76
  page: 9
  dimension: output_form
  text: Their relative underperformance in prompt-specific tasks reflects their limited ability to exploit prompt-dependent
    patterns without fine-tuning.
- id: Q77
  page: 9
  dimension: output_form
  text: Overall, the findings of the benchmarking experiments above highlight the need to prioritize future research on cross-prompt
    AES, which is practically closer to the real world, while best models are still far from human performance.
- id: Q78
  page: 9
  dimension: input_content
  text: While research on automated scoring of English essays began more than 55 years ago, Arabic essay scoring is hindered
    by the lack of data resources.
- id: Q79
  page: 9
  dimension: input_content
  text: To bridge this gap, this paper introduced LAILA, the first large-scale publicly available dataset for Arabic AES.
- id: Q80
  page: 9
  dimension: input_content
  text: The dataset comprises 7,859 essays written on 8 different prompts by 4,372 high school students, and provides annotations
    for 7 writing traits as well as a holistic score with substantial inter-annotator agreement.
- id: Q81
  page: 9
  dimension: input_content
  text: This makes it a comprehensive and reliable resource for training models and evaluating writing quality of Arabic essays.
- id: Q82
  page: 9
  dimension: output_content
  text: For reproducibility, we detailed the data collection and annotation process.
- id: Q83
  page: 9
  dimension: output_form
  text: We also benchmarked LAILA using SOTA Arabic and English AES models in both prompt-specific and cross-prompt settings,
    showing strong baselines for future research.
- id: Q84
  page: 9
  dimension: output_content
  text: We heartily thank our dedicated annotators for their contributions and express our gratitude to Qatar University Testing
    Center, the Ministry of Education and Higher Education in Qatar (the Arabic Section of the Department Of Educational Supervision
    in particular), participating schools, and students for making this work possible.
- id: Q85
  page: 9
  dimension: output_content
  text: We also acknowledge the support of Advanced Group for Information Technology (AGI) for providing access to the platform,
    Assessment Gourmet, which was used to manage and administer the annotation process.
- id: Q86
  page: 9
  dimension: input_content
  text: This work was made possible by NPRP grant NPRP14S-0402-210127 from the Qatar Research Development and Innovation (QRDI)
    Council.
- id: Q87
  page: 9
  dimension: input_content
  text: While LAILA represents a significant step forward for Arabic AES, it has notable limitations.
- id: Q88
  page: 9
  dimension: input_content
  text: First, LAILA was collected from students in a single country, Qatar, and specific grade levels, grades 10 to 12, which
    may limit its generalizability to other Arabic-speaking populations due to diverse educational systems. However, this
    concern is partially mitigated by Qatar's large population of Arab expatriates, resulting in student participants representing
    a wide variety of Arabic dialects and backgrounds.
- id: Q89
  page: 10
  dimension: input_ontology
  text: Second, LAILA includes only explanatory and persuasive writing prompts, limiting genre diversity and potentially affecting
    model robustness across other styles, such as narrative or descriptive writing.
- id: Q90
  page: 10
  dimension: input_content
  text: Third, two of the prompts (Prompts 3 and 4) have fewer essays than the rest, which could introduce imbalance and lead
    to skewed performance in prompt-specific evaluations.
- id: Q91
  page: 10
  dimension: output_ontology
  text: Fourth, the relevance trait is scored on a narrow scale from 0 to 2, which limits the granularity of evaluation and
    may cause QWK to underrepresent subtle differences in model predictions.
- id: Q92
  page: 10
  dimension: input_form
  text: Fifth, with an average essay length of only 171 words, the dataset lacks extended writing samples, restricting the
    assessment of models on long-form academic tasks requiring more complex, extended compositions.
- id: Q93
  page: 10
  dimension: output_form
  text: Finally, we acknowledge that the experimental results reported in Table 5 do not aim to exhaustively benchmark state-of-the-art
    AES models; rather, they serve as baseline performance for LAILA.
- id: Q94
  page: 10
  dimension: input_content
  text: We emphasize that the primary contribution of this work lies in the construction and public release of a large-scale
    Arabic AES dataset, rather than in proposing novel AES model architectures.
- id: Q95
  page: 10
  dimension: output_content
  text: 'The collection of LAILA received approval from an Institutional Review Board (IRB Number: QU-IRB 159/2024-EA) and
    was conducted with informed consent from both students and their legal guardians.'
- id: Q96
  page: 10
  dimension: input_content
  text: Essays were written under exam-style supervised conditions, with participation entirely voluntary and independent
    of students' academic evaluations or grades.
- id: Q97
  page: 10
  dimension: input_form
  text: To protect participant privacy, all submissions were assigned pre-generated anonymous identifiers, and personally
    identifiable information was systematically removed during data cleaning.
- id: Q98
  page: 10
  dimension: output_content
  text: Annotation was conducted on a platform that prevented annotators from accessing student identities or demographic
    information.
- id: Q99
  page: 10
  dimension: input_content
  text: Essay prompts were carefully designed to be developmentally appropriate for the target age groups, culturally relevant
    to the Arabic-speaking context, and free of sensitive topics or potentially harmful content.
- id: Q100
  page: 10
  dimension: input_content
  text: The dataset includes balanced gender representation and covers grades 10-12.
- id: Q101
  page: 10
  dimension: output_content
  text: All annotators were qualified Arabic language educators who received fair compensation at or above local professional
    rates.
- id: Q102
  page: 10
  dimension: output_content
  text: They completed structured training on annotation guidelines, and inter-annotator disagreements were resolved through
    systematic adjudication procedures.
- id: Q103
  page: 10
  dimension: output_form
  text: The dataset will be released exclusively for research and educational purposes in Arabic automated essay scoring.
- id: Q104
  page: 10
  dimension: output_form
  text: We explicitly prohibit its use for high-stakes educational decisions affecting individual students.
- id: Q105
  page: 10
  dimension: output_form
  text: 'Users must commit to: (1) preventing re-identification attempts, (2) avoiding demographic profiling or inference,
    and (3) refraining from deployment in operational assessment contexts without independent validation.'
- id: Q106
  page: 10
  dimension: output_form
  text: We recommend that any system developed using LAILA undergo fairness auditing and stakeholder consultation before real-world
    application.
- id: Q107
  page: 11
  dimension: input_ontology
  text: 'TAQEEM 2025: Overview of the first shared task for Arabic quality evaluation of essays in multi-dimensions.'
- id: Q108
