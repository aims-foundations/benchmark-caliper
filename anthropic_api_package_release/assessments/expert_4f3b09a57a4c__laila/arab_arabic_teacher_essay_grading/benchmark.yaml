  text: 'ZaQQ: A new Arabic dataset for automatic essay scoring via a novel human–ai collaborative framework.'
- id: Q110
  page: 11
  dimension: input_content
  text: The English language learner insight, proficiency and skills evaluation (ELLIPSE) corpus.
- id: Q111
  page: 11
