- id: Q114
  page: 12
  dimension: output_content
  text: For annotating LAILA, we adopted the rubric from the Core Academic Skills Test (CAST), which is provided in Arabic,
    developed by the Qatar University Testing Center (QUTC).
- id: Q115
  page: 12
  dimension: output_ontology
  text: 'This rubric guided scoring across 7 writing traits: relevance (REL), organization (ORG), vocabulary (VOC), style
    (STY), development (DEV), mechanics (MEC), and grammar (GRA).'
- id: Q116
  page: 12
  dimension: output_ontology
  text: An English-translated version of the CAST rubric is presented in Table 6.
- id: Q117
  page: 13
  dimension: output_ontology
  text: 'Note: A score of 0 is assigned if the student does not attempt the task, provides a response that falls below the
    performance level described for score 1, or submits content that is not relevant to the topic of the given prompt.'
- id: Q118
  page: 13
  dimension: input_ontology
  text: 'Table 6: CAST Persuasive/Argumentative Writing Rubric - English Translation (Bashendy et al., 2024).'
- id: Q119
  page: 14
  dimension: output_ontology
  text: Figure 4 presents the score distributions in LAILA across 8 distinct prompts (P1–P8) and 7 writing traits, including
    Relevance (REL), Organization (ORG), Vocabulary (VOC), Style (STY), Development (DEV), Mechanics (MEC), and Grammar (GRA),
    alongside a Holistic (HOL) score representing the sum of all individual traits.
- id: Q120
  page: 14
  dimension: output_ontology
  text: All traits are rated on a scale of 0–5, except REL, which ranges from 0–2.
- id: Q121
  page: 14
  dimension: output_form
  text: Overall, most traits approximate a normal distribution with comparable patterns across prompts, suggesting that essays'
    quality remains relatively stable regardless of the prompt topic.
- id: Q122
  page: 14
  dimension: output_content
  text: However, variations emerge by prompt and trait.
- id: Q123
  page: 14
  dimension: output_ontology
  text: For REL, distributions are consistently skewed toward score 2 (the highest) across all prompts, indicating that most
    students successfully addressed the assigned task and produced strongly relevant essays.
- id: Q124
  page: 14
  dimension: input_content
  text: However, P1 and P5 display relatively higher frequencies at score 0, compared to other prompts, suggesting potential
    ambiguity in prompt wording that may have limited clear interpretation.
- id: Q125
  page: 14
  dimension: input_ontology
  text: Notably, both P1 and P5 are explanatory prompts, which often allow greater flexibility in structure and content.
- id: Q126
  page: 14
  dimension: input_content
  text: This openness may have led to varied interpretations among students and inconsistencies in alignment with the intended
    prompt focus.
- id: Q127
  page: 14
  dimension: output_form
  text: The distribution of ORG scores varies across prompts but consistently peaks at score 3.
- id: Q128
  page: 14
  dimension: output_form
  text: P2 exhibits a pronounced peak at 3, whereas P3 and P4 show a wider spread toward lower scores, suggesting a weaker
    organizational structure in these essays.
- id: Q129
  page: 14
  dimension: output_form
  text: P5 and P6 display nearly identical, perfectly bell-shaped distributions, while P7 and P8 are skewed toward higher
    scores, reflecting stronger organization.
- id: Q130
  page: 14
  dimension: output_form
  text: Similarly, the VOC and STY traits generally follow comparable patterns, clustering around scores 2–3 with a common
    peak at 3, indicating that these dimensions present moderate challenges for most students.
- id: Q131
  page: 14
  dimension: output_form
  text: The DEV, MEC, and GRA traits exhibit broadly comparable distributions across all prompts, though with subtle variations.
- id: Q132
  page: 14
  dimension: output_form
  text: The DEV trait shows distinct peaks at scores 2, 3, and 4, suggesting that
- id: Q133
