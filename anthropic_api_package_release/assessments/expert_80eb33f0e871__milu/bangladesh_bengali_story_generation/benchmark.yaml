- id: Q17
  page: 3
  dimension: input_ontology
  text: MILU is a large, multi-domain test set containing multiple-choice based questions (MCQs) taken from over 41 subjects
    with an emphasis on India-specific knowledge.
- id: Q18
  page: 3
  dimension: input_ontology
  text: This benchmark covers many domains, including Science, Social Sciences, Humanities, Arts, Business Studies, and Law,
    among others.
- id: Q19
  page: 3
  dimension: input_ontology
  text: MILU is designed as a culturally relevant benchmark to assess general problem-solving abilities and India-specific
    knowledge.
- id: Q20
  page: 3
  dimension: input_content
  text: These questions were sourced following an approach similar to AGIEVAL (Zhong et al., 2023), collecting the questions
    from various public exams taken by individuals intending to either pursue higher studies or seek career advancements,
    such as qualification tests and national and state-level civil services exams, among others.
- id: Q21
  page: 3
  dimension: input_content
  text: We gathered exam-specific questions by scraping various online exam portals that offer previously released question
    papers from various exams in multiple different languages.
- id: Q22
  page: 3
  dimension: output_content
  text: These portals typically tag questions manually with topic names and language details, and subject experts ensure the
    accuracy of the answers.
- id: Q23
  page: 3
  dimension: input_content
  text: Our benchmark includes questions from over 40 different types of exams conducted both at the national and state levels
    over recent years.
- id: Q24
  page: 3
  dimension: input_content
  text: Regional state exams are particularly valuable as they cover various state-level topics and emphasize the official
    language of each state.
- id: Q25
  page: 3
  dimension: input_content
  text: In total, we collected more than 150K questions across 11 Indian Languages- Bengali (bn), Gujarati (gu), Hindi (hi),
    Kannada (kn), Malayalam (ml), Marathi (mr), Odia (or), Punjabi (pn), Tamil (ta), Telugu (te), and English (en)-spanning
    41 diverse subjects.
- id: Q26
  page: 3
  dimension: input_content
  text: English questions are also included as these often address Indian culture-specific content, which is notably missing
    from existing popular benchmarks.
- id: Q27
  page: 4
  dimension: input_form
  text: Despite our best efforts to maintain the quality of questions collected, some amount of noise or errors may still
    be present. To address potential noise in the questions, we employ multiple layers of manual and automated cleaning filters.
- id: Q28
  page: 4
  dimension: input_form
  text: Initially, we manually review a large sample of questions to detect and eliminate potential sources of noise.
- id: Q29
  page: 4
  dimension: input_form
  text: During the collection process, we exclude any reading-comprehension-style questions, images-based questions, and those
    with more than four answer options to ensure uniformity and consistency.
- id: Q30
  page: 4
  dimension: input_form
  text: To remove incorrect language entries, we utilize a combination of INDICLID (Madhani et al., 2023) and Unicode-based
    filtering (Khan et al., 2024), ensuring that the questions are in the correct language.
- id: Q31
  page: 4
  dimension: input_form
  text: To further refine the dataset, we remove any duplicate questions to retain only the unique ones.
- id: Q32
  page: 4
  dimension: input_form
  text: As a final step, we manually verify a sample of questions from each language to ensure accuracy and correct any remaining
    errors.
- id: Q33
  page: 4
  dimension: output_content
  text: Upon examination, we found that approximately 45% of questions were accurately labeled with a topic name, while the
    remaining questions lacked this information.
- id: Q34
  page: 4
  dimension: input_form
  text: To address this issue, we first translate the untagged questions into English using INDICTRANS2 (Gala et al., 2023)
    and then prompt GPT-4O-MINI model to assign an appropriate topic name to the question.
- id: Q35
  page: 4
  dimension: output_ontology
  text: Finally, in total, we get around 20K tags. However, these tags are highly fine-grained, often having a heavy overlap.
- id: Q36
  page: 4
  dimension: output_ontology
  text: To organize them, we embed the tags using the NV-EMBED-V2 (Lee et al., 2024) model and apply K-means clustering to
    group tags into 50 clusters.
- id: Q37
  page: 4
  dimension: output_content
  text: We manually review these clusters and assign appropriate subject labels.
- id: Q38
  page: 4
  dimension: output_ontology
  text: 'Following the manual merging of related clusters, we determine 41 distinct subject names, which fall into eight main
    domains: Arts and Humanities, Social Sciences, Environmental Sciences, Law and Governance, Health and Medicine, Science,
    Engineering and Technology, and Business Studies.'
- id: Q39
  page: 4
  dimension: input_content
  text: Finally, we observed that some topics in certain languages had less than 100 questions. To ensure thorough evaluation
    across all subjects and languages, we aimed to have at least 100 questions per subject in each language.
- id: Q40
  page: 4
  dimension: input_content
  text: For subjects with insufficient questions, we sampled questions from the English set from that subject and translated
    them into the required language using GPT-4O.
- id: Q41
  page: 4
  dimension: input_form
  text: We chose GPT-4O over specialized translation models for their ability to remain task-aware during translation (Ahuja
    et al., 2024), ensuring the translated content aligns with the intent of the question.
- id: Q42
  page: 4
  dimension: input_content
  text: In total, we release around 79K questions across 41 subjects across 8 domains in 11 languages, capping each subject-language
    pair at 500 questions for feasible evaluations.
- id: Q43
  page: 4
  dimension: input_content
  text: Table 2 shows the overall statistics of MILU. Of the total 79K questions, only 25% of questions are translated from
    English, with the remainder
- id: Q44
  page: 5
  dimension: output_form
  text: We evaluate 42 different models on MILU, including large proprietary models, open-source multilingual models, and
    popular fine-tuned models specific to Indic languages.
- id: Q45
  page: 5
  dimension: output_form
  text: Both the base versions and instruction fine-tuned variants of these models, wherever applicable, are evaluated to
    measure the improvements gained from fine-tuning.
- id: Q46
  page: 5
  dimension: output_form
  text: All models, except for proprietary models and LLAMA-3.1-405B, are tested under 0-shot, 1-shot, and 5-shot setups.
- id: Q47
  page: 5
  dimension: input_content
  text: We maintain a separate validation set of approximately 9,000 questions to serve as examples for few-shot evaluations.
- id: Q48
  page: 5
  dimension: output_form
  text: For non-API-based models, we use the LM-EVALUATION-HARNESS (Gao et al., 2024; Biderman et al., 2024) to ensure clean
    and reproducible evaluations.
- id: Q49
  page: 5
  dimension: output_form
  text: We use the log-likelihood method, where the probability of a given output string is computed by conditioning it on
    some provided input (Brown et al., 2020).
- id: Q50
  page: 5
  dimension: output_form
  text: Specifically, the log-likelihood of an answer (a) given the question (x), i.e., logP(a|x), is calculated by concatenating
    the answer (a) with question (x), and then summing up the log probabilities, of each target token.
- id: Q51
  page: 5
  dimension: output_form
  text: For multiple choice questions, given k possible answer strings, we select the answer string (ai) with the highest
    conditional log probability, i.e., argmax(logP(a1|x), ..., logP(ak|x)).
- id: Q52
  page: 5
  dimension: output_form
  text: The API-based models are evaluated using the generative approach due to the lack of support for prompt log probabilities.
- id: Q53
  page: 5
  dimension: output_form
  text: We explicitly prompt these models to generate the correct response in a structured JSON format to simplify response
    parsing.
- id: Q54
  page: 5
  dimension: output_form
  text: Due to the high costs involved, these models are evaluated only in the zero-shot setup.
- id: Q55
  page: 6
  dimension: output_form
  text: We report 5-shot accuracies for all open models (except for LLAMA-3.1-70B-INSTRUCT & LLAMA-3.1-405B for which we report
    0-shot accuracy) with the accuracy averaged across all the domains per language.
- id: Q56
  page: 6
  dimension: input_content
  text: We evaluate around 16 Indic language LLMs on MILU.
- id: Q57
  page: 6
  dimension: input_content
  text: These models are primarily built by adapting English LLMs, such as LLAMA-2-7B, by first continually pretraining on
    small amount Indic language data, followed by optionally instruction finetuning them.
- id: Q58
  page: 6
  dimension: output_form
  text: As seen from Table 4, across languages, the models exhibit average performance comparable to random baselines, with
    minimal variations among them.
- id: Q59
  page: 6
  dimension: input_ontology
  text: When analyzed across domains, the models generally perform worse in Arts, Humanities, and Social Sciences than in
    STEM subjects.
- id: Q60
  page: 6
  dimension: output_form
  text: We compare the performance of different Base and Instruct models across zero, one, and five-shot setups.
- id: Q61
  page: 6
  dimension: output_form
  text: As shown in Figure 3, the performance of base models consistently improves with an increasing number of in-context
    examples, with the 5-shot setup yielding the best results.
- id: Q62
  page: 6
  dimension: output_form
  text: In contrast, Instruct models exhibit more varied behavior, where models either stagnate or even degrade in performance.
- id: Q63
  page: 6
  dimension: output_form
  text: This also aligns with expectations, as Instruct models are specifically fine-tuned as conversation assistants and
    may not respond well to the few-shot in-context examples format.
- id: Q64
  page: 7
  dimension: output_form
  text: We evaluate the LLAMA and GEMMA family of models, ranging from 1B to 405B parameters, to analyze how performance scales
    with model size.
- id: Q65
  page: 7
  dimension: output_form
  text: Figure 5 shows that the model performance improves significantly with increasing scale.
- id: Q66
  page: 7
  dimension: output_form
  text: Notably, instruction-tuned models in the LLAMA family show more substantial improvements as compared to those in the
    GEMMA family.
- id: Q67
  page: 7
  dimension: output_form
  text: We analyze the performance of various base and instruct models across multiple domains and languages.
- id: Q68
  page: 7
  dimension: input_ontology
  text: Similar trends to those in Section (§5.2) are observed where the open models perform poorly in domains specific to
    Indian culture—such as Arts & Humanities, Social Sciences, and Law & Governance—but demonstrate higher performance in
    STEM fields.
- id: Q69
  page: 7
  dimension: input_content
  text: This suggests that the training corpora for these models lack sufficient culturally specific data.
- id: Q70
  page: 7
  dimension: input_content
  text: Bridging this gap requires a more inclusive data distribution that ensures equitable representation of all cultures
    and languages.
- id: Q71
  page: 7
  dimension: output_form
  text: As most Indic LLMs are built on English base models like LLAMA-2-7B, we assess the impact of language adaptation on
    their performance.
- id: Q72
  page: 7
  dimension: output_form
  text: Table 5 compares language-specific models with the original LLAMA-2-7B, and instruction-tuned models with LLAMA-2-7B-CHAT.
- id: Q73
  page: 7
  dimension: output_form
  text: Our findings show minimal gains, with some models even underperforming post-adaptation.
- id: Q74
  page: 8
  dimension: input_ontology
  text: In this paper, we introduced MILU—Multilingual Indic Language Understanding Benchmark-a comprehensive benchmark specifically
    designed to evaluate LLMs across 11 Indic languages, spanning diverse domains and culturally relevant subjects.
- id: Q75
  page: 8
  dimension: output_form
  text: We evaluate 45 different LLMs and find that the majority of LLMs struggle on MILU, with GPT4o achieving the highest
    average accuracy.
- id: Q76
  page: 8
  dimension: input_ontology
  text: The analysis also shows that models perform significantly better in high-resource languages than low-resource ones,
    highlighting the need for more robust multilingual strategies.
- id: Q77
  page: 8
  dimension: input_ontology
  text: Additionally, the domain-specific analysis indicates that models perform better in general fields such as STEM while
    facing challenges in culturally relevant subjects like Arts, Humanities, and Law, highlighting the lack of this knowledge
    in the current models and datasets.
- id: Q78
  page: 8
  dimension: output_form
  text: We conjecture that limited performance gains may result from small language-specific datasets and reliance on parameter-efficient
    methods like LoRA (Hu et al., 2022).
- id: Q79
  page: 8
  dimension: output_form
  text: Another contributing factor could be the lack of diversity in instruction fine-tuning datasets.
- id: Q80
  page: 8
  dimension: output_form
  text: Models like AIRAVATA, which utilize more diverse data (Gala et al., 2024), exhibit noticeably better performance.
- id: Q81
  page: 8
  dimension: output_form
  text: Further investigation is required to fully understand the limitations and opportunities in this area.
- id: Q82
  page: 9
  dimension: input_ontology
  text: First, we restricted our study to the top 11 languages due to the lack of readily available questions in low-resource
    languages, which we aim to address in future work.
- id: Q83
  page: 9
  dimension: output_form
  text: Second, limited computational resources prevented a thorough evaluation of larger models, such as LLAMA-3.1-70B-INSTRUCT
    and LLAMA-3.1-405B.
- id: Q84
  page: 9
  dimension: input_content
  text: Third, the scarcity of questions necessitated translating a portion of the dataset.
- id: Q85
  page: 9
  dimension: output_form
  text: Finally, our evaluation primarily relies on the log-likelihood approach, which may yield different results compared
    to other established methods, such as generation-based evaluation and chain-of-thought (CoT) prompting.
- id: Q86
  page: 9
  dimension: output_content
  text: We would like to thank EkStep Foundation and Nilekani Philanthropies for their generous grant towards building datasets,
    models, tools and other resources for Indian languages.
- id: Q87
  page: 9
  dimension: output_content
  text: We are also immensely grateful to the volunteers from the AI4Bharat team for their motivation and meticulous efforts
    in conducting manual audits.
- id: Q88
  page: 9
  dimension: input_content
  text: All data described in this work was scraped from publicly available resources.
- id: Q89
  page: 9
  dimension: input_content
  text: The datasets used in this paper will be made available under permissible licenses.
- id: Q90
  page: 9
  dimension: output_form
  text: Additionally, the code used for our evaluations will be made publicly available under the MIT License.
- id: Q91
  page: 9
  dimension: output_content
  text: We only used ChatGPT for assistance purely with the language of the paper, e.g., paraphrasing, spell-checking, or
