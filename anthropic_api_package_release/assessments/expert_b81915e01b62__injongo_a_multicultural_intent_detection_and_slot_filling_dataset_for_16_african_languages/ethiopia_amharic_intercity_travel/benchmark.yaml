  page: 6
  dimension: output_content
  text: We attribute the success of this model to the coverage of all languages in INJONGO during its pre-training (see Appendix
    Table 11).
- id: Q80
  page: 6
  dimension: output_form
  text: AfroXLMR, the earlier version of AfroXLMR-76L, follows closely with an average accuracy of 92.2% and an F1 score of
    85.2%.
- id: Q81
  page: 6
  dimension: output_content
  text: However, this model was not pre-trained on some of the languages such as ewe, twi, lin, and wol leading to a significant
    drop in performance of −5.8, −4.8, −1.3, −0.4 for intent detection when compared to AfroXLMR-76L.
- id: Q82
  page: 6
  dimension: output_form
  text: This shows that multilingual encoders for African languages can significantly improve the performance over massively
    multilingual encoders covering more than 100 languages such as XLM-R and NLLB LLM2Vec.
- id: Q83
  page: 7
  dimension: output_form
  text: Table 6 shows the zero-shot LLM evaluation of five open models and two closed models.
- id: Q84
  page: 7
  dimension: output_form
  text: Evaluation is based on accuracy and F1-score for ID and SF tasks. Average computed on five templates, and on only
    African languages.
- id: Q85
  page: 7
  dimension: output_form
  text: Slot-filling task is difficult for all LLMs including on English The highest average performance achieved by the LLMs
    is 33.3% for GPT-4o, although much better than the open model at 28.8. We attribute this to the difficulty of LLMs on
    the named entity recognition task as reported by other researchers (Yu et al., 2023; Ojo et al., 2023). In comparison
    to the best-finetuned model, there is a large drop in performance of −53.2. This shows that having training data is still
    relevant for this task even in the LLM era, especially for low-resource languages.
- id: Q86
  page: 7
  dimension: output_form
  text: For intent detection, we find that all open models achieved below 50% on the relatively easy task of intent detection.
    The poor performance may be attributed to either a lack of exposure to many African languages or the large label space
    (i.e. 40) for the classification task.
- id: Q87
  page: 7
  dimension: output_content
  text: The closed models result are better, with GPT-4o and Gemini 1.5 Pro achieving more than +20 points than the best open
    model, Llama 3.3 70B. However, if we compare the results in the English language, open models such as Gemma 2 27B and
    Llama 3.3 70B are competitive with closed models. This shows that open models are more biased toward high-resource languages.
- id: Q88
  page: 7
  dimension: input_content
  text: The performance of some African languages is often higher than others, this is probably connected to the amount of
    monolingual data available on the web.
- id: Q89
  page: 7
  dimension: input_content
  text: For example, Swahili (swa) with over 1 billion monolingual data (Kudugunta et al., 2023) has 80.6 accuracy point that
    is comparable performance to English performance (81.1) with Llama 3.3 70B, while other languages have much lower performance.
- id: Q90
  page: 8
  dimension: output_form
  text: 'Figure 3 shows the result of the various few-shot setups: 5-examples, 1-shot (40 examples, one from each intent type),
    and 4-shots (160 examples).'
- id: Q91
  page: 8
  dimension: output_form
  text: 'Our result shows a big boost in performance with only 5-examples, especially for the slot-filling task and some LLMs:
    GPT-4o and Gemini 1.5 Pro improved the most by more than +19 points.'
- id: Q92
  page: 8
  dimension: output_form
  text: Similarly, Gemma 2 9B improved from 2.4 to 33.5 matching the performance of Llama 3.3 70B (with 5-examples).
- id: Q93
  page: 8
  dimension: output_form
  text: Additional samples from 1-shot and 4-shot consistently improved performance for all models except Llama 3.3 70B.
- id: Q94
  page: 8
  dimension: output_form
  text: We find Gemini 1.5 Pro, Gemma 2 9B and Gemma 2 27B to benefit the most from 5-examples, with an accuracy boost of
    +14.3, +15.7, and +21.8 respectively.
- id: Q95
  page: 8
  dimension: output_form
  text: While the zero-shot performance of Gemini 1.5 Pro is worse than GPT-4o, the few-shot performance exceeds that of GPT-4o
    with +1.8 and +2.3 improvement in 5-examples and 1-shot.
- id: Q96
  page: 8
  dimension: output_form
  text: Our result shows the effectiveness of LLMs in adapting quickly to a new task in low-resource settings.
- id: Q97
  page: 8
  dimension: output_form
  text: While all LLMs improve performance with more shots, there is still a large gap with SFT.
- id: Q98
  page: 8
  dimension: output_form
  text: We performed SFT on Gemma 2 9B with all training samples and prompt templates, we found a large performance gap of
    +15.8 and +34.1 for intent detection and slot-filling respectively if we compare SFT (52k samples) to 4-shots (160 examples).
- id: Q99
  page: 8
  dimension: output_form
  text: However, for closed models, the gap of SFT on Gemma 2 9B to Gemini 1.5 Pro and GPT-4o is much smaller, especially
    for intent detection.
- id: Q100
  page: 8
  dimension: output_form
  text: In general, few-shots of LLMs are still worse than SFT but are very crucial and effective when training data are scarce.
- id: Q101
  page: 8
  dimension: input_ontology
  text: 'Figure 4 shows our final experiments that compare cross-lingual transfer results from two English datasets: CLINC
    (Western-centric) and INJONGO (African-centric) on the intent detection task.'
- id: Q102
  page: 8
  dimension: output_form
  text: At 5-shots, in both in-language and translate-test settings, the accuracy of all settings is quite similar, however
    as we increase the number of instances to 10-shots (400 examples), we find that the INJONGO in-language performance was
    better than the CLINC (16.1 vs. 4.0) that is more Western-centric.
- id: Q103
  page: 8
  dimension: output_form
  text: Similarly, in translate-test setting, the gain in performance is much larger (+29), which implies that in a low-resource
    setting, leveraging a multicultural dataset with the African context is effective.
- id: Q104
  page: 8
  dimension: input_content
  text: However, with more samples (25-shots), there is no significant difference in whether the samples are Western-centric
    or not, and training data size seems to be more important.
- id: Q105
  page: 9
  dimension: input_ontology
  text: We present INJONGO, a new benchmark dataset for evaluating intent detection and slot-filling for 16 African languages.
- id: Q106
  page: 9
  dimension: input_content
  text: INJONGO represents the first large-scale multicultural dataset focused on African language Conversation AI.
- id: Q107
  page: 9
  dimension: input_ontology
  text: The scope of INJONGO is constrained by its coverage of only 5 domains and 40 intents, missing some other domains such
    as healthcare and education that are essential for real-world applications.
- id: Q108
  page: 9
  dimension: input_content
  text: Our language selection, while substantial, still represents only a fraction of Africa's linguistic diversity, particularly
    lacking representation from other language families such as Nilo-Saharan languages.
- id: Q109
  page: 9
  dimension: output_content
  text: The annotation process revealed inherent challenges in entity classification across languages, requiring two rounds
    of review to achieve consistent quality.
- id: Q110
  page: 9
  dimension: input_content
  text: Although significant for low-resource languages, the dataset size of 3,200 examples per language remains modest compared
    to high-resource benchmarks, potentially limiting model performance.
- id: Q111
  page: 9
  dimension: input_ontology
  text: Additionally, the fixed distribution of examples across intents may not accurately reflect the natural frequency of
    these interactions in real-world conversations.
