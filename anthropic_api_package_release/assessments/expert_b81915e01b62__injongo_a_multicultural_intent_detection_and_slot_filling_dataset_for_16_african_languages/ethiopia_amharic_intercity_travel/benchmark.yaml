coverage_strengths:
- user_priority: Amharic language support for Ethiopian intercity booking
  benchmark_coverage: Amharic is one of 16 African languages covered, drawn from the Afro-Asiatic family; native-speaker annotators
    generated culturally grounded utterances [Q4, Q33]
  dimension: input_content
- user_priority: Intent detection for travel domain
  benchmark_coverage: Travel is one of INJONGO's 5 domains, with intents including 'exchange rate' and 'book flight' selected
    as 'most suitable to African contexts' from CLINC [Q39, Q117]
  dimension: input_ontology
- user_priority: Slot-filling for fare and payment extraction
  benchmark_coverage: CURRENCY and MONEY are among the 23 final slot types, supporting Birr-denominated fare extraction in
    principle [Q144]
  dimension: output_ontology
- user_priority: Ground-up African cultural grounding rather than translation
  benchmark_coverage: Utterances were generated by native speakers rather than translated; the Xhosa annotator example explicitly
    shows substitution of South African banks (FNB, Absa) and Rand currency for Western exemplars [Q37, Q40, Q41]
  dimension: input_content
- user_priority: High annotation quality with inter-annotator agreement
  benchmark_coverage: Two-round review process yielded Fleiss' Kappa of 0.912–1.00 across all languages after corrections
    [Q48, Q109]
  dimension: output_content
- user_priority: Structured intent+slot output format matching task-oriented dialogue
  benchmark_coverage: Benchmark evaluates accuracy for intent detection and F1 for slot-filling, with structured $$ -delimited
    output format matching task-oriented dialogue system requirements [Q84, Q145, Q146]
  dimension: output_form
- user_priority: African-centric training data advantage over Western-centric sources
  benchmark_coverage: Cross-lingual transfer experiments show INJONGO English outperforms CLINC by +16.1 accuracy points at
    10-shots in-language and +29 accuracy points in translate-test, confirming multicultural data advantage in low-resource
    settings [Q102, Q103]
  dimension: input_content
