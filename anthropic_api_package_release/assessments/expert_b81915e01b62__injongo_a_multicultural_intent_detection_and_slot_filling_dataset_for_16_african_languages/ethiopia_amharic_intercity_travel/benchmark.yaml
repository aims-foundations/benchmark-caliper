  text: Limited available labeled datasets are one of the major challenges of AfricaNLP.
- id: Q25
  page: 2
  dimension: input_ontology
  text: The closest benchmark to our task of slot-filling is MasakhaNER (Adelani et al., 2021, 2022) that covers 20 African
    languages but they focus on four entity types "personal names", "organization", "location", and "dates", which are not
    fine-grained and well adapted to several domains such as banking and travel that we cover in INJONGO.
- id: Q26
  page: 2
  dimension: input_content
  text: Most of the existing benchmarks for intent detection and slot-filling tasks are English-only.
- id: Q27
  page: 2
  dimension: input_content
  text: 'There are a few efforts to make them multilingual in two ways: (1) human generating the utterances in a particular
    domain, followed by intent and slot filling annotation. (2) through human translation of annotated data from English to
    other languages which introduces some cultural bias since Western entities are being propagated.'
- id: Q28
  page: 2
  dimension: input_content
  text: While the first approach is the most ideal methodology, it is very cost-intensive when scaling to many languages.
- id: Q29
  page: 2
  dimension: input_content
  text: MASSIVE benchmark partially addresses this Western cultural bias by encouraging translators to replace entities with
    more culturally relevant ones, but Western entities are still prevalent in the dataset.
- id: Q30
  page: 2
  dimension: input_content
  text: In our paper, we introduce INJONGO which is the largest intent detection and slot-filling dataset covering 16 African
    languages, and we ensured that the slot entities are more culturally relevant in the respective countries the languages
    are from.
- id: Q31
  page: 2
