- id: Q121
  page: 13
  dimension: output_form
  text: To ensure equitable comparison across architectures, we implement a standardized training protocol.
- id: Q122
  page: 13
  dimension: output_form
  text: All SLMs are finetuned using the AdamW optimizer in 20 epochs with a learning rate schedule incorporating 10% linear
    warmup steps followed by linear decay.
- id: Q123
  page: 13
  dimension: output_form
  text: Early stopping (patience=5) is adopted, and the dev set performance is monitored.
- id: Q124
  page: 13
  dimension: output_form
  text: Learning rates are carefully calibrated for each architecture type as detailed in Table 10.
- id: Q125
  page: 13
  dimension: output_form
  text: Our empirical investigations demonstrate that slot filling tasks consistently require higher learning rates compared
    to intent detection tasks specifically, encoder-only models utilize 1 × 10−5/3 × 10−5for intent detection/slot filling
    respectively, while encoder-decoder architectures necessitate elevated rates of 5 × 10−5/1 × 10−4.
- id: Q126
  page: 13
  dimension: output_form
  text: Given the computational constraints of finetuning LLMs, Fully Supervised Fine-Tuning (FSFT) is exclusively performed
    on the Gemma 2 9B model with 5 epochs.
- id: Q127
  page: 14
  dimension: output_form
  text: Based on established SFT practices and task-specific requirements, we use learning rates of 2 × 10−5 and 2.5 × 10−5
    for intent detection and slot filling respectively.
- id: Q128
  page: 14
  dimension: input_content
  text: Training data is constructed from the combined train splits of INJONGO dataset across all 17 languages, with prompts
    randomly sampled from a pool of 5 predefined templates.
- id: Q129
  page: 14
  dimension: input_form
  text: All experiments are conducted using full precision (FP32) on NVIDIA H100/L40S GPUs with a consistent batch size of
    32, achieved through gradient accumulation when necessary.
- id: Q130
  page: 14
  dimension: output_form
  text: Before the final model training, we conducted a comprehensive analysis of learning rate variations to understand their
    effect on model performance across Intent Detection and Slot Filling tasks.
- id: Q131
  page: 14
  dimension: input_form
  text: For closed-source models (GPT-4o and Gemini 1.5 Pro), we utilize the API provided by the respective vendor for inference.
- id: Q132
  page: 14
  dimension: input_form
  text: For open-source models, inference is performed using vLLM (Kwon et al., 2023), except for Aya-101, where Text Generation
    Inference (TGI) is employed.
- id: Q133
  page: 14
  dimension: output_form
  text: Across 5 LLMs, we evaluated the performance of zero-shot and few-shot learning on the Intent Detection and Slot Filling
    tasks.
- id: Q134
  page: 14
  dimension: output_form
  text: We only evaluate the performance of the models on the best prompt for each task.
- id: Q135
  page: 14
  dimension: output_form
  text: The 2nd prompt for Intent Detection and the 3rd prompt for Slot Filling are used for evaluation.
- id: Q136
