name: Urban Ethiopian Utility Chatbot Users — Amharic-Language Telegram/SMS
abbreviation: ETH-UTILITY-AM
assessment_context:
  benchmark: INJONGO
  deployment_task: Intent detection and slot-filling for utility customer service
    chatbots (Ethiopian Electric Utility and Addis Ababa Water) delivered via Telegram
    and SMS
  scoping_note: This document is scoped to urban Ethiopian households in Addis Ababa
    and regional capitals (Dire Dawa, Hawassa, Mekelle) interacting in Amharic — and
    not to Sub-Saharan Africa broadly. The authoritative source for ground-truth slot
    labels is utility customer service agents and billing staff, not community annotators.
target_population:
  description: Urban Ethiopian households seeking assistance with prepaid meter top-ups,
    outage reports, and bill disputes from Ethiopian Electric Utility (EEU) and Addis
    Ababa Water and Sewerage Authority (AAWSA). Users are primarily Amharic-speaking
    adults across Addis Ababa and secondary regional capitals. Younger cohorts (approximately
    late teens through 30s) exhibit growing Amharic-English code-switching. Interaction
    is predominantly via Telegram using full Ethiopic (Ge'ez) script; SMS is a secondary
    channel.
  primary_cities:
  - Addis Ababa (primary deployment hub)
  - Dire Dawa
  - Hawassa
  - Mekelle
  population_size_estimates:
    addis_ababa_population: 'Addis Ababa metro area population approximately 5.70
      million (2024) and 5.96 million (2025) per UN-derived estimates; city proper
      estimated 3.6–4 million. Note: Ethiopia''s last published census was 2007 (2.74M
      city proper); current figures are projections. 71% of city residents use Amharic
      as primary language. Source: UN World Population Prospects 2024 via MacroTrends
      — [|https://www.macrotrends.net/global-metrics/cities/20921/addis-ababa/population|];
      language share from WorldPopulationReview citing 2007 census data — [|https://worldpopulationreview.com/cities/ethiopia/addis-ababa|]'
    regional_capital_populations: '[NEEDS VERIFICATION — deferred: below search budget;
      Statistics Ethiopia 2024 projections exist at statsethiopia.gov.et but city-level
      figures for Dire Dawa, Hawassa, and Mekelle require direct access to CSA projection
      tables]'
    urban_household_utility_customer_base_eeu: '[NEEDS VERIFICATION — deferred: EEU
      does not publish disaggregated urban customer counts in accessible English-language
      sources; low impact for benchmark scoring]'
    urban_household_utility_customer_base_aawsa: '[NEEDS VERIFICATION — deferred:
      AAWSA does not publish customer base figures in accessible English-language
      sources; low impact for benchmark scoring]'
  age_distribution_notes: 'Younger urban users (estimated late teens to early 30s)
    are more likely to code-switch with English; older users are more likely to use
    monolingual Amharic. Ethiopia''s median national age is 19.3 years (UN 2024),
    supporting high youth share of urban user base. Exact age-band breakdown for utility
    chatbot users is [NEEDS VERIFICATION — deferred: likely unsearchable without EEU/AAWSA
    CRM data].'
  occupation_and_socioeconomic_profile: 'Primarily urban wage earners and small-business
    households with active utility accounts. Smartphone and Telegram penetration skews
    toward middle-income and above within urban areas. [NEEDS VERIFICATION — deferred:
    income distribution of active EEU/AAWSA prepaid meter customers; not published
    in accessible sources]'
languages:
  primary: Amharic (አማርኛ) — official national working language of Ethiopia; dominant
    language for EEU and AAWSA customer service
  code_switching:
    description: Intra-sentential and inter-sentential Amharic-English code-switching
      is confirmed as a frequent and growing pattern, especially among urban youth.
      The deployment system must handle this robustly.
    frequency_estimate: '[NOT FOUND — searched for proportion of code-switched utterances
      in production EEU/AAWSA chat logs; no published figure exists. No Amharic-English
      code-switching NLP benchmark specific to Ethiopian utility dialogue was found.
      The broader Amharic NLP literature (EthioLLM, Walia-LLM, AGE dataset) does not
      address code-switching density in utility chat contexts.]'
    english_register: Technical/domain vocabulary (e.g., 'meter', 'top-up', 'token',
      'balance') frequently borrowed or switched to English even within otherwise
      Amharic utterances
  regional_substrate_languages:
    description: Users in Dire Dawa, Hawassa, and Mekelle may produce Amharic with
      phonological, lexical, or syntactic substrate influence from Oromo, Sidama/Sidaamu
      Afoo, or Tigrinya respectively. The extent to which this affects NLU slot-filling
      is undocumented.
    oromo_interference_zone: Dire Dawa and surrounding eastern areas; also southern
      Hawassa corridor
    tigrinya_interference_zone: Mekelle and Tigray region
    corpus_representation_of_regional_variation: '[NOT FOUND — searched for whether
      INJONGO Amharic split reflects regional variation or defaults to Addis Ababa
      prestige Amharic; no documentation found in the paper or GitHub repository.
      The INJONGO annotation logistics (Kenya-based remuneration company, pan-African
      native speaker pool) make it likely that Amharic annotators were recruited without
      explicit regional capital stratification, but this is not confirmed in published
      materials.]'
  excluded_representations:
    romanized_amharic: Explicitly out of scope per deployment decision. System is
      NOT required to handle Amharic written in Latin characters.
    rationale: Telegram transmits Ethiopic Unicode reliably; romanized input was assessed
      as an unnecessary investment for this population.
  other_minority_contact_languages: 'Oromo (Oromiffa) and Tigrinya are separate languages
    spoken by significant urban populations in their respective regional capitals;
    their presence as secondary user languages in those contexts should be considered
    for future scope extensions. [NEEDS VERIFICATION — deferred: proportion of EEU/AAWSA
    customers who are non-Amharic-primary in regional capitals; likely unsearchable
    without utility CRM data]'
writing_systems:
  primary_script: Ethiopic (Ge'ez) script — Unicode block U+1200–U+137F and extended
    ranges
  encoding_standard:
    expected: UTF-8 encoded Unicode Ethiopic
    telegram_transmission: 'Telegram transmits Ethiopic Unicode reliably in practice;
      formal confirmation of encoding normalization (NFC vs. NFD, Unicode version)
      for INJONGO Amharic instances is [NOT FOUND — searched INJONGO paper and GitHub
      repository; no Unicode normalization documentation appears in the paper, the
      ACL Anthology version, or the McGill-NLP/Injongo GitHub README. The GitHub example
      item shows Ethiopic characters rendered correctly (e.g., ''አባይ ባንክ''), but NFC/NFD
      normalization status is unconfirmed. Source: McGill-NLP/Injongo GitHub — [|https://github.com/McGill-NLP/Injongo|]]'
    sms_considerations: SMS channel may not reliably transmit Ethiopic script; per
      deployment decision, full Ethiopic script is the target and romanized fallback
      is not in scope
  numeral_mixing:
    description: Users may mix Ethiopic numerals (፩፪፫...), Western Arabic numerals
      (1 2 3...), and occasionally Eastern Arabic numerals in meter IDs, payment amounts,
      and account numbers
    injongo_documentation: '[NOT FOUND — whether INJONGO Amharic instances include
      Ethiopic-Arabic numeral mixing or standardize to one numeral system is not documented
      in the paper. The GitHub example instance uses no numerals. This remains an
      unverified gap.]'
literacy_and_digital_access:
  urban_amharic_literacy_rate: 'Adult literacy in Addis Ababa is the highest among
    Ethiopian cities: over 93% for males and approximately 80% for females (2005 DHS
    data cited by WorldPopulationReview). National urban literacy is substantially
    higher than the national aggregate. Caution: these figures are from 2005 survey
    data and may understate current rates. Source: WorldPopulationReview citing CSA/DHS
    — [|https://worldpopulationreview.com/cities/ethiopia/addis-ababa|]; corroborated
    by Wikipedia Demographics of Addis Ababa citing 2005 data (male 93.6%) — [|https://en.wikipedia.org/wiki/Addis_Ababa|]'
  addis_ababa_literacy_rate: 'Male adult literacy ~93.6%, female ~80% (2005 DHS baseline;
    likely improved by 2024 given urbanization and school expansion trends). Sub-national
    caveat: these are city-level aggregates and may not reflect variation across kebeles
    or lower-income peri-urban zones. Source: Wikipedia Demographics of Addis Ababa
    — [|https://en.wikipedia.org/wiki/Addis_Ababa|]'
  smartphone_penetration_urban_ethiopia: 'Ethio Telecom reported 83.2 million total
    subscribers and 47.4 million mobile data/internet users (target for 2024/25 FY),
    implying national mobile internet penetration of approximately 35–40%. Urban nodes
    including Addis Ababa, Dire Dawa, and Hawassa record the highest penetration,
    with 4G availability exceeding 80% in core urban areas. Smartphone affordability
    remains a barrier for approximately 51% of unbanked adults nationally. Source:
    Ethio Telecom 2024/25 performance report via TechAfrica News — [|https://techafricanews.com/2025/07/25/ethio-telecom-achieves-83-2m-subscribers-and-73-revenue-surge-as-lead-strategy-concludes/|];
    Mordor Intelligence Ethiopia Telecom report — [|https://www.mordorintelligence.com/industry-reports/ethiopia-telecom-mno-market|]'
  telegram_active_users_ethiopia: '[NEEDS VERIFICATION — deferred: no country-level
    Telegram user count for Ethiopia is published by Telegram or in ITU/World Bank
    datasets. Telegram''s dominant role in Ethiopian urban communication is widely
    reported qualitatively but no precise figure was found within search budget.]'
  mobile_internet_penetration_urban_pct: '4G coverage exceeds 80% in Addis Ababa,
    Dire Dawa, Hawassa, and regional capitals as of 2024/25. Ethio Telecom''s telecom
    density nationally reached 72.2% in early 2025. Urban penetration is substantially
    higher than the national figure. Source: Mordor Intelligence Ethiopia Telecom
    — [|https://www.mordorintelligence.com/industry-reports/ethiopia-telecom-mno-market|];
    Addis Insight Ethio Telecom H1 2024 report — [|https://www.addisinsight.net/2025/02/12/telebirr-hits-51-5-million-users-facilitating-1-03-trillion-etb-in-transactions/|]'
  notes: Urban literacy rates in Addis Ababa are substantially higher than the national
    average. Telegram is reported to be widely used as a primary communication platform
    in urban Ethiopia, but precise penetration figures require verification. Telebirr's
    54.84 million users (FY2024/25) and Ethio Telecom's 83.2 million total subscribers
    confirm deep mobile-money and mobile internet penetration in the deployment population.
infrastructure_notes:
  primary_channel: Telegram (text-based, full Ethiopic script, emoji support, inline
    buttons common in bot interfaces)
  secondary_channel: SMS (plain text; Ethiopic script delivery reliability varies
    by carrier and handset)
  mobile_network_quality_urban: '4G coverage exceeds 80% and pilot 5G cells are active
    in core business districts of Addis Ababa, Dire Dawa, Hawassa, and regional capitals
    as of FY2024/25. Ethio Telecom deployed 1,683 new mobile sites in 2024/25, with
    512 cities receiving 4G and 16 cities receiving 5G. Source: Mordor Intelligence
    — [|https://www.mordorintelligence.com/industry-reports/ethiopia-telecom-mno-market|];
    Ethio Telecom FY2024/25 annual report via Addis Insight — [|https://addisinsight.net/2025/07/24/ethio-telecom-reports-162-billion-birr-revenue-and-4-9-trillion-birr-in-telebirr-transfers-in-2017-fiscal-year/|]'
  electricity_access_addis_ababa_pct: '[NEEDS VERIFICATION — deferred: World Bank
    electrification data covers national and broad urban figures but Addis Ababa city-specific
    electricity access rate not retrieved within search budget; low impact for benchmark
    scoring]'
  prepaid_meter_penetration_eeu: '[NEEDS VERIFICATION — deferred: EEU does not publish
    prepaid vs. postpaid breakdown in accessible English-language sources]'
  bot_platform_constraints: 'Telegram Bot API imposes message-length and rate-limit
    constraints relevant to multi-turn slot-filling dialogue. [NEEDS VERIFICATION
    — deferred: specific rate limits and session management used by EEU/AAWSA deployments;
    likely requires direct engagement with EEU/AAWSA technical teams]'
domain_specific_notes:
  utility_context:
    deploying_entities:
    - Ethiopian Electric Utility (EEU) — national electricity provider
    - Addis Ababa Water and Sewerage Authority (AAWSA) — municipal water utility
    core_use_cases:
    - Prepaid meter top-up (STS token purchase and entry)
    - Outage reporting and status queries
    - Bill disputes and payment history queries
    - Account registration and meter ID lookup
    ethiopian_specific_payment_methods:
      telebirr: 'Ethio Telecom''s mobile money platform — dominant digital payment
        channel in Ethiopia with 54.84 million users as of FY2024/25 (up from ~36M
        at launch in 2021), handling 4.93 trillion ETB in cumulative transactions.
        Telebirr is explicitly used by urban citizens to pay utilities, according
        to multiple sources. 310,000 merchants and 320,000 agents as of FY2024/25.
        Source: Ethio Telecom FY2024/25 report via TechAfrica News — [|https://techafricanews.com/2025/07/25/ethio-telecom-achieves-83-2m-subscribers-and-73-revenue-surge-as-lead-strategy-concludes/|];
        Mordor Intelligence — [|https://www.mordorintelligence.com/industry-reports/ethiopia-telecom-mno-market|]'
      telebirr_injongo_presence: '[NOT FOUND — whether Telebirr appears as a PAYMENT_COMPANY
        value in INJONGO Amharic instances is not documented in the paper or in accessible
        GitHub data. The INJONGO GitHub example shows ''አባይ ባንክ'' (Abay Bank) as a
        BANK_NAME slot value in the Amharic banking domain, but no utility-domain
        Amharic examples with payment company slots are documented. Source: McGill-NLP/Injongo
        GitHub — [|https://github.com/McGill-NLP/Injongo|]]'
      cbe_birr: 'Commercial Bank of Ethiopia mobile wallet; CBE is one of Ethiopia''s
        largest banks. Integration status with EEU/AAWSA top-up workflows is [NEEDS
        VERIFICATION — deferred: not documented in accessible public sources]'
      cbe_birr_in_injongo: '[NEEDS VERIFICATION — deferred: below search budget; same
        gap as Telebirr in INJONGO]'
      hellocash: '[NEEDS VERIFICATION — deferred: relevance to utility payment workflows;
        below search budget]'
      other_mobile_money: 'M-Pesa (Safaricom Ethiopia) entered the market following
        Safaricom Ethiopia''s license in 2021. The Ethiopian mobile money market is
        dominated by Telebirr. Source: Mordor Intelligence — [|https://www.mordorintelligence.com/industry-reports/ethiopia-telecom-mno-market|]'
      cash_payment_agents: 'Physical payment agents and bank branches remain important
        channels; chatbot may need to direct users to physical locations. [NEEDS VERIFICATION
        — deferred: proportion of customers using cash vs. digital payment; not in
        accessible sources]'
    prepaid_meter_system:
      token_standard: 'STS (Standard Transfer Specification) tokens are the international
        standard for prepaid electricity metering and are used by EEU. [NEEDS VERIFICATION
        — deferred: formal EEU confirmation that STS (not a proprietary format) is
        used; the STS standard is internationally dominant for prepaid meters and
        EEU''s procurement of prepaid meters follows standard international practice,
        but a direct EEU technical document was not retrieved]'
      token_format: '20-digit numeric codes entered on the meter keypad [NEEDS VERIFICATION
        — deferred: formal EEU documentation of token format; consistent with STS
        standard internationally]'
      meter_id_format: '[NEEDS VERIFICATION — deferred: EEU meter ID length and format
        conventions; not in accessible public sources; requires EEU technical documentation]'
      aawsa_account_format: '[NEEDS VERIFICATION — deferred: AAWSA account number
        format and structure; not in accessible public sources]'
    power_shedding:
      description: Load-shedding schedules (የኃይል ቅነሳ) are a known Ethiopian utility
        context feature; users may query outage schedules by neighborhood or kebele
      schedule_source: '[NEEDS VERIFICATION — deferred: whether EEU publishes official
        load-shedding schedules and how chatbot should reference them; requires EEU
        operational documentation]'
  address_and_administrative_conventions:
    description: Ethiopian utility accounts reference addresses using a hierarchical
      administrative system that does not map cleanly to INJONGO's CITY_OR_PROVINCE
      and PLACE_NAME slot types
    administrative_hierarchy:
    - Kebele (ቀበሌ) — lowest formal administrative unit; appears in utility account
      records
    - Woreda (ወረዳ) — district-level unit above kebele
    - Sub-city (ክፍለ ከተማ) — Addis Ababa-specific administrative division
    - Zone — regional capital administrative layer
    informal_neighborhood_names: Users commonly refer to neighborhoods by informal
      names (e.g., Bole, Piassa, Merkato, Megenagna) rather than kebele numbers. These
      may not align with official utility account address fields.
    slot_gap: INJONGO's 23-slot ontology does not include METER_ID, UTILITY_ACCOUNT_NUMBER,
      KEBELE, or ADDRESS_SUBUNIT types. This is a confirmed gap requiring augmentation
      or post-processing mapping.
    injongo_place_name_coverage: '[NOT FOUND — whether INJONGO Amharic instances include
      Ethiopian kebele or sub-city references in PLACE_NAME or CITY_OR_PROVINCE slots
      is not documented in the paper or accessible GitHub data. The annotation guide
      specifies that PLACE_NAME requires explicit naming (not generic ''mall'' or
      ''airport''), but Ethiopian administrative sub-unit naming conventions are not
      addressed. This gap remains unresolved.]'
  ground_truth_authority:
    description: Per the deployment specification, correct slot-filling labels must
      be validated by EEU customer service agents and AAWSA billing staff — not community-level
      conventions or general native-speaker annotators.
    injongo_annotator_domain_familiarity: '[NOT FOUND — the INJONGO paper documents
      that annotators were recruited through a Kenya-based logistics company at per-country
      rates, that they were native speakers, and that a complete annotation guide
      was provided. No documentation confirms that Amharic annotators had utility
      billing domain expertise or were Ethiopia-based specifically. The paper does
      not address domain familiarity of annotators for any language split. Source:
      INJONGO paper (arXiv 2502.09814) — [|https://arxiv.org/abs/2502.09814|]; ACL
      Anthology — [|https://aclanthology.org/2025.acl-long.464/|]]'
    validation_gap: INJONGO annotation was performed by pan-African native-speaker
      crowdworkers with no documented utility domain expertise; utility-domain Amharic
      slot labels have not been validated by EEU or AAWSA staff. This is a high-priority
      gap for deployment readiness.
cultural_norms_notes: Urban Ethiopian users, particularly in Addis Ababa, typically
  interact with formal service institutions in Amharic with a deferential but direct
  register. Telegram bot interactions are expected to use polite second-person forms
  (appropriate use of እርስዎ vs. አንተ/አንቺ). Younger users are accustomed to informal
  abbreviation and emoji use in Telegram. Outage frustration and billing disputes
  may involve emotionally charged language. Code-switching to English for technical
  terms (token, top-up, meter, balance, account) is normalized and should not be treated
  as an error signal by the NLU system.
intent_ontology_alignment:
  injongo_utility_intents_documented: '[NOT FOUND — the full list of INJONGO Utility-domain
    intent labels is not enumerated in the paper abstract or accessible search results.
    The paper cites Utility as one of five domains with 40 total intents derived from
    CLINC, but only exemplifies Banking intents (''transfer'', ''pay bill'') and Travel
    intents (''exchange rate'', ''book flight''). Utility-specific intent labels (e.g.,
    ''report_outage'', ''pay_utility_bill'', ''meter_top_up'') are not confirmed or
    denied. Source: INJONGO paper (arXiv 2502.09814) Appendix A.1 — [|https://arxiv.org/pdf/2502.09814|]]'
  deployment_required_intents:
  - Prepaid meter top-up request
  - STS token entry / token query
  - Outage report (electricity)
  - Outage status query
  - Load-shedding schedule query
  - Bill dispute initiation
  - Payment history query
  - Account balance query
  - Account registration / meter ID lookup
  - Payment via Telebirr / CBE Birr
  - Payment via bank branch / agent
  - Water supply complaint
  - Water bill dispute
  - Escalation to human agent
  coverage_assessment: 'INJONGO Utility domain exists but was designed for pan-African
    contexts. Ethiopian-specific prepaid meter, mobile-money (Telebirr/CBE Birr),
    and power-shedding schedule intents are likely absent or underrepresented — confirmed
    by the paper''s acknowledgment that the fixed 40-intent taxonomy may miss domains
    ''essential for real-world applications''. The full Utility intent list is not
    enumerated in accessible sources and requires inspection of the INJONGO data release
    on HuggingFace (Masakhane-NLU). Source: INJONGO paper Q107 — [|https://arxiv.org/pdf/2502.09814|]'
  intent_frequency_distribution_note: 'INJONGO uses a fixed uniform distribution (80
    utterances per intent); real EEU/AAWSA interaction logs are likely heavily skewed
    toward top-up and outage reporting. This distributional mismatch may affect evaluation
    validity. [NEEDS VERIFICATION — deferred: EEU/AAWSA production intent frequency
    distribution; not in publicly accessible sources]'
slot_ontology_alignment:
  injongo_slots_relevant_to_deployment:
  - ACCOUNT_TYPE
  - BANK_NAME
  - BILL_TYPE
  - CITY_OR_PROVINCE
  - CURRENCY
  - MONEY
  - NUMBER
  - PAYMENT_COMPANY
  - PLACE_NAME
  - TIME
  - DATE
  deployment_required_slots_missing_from_injongo:
  - slot: METER_ID
    notes: EEU prepaid meter identifier; not present in INJONGO 23-slot ontology.
      Extraction is critical for top-up workflows.
  - slot: UTILITY_ACCOUNT_NUMBER
    notes: AAWSA and EEU account identifiers; not present in INJONGO ontology.
  - slot: STS_TOKEN
    notes: 20-digit prepaid electricity token; distinct from generic NUMBER slot.
  - slot: KEBELE
    notes: Sub-city administrative unit used in utility address records; not present
      in INJONGO ontology.
  - slot: WOREDA
    notes: District-level administrative unit; not present in INJONGO ontology.
  - slot: NEIGHBORHOOD_NAME
    notes: Informal Addis Ababa neighborhood references (e.g., Bole, Piassa); may
      partially overlap PLACE_NAME but conventions differ.
  - slot: PAYMENT_METHOD
    notes: Specific mobile-money or bank channel (Telebirr, CBE Birr, etc.); may partially
      overlap PAYMENT_COMPANY but Ethiopian-specific values need confirmation.
  payment_company_ethiopian_values:
    telebirr_in_injongo: '[NOT FOUND — the INJONGO GitHub repository shows one Amharic
      banking-domain example with ''አባይ ባንክ'' (Abay Bank) as BANK_NAME; no utility-domain
      Amharic example with PAYMENT_COMPANY slot is accessible. Whether Telebirr appears
      as a PAYMENT_COMPANY value in INJONGO Amharic instances requires direct inspection
      of the Masakhane-NLU HuggingFace dataset. Source: McGill-NLP/Injongo GitHub
      — [|https://github.com/McGill-NLP/Injongo|]]'
    cbe_birr_in_injongo: '[NEEDS VERIFICATION — deferred: same gap as Telebirr; requires
      dataset inspection]'
    other_ethiopian_fintech_in_injongo: '[NEEDS VERIFICATION — deferred: requires
      dataset inspection; below remaining search budget]'
code_switching_assessment:
  deployment_requirement: Robust handling of intra-sentential Amharic-English code-switching
    is a confirmed HIGH-priority requirement.
  injongo_code_switching_coverage: '[NOT FOUND — searched INJONGO paper (arXiv 2502.09814),
    ACL 2025 published version, and GitHub repository for any mention of code-switching
    as a design criterion or measured property of the Amharic split. No documentation
    found. The native-speaker elicitation procedure aimed for cultural relevance but
    does not mention code-switching. The paper attributes performance differences
    across African languages to monolingual data availability without addressing code-switching
    density. No Amharic-English code-switching NLP benchmark exists that is specific
    to Ethiopian utility dialogue; the broader code-switching NLP literature covers
    mainly Hindi-English, Spanish-English, and similar pairs. Source: INJONGO paper
    — [|https://arxiv.org/abs/2502.09814|]; code-switching NLP survey — [|https://github.com/gentaiscool/code-switching-papers|]]'
  typical_code_switching_patterns:
  - 'English domain vocabulary within Amharic syntax: ''የ meter number-ዬን ልጠቀም'' (my
    meter number to use)'
  - English numerals and currency with Amharic morphology
  - English imperative or interrogative fragments mixed with Amharic
  - Telebirr/CBE Birr brand names as English insertions
  risk: 'If INJONGO Amharic split lacks code-switched utterances, benchmark F1 scores
    may overestimate performance on the deployment population''s naturalistic input
    distribution. This is a high-risk unresolved gap: code-switching was not an explicit
    design criterion, and no counter-evidence was found.'
applicable_regulations_and_standards:
  data_protection:
    ethiopia_data_protection_law: 'Personal Data Protection Proclamation No. 1321/2024
      (PDPP 2024) — Ethiopia''s first comprehensive data protection law. Passed by
      the Federal House of Representatives on April 4, 2024, published in the Federal
      Negarit Gazette on July 24, 2024. The law applies to all public and private
      entities processing personal data within Ethiopia, imposes consent and purpose-limitation
      requirements, mandates domestic data storage (data localization), requires Data
      Protection Impact Assessments (DPIAs) for high-risk processing (including automated
      profiling), and designates the Ethiopian Communications Authority (ECA) as the
      supervisory authority. Chatbot deployments processing utility customer data
      (account numbers, payment records, location data) fall squarely within scope.
      Implementing regulations from ECA are still pending as of late 2024. Source:
      CIPIT analysis — [|https://cipit.org/ethiopias-personal-data-protection-proclamation-of-2024-and-its-budding-digital-identity-regime/|];
      TechHive Advisory review — [|https://www.techhiveadvisory.africa/insights/review-of-ethiopias-data-protection-act|];
      Regulations.AI entry — [|https://regulations.ai/regulations/RAI-ET-NA-PDPPNXX-2024|]'
    eeu_data_governance_policy: '[NEEDS VERIFICATION — deferred: EEU-specific data
      governance policy for chatbot deployments; not in accessible public sources;
      requires direct engagement with EEU]'
    aawsa_data_governance_policy: '[NEEDS VERIFICATION — deferred: AAWSA-specific
      data governance policy; not in accessible public sources]'
  telecom_regulation:
    ethio_telecom_bot_policy: '[NEEDS VERIFICATION — deferred: Ethio Telecom / Telegram
      API usage terms for commercial chatbot deployments in Ethiopia; not in accessible
      public sources]'
    sms_regulatory_framework: 'The Ethiopian Communications Authority (ECA) regulates
      commercial SMS services under Proclamation No. 1148/2019 and subsequent directives.
      ECA was designated as the supervisory authority for both telecommunications
      and personal data protection under PDPP 2024. Source: British International
      Investment report on Ethiopian telecoms — [|https://assets.bii.co.uk/wp-content/uploads/2024/10/09105903/BII-Impact-of-investment-in-the-Ethiopian-telecoms-market_2024.pdf|]'
    eca_as_data_protection_authority: 'The ECA serves as the supervisory authority
      for PDPP 2024, making it the key regulatory body for both telecom channel regulation
      (SMS, bot APIs) and personal data protection for the deployment. Source: PDPP
      2024 analysis — [|https://www.techhiveadvisory.africa/insights/review-of-ethiopias-data-protection-act|]'
