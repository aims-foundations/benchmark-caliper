benchmark_amharic_split_details:
  total_instances: 3200
  train_dev_test_split: 70% / 10% / 20% stratified by intent
  instances_per_intent: 80
  annotation_platform: LabelStudio
  script: Ethiopic (Ge'ez) — full native script
  amharic_example_confirmed: 'The INJONGO GitHub repository confirms Amharic (amh)
    is included in the dataset with Ethiopic script. One accessible banking-domain
    Amharic example shows: intent=balance, text=''በ አባይ ባንክ አካውንት ለሶፋ የሚሆን ገንዘብ አለኝ'',
    slots: BANK_NAME=''አባይ ባንክ'', SHOPPING_ITEM=''ሶፋ''. This confirms Ethiopic script
    encoding is functional in the release. Source: McGill-NLP/Injongo GitHub — [|https://github.com/McGill-NLP/Injongo|]'
  fleiss_kappa_amharic_pre_review: '[NOT FOUND — the INJONGO paper Table 3 reports
    Fleiss'' Kappa per language, but the specific Amharic pre-review value is not
    quoted in accessible search result snippets. The paper states range was 0.618
    (Zulu) to 0.934 (Shona) before review; Amharic''s position within this range is
    not surfaced. Requires direct access to Table 3 in the full paper PDF. Source:
    INJONGO paper arXiv 2502.09814 — [|https://arxiv.org/pdf/2502.09814|]]'
  fleiss_kappa_amharic_post_review: '[NOT FOUND — post-review range is reported as
    0.912–1.00 across all languages; Amharic-specific value requires direct access
    to Table 3]'
  amharic_annotator_count: '[NOT FOUND — the paper does not enumerate per-language
    annotator counts in accessible search result snippets; likely documented in Appendix
    or supplementary materials of the full paper]'
  amharic_annotator_location_and_background: '[NOT FOUND — the paper states annotators
    were recruited through a Kenya-based logistics company at per-country rates; whether
    Amharic annotators were Ethiopia-based and had utility domain familiarity is not
    documented. Source: INJONGO paper — [|https://arxiv.org/abs/2502.09814|]]'
  unicode_normalization_confirmed: '[NOT FOUND — NFC/NFD normalization status of Ethiopic
    characters in the INJONGO Amharic data release is not documented in the paper,
    GitHub README, or any accessible source. The GitHub example renders Ethiopic correctly
    but normalization form is unspecified.]'
  monolingual_pretraining_data_amharic: 'Amharic is confirmed as one of the higher-performing
    languages in INJONGO (>70% intent detection accuracy with Llama 3.3 70B), grouped
    alongside Hausa, Igbo, Shona, Swahili, Xhosa, Yoruba, and Zulu as languages with
    ''larger monolingual data on the web.'' The INJONGO paper attributes Swahili''s
    near-English performance to 1B+ tokens; Amharic''s exact web corpus size is not
    given. The UnifiedCrawl project (arXiv 2411.14343) confirms Amharic was extracted
    from Common Crawl and substantially surpasses earlier corpus sizes, but the specific
    token count is not reported in accessible snippets. Amharic is substantially lower-resource
    than Swahili. Source: INJONGO paper Q88-89 — [|https://arxiv.org/abs/2502.09814|];
    UnifiedCrawl paper — [|https://arxiv.org/html/2411.14343v1|]'
net_new_fields:
  ethiopian_amharic_llm_ecosystem:
    ethiollm: 'EthioLLM is a multilingual LLM covering five Ethiopian languages (Amharic,
      Ge''ez, Afan Oromo, Somali, Tigrinya) with an associated EthioBenchmark dataset
      for downstream NLP tasks. This is the closest Ethiopia-centric NLP evaluation
      suite to the deployment context, though it does not include utility-domain intent
      detection or slot-filling. Models and datasets are available at the EthioNLP
      HuggingFace repository. Source: EthioLLM paper arXiv 2403.13737 — [|https://arxiv.org/pdf/2403.13737|]'
    walia_llm: 'Walia-LLM (EMNLP 2024 Findings) fine-tunes LLaMA-2 on Amharic task-specific
      and generative datasets, demonstrating improved Amharic NLP performance. Covers
      summarization, text expansion, QA, and MT. Does not cover utility-domain intent
      detection. Relevant as evidence that Amharic-specific fine-tuning substantially
      outperforms zero-shot multilingual models for Ethiopian NLP tasks — directly
      supporting the recommendation to fine-tune rather than rely on zero-shot LLM
      evaluation on INJONGO. Source: Walia-LLM paper — [|https://aclanthology.org/2024.findings-emnlp.25/|]'
    amharic_passage_retrieval_benchmark: 'An ACL 2025 Findings paper introduces optimized
      text embedding models and benchmarks for Amharic passage retrieval, confirming
      active development of Amharic-specific NLP infrastructure. Source: GitHub topic
      amharic-nlp — [|https://github.com/topics/amharic-nlp|]'
    relevance_to_assessment: The existence of EthioLLM and Walia-LLM confirms that
      Amharic-specific fine-tuning infrastructure exists and that INJONGO's Amharic
      split can serve as training/evaluation data for deployment. However, none of
      these resources address utility-domain slot-filling with Ethiopian-specific
      slot types (METER_ID, KEBELE, STS_TOKEN), reinforcing the domain gap identified
      in the slot ontology alignment section.
  telebirr_eeu_integration_context:
    description: Telebirr (54.84 million users, FY2024/25) is explicitly documented
      as a platform used by urban citizens to pay utility bills and taxes. Ethio Telecom's
      2024/25 performance report confirms over 52 public and private institutions
      are integrated into Telebirr. This confirms the deployment assumption that Telebirr
      is the primary digital payment channel for EEU/AAWSA and that PAYMENT_COMPANY
      slot values for Telebirr are operationally critical.
    source: Ethio Telecom FY2024/25 annual report via TechAfrica News — [|https://techafricanews.com/2025/07/25/ethio-telecom-achieves-83-2m-subscribers-and-73-revenue-surge-as-lead-strategy-concludes/|];
      Huawei/Ethio Telecom case study — [|https://www.huawei.com/en/media-center/transform/10/frehiwot-tamru|]
  pdpp_2024_chatbot_implications:
    description: Ethiopia's PDPP 2024 (Proclamation No. 1321/2024, effective July
      24, 2024) requires data localization (utility customer data collected within
      Ethiopia must be stored domestically), mandates DPIAs for automated processing
      including profiling, and designates the ECA as supervisor. A chatbot processing
      utility account numbers, payment history, and location data (kebele) is high-risk
      under PDPP 2024 and likely requires DPIA and ECA registration. Implementing
      regulations from ECA are still pending as of late 2024, creating compliance
      uncertainty.
    source: CIPIT analysis Nov 2024 — [|https://cipit.org/ethiopias-personal-data-protection-proclamation-of-2024-and-its-budding-digital-identity-regime/|];
      Regulations.AI — [|https://regulations.ai/regulations/RAI-ET-NA-PDPPNXX-2024|]
  amharic_in_injongo_performance_context:
    description: INJONGO experimental results (Table 6, zero-shot LLM evaluation)
      confirm Amharic achieves >70% intent detection accuracy with Llama 3.3 70B in
      the INJONGO benchmark, grouping it among the higher-performing African languages.
      However, this figure reflects benchmark performance on monolingual INJONGO Amharic
      instances and should not be extrapolated to code-switched or utility-specific
      deployment inputs. The performance gap between fine-tuned models (93.7% accuracy,
      85.6% F1) and zero-shot LLMs (~70% accuracy, ~26–33% F1) is large and consistent
      across languages.
    source: INJONGO paper arXiv 2502.09814 — [|https://arxiv.org/abs/2502.09814|];
      ACL Anthology — [|https://aclanthology.org/2025.acl-long.464/|]
