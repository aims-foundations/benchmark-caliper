- id: Q14
  page: 2
  dimension: input_ontology
  text: BLUE encompasses 10 tasks, such as NER, sentence similarity, relation extraction, text classification, and inference.
- id: Q15
  page: 2
  dimension: input_ontology
  text: CBLUE covers 8 tasks, including NER, information extraction, text and intent classification, sentence similarity,
    and query relevance.
- id: Q16
  page: 2
  dimension: input_ontology
  text: To our knowledge, aside the multilingual benchmark BigBIO (Fries et al., 2022) which includes only 4 corpora for French
    and is initially intended for generative text completion under zero-shot scenario, no large benchmark specialized in the
    French biomedical field exists.
- id: Q17
  page: 2
  dimension: input_ontology
  text: Our proposed benchmark comprises 20 French biomedical language understanding tasks, one of which is specifically created
    for this benchmark.
- id: Q18
  page: 2
  dimension: input_ontology
  text: 'A variety of tasks with different requirements and objectives: Part-of-Speech (POS) tagging, Multi-class, Multi-label
    and Intent classification, Named-Entity Recognition (NER), Multiple-Choice Question-Answering (MCQA), and Semantic Textual
    Similarity (STS).'
- id: Q19
  page: 2
  dimension: input_content
  text: 'A diverse range of data origins: Scientific literature, clinical trials, clinical cases, speech transcriptions, and
    more as described in Table 2.'
- id: Q20
  page: 2
  dimension: input_ontology
  text: Please note that within DrBenchmark, we include classical tasks like NER and POS tagging, as well as more specific
    and challenging tasks like MCQA and multi-label classification.
- id: Q21
  page: 3
  dimension: input_ontology
  text: 'DEFT-2020 (Cardon et al., 2020) contains clinical cases, encyclopedia and drug labels introduced in the 2020 edition
    of an annual French Text Mining Challenge, called DEFT, and annotated for two tasks: (i) textual similarity and (ii) multi-class
    classification.'
- id: Q22
  page: 3
  dimension: output_ontology
  text: The first task aims at identifying the degree of similarity within pairs of sentences, from 0 (the less similar) to
    5 (the most similar).
- id: Q23
  page: 3
  dimension: output_ontology
  text: The second task consists in identifying, for a given sentence, the most similar sentence among three sentences provided.
- id: Q24
  page: 3
  dimension: input_content
  text: DEFT-2021 (Grouin et al., 2021) is a subset of 275 clinical cases taken from the 2019 edition of DEFT.
- id: Q25
  page: 3
  dimension: output_content
  text: 'This dataset is manually annotated in two tasks: (i) multi-label classification and (ii) NER.'
- id: Q26
  page: 3
  dimension: input_ontology
  text: The multi-label classification task focuses on identifying the patient's clinical profile based on the diseases, signs,
    or symptoms mentioned in the clinical cases.
- id: Q27
  page: 3
  dimension: output_ontology
  text: The dataset is annotated with 23 axes from Chapter C of the Medical Subject Headings (MeSH).
- id: Q28
  page: 3
  dimension: input_ontology
  text: The second task involves fine-grained information extraction for 13 types of entities (more detail in Appendix B.7).
- id: Q29
  page: 3
  dimension: input_content
  text: E3C (Magnini et al., 2020) is a multilingual dataset of clinical cases annotated for the NER task.
- id: Q30
  page: 3
  dimension: output_ontology
  text: 'It consists of two types of annotations (more detail in Appendix B.4): (i) clinical entities (e.g., pathologies),
    (ii) temporal information and factuality (e.g., events).'
- id: Q31
  page: 3
  dimension: input_form
  text: While the dataset covers 5 languages, only the French portion is retained for the benchmark.
- id: Q32
  page: 3
  dimension: input_form
  text: Since the dataset does not come with pre-defined subsets, we performed a 70 / 10 / 20 random split, as described in
    Table 3.
- id: Q33
  page: 3
  dimension: input_content
  text: The QUAERO French Medical Corpus (Névéol et al., 2014), simply referred to as QUAERO in this paper, contains annotated
    entities and concepts for NER tasks.
- id: Q34
  page: 3
  dimension: input_content
  text: The dataset covers two text genres (drug leaflets and biomedical titles), consisting of a total of 103,056 words sourced
    from EMEA or MEDLINE.
- id: Q35
  page: 3
  dimension: output_ontology
  text: 10 entity categories corresponding to the UMLS Semantic Groups (Lindberg et al., 1993) were annotated (more detail
    in Appendix B.3).
- id: Q36
  page: 3
  dimension: output_ontology
  text: In total, 26,409 entity annotations were mapped to 5,797 unique UMLS concepts.
- id: Q37
  page: 3
  dimension: input_form
  text: Due to the presence of nested entities in annotations, we simplified the evaluation process by retaining only annotations
    at the higher granularity level from the BigBio (Fries et al., 2022) implementation, following the approach described
    in Touchent et al. (2023), which translates into an average loss of 6.06% of the annotations on EMEA and 8.90% on MEDLINE.
    Additionally, considering that some documents from EMEA exceed the maximum input sequence length that most current language
    models can handle, we decided to split these documents into sentences.
- id: Q38
  page: 4
  dimension: input_content
  text: MorFITT (Labrak et al., 2023) is a multi-label dataset annotated with medical specialties. It contains 3,624 biomedical
    abstracts from PMC Open Access. It has been annotated across 12 medical specialties (more detail in Appendix B.5), for
    a total of 5,116 annotations.
- id: Q39
  page: 4
  dimension: input_ontology
  text: FrenchMedMCQA (Labrak et al., 2022) is a Multiple-Choice Question-Answering (MCQA) dataset for biomedical domain.
    It contains 3,105 questions coming from real exams of the French medical specialization diploma in pharmacy, integrating
    single and multiple answers. The first task consists of automatically identifying the set of correct answers among the
    5 proposed for a given question. The second task consists of identifying the number of answers (between 1 and 5) supposedly
    correct for a given question.
- id: Q40
  page: 4
  dimension: input_content
  text: 'Mantra-GSC (Kors et al., 2015) is a multilingual dataset annotated for biomedical NER. From the 5 languages covered,
    we included only the French subset in this benchmark. The dataset is obtained from 3 sources which have been partitioned
    to be evaluated separately by 2 annotation schemes (more detail in Appendix B.6): Medline (11 classes), and EMEA and Patents
    (10 classes). The sources cover different types of documents (biomedical abstracts/titles, drug labels and patents). To
    ensure evaluation consistency, we randomly split the dataset into 3 subsets: 70% for training, 10% for validation, and
    20% for testing.'
- id: Q41
  page: 4
  dimension: output_content
  text: CLISTER (Hiebel et al., 2022) is a French clinical cases Semantic textual similarity (STS) dataset of 1,000 sentence
    pairs manually annotated by several annotators, who assigned similarity scores ranging from 0 to 5 to each pair. The scores
    were then averaged together to obtain a floating-point number representing the overall similarity. The objective of this
    dataset is to develop models that can automatically predict a similarity score that closely aligns with the reference
    score based solely on the two sentences provided.
- id: Q42
  page: 4
  dimension: output_content
  text: CAS (Grabar et al., 2018) comprises 3,790 clinical cases that have been annotated for POS tagging with 31 classes
    using automatic annotations through Tagex 3, with an evaluation conducted by comparing the automatic outputs against manual
    annotations. This evaluation yielded 98% precision. Since the dataset does not come with predefined subsets, we made the
    decision to randomly split it into 3 subsets of 70%, 10% and 20% of the total data for training, validation and test respectively.
- id: Q43
  page: 4
  dimension: input_content
  text: ESSAI (Dalloux et al., 2021) contains 7,247 clinical trial protocols annotated in 41 POS tags using TreeTagger (Schmid,
    1994). As the dataset was not originally divided into 3 subsets, we applied the same procedure as on the CAS corpus.
- id: Q44
  page: 4
  dimension: input_ontology
  text: PxCorpus (Kocabiyikoglu et al., 2022) is a spoken language understanding dataset in the domain of medical drug prescription
    transcripts. It includes 4 hours (1,981 recordings) of transcribed and annotated dialogues focused on drug prescriptions.
    The recordings were manually transcribed and semantically annotated. The first task involves classifying the textual utterances
    into one of the 4 intent classes (prescribe, replace, negate, none). The second task is a NER task where each word in
    a sequence is classified into one of 38 classes, such as drug, dose, or mode (more detail in Appendix B.9).
- id: Q45
  page: 4
  dimension: output_content
  text: DiaMed is an original dataset created specifically for DrBenchmark. It comprises 739 new French clinical cases collected
    from an open source journal (The Pan African Medical Journal). The cases have been manually annotated by several annotators,
    one of which is a medical expert, into 22 chapters of the International Classification of Diseases, 10th Revision (ICD-10)
    (Wor, 2019). These chapters provide a general description of the type of injury or disease. To ease the annotation process,
    only label at the chapter level were used (more detail in Appendix B.8). The inter-annotator agreement between the 4 annotators
    has been computed for two annotation sessions (see Table 4), with 15 different clinical cases assessed per session.
- id: Q46
  page: 4
  dimension: output_content
  text: 'Table 4: Inter-annotator agreement statistics. κ is referring to Kappa Cohen and G to Gwet''s AC1.'
- id: Q47
  page: 4
  dimension: input_form
  text: To facilitate the adoption of DrBenchmark and ensure consistency in implementations, we have de-
- id: Q48
  page: 5
  dimension: input_form
  text: We developed a practical toolkit based on the HuggingFace Datasets library (Lhoest et al., 2021). This toolkit includes
    data loaders that adhere to normalized schemes and predefined data splits. It also provides pre-training and evaluation
    scripts for each of the tasks, utilizing the HuggingFace Transformers (Wolf et al., 2020) and PyTorch (Paszke et al.,
    2019) libraries.
- id: Q49
  page: 5
  dimension: output_form
  text: For further guidance, we have integrated all the training details, including hyperparameters, in Appendix A. This
    information will help users to reproduce and customize the experiments conducted with DrBenchmark.
- id: Q50
  page: 5
  dimension: output_form
  text: To guarantee fair comparison, we focus exclusively on pre-trained masked language models (MLMs) in this study. These
    MLMs are based on BERT-like architectures (Devlin et al., 2019).
- id: Q51
  page: 5
  dimension: output_form
  text: All the models are fine-tuned regarding a strict protocol using the same hyperparameters for each downstream task.
    The reported results are obtained by averaging the scores from four separate runs, thus ensuring robustness and reliability.
    We also report statistical significance computed using Student's t-test.
- id: Q52
  page: 6
  dimension: output_form
  text: To ensure a fair and consistent comparison among systems for sequence-to-sequence tasks such as POS tagging and NER,
    we chose the SeqEval (Nakayama, 2018) metric in conjunction with the IOB2 format and the training of all the models to
    predict only the label on the first token of each word as mentioned by Touchent et al. (2023).
- id: Q53
  page: 6
  dimension: output_form
  text: It provides a tokenizer-agnostic evaluation and mitigates any correlation between models' performances and the tokenization
    process.
- id: Q54
  page: 6
  dimension: output_form
  text: 'For STS tasks, the models'' performance was assessed using two metrics: (1) the Spearman correlation, and (2) the
    mean relative solution distance accuracy (EDRM), as defined by the original authors of the DEFT-2020 dataset (Cardon et
    al., 2020).'
- id: Q55
  page: 6
  dimension: output_form
  text: In Section 5.1, we compare the results obtained by each model within DrBenchmark, which permits to position a wide
    range of state-of-the-art models in the biomedical field across various NLP tasks.
- id: Q56
  page: 6
  dimension: output_form
  text: The results of the 8 models are reported in Table 6 and compared to a baseline obtained by considering the majority
    class for all predictions.
- id: Q57
  page: 6
  dimension: output_ontology
  text: Overall, although we might anticipate certain models to excel in all tasks, we discovered that no single model outperforms
    the rest in all application scenarios.
- id: Q58
  page: 6
  dimension: output_ontology
  text: Interestingly, most of the models examined manage to secure the top position in at least one of the French biomedical
    downstream tasks studied.
- id: Q59
  page: 6
  dimension: output_form
  text: The only exception pertains to the cross-lingual generalist model (XLM-RoBERTa), which manages to reach the second-best
    position on several tasks.
- id: Q60
  page: 6
  dimension: output_content
  text: French biomedical language models (DrBERT-FS, DrBERT-CP, CamemBERT-bio), presumed to be the most aligned with the
    nature of the data of the benchmark, exhibit indeed superior performance across many tasks.
- id: Q61
  page: 6
  dimension: output_form
  text: More precisely, DrBERT-FS achieves the highest performance in 8 tasks, DrBERT-CP in 5 tasks, and CamemBERT-bio in
    2 tasks.
- id: Q62
  page: 6
  dimension: output_form
  text: This indicates that domain and language-specialized models achieve the best performance in up to 75% of the DrBenchmark
    downstream tasks.
- id: Q63
  page: 6
  dimension: output_ontology
  text: Generalist models (CamemBERT, CamemBERTa, FlauBERT and XLM-RoBERTa) are more suitable for tasks that require extensive
    linguistic knowledge but may not perform as well as specialized models nor even reach their level of performance.
- id: Q64
  page: 6
  dimension: output_form
  text: We observe that all generalist models obtain better performance only on 4 out of the 20 tasks, but still remain competitive
    on most tasks.
- id: Q65
  page: 6
  dimension: input_content
  text: Furthermore, our experiments with DrBERT-FS indicate that biomedical models may require less pre-training data compared
    to generalist ones.
- id: Q66
  page: 6
  dimension: input_content
  text: However, it is important to note that this observation requires further confirmation.
- id: Q67
  page: 6
  dimension: input_content
  text: In some tasks, biomedical models that undergo continual pre-training from a generalist model, such as CamemBERT-bio,
    can prove to be the most effective, underscoring the value of pre-training on generalist data.
- id: Q68
  page: 7
  dimension: input_form
  text: 'For this purpose, we conducted experiments by varying the amount of training data during the fine-tuning process
    by randomly choosing four percentages of the training data: 25%, 50%, 75% and 100%.'
- id: Q69
  page: 7
  dimension: output_form
  text: To make the experiment as fair as possible, we did four runs for each percentage, model and dataset combination.
- id: Q70
  page: 7
  dimension: output_form
  text: The validation and test sets have not been changed for the sake of comparison.
- id: Q71
  page: 7
  dimension: output_form
  text: We observe that on certain datasets, some models capture information more quickly than others, like in Figures 1b,
    1f and 1a.
- id: Q72
  page: 7
  dimension: output_form
  text: Unsurprisingly, in almost all scenarios, having the complete training set yields better results than having only 25%
    of it.
- id: Q73
  page: 7
  dimension: output_form
  text: However, all the models based on CamemBERT face difficulties in corpora with limited amount of data, such as MantraGSC
    Patents, where they fail to generate labels other than 'O'.
- id: Q74
  page: 7
  dimension: output_form
  text: On the other hand, in the same low-resource scenarios, CamemBERTa models exhibit greater robustness and achieve superior
    performance.
- id: Q75
  page: 8
  dimension: input_form
  text: Tokenizers play a crucial role in MLMs by utilizing size-limited vocabularies to split texts into sub-units, aiming
    to handle out-of-vocabulary (OOV) words.
- id: Q76
  page: 8
  dimension: input_content
  text: Due to variations in the training data, vocabularies differ across different models, as illustrated in Figure 2.
- id: Q77
  page: 8
  dimension: input_form
  text: So far, there has been a prevailing notion in the community that excessive segmentation of words in tokenization leads
    to a loss of morphological form and semantic meaning, introducing noise and adversely affecting performance (Church, 2020;
    Hofmann et al., 2021; Bostrom and Durrett, 2020).
- id: Q78
  page: 8
  dimension: input_form
  text: However, our experiments, as shown in Table 7, reveal that FlauBERT is the model with the least word segmentation
    (1.43 in average), while DrBERT-CP tends to have the highest average segmentation (1.90 in average).
- id: Q79
