coverage_strengths:
- user_priority: French biomedical NLP — POS tagging, NER, multi-label classification, temporal entity extraction
  benchmark_coverage: 'DrBenchmark provides 20 tasks explicitly spanning POS tagging, NER, multi-label classification, intent
    classification, MCQA, and STS [Q1, Q4, Q18], all in French biomedical text. Temporal entity labels (DATE, DURATION, FREQUENCY,
    MOMENT) and clinical entity labels (ANATOMY, PATHOLOGY, TREATMENT) are documented in DEFT-2021''s NER scheme [Q108], directly
    covering the deployment''s temporal extraction and entity recognition functions.

    '
  dimension: input_ontology
- user_priority: ICD-10/PMSI mapping for clinical profile generation
  benchmark_coverage: 'DiaMed maps clinical cases to 22 ICD-10 chapter-level categories [Q107], and DEFT-2021''s multi-label
    classification uses 23 MeSH axes from Chapter C [Q27]. These provide partial ontological alignment with the deployment''s
    ICD-10/PMSI mapping function, albeit at chapter rather than granular PMSI code level.

    '
  dimension: output_ontology
- user_priority: Diverse French biomedical source types covering clinical, regulatory, and scientific register
  benchmark_coverage: 'Source types span scientific literature, clinical trials, clinical cases, and speech transcriptions
    [Q19], including QUAERO (EMEA drug leaflets and MEDLINE titles) [Q33, Q34], ESSAI (clinical trial protocols) [Q43], CAS
    (clinical cases) [Q42], and PxCorpus (spoken drug prescription transcripts) [Q44]. This breadth partially addresses the
    deployment''s need for coverage across hospital documentation registers.

    '
  dimension: input_content
- user_priority: Domain- and language-specialized French biomedical models
  benchmark_coverage: 'The benchmark evaluates 8 MLMs including French biomedical models (DrBERT, CamemBERT-bio) and French
    generalist models (CamemBERT, FlauBERT), finding that domain-specialized models achieve best performance on up to 75%
    of tasks [Q62]. This directly informs model selection for the deployment''s clinical NLP pipeline.

    '
  dimension: output_form
- user_priority: Inter-annotator agreement and annotation quality evidence
  benchmark_coverage: 'DiaMed is the one dataset with documented IAA statistics (Cohen''s Kappa and Gwet''s AC1 across two
    sessions) and explicit involvement of a medical expert annotator [Q45, Q46], providing the strongest annotation quality
    signal available within the benchmark for the deployment''s ICD-10 classification task.

    '
  dimension: output_content
coverage_gap_analysis:
- user_priority: Tropical and overseas-territory pathology coverage (French DOM-TOM)
  benchmark_coverage: 'All documented source corpora originate from metropolitan French academic, clinical, or regulatory
    institutions [Q8, Q19, Q43]. DiaMed draws from the Pan African Medical Journal [Q45], introducing some non-metropolitan
    signal, but the paper does not articulate its relevance to French overseas-territory pathology profiles (e.g., dengue,
    chikungunya, malaria) or DOM-TOM clinical populations. No task category documents tropical medicine coverage.

    '
  gap_type: full
  web_search_target: French overseas territories DOM-TOM biomedical NLP clinical NER tropical pathology benchmark corpus
- user_priority: Hospital coding specialist vs. academic annotator authority for ICD-10/PMSI labels
  benchmark_coverage: 'DEFT-2021 is manually annotated for multi-label classification and NER [Q25] but does not document
    annotator clinical expertise or PMSI coding credentials. Only DiaMed documents any medical expert involvement [Q45]. No
    dataset mentions PMSI coders, hospital clinicians, or coding specialists in its annotation description. The exclusively
    metropolitan French academic institutional base [Q8] reinforces that hospital coding specialist validation was not a design
    consideration.

    '
  gap_type: full
  web_search_target: DrBenchmark DEFT-2021 annotation protocol clinical coder PMSI ICD-10 annotator expertise French biomedical
- user_priority: Multi-label confidence calibration and uncertainty flagging scoring
  benchmark_coverage: 'Classification tasks are scored against majority-class baselines with standard metrics [Q56], and results
    are averaged over four runs with Student''s t-test for significance [Q51]. The paper acknowledges poor performance on
    MLC tasks even for specialized models [Q82, Q86, Q87] but does not document any confidence calibration metric, uncertainty
    flagging protocol, or ranked-candidate list quality assessment. The deployment''s multi-label-with-confidence behavior
    is structurally absent from the benchmark''s scoring framework.

    '
  gap_type: full
  web_search_target: DrBenchmark multi-label classification confidence calibration scoring uncertainty flagging French biomedical
    NLP
- user_priority: Noise robustness and register match for active-hospital EHR notes
  benchmark_coverage: 'The benchmark''s clinical case sources are competition corpora, academic write-ups, and clinical trial
    protocols [Q19, Q24, Q43] — edited, published sources rather than raw active-hospital EHR discharge summaries or dictation
    notes. CAS provides 3,790 clinical cases [Q42] and PxCorpus provides transcribed drug prescription dialogues [Q44], but
    neither is characterized as noisy raw hospital documentation. The paper does not assess model robustness to abbreviation-heavy
    or institution-specific shorthand, and QUAERO document splitting for sequence length [Q37] addresses infrastructure rather
    than register noise.

    '
  gap_type: partial
  web_search_target: French clinical NLP benchmark raw EHR discharge notes noise robustness abbreviation shorthand hospital
    documentation
- user_priority: Silver standard label provenance and adjudication methodology
  benchmark_coverage: 'CAS uses automatic POS annotations validated at 98% precision [Q42], meaning at least one task rests
    on non-expert labels. CLISTER uses averaged multi-annotator scores [Q41]. DiaMed is the sole dataset with documented IAA
    and expert involvement [Q45, Q46]. For the majority of the 20 tasks, annotation provenance is undocumented in the registry.
    The deployer''s concern about silver-standard label propagation is only partially addressable from the paper''s documentation.

    '
  gap_type: partial
  web_search_target: DrBenchmark annotation methodology silver standard expert adjudication DEFT NER multi-label French biomedical
    NLP
