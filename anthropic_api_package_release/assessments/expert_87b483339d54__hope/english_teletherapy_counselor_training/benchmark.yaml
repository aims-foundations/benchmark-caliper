coverage_strengths:
- user_priority: Dialogue-act classification in structured clinical counseling sessions
  benchmark_coverage: 'HOPE was purpose-built for dyadic clinical counseling, with 12 labels designed in consultation with
    therapist and counseling experts to capture the intents of both patient and therapist across CBT, child, and family therapy
    sessions [Q27, Q28]. The label set provides documented coverage of the core communicative acts present in formal therapeutic
    interaction [Q22].

    '
  dimension: input_ontology
- user_priority: Session quality assessment and counselor feedback support
  benchmark_coverage: 'Label-wise F1 scores are reported for all 12 dialogue-act categories [Q76], enabling fine-grained assessment
    of model performance on individual communicative acts. Speaker asymmetry is modeled explicitly: the benchmark documents
    that certain labels are "majorly associated with the patient, while a few others are related to the therapist" [Q60],
    which is directly relevant to counselor-feedback applications.

    '
  dimension: output_form
- user_priority: English-language text-based teletherapy transcripts
  benchmark_coverage: 'HOPE is text-only and English-only, derived from ASR-transcribed sessions with manual correction [Q25].
    RoBERTa-based utterance representations [Q61, Q111] and the full deployment pipeline operate in the same modality and
    language, creating strong alignment with text-based teletherapy transcript processing.

    '
  dimension: input_form
- user_priority: Annotation quality and psycholinguistic grounding
  benchmark_coverage: 'Three expert linguist annotators completed calibration exercises and consensus discussions moderated
    by an expert therapist before full annotation [Q46, Q47]. Mental-health professionals were additionally consulted during
    guideline preparation [Q95], yielding an inter-annotator Kappa of 0.7234 (''substantial'') [Q49].

    '
  dimension: output_content
