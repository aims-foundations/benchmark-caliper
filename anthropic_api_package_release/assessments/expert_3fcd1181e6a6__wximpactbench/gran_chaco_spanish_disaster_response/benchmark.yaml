coverage_strengths:
- user_priority: Broad societal impact categories spanning infrastructure, health, and agriculture
  benchmark_coverage: Six operationalized impact categories (Infrastructural, Agricultural, Ecological, Financial, Human Health,
    Political) with detailed definitional scope [Q11, Q25, Q135, Q136, Q139]
  dimension: input_ontology
- user_priority: Multi-label simultaneous classification output as minimum acceptable output form
  benchmark_coverage: Benchmark implements simultaneous multi-label classification across all six categories in a single LLM
    call, matching the deployment's minimum acceptable output specification [Q57, Q43]
  dimension: output_form
- user_priority: Quantified model performance on disaster impact classification
  benchmark_coverage: Extensive experiments across eleven LLMs using F1-score, accuracy, and strict row-wise accuracy provide
    first-hand evidence of classification difficulty, including consistently low F1 scores even for better-performing categories
    [Q6, Q43, Q64, Q65, Q66]
  dimension: output_form
- user_priority: Context length handling for varying text lengths
  benchmark_coverage: Benchmark explicitly tests both long-context (avg. 2987.4 tokens) and mixed-context (avg. 781.3 tokens,
    chunked to ~250 tokens) versions, documenting how context length affects classification accuracy [Q109, Q70, Q71]
  dimension: input_form
