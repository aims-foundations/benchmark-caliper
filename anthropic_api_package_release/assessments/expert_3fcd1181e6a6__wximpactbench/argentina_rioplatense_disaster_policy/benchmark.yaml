  text: To ensure a high-quality evaluation of historical weather impact analysis, we developed a structured annotation framework
    for meteorology experts.
- id: Q130
  page: 18
  dimension: output_content
  text: The goal of this annotation is to create a reliable benchmark for assessing the ability of LLMs to understand and
    classify disruptive weather-related societal and environmental impacts.
- id: Q131
  page: 18
  dimension: output_content
  text: The detailed annotation guidelines are provided in Table 14, outlining the task objectives, category definitions,
    and better practices for identifying and classifying weather impacts in historical texts.
- id: Q132
  page: 18
  dimension: input_content
  text: Annotators will examine historical newspaper articles documenting disruptive weather events.
- id: Q133
  page: 18
  dimension: output_ontology
  text: 'The analysis requires the identification of impacts across six categories: infrastructural, agricultural, ecological,
    financial, human health, and political.'
- id: Q134
  page: 18
  dimension: output_content
  text: While specific examples are provided for each impact category, annotators should apply their meteorological expertise
    to identify and classify impacts beyond these examples, maintaining a comprehensive analytical approach.
- id: Q135
  page: 19
  dimension: input_ontology
  text: 'Infrastructural Impact: Examines weather-related damage or disruption to physical infrastructure and essential services.
    Includes structural damage to buildings, roads, and bridges; disruptions to transportation (e.g., railway cancellations,
    road closures); interruptions to utilities (e.g., power, water supply); failures in communication networks; and industrial
    facility damage. Both immediate physical damage and service disruptions should be considered.'
- id: Q136
  page: 19
  dimension: input_ontology
  text: 'Agricultural Impact: Focuses on weather-related effects on farming and livestock management. Includes crop yield
    variations; direct damage to crops, timber, or livestock; modifications to farming schedules; disruptions to food production
    and supply chains; impacts on farming equipment; and changes in agricultural inputs (e.g., soil conditions, water availability,
    fertilizers, animal feed). Both immediate and long-term effects should be considered.'
- id: Q137
  page: 19
  dimension: input_ontology
  text: 'Ecological Impact: Examines effects on natural environments and ecosystems. Includes changes in biodiversity; impacts
    on wildlife populations and behavior; effects on non-agricultural plant life; habitat modifications (e.g., forests, wetlands,
    water bodies); changes in hydrological systems (e.g., river levels, lake conditions); and urban plant life impact. Immediate
    environmental changes should be prioritized.'
- id: Q138
  page: 19
  dimension: input_ontology
  text: 'Financial Impact: Analyzes economic consequences of weather events. Includes direct monetary losses; business disruptions
    requiring financial intervention; market fluctuations; impacts on tourism and local economies; and insurance claims or
    economic relief measures. The focus should be on explicit financial impacts rather than inferred consequences.'
- id: Q139
  page: 19
  dimension: input_ontology
  text: 'Human Health Impact: Examines both physical and mental health effects. Includes direct injuries or fatalities (including
    cases where one or more casualties are explicitly mentioned); increased risks of weather-related illnesses; mental health
    consequences (e.g., stress, anxiety); impacts on healthcare accessibility; and long-term health implications. Both short-term
    and chronic health effects should be considered.'
- id: Q140
  page: 19
  dimension: input_ontology
  text: 'Political Impact: Evaluates governmental and policy responses to weather events. Includes government decision-making
    and policy changes; shifts in public opinion or political discourse; effects on electoral processes; international aid
    and relations; and debates on disaster preparedness and response. Both direct political reactions and policy implications
    should be analyzed.'
- id: Q141
  page: 20
  dimension: output_ontology
  text: 'Infrastructural Impact: Classify as ''true'' if the text mentions any damage or disruption to physical infrastructure
    and essential services. This includes structural damage to buildings, roads, or bridges; any disruptions to transportation
    systems such as railway cancellations or road closures; interruptions to public utilities including power and water supply;
    any failures in communication networks; or damage to industrial facilities. Consider only explicit mentions of physical
    damage or service disruptions in your classification.'
- id: Q142
  page: 20
  dimension: output_ontology
  text: 'Agricultural Impact: Classify as ''true'' if the text mentions any weather-related effects on farming and livestock
    management operations. This includes yield variations in crops and animal products; direct damage to crops, timber resources,
    or livestock; modifications to agricultural practices or schedules; disruptions to food production or supply chains; impacts
    on farming equipment and resources; or effects on agricultural inputs including soil conditions, water availability for
    farming, and essential materials such as seedlings, fertilizers, or animal feed.'
- id: Q143
  page: 20
  dimension: output_ontology
  text: 'Ecological Impact: Classify as ''true'' if the text mentions any effects on natural environments and ecosystems.
    This includes alterations to local environments and biodiversity; impacts on wildlife populations and behavior patterns;
    effects on non-agricultural plant life and vegetation; modifications to natural habitats including water bodies, forests,
    and wetlands; changes in hydrological systems such as river levels and lake conditions; or impacts on urban plant life.'
- id: Q144
  page: 20
  dimension: output_ontology
  text: 'Financial Impact: Classify as ''true'' if the text explicitly mentions economic consequences of weather events. This
    includes direct monetary losses; business disruptions or closures requiring financial intervention; market price fluctuations
    or demand changes for specific goods; impacts on tourism and local economic activities; or insurance claims or economic
    relief measures. Focus only on explicit mentions of financial losses or fluctuations.'
- id: Q145
  page: 20
  dimension: output_ontology
  text: 'Human Health Impact: Classify as ''true'' if the text mentions physical or mental health effects of weather events
    on populations. This includes direct injuries or fatalities (including cases where zero or more casualties are explicitly
    mentioned); elevated risks of weather-related or secondary illnesses; mental health consequences such as stress or anxiety;
    impacts on healthcare service accessibility; or long-term health implications.'
- id: Q146
  page: 20
  dimension: output_ontology
  text: 'Political Impact: Classify as ''true'' if the text mentions governmental and policy responses to weather events.
    This includes government decision-making and policy modifications in response to events; changes in public opinion or
    political discourse; effects on electoral processes or outcomes; international relations and aid responses; or debates
    surrounding disaster preparedness and response capabilities.'
