- id: Q93
  page: 7
  dimension: input_form
  text: We train our models with Adam (Kingma & Ba, 2015) with initial learning rate 10−4 and batch size 128.
- id: Q94
  page: 7
  dimension: output_form
  text: We use the macro-average score as the validation metric and stop training when the learning rate drops below 10−5
    or performance does not improve after 5 validation checks.
- id: Q95
  page: 7
  dimension: input_form
  text: We also train a set of single-task models, which are configured and trained identically, but share no parameters.
- id: Q96
  page: 7
  dimension: output_form
  text: To allow for fair comparisons with the multi-task analogs, we do not tune parameter or training settings for each
    task, so these single-task models do not generally represent the state of the art for each task.
- id: Q97
  page: 7
  dimension: input_ontology
  text: 'Finally, we evaluate the following trained sentence-to-vector encoder models using our benchmark: average bag-of-words
    using GloVe embeddings (CBoW), Skip-Thought (Kiros et al., 2015), InferSent (Conneau et al., 2017), DisSent (Nie et al.,
    2017), and GenSen (Subramanian et al., 2018).'
- id: Q98
  page: 7
  dimension: input_form
  text: For these models, we only train task-specific classifiers on the representations they produce.
- id: Q99
  page: 8
  dimension: output_form
  text: We train three runs of each model and evaluate the run with the best macro-average development set performance (see
    Table 6 in Appendix C).
- id: Q100
  page: 8
  dimension: output_form
  text: For single-task and sentence representation models, we evaluate the best run for each individual task.
- id: Q101
  page: 8
  dimension: input_ontology
  text: We find that multi-task training yields better overall scores over single-task training amongst models using attention
    or ELMo.
- id: Q102
  page: 8
  dimension: input_ontology
  text: Attention generally has negligible or negative aggregate effect in single task training, but helps in multi-task training.
- id: Q103
  page: 8
  dimension: input_form
  text: We see a consistent improvement in using ELMo embeddings in place of GloVe or CoVe embeddings, particularly for single-sentence
    tasks.
- id: Q104
  page: 8
  dimension: input_form
  text: Using CoVe has mixed effects over using only GloVe.
- id: Q105
  page: 8
  dimension: input_ontology
  text: Among the pre-trained sentence representation models, we observe fairly consistent gains moving from CBoW to Skip-Thought
    to Infersent and GenSen.
- id: Q106
  page: 8
  dimension: output_ontology
  text: On WNLI, no model exceeds most-frequent-class guessing (65.1%) and we substitute the model predictions for the most-frequent
    baseline.
- id: Q107
  page: 8
  dimension: output_form
  text: On RTE and in aggregate, even our best baselines leave room for improvement.
- id: Q108
  page: 8
  dimension: output_form
  text: These early results indicate that solving GLUE is beyond the capabilities of current models and methods.
- id: Q109
  page: 9
  dimension: output_form
  text: We analyze the baselines by evaluating each model's MNLI classifier on the diagnostic set to get a better sense of
    their linguistic capabilities.
- id: Q110
  page: 9
  dimension: output_form
  text: 'Overall performance is low for all models: The highest total score of 28 still denotes poor absolute performance.'
- id: Q111
  page: 9
  dimension: input_ontology
  text: Performance tends to be higher on Predicate-Argument Structure and lower on Logic, though numbers are not closely
    comparable across categories.
- id: Q112
  page: 9
  dimension: output_form
  text: Unlike on the main benchmark, the multi-task models are almost always outperformed by their single-task counterparts.
- id: Q113
  page: 9
  dimension: output_ontology
  text: Most models handle universal quantification relatively well.
- id: Q114
  page: 9
  dimension: output_ontology
  text: Double negation is especially difficult for the GLUE-trained models that only use GloVe embeddings.
- id: Q115
  page: 9
  dimension: output_form
  text: We expect that our platform and diagnostic dataset will be useful for similar analyses in the future, so that model
    designers can better understand their models' generalization behavior and implicit knowledge.
- id: Q116
  page: 9
  dimension: input_ontology
  text: We introduce GLUE, a platform and collection of resources for evaluating and analyzing natural language understanding
    systems.
- id: Q117
  page: 9
  dimension: output_content
  text: We thank Ellie Pavlick, Tal Linzen, Kyunghyun Cho, and Nikita Nangia for their comments on this work at its early
    stages, and we thank Ernie Davis, Alex Warstadt, and Quora's Nikhil Dandekar and Kornel Csernai for providing access to
    private evaluation data.
- id: Q118
  page: 9
  dimension: output_content
  text: This project has benefited from financial support to SB by Google, Tencent Holdings, and Samsung Research, and to
    AW from AdeptMind and an NSF Graduate Research Fellowship.
- id: Q119
  page: 13
  dimension: input_content
  text: To construct a balanced dataset, we select all pairs in which the most similar sentence to the question was not the
    answer sentence, as well as an equal amount of cases in which the correct sentence was the most similar to the question,
    but another distracting sentence was a close second.
- id: Q120
  page: 13
  dimension: input_form
  text: Our similarity metric is based on CBoW representations with pre-trained GloVe embeddings.
- id: Q121
  page: 13
  dimension: input_content
  text: This approach to converting pre-existing datasets into NLI format is closely related to recent work by White et al.
    (2017), as well as to the original motivation for textual entailment presented by Dagan et al. (2006).
- id: Q122
  page: 13
  dimension: input_ontology
  text: Both argue that many NLP tasks can be productively reduced to textual entailment.
- id: Q123
  page: 14
  dimension: input_form
  text: 'We implement our attention mechanism as follows: given two sequences of hidden states u1, u2, . . . , uM and v1,
    v2, . . . , vN, we first compute matrix H where Hij = ui· vj.'
- id: Q124
  page: 14
  dimension: input_form
  text: We scale each task's loss inversely proportional to the number of examples for that task, which we found to improve
    overall performance.
- id: Q125
  page: 14
  dimension: input_form
  text: We train our models with Adam (Kingma & Ba, 2015) with initial learning rate 10−3, batch size 128, and gradient clipping.
- id: Q126
  page: 14
  dimension: output_form
  text: We use macro-average score over all tasks as our validation metric, and perform a validation check every 10k updates.
- id: Q127
  page: 14
  dimension: input_form
  text: We divide the learning rate by 5 whenever validation performance does not improve.
- id: Q128
  page: 14
  dimension: input_form
  text: We stop training when the learning rate drops below 10−5 or performance does not improve after 5 validation checks.
- id: Q129
  page: 14
  dimension: input_ontology
  text: 'We evaluate the following sentence representation models: 1. CBoW, the average of the GloVe embeddings of the tokens
    in the sentence. 2. Skip-Thought (Kiros et al., 2015), a sequence-to-sequence(s) model trained to generate the previous
    and next sentences given the middle sentence. 3. InferSent (Conneau et al., 2017), a BiLSTM with max-pooling trained on
    MNLI and SNLI. 4. DisSent (Nie et al., 2017), a BiLSTM with max-pooling trained to predict the discourse marker (because,
    so, etc.) relating two sentences on data derived from TBC. 5. GenSen (Subramanian et al., 2018), a sequence-to-sequence
    model trained on a variety of supervised and unsupervised objectives.'
- id: Q130
  page: 14
  dimension: input_form
  text: We train task-specific classifiers on top of frozen sentence encoders, using the default parameters from SentEval.
- id: Q131
  page: 14
  dimension: output_form
  text: The GLUE website limits users to two submissions per day in order to avoid overfitting to the private test data.
- id: Q132
  page: 14
  dimension: input_content
  text: GLUE's online platform is built using React, Redux and TypeScript.
- id: Q133
  page: 14
  dimension: input_content
  text: We use Google Firebase for data storage and Google Cloud Functions to host and run our grading script when a submission
    is made.
- id: Q134
  page: 15
  dimension: input_ontology
  text: The dataset is designed to allow for analyzing many levels of natural language understanding, from word meaning and
    sentence structure to high-level reasoning and application of world knowledge.
- id: Q135
  page: 15
  dimension: input_ontology
  text: 'To make this kind of analysis feasible, we first identify four broad categories of phenomena: Lexical Semantics,
    Predicate-Argument Structure, Logic, and Knowledge.'
- id: Q136
  page: 15
  dimension: input_ontology
  text: However, since these categories are vague, we divide each into a larger set of fine-grained subcategories.
- id: Q137
  page: 15
  dimension: input_ontology
  text: These categories are not based on any particular linguistic theory, but broadly based on issues that linguists have
    often identified and modeled in the study of syntax and semantics.
- id: Q138
  page: 15
  dimension: output_form
  text: The dataset is provided not as a benchmark, but as an analysis tool to paint in broad strokes the kinds of phenomena
    a model may or may not capture, and to provide a set of examples that can serve for error analysis, qualitative model
    comparison, and development of adversarial examples that expose a model's weaknesses.
- id: Q139
  page: 15
  dimension: output_form
  text: Because the distribution of language is somewhat arbitrary, it will not be helpful to compare performance of the same
    model on different categories.
- id: Q140
  page: 15
  dimension: output_form
  text: Rather, we recommend comparing performance that different models score on the same category, or using the reported
    scores as a guide for error analysis.
- id: Q141
  page: 15
  dimension: output_ontology
  text: Note that some examples may be tagged with phenomena belonging to multiple categories.
- id: Q142
  page: 16
  dimension: input_ontology
  text: These phenomena center on aspects of word meaning.
- id: Q143
  page: 16
  dimension: input_ontology
  text: Entailment can be applied not only on the sentence level, but the word level.
- id: Q144
  page: 16
  dimension: input_ontology
  text: This relationship applies to many types of words (nouns, adjectives, verbs, many prepositions, etc.) and the relationship
    between lexical and sentential entailment has been deeply explored, e.g., in systems of natural logic.
- id: Q145
  page: 16
  dimension: input_ontology
  text: 'This is a special case of lexical contradiction where one word is derived from the other: from "affordable" to "unaffordable",
    "agree" to "disagree", etc.'
- id: Q146
  page: 16
  dimension: input_ontology
  text: Propositions appearing in a sentence may be in any entailment relation with the sentence as a whole, depending on
    the context in which they appear.
- id: Q147
  page: 16
  dimension: input_ontology
  text: In many cases, this is determined by lexical triggers (usually verbs or adverbs) in the sentence.
- id: Q148
  page: 16
  dimension: output_ontology
  text: We place all examples involving these phenomena under the label of Factivity.
- id: Q149
  page: 16
  dimension: input_ontology
  text: Some propositions denote symmetric relations, while others do not.
- id: Q150
  page: 16
  dimension: input_ontology
  text: Whether a relation is symmetric, or admits collecting its arguments into the subject, is often determined by its head
    word (e.g., "like", "marry" or "meet"), so we classify it under Lexical Semantics.
- id: Q151
  page: 16
  dimension: input_ontology
  text: If a word can be removed from a sentence without changing its meaning, that means the word's meaning was more-or-less
    adequately expressed by the sentence; so, identifying these cases reflects an understanding of both lexical and sentential
    semantics.
- id: Q152
  page: 17
  dimension: input_ontology
  text: Named Entities Words often name entities that exist in the world. There are many different kinds of understanding
    we might wish to understand about these names, including their compositional structure (for example, the "Baltimore Police"
    is the same as the "Police of the City of Baltimore") or their real-world referents and acronym expansions (for example,
    "SNL" is "Saturday Night Live"). This category is closely related to World Knowledge, but focuses on the semantics of
    names as lexical items rather than background knowledge about their denoted entities.
- id: Q153
  page: 17
  dimension: input_ontology
  text: Quantifiers Logical quantification in natural language is often expressed through lexical triggers such as "every",
    "most", "some", and "no". While we reserve the categories in Quantification and Monotonicity for entailments involving
    operations on these quantifiers and their arguments, we choose to regard the interchangeability of quantifiers (e.g.,
    in many cases "most" entails "many") as a question of lexical semantics.
- id: Q154
  page: 17
  dimension: input_ontology
  text: An important component of understanding the meaning of a sentence is understanding how its parts are composed together
    into a whole. In this category, we address issues across that spectrum, from syntactic ambiguity to semantic roles and
    coreference.
- id: Q155
  page: 17
  dimension: input_ontology
  text: 'Syntactic Ambiguity: Relative Clauses, Coordination Scope These two categories deal purely with resolving syntactic
    ambiguity. Relative clauses and coordination scope are both sources of a great amount of ambiguity in English.'
- id: Q156
  page: 17
  dimension: input_ontology
  text: Prepositional phrase attachment is a particularly difficult problem that syntactic parsers in NLP systems continue
    to struggle with. We view it as a problem both of syntax and semantics, since prepositional phrases can express a wide
    variety of semantic roles and often semantically apply beyond their direct syntactic attachment.
- id: Q157
  page: 17
  dimension: input_ontology
  text: 'Core Arguments Verbs select for particular arguments, particularly subjects and objects, which might be interchangeable
    depending on the context or the surface form. One example is the ergative alternation: "Jake broke the vase" entails "the
    vase broke" but "Jake broke the vase" does not entail "Jake broke". Other rearrangements of core arguments, such as those
    seen in Symmetry/Collectivity, also fall under the Core Arguments label.'
- id: Q158
  page: 17
  dimension: input_ontology
  text: 'Alternations: Active/Passive, Genitives/Partitives, Nominalization, Datives All four of these categories correspond
    to syntactic alternations that are known to follow specific patterns in English: Active/Passive: "I saw him" is equivalent
    to "He was seen by me" and entails "He was seen". Genitives/Partitives: "the elephant''s foot" is the same thing as "the
    foot of the elephant". Nominalization: "I caused him to submit his resignation" entails "I caused the submission of his
    resignation". Datives: "I baked him a cake" entails "I baked a cake for him" and "I baked a cake" but not "I baked him".'
- id: Q159
  page: 17
  dimension: input_ontology
  text: Ellipsis/Implicits Often, the argument of a verb or other predicate is omitted (elided) in the text, with the reader
    filling in the gap. We can construct entailment examples by explicitly filling in the gap with the correct or incorrect
    referents. For example, the premise "Putin is so entrenched within Russias ruling system that many of its members can
    imagine no other leader" entails "Putin is so entrenched within Russias ruling system that many of its members can imagine
    no other leader than Putin" and contradicts "Putin is so entrenched within Russias ruling system that many of its members
    can imagine no other leader than themselves."
- id: Q160
  page: 17
  dimension: input_ontology
  text: This is often regarded as a special case of anaphora, but we decided to split out these cases from explicit anaphora,
    which is often also regarded as a case of coreference (and attempted to some degree in modern coreference resolution systems).
- id: Q161
  page: 18
  dimension: input_ontology
  text: Coreference refers to when multiple expressions refer to the same entity or event.
- id: Q162
  page: 18
  dimension: input_ontology
  text: It is closely related to Anaphora, where the meaning of an expression depends on another (antecedent) expression in
    context.
- id: Q163
  page: 18
  dimension: input_ontology
  text: These two phenomena have significant overlap; for example, pronouns ("she", "we", "it") are anaphors that are co-referent
    with their antecedents.
- id: Q164
  page: 18
  dimension: input_ontology
  text: In this category we only include cases where there is an explicit phrase (anaphoric or not) that is co-referent with
    an antecedent or other phrase.
- id: Q165
  page: 18
  dimension: input_content
  text: We construct examples for these in much the same way as for Ellipsis/Implicits.
- id: Q166
  page: 18
  dimension: input_ontology
  text: Many modifiers, especially adjectives, allow non-intersective uses, which affect their entailment behavior.
- id: Q167
  page: 18
  dimension: input_ontology
  text: Generally, an intersective use of a modifier, like "old" in "old men", is one which may be interpreted as referring
    to the set of entities with both properties (they are old and they are men).
- id: Q168
  page: 18
  dimension: input_ontology
  text: Intersectivity is related to Factivity.
- id: Q169
  page: 18
  dimension: input_ontology
  text: However, we choose to categorize intersectivity under predicate-argument structure rather than lexical semantics,
    because generally the same word will admit both intersective and non-intersective uses, so it may be regarded as an ambiguity
    of argument structure.
- id: Q170
  page: 18
  dimension: input_ontology
  text: Restrictivity is most often used to refer to a property of uses of noun modifiers.
- id: Q171
  page: 18
  dimension: input_ontology
  text: In particular, a restrictive use of a modifier is one that serves to identify the entity or entities being described,
    whereas a non-restrictive use adds extra details to the identified entity.
- id: Q172
  page: 18
  dimension: input_ontology
  text: Modifiers that are commonly used non-restrictively are appositives, relative clauses starting with "which" or "who",
    and expletives (e.g. "pesky").
- id: Q173
  page: 18
  dimension: input_ontology
  text: With an understanding of the structure of a sentence, there is often a baseline set of shallow conclusions that can
    be drawn using logical operators and often modeled using the mathematical tools of logic.
- id: Q174
  page: 18
  dimension: input_ontology
  text: 'All of the basic operations of propositional logic appear in natural language, and we tag them where they are relevant
    to our examples:'
- id: Q175
  page: 19
  dimension: input_ontology
  text: 'Conjunction: "Temperature and snow consistency must be just right" entails "Temperature must be just right".'
- id: Q176
  page: 19
  dimension: input_ontology
  text: 'Disjunction: "Life is either a daring adventure or nothing at all" does not entail, but is entailed by, "Life is
    a daring adventure".'
- id: Q177
  page: 19
  dimension: input_ontology
  text: 'Conditionals: "If both apply, they are essentially impossible" does not entail "They are essentially impossible".'
- id: Q178
  page: 19
  dimension: input_ontology
  text: Conditionals are more complicated because their use in language does not always mirror their meaning in logic.
- id: Q179
  page: 19
  dimension: input_ontology
  text: 'For example, they may be used at a higher level than the at-issue assertion: "If you think about it, it''s the perfect
    reverse psychology tactic" entails "It''s the perfect reverse psychology tactic".'
- id: Q180
  page: 19
  dimension: input_ontology
  text: Quantifiers are often triggered by words such as "all", "some", "many", and "no".
- id: Q181
  page: 19
  dimension: input_ontology
  text: 'Universal: "All parakeets have two wings" entails, but is not entailed by, "My parakeet has two wings".'
- id: Q182
  page: 19
  dimension: input_ontology
  text: 'Existential: "Some parakeets have two wings" does not entail, but is entailed by, "My parakeet has two wings".'
- id: Q183
  page: 19
  dimension: input_ontology
  text: Monotonicity is a property of argument positions in certain logical systems.
- id: Q184
  page: 19
  dimension: input_ontology
  text: In general, it gives a way of deriving entailment relations between expressions that differ on only one subexpression.
- id: Q185
  page: 19
  dimension: input_ontology
  text: '"a" is upward monotone in its restrictor: an entailment in the restrictor yields an entailment of the whole statement.'
- id: Q186
  page: 19
  dimension: input_ontology
  text: '"no" is downward monotone in its restrictor: an entailment in the restrictor yields an entailment of the whole statement
    in the opposite direction.'
- id: Q187
  page: 19
  dimension: input_ontology
  text: '"exactly one" is non-monotone in its restrictor: entailments in the restrictor do not yield entailments of the whole
    statement.'
- id: Q188
  page: 19
  dimension: input_ontology
  text: In this way, entailments between sentences that are built off of entailments of sub-phrases almost always rely on
    monotonicity judgments; see, for example, Lexical Entailment.
- id: Q189
  page: 19
  dimension: input_ontology
  text: However, because this is such a general class of sentence pairs, to keep the Logic category meaningful we do not always
    tag these examples with monotonicity.
- id: Q190
  page: 19
  dimension: input_ontology
  text: Some higher-level facets of reasoning have been traditionally modeled using logic, such as actual mathematical reasoning
    (entailments based off of numbers) and temporal reasoning (which is often modeled as reasoning about a mathematical timeline).
- id: Q191
  page: 19
  dimension: input_ontology
  text: 'Intervals/Numbers: "I have had more than 2 drinks tonight" entails "I have had more than 1 drink tonight".'
- id: Q192
  page: 19
  dimension: input_ontology
  text: 'Temporal: "Mary left before John entered" entails "John entered after Mary left".'
- id: Q193
  page: 20
  dimension: input_ontology
  text: Strictly speaking, world knowledge and common sense are required on every level of language understanding for disambiguating
    word senses, syntactic structures, anaphora, and more.
- id: Q194
  page: 20
  dimension: input_ontology
  text: However, in these categories, we gather examples where the entailment rests not only on correct disambiguation of
    the sentences, but also application of extra knowledge, whether concrete knowledge about world affairs or more common-sense
    knowledge about word meanings or social or physical dynamics.
- id: Q195
  page: 20
  dimension: input_ontology
  text: World Knowledge In this category we focus on knowledge that can clearly be expressed as facts, as well as broader
    and less common geographical, legal, political, technical, or cultural knowledge.
- id: Q196
  page: 20
  dimension: input_ontology
  text: Common Sense In this category we focus on knowledge that is more difficult to express as facts and that we expect
    to be possessed by most people independent of cultural or educational background.
- id: Q197
  page: 20
  dimension: input_ontology
  text: This includes a basic understanding of physical and social dynamics as well as lexical meaning (beyond simple lexical
    entailment or logical relations).
coverage_strengths:
- user_priority: Multi-task NLU evaluation framework (structural reference)
  benchmark_coverage: 'GLUE provides a nine-task macro-averaged evaluation platform with publicly

    documented per-task metrics and a held-out test set submission model [Q15, Q59].

    While none of the tasks map to Luxembourgish administrative needs, the platform

    architecture (leaderboard, macro-average, per-task breakdown) could serve as a

    structural reference for designing a custom Luxembourgish benchmark suite.

    '
  dimension: input_ontology
- user_priority: Sentiment analysis as one required NLU capability
  benchmark_coverage: 'GLUE includes SST-2, a sentiment classification task with binary positive/negative

    labels and accuracy evaluation [Q26, Q28]. This is the single functional overlap with

    the deployment''s sentiment/frustration detection requirement, though the data source

    (English movie reviews [Q26]) and annotator pool are entirely misaligned with

    Luxembourgish administrative correspondence.

    '
  dimension: output_ontology
- user_priority: Diagnostic analysis of model linguistic capabilities
  benchmark_coverage: 'The diagnostic dataset''s four-category, fine-grained subcategory structure [Q135,

    Q136] and its per-category R3 reporting [Q70, Q140] provide a model for systematic

    capability profiling. The recommendation to compare models within categories rather

    than across them [Q140] is methodologically transferable to a Luxembourgish

    capability audit, even though the specific phenomena probed (English syntax and

    semantics) do not transfer.

    '
  dimension: output_form
- user_priority: Human-in-the-loop annotation and inter-annotator agreement documentation
  benchmark_coverage: 'The diagnostic set documents a formal human baseline with Fleiss''s κ = 0.73 across

    six annotators [Q74], providing a methodological reference for establishing human

    agreement baselines in any future Luxembourgish annotation effort.

    '
  dimension: output_content
