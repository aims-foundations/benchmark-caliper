- id: Q9
  page: 1
  dimension: input_ontology
  text: This dataset is designed to highlight common challenges, such as the use of world knowledge and logical operators,
    that we expect models must handle to robustly solve the tasks.
- id: Q10
  page: 1
  dimension: output_form
  text: We evaluate baselines based on current methods for transfer and representation learning and find that multi-task training
    on all tasks performs better than training a separate model per task.
- id: Q11
  page: 1
  dimension: output_form
  text: However, the low absolute performance of our best model indicates the need for improved general NLU systems.
- id: Q12
  page: 2
  dimension: output_ontology
  text: All tasks are single sentence or sentence pair classification, except STS-B, which is a regression task. MNLI has
    three classes; all other classification tasks have two. Test sets shown in bold use labels that have never been made public
    in any form.
- id: Q13
  page: 2
  dimension: output_form
  text: To better understand the challenged posed by GLUE, we conduct experiments with simple baselines and state-of-the-art
    sentence representation models. We find that unified multi-task trained models slightly outperform comparable models trained
    on each task separately. Our best multi-task model makes use of ELMo (Peters et al., 2018), a recently proposed pre-training
    technique. However, this model still achieves a fairly low absolute score.
- id: Q14
  page: 2
  dimension: output_ontology
  text: Analysis with our diagnostic dataset reveals that our baseline models deal well with strong lexical signals but struggle
    with deeper logical structure.
- id: Q15
  page: 2
  dimension: input_ontology
  text: 'In summary, we offer: (i) A suite of nine sentence or sentence-pair NLU tasks, built on established annotated datasets
    and selected to cover a diverse range of text genres, dataset sizes, and degrees of difficulty. (ii) An online evaluation
    platform and leaderboard, based primarily on privately-held test data. The platform is model-agnostic, and can evaluate
    any method capable of producing results on all nine tasks. (iii) An expert-constructed diagnostic evaluation dataset.
    (iv) Baseline results for several major existing approaches to sentence representation learning.'
- id: Q16
  page: 2
  dimension: input_ontology
  text: Like GLUE, SentEval relies on a set of existing classification tasks involving either one or two sentences as inputs.
    Unlike GLUE, SentEval only evaluates sentence-to-vector encoders, making it well-suited for evaluating models on tasks
    involving sentences in isolation.
- id: Q17
  page: 2
  dimension: input_ontology
  text: 'GLUE is designed to facilitate the development of these methods: It is model-agnostic, allowing for any kind of representation
    or contextualization, including models that use no explicit vector or symbolic representations for sentences whatsoever.'
- id: Q18
  page: 3
  dimension: input_ontology
  text: GLUE is centered on nine English sentence understanding tasks, which cover a broad range of domains, data quantities,
    and difficulties.
- id: Q19
  page: 3
  dimension: input_ontology
  text: As the goal of GLUE is to spur development of generalizable NLU systems, we design the benchmark such that good performance
    should require a model to share substantial knowledge (e.g., trained parameters) across all tasks, while still maintaining
    some task-specific components.
- id: Q20
  page: 3
  dimension: output_form
  text: Unless otherwise mentioned, tasks are evaluated on accuracy and are balanced across classes.
- id: Q21
  page: 3
  dimension: input_content
  text: The Corpus of Linguistic Acceptability (Warstadt et al., 2018) consists of English acceptability judgments drawn from
    books and journal articles on linguistic theory.
- id: Q22
  page: 3
  dimension: output_ontology
  text: Each example is a sequence of words annotated with whether it is a grammatical English sentence.
- id: Q23
  page: 3
  dimension: output_form
  text: Following the authors, we use Matthews correlation coefficient (Matthews, 1975) as the evaluation metric, which evaluates
    performance on unbalanced binary classification and ranges from -1 to 1, with 0 being the performance of uninformed guessing.
- id: Q24
  page: 3
  dimension: input_content
  text: We use the standard test set, for which we obtained private labels from the authors.
- id: Q25
  page: 3
  dimension: output_form
  text: We report a single performance number on the combination of the in- and out-of-domain sections of the test set.
- id: Q26
  page: 3
  dimension: input_content
  text: The Stanford Sentiment Treebank (Socher et al., 2013) consists of sentences from movie reviews and human annotations
    of their sentiment.
- id: Q27
  page: 3
  dimension: input_ontology
  text: The task is to predict the sentiment of a given sentence.
- id: Q28
  page: 3
  dimension: output_ontology
  text: We use the two-way (positive/negative) class split, and use only sentence-level labels.
- id: Q29
  page: 3
  dimension: input_content
  text: The Microsoft Research Paraphrase Corpus (Dolan & Brockett, 2005) is a corpus of sentence pairs automatically extracted
    from online news sources, with human annotations for whether the sentences in the pair are semantically equivalent.
- id: Q30
  page: 3
  dimension: output_form
  text: Because the classes are imbalanced (68% positive), we follow common practice and report both accuracy and F1 score.
- id: Q31
  page: 3
  dimension: input_content
  text: The Quora Question Pairs dataset is a collection of question pairs from the community question-answering website Quora.
- id: Q32
  page: 3
  dimension: input_ontology
  text: The task is to determine whether a pair of questions are semantically equivalent.
- id: Q33
  page: 3
  dimension: output_form
  text: As in MRPC, the class distribution in QQP is unbalanced (63% negative), so we report both accuracy and F1 score.
- id: Q34
  page: 3
  dimension: output_content
  text: We observe that the test set has a different label distribution than the training set.
- id: Q35
  page: 3
  dimension: input_content
  text: The Semantic Textual Similarity Benchmark (Cer et al., 2017) is a collection of sentence pairs drawn from news headlines,
    video and image captions, and natural language inference data. Each pair is human-annotated with a similarity score from
    1 to 5; the task is to predict these scores. Follow common practice, we evaluate using Pearson and Spearman correlation
    coefficients.
- id: Q36
  page: 4
  dimension: input_content
  text: The Multi-Genre Natural Language Inference Corpus (Williams et al., 2018) is a crowdsourced collection of sentence
    pairs with textual entailment annotations.
- id: Q37
  page: 4
  dimension: input_ontology
  text: Given a premise sentence and a hypothesis sentence, the task is to predict whether the premise entails the hypothesis
    (entailment), contradicts the hypothesis (contradiction), or neither (neutral).
- id: Q38
  page: 4
  dimension: input_content
  text: The premise sentences are gathered from ten different sources, including transcribed speech, fiction, and government
    reports.
- id: Q39
  page: 4
  dimension: output_form
  text: We use the standard test set, for which we obtained private labels from the authors, and evaluate on both the matched
    (in-domain) and mismatched (cross-domain) sections.
- id: Q40
  page: 4
  dimension: input_content
  text: We also use and recommend the SNLI corpus (Bowman et al., 2015) as 550k examples of auxiliary training data.
- id: Q41
  page: 4
  dimension: input_content
  text: The Stanford Question Answering Dataset (Rajpurkar et al. 2016) is a question-answering dataset consisting of question-paragraph
    pairs, where one of the sentences in the paragraph (drawn from Wikipedia) contains the answer to the corresponding question
    (written by an annotator).
- id: Q42
  page: 4
  dimension: input_form
  text: We convert the task into sentence pair classification by forming a pair between each question and each sentence in
    the corresponding context, and filtering out pairs with low lexical overlap between the question and the context sentence.
- id: Q43
  page: 4
  dimension: input_ontology
  text: The task is to determine whether the context sentence contains the answer to the question.
- id: Q44
  page: 4
  dimension: output_ontology
  text: This modified version of the original task removes the requirement that the model select the exact answer, but also
    removes the simplifying assumptions that the answer is always present in the input and that lexical overlap is a reliable
    cue.
- id: Q45
  page: 4
  dimension: input_form
  text: This process of recasting existing datasets into NLI is similar to methods introduced in White et al. (2017) and expanded
    upon in Demszky et al. (2018).
- id: Q46
  page: 4
  dimension: input_content
  text: The Recognizing Textual Entailment (RTE) datasets come from a series of annual textual entailment challenges.
- id: Q47
  page: 4
  dimension: input_content
  text: We combine the data from RTE1 (Dagan et al., 2006), RTE2 (Bar Haim et al., 2006), RTE3 (Giampiccolo et al., 2007),
    and RTE5 (Bentivogli et al., 2009).
- id: Q48
  page: 4
  dimension: input_content
  text: Examples are constructed based on news and Wikipedia text.
- id: Q49
  page: 4
  dimension: input_form
  text: We convert all datasets to a two-class split, where for three-class datasets we collapse neutral and contradiction
    into not entailment, for consistency.
- id: Q50
  page: 4
  dimension: input_content
  text: The Winograd Schema Challenge (Levesque et al., 2011) is a reading comprehension task in which a system must read
    a sentence with a pronoun and select the referent of that pronoun from a list of choices.
- id: Q51
  page: 4
  dimension: input_content
  text: 'The examples are manually constructed to foil simple statistical methods: Each one is contingent on contextual information
    provided by a single word or phrase in the sentence.'
- id: Q52
  page: 4
  dimension: input_form
  text: To convert the problem into sentence pair classification, we construct sentence pairs by replacing the ambiguous pronoun
    with each possible referent.
- id: Q53
  page: 5
  dimension: input_content
  text: We use a small evaluation set consisting of new examples derived from fiction books that was shared privately by the
    authors of the original corpus.
- id: Q54
  page: 5
  dimension: input_form
  text: While the included training set is balanced between two classes, the test set is imbalanced between them (65% not
    entailment).
- id: Q55
  page: 5
  dimension: output_content
  text: 'Also, due to a data quirk, the development set is adversarial: hypotheses are sometimes shared between training and
    development examples, so if a model memorizes the training examples, they will predict the wrong label on corresponding
    development set example.'
- id: Q56
  page: 5
  dimension: output_ontology
  text: Labels are entailment (E), neutral (N), or contradiction (C).
- id: Q57
  page: 5
  dimension: output_form
  text: The GLUE benchmark follows the same evaluation model as SemEval and Kaggle.
- id: Q58
  page: 5
  dimension: output_form
  text: To evaluate a system on the benchmark, one must run the system on the provided test data for the tasks, then upload
    the results to the website gluebenchmark.com for scoring.
- id: Q59
  page: 5
  dimension: output_form
  text: The benchmark site shows per-task scores and a macro-average of those scores to determine a system's position on the
    leaderboard.
- id: Q60
  page: 5
  dimension: output_form
  text: For tasks with multiple metrics (e.g., accuracy and F1), we use an unweighted average of the metrics as the score
    for the task when computing the overall macro-average.
- id: Q61
  page: 5
  dimension: input_content
  text: Drawing inspiration from the FraCaS suite (Cooper et al., 1996) and the recent Build-It-Break-It competition (Ettinger
    et al., 2017), we include a small, manually-curated test set for the analysis of system performance.
- id: Q62
  page: 5
  dimension: input_form
  text: Each diagnostic example is an NLI sentence pair with tags for the phenomena demonstrated.
- id: Q63
  page: 5
  dimension: input_content
  text: We ensure the data is reasonably diverse by producing examples for a variety of linguistic phenomena and basing our
    examples on naturally-occurring sentences from several domains (news, Reddit, Wikipedia, academic papers).
- id: Q64
  page: 6
  dimension: input_ontology
  text: We begin with a target set of phenomena, based roughly on those used in the FraCaS suite (Cooper et al., 1996).
- id: Q65
  page: 6
  dimension: output_content
  text: We construct each example by locating a sentence that can be easily made to demonstrate a target phenomenon, and editing
    it in two ways to produce an appropriate sentence pair.
- id: Q66
  page: 6
  dimension: output_content
  text: We make minimal modifications so as to maintain high lexical and structural overlap within each sentence pair and
    limit superficial cues.
- id: Q67
  page: 6
  dimension: output_content
  text: We then label the inference relationships between the sentences, considering each sentence alternatively as the premise,
    producing two labeled examples for each pair (1100 total).
- id: Q68
  page: 6
  dimension: output_content
  text: Where possible, we produce several pairs with different labels for a single source sentence, to have minimal sets
    of sentence pairs that are lexically and structurally very similar but correspond to different entailment relationships.
- id: Q69
  page: 6
  dimension: output_ontology
  text: The resulting labels are 42% entailment, 35% neutral, and 23% contradiction.
- id: Q70
  page: 6
  dimension: output_form
  text: Since the class distribution in the diagnostic set is not balanced, we use R3 (Gorodkin, 2004), a three-class generalization
    of the Matthews correlation coefficient, for evaluation.
- id: Q71
  page: 6
  dimension: output_form
  text: We reproduce the methodology of Gururangan et al. (2018), training two fastText classifiers (Joulin et al., 2016)
    to predict entailment labels on SNLI and MNLI using only the hypothesis as input.
- id: Q72
  page: 6
  dimension: output_content
  text: The models respectively get near-chance accuracies of 32.7% and 36.4% on our diagnostic data, showing that the data
    does not suffer from such artifacts.
- id: Q73
  page: 6
  dimension: output_content
  text: To establish human baseline performance on the diagnostic set, we have six NLP researchers annotate 50 sentence pairs
    (100 entailment examples) randomly sampled from the diagnostic set.
- id: Q74
  page: 6
  dimension: output_content
  text: Inter-annotator agreement is high, with a Fleiss's κ of 0.73.
- id: Q75
  page: 6
  dimension: output_form
  text: The average R3 score among the annotators is 0.80, much higher than any of the baseline systems described in Section
    5.
- id: Q76
  page: 6
  dimension: output_form
  text: The diagnostic examples are hand-picked to address certain phenomena, and NLI is a task with no natural input distribution,
