- id: Q77
  page: 6
  dimension: output_form
  text: Performance on the analysis set should be compared between models but not between categories.
- id: Q78
  page: 6
  dimension: output_form
  text: The set is provided not as a benchmark, but as an analysis tool for error analysis, qualitative model comparison,
    and development of adversarial examples.
- id: Q79
  page: 6
  dimension: output_content
  text: We implement our models in the AllenNLP library (Gardner et al., 2017).
- id: Q80
  page: 6
  dimension: output_form
  text: Our simplest baseline architecture is based on sentence-to-vector encoders, and sets aside GLUE's ability to evaluate
