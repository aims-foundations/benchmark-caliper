coverage_strengths:
- user_priority: Broad classical-deductive FOL coverage (quantifiers, negation, conditionals, multi-step chains)
  benchmark_coverage: 'FOLIO includes all core FOL operators (negation, conjunction, disjunction, implication, universal/existential
    quantifiers, equality) [Q138] and n-place predicates [Q141], covers all 24 valid syllogism types augmented with conjunction,
    disjunction, and implication [Q43], and explicitly positions logical reasoning as something that "should be sufficiently
    and independently evaluated" [Q7]. Temporal and modal logic are documented as out of scope [Q139, Q140], matching the
    lab''s stated exclusions.

    '
  dimension: input_ontology
- user_priority: Multi-step deduction chain depth
  benchmark_coverage: '28.7% of examples require five or more depths of reasoning [Q60], and performance analysis explicitly
    breaks out accuracy by reasoning depth, showing that GPT-3.5 and GPT-4 perform substantially worse on 4–7 depth examples
    [Q99]. Fine-tuning on longer chains improves performance on equally long test chains [Q100], directly supporting depth-stratified
    analysis.

    '
  dimension: input_ontology
- user_priority: Three-way categorical classification accuracy (entailment/contradiction/neutral)
  benchmark_coverage: 'FOLIO''s True/False/Unknown label scheme maps directly onto the lab''s three-class taxonomy with no
    residual ambiguity [Q36, Q66]. The primary evaluation metric is classification accuracy [Q80], and the near-balanced test
    set distribution (87 True, 78 False, 61 Unknown) supports unbiased accuracy estimation [Q94].

    '
  dimension: output_ontology
- user_priority: Objective, machine-verifiable ground-truth labels
  benchmark_coverage: 'Ground-truth labels are not based on subjective annotator judgment but are formally verified by an
    automated FOL inference engine [Q2, Q153], anchoring label correctness in objective logical validity. Expert human annotators
    achieve 95.98% accuracy confirming the labels are learnable by FOL-trained humans [Q111].

    '
  dimension: output_content
- user_priority: Hybrid NL+FOL input presentation mode
  benchmark_coverage: 'FOLIO provides parallel NL and FOL annotations for every premise and conclusion [Q65], and the paper
    directly evaluates NL-only, FOL-only, and NL+FOL presentation modes, finding that NL+FOL improves GPT-4 performance while
    NL+FOL and FOL-only hurt GPT-3.5 [Q162, Q163]. This documented experiment is directly relevant to the lab''s undecided
    presentation strategy.

    '
  dimension: input_form
coverage_gap_analysis:
