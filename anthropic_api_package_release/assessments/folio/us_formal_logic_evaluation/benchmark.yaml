    primary input signal. The FOL-only condition is tested in [Q162, Q163] but shows performance degradation for GPT-3.5,
    and the benchmark''s NL quality engineering (Grammarly checks, English Literature review [Q49, Q50]) implies the NL layer
    is the intended primary input. Documented score distributions and model rankings derive primarily from NL-first presentation,
    so validity of FOLIO scores may not generalize to a pure-symbolic regime.

    '
