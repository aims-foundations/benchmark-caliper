- id: Q9
  page: 1
  dimension: input_ontology
  text: Some of these common benchmarks do not specifically evaluate logical reasoning independently of other forms of reasoning
    (Yu et al., 2020; Liu et al., 2021).
- id: Q10
  page: 1
  dimension: input_ontology
  text: Those specifically designed for measuring logical reasoning are insufficient in terms of logical reasoning complexity
    and natural language variety.
- id: Q11
  page: 1
  dimension: input_ontology
  text: Examples in RuleTaker (Clark et al., 2020) and LogicNLI (Tian et al., 2021) need at most five depths of reasoning.
