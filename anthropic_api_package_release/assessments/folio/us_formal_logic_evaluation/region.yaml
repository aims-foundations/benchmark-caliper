name: US AI Research Lab — FOLIO FOL Reasoning Evaluation
abbreviation: us_ai_lab_folio
deployment_context:
  organization_type: US-based AI research laboratory
  user_population: AI researchers, ML engineers, and benchmark evaluators with formal
    training in logic and NLP; not a general consumer population
  task: Benchmarking LLM logical reasoning via three-way classification (entailment
    / contradiction / neutral) on structured premise-conclusion pairs drawn from FOLIO
  evaluation_paradigm: Classification accuracy on a three-way categorical label (True
    / False / Unknown), with potential secondary interest in NL-to-FOL translation
    quality metrics
  geography: United States (research lab context); no sub-national or demographic
    variation relevant to this deployment
  domain: Formal classical first-order logic reasoning
languages:
  primary:
  - English
  variants:
  - Standard American English (academic/technical register)
  note: All benchmark inputs and outputs are in English. The population consists of
    native or near-native English speakers with advanced technical literacy. No multilingual
    or dialect variation is relevant to this deployment.
writing_systems:
  scripts:
  - Latin alphabet
  - Standard FOL symbolic notation (¬, ∧, ∨, →, ∀, ∃, =)
  note: Inputs may be presented in natural language (Latin script), in formal FOL
    symbolic notation, or as a hybrid of both. The choice between presentation modes
    is a live, unresolved decision by the lab and constitutes the highest-priority
    validity concern for this assessment.
population_expertise_profile:
  domain_knowledge: Users possess formal education in first-order logic and are familiar
    with classical deductive reasoning, quantifiers, negation, conditionals, and multi-step
    inference chains
  nlp_ml_background: Users are practicing AI/ML researchers capable of interpreting
    benchmark methodology, score distributions, confusion matrices, and ceiling-effect
    diagnostics
  benchmark_literacy: High; users will scrutinize validity claims and are aware of
    failure modes such as data contamination, ceiling effects, and input-format sensitivity
  note: This is an expert evaluator population, not an end-user or consumer population.
    Cultural loading, accessibility, and general literacy concerns that apply to consumer-facing
    deployments are not applicable here.
benchmark_alignment:
  benchmark_name: 'FOLIO: Natural Language Reasoning with First-Order Logic'
  benchmark_domain: Logical reasoning (first-order logic)
  benchmark_language: en
  label_mapping:
    entailment: 'True'
    contradiction: 'False'
    neutral: Unknown
    mapping_status: Clean and confirmed by deployment elicitation; no sub-distinctions
      within Unknown required
  in_scope_reasoning_types:
  - Classical deductive FOL
  - Universal and existential quantification
  - Negation
  - Conditionals (implication)
  - Conjunction and disjunction
  - Multi-step deduction chains
  out_of_scope_reasoning_types:
  - Temporal logic
  - Modal logic
  - Arithmetic reasoning
  - Probabilistic reasoning
input_format_considerations:
  priority: HIGH — primary validity concern for this deployment
  folio_native_format: Natural-language-first; FOL is a parallel annotation layer,
    not the primary input signal
  lab_presentation_options:
  - mode: Natural language only (NL)
    folio_match: Strong — FOLIO was designed and validated for NL-first presentation
  - mode: Hybrid NL + FOL
    folio_match: Supported — FOLIO provides parallel NL/FOL annotations; paper documents
      NL+FOL improves GPT-4 but hurts GPT-3.5
  - mode: Pure symbolic (FOL only)
    folio_match: Weak — FOLIO score distributions derive primarily from NL-first presentation;
      pure-symbolic regime may not generalize to or from documented FOLIO scores
  decision_status: Unresolved as of elicitation; lab is actively considering both
    pure-symbolic and hybrid modes
  closest_alternative_for_pure_symbolic: 'For pure-symbolic or semi-symbolic FOL evaluation
    regimes, the closest alternatives to FOLIO identified are: (1) ProntoQA (Saparov
    & He, 2022/2023) — a synthetic benchmark generating instances from FOL ontologies
    with explicit proof chains; uses template-based NL but is structured around symbolic
    ontologies and supports stepwise proof verification; GPT-4 CoT achieves ~98.79%
    accuracy (near ceiling for current frontier models). (2) ProverQA (ICLR 2025)
    — a newer FOL reasoning benchmark (1,500 instances, easy/medium/hard by chain
    depth 1–9) generated by ProverGen, a framework combining LLMs with symbolic provers
    (Prover9); provides symbolic representations and faithful reasoning chains; state-of-the-art
    LLMs still struggle on the hard subset. (3) LogicGraph (2025/2026) — a neuro-symbolic
    benchmark with average depth 6.01 and multi-path reasoning (2–19 valid paths per
    query), supporting symbolic notation; verified using Prover9. (4) LogicNLI (Tian
    et al., 2021) — auto-generated from logic expressions; more template-based and
    less linguistically diverse than FOLIO. Note: ProntoQA intentionally avoids real-world
    concepts; ProofWriter and ProntoQA use handcrafted templates lacking linguistic
    diversity. ProverQA and LogicGraph are the strongest 2024–2025 candidates for
    labs wanting scalable, depth-stratified, symbolically grounded FOL evaluation.

    Sources: ProntoQA — [|https://www.emergentmind.com/topics/prontoqa|]; ProverQA/ProverGen
    ICLR 2025 — [|https://proceedings.iclr.cc/paper_files/paper/2025/file/862819c227b16f9af64dd6ad6cfdf275-Paper-Conference.pdf|];
    LogicGraph arxiv 2025 — [|https://arxiv.org/html/2602.21044v1|]'
evaluation_pipeline_considerations:
  primary_task: NL reasoning classification (three-way accuracy)
  secondary_task: NL-to-FOL translation (SynV and ExcAcc metrics)
  task_separation_status: FOLIO defines the two tasks with separate metrics, but whether
    the lab's pipeline conflates or separates translation quality from downstream
    classification accuracy is unresolved
  metric_for_primary_task: Classification accuracy over True / False / Unknown labels
  metrics_for_secondary_task:
  - Syntactic Validity (SynV) — binary score on FOL formula syntactic correctness
  - Inference Engine Execution Accuracy (ExcAcc) — label match after feeding translated
    FOL into inference engine
  known_label_asymmetry: Models systematically underperform on False and Unknown relative
    to True; accuracy on non-True labels is substantially lower (54.0% few-shot, 61.9%
    fine-tuning). Lab should account for this when interpreting aggregate accuracy.
discriminability_and_ceiling_concerns:
  folio_gpt4_few_shot_accuracy: 53.1% on HybLogic (near random for three-class problem)
  expert_human_accuracy: 95.98%
  expert_gpt4_gap_at_publication: 31.82 percentage points
  frontier_model_scores_2024_2025: 'Substantial progress since original GPT-4 baseline.
    Neuro-symbolic systems using GPT-4-Turbo as backbone have pushed FOLIO state-of-the-art
    significantly: LLM-ARC (Actor-Critic with Answer Set Programming, 2024) achieves
    88.32% on the FOLIO validation set, up from the prior SotA of 78.9% (LogicLM).
    A separate 2025 auto-formalization agent (Z3Py + SMT) achieves 86.70% on the cleaned
    FOLIO validation set versus a CoT baseline of 73.89%. These neuro-symbolic pipelines
    substantially close the expert–model gap (originally 31.82 pp). However, no published
    direct evaluation of vanilla GPT-4o, Claude 3.5, or Gemini 1.5 on FOLIO was found;
    the 88.32% SotA is from a specialized neuro-symbolic pipeline, not a standard
    prompting baseline. For standard prompting-only baselines with frontier models,
    the ceiling concern remains live and unresolved.

    Sources: LLM-ARC 88.32% — [|https://arxiv.org/pdf/2406.17663|]; agentified assessment
    86.70% — [|https://arxiv.org/pdf/2603.02788|]'
  ceiling_risk_assessment: Moderate-to-high concern for standard prompting baselines;
    neuro-symbolic pipelines have substantially closed the gap (88.32% SotA vs. 95.98%
    human expert), but vanilla frontier-model prompting scores remain undocumented
    in publicly available literature. The benchmark retains headroom for standard
    prompting evaluation as of mid-2025.
  headroom_indicator: 'Expert human ceiling is 95.98%; best published neuro-symbolic
    system (LLM-ARC, 2024) reaches 88.32%. Standard prompting baselines still leave
    ~7–42 pp of headroom depending on methodology. Source: [|https://arxiv.org/pdf/2406.17663|]'
deduction_chain_depth_coverage:
  depth_distribution_summary: 'Mode = 4; 28.7% of examples require five or more reasoning
    depths; depth range is 0–7 (confirmed from FOLIO paper Table 1 comparison row,
    EMNLP 2024 version). Source: [|https://aclanthology.org/2024.emnlp-main.1229.pdf|]'
  per_depth_example_counts: '[NOT FOUND — searched FOLIO GitHub repository and EMNLP
    2024 paper appendices; the paper documents aggregate depth statistics (mode=4,
    28.7% at depth ≥5, range 0–7) and per-depth accuracy bands but does not publish
    a per-depth example count table in publicly accessible supplementary materials.
    The total test set contains 226 examples (87 True, 78 False, 61 Unknown); with
    28.7% at depth ≥5, approximately 65 test examples are at depth 5–7, which may
    be insufficient for reliable per-depth accuracy estimates at depth 6–7 specifically.]'
  statistical_power_at_high_depth: '[NOT FOUND — no published power analysis for depth
    ≥5 subsets found. Given 226 test examples and 28.7% at depth ≥5 (~65 examples),
    depth 6 and depth 7 subsets are likely small (estimated single-digit to low double-digit
    examples each), making accuracy estimates at those specific depths statistically
    unreliable. Lab should treat per-depth scores at depth 6–7 as indicative only.]'
  performance_by_depth_band: GPT-3.5 and GPT-4 substantially weaker at depth 4–7 versus
    depth 0–3 (documented in FOLIO paper)
data_quality_and_contamination:
  annotation_process: Expert-annotated by CS students and researchers with FOL training;
    NL quality reviewed by NLP/CL experts and English Literature specialists; FOL
    quality reviewed by FOL experts separately
  label_grounding: Automated FOL inference engine (Stanford CS221 module); ground
    truth is logically objective, not dependent on annotator agreement
  quality_control_pass_rate: 39.2% of stories had at least one issue and were rewritten
  wikilogic_contamination_risk: WikiLogic examples derived from Wikipedia topics may
    overlap with LLM pretraining data — possible confound for NL-condition evaluations
    of large pretrained models
  hyblogic_pattern_leakage_risk: HybLogic's template origin may allow fine-tuned models
    to learn structural patterns rather than genuine reasoning
  current_contamination_exposure: '[NOT FOUND — no published study specifically assessing
    FOLIO test-set contamination in post-2022 model training corpora was found. The
    benchmark was released in 2022 (arXiv) and published at EMNLP 2024; its GitHub
    repository and test labels are public, creating plausible contamination risk for
    models trained after 2022. A 2025 data-cleaning study (arxiv 2603.02788) found
    annotation errors in FOLIO requiring repair, which is a distinct issue from contamination.
    Lab should treat contamination as an unresolved risk and consider held-out or
    perturbed evaluation subsets. Source for annotation error finding: [|https://arxiv.org/pdf/2603.02788|]]'
  folio_annotation_errors_note: 'A 2025 study implementing a systematic data cleaning
    pipeline using the Vampire theorem prover found annotation errors in the public
    FOLIO dataset, establishing a ''cleaned'' validation set. This is relevant to
    baseline reliability: accuracy scores on the cleaned vs. uncleaned set may differ.
    Source: [|https://arxiv.org/pdf/2603.02788|]'
infrastructure_notes:
  deployment_environment: Research lab compute infrastructure; high-resource setting
    with no connectivity, device, or bandwidth constraints relevant to this deployment
  tooling: Standard NLP/ML tooling (Python, HuggingFace, OpenAI API, etc.); FOL inference
    engine is Stanford CS221 module with custom Python parser bridge
  interface_type: Programmatic API / batch evaluation pipeline; no consumer UI concerns
  accessibility_concerns: Not applicable — expert evaluator population in a well-resourced
    lab environment
regulatory_and_ethical_considerations:
  data_sensitivity: Low — benchmark consists of logically structured fictional stories
    with no personal data
  bias_screening: FOLIO excludes stories with identity-based biases (race, ethnicity,
    gender, sexuality, nationality, class, religion); factually inaccurate or opinionated
    stories were rewritten
  applicable_us_ai_evaluation_standards: 'NIST AI RMF 1.0 (released January 2023)
    is the primary US voluntary framework for AI risk management; it is explicitly
    voluntary and does not mandate specific internal benchmark evaluation procedures
    for research labs. A Generative AI Profile (NIST AI 600-1) was released July 26,
    2024, extending guidance to LLMs with 12 risk categories, but this profile also
    remains voluntary. No federal regulation currently imposes mandatory requirements
    on internal benchmark use at US AI research labs. The NIST AI RMF is increasingly
    referenced by sector regulators (FTC, FDA, etc.) and federal contractors face
    implicit alignment expectations, but formal mandate does not apply to this internal
    research evaluation context.

    Sources: NIST AI RMF 1.0 — [|https://www.nist.gov/itl/ai-risk-management-framework|];
    NIST AI 600-1 Generative AI Profile — [|https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.600-1.pdf|]'
  irb_or_human_subjects: Not applicable — evaluation uses existing benchmark data,
    not new human subjects
  annotator_demographics: 'Not fully documented; known: native/near-native English
    speakers, CS students/researchers with FOL education; gender, racial, and institutional
    diversity are NOT DOCUMENTED in the paper'
validity_dimension_priorities:
  input_format_IF: HIGH — live unresolved decision between pure-symbolic and hybrid
    presentation; primary gap between FOLIO design and potential lab use
  input_ontology_IO: LOWER — FOLIO's classical FOL coverage matches lab scope precisely;
    temporal/modal/arithmetic out-of-scope exclusions confirmed
  input_content_IC: LOWER — formal logical statements with no cultural loading; expert-annotated,
    not web-scraped; source culture matches target population
  output_ontology_OO: LOWER — True/False/Unknown maps cleanly to entailment/contradiction/neutral;
    no residual ambiguity confirmed
  output_content_OC: LOWER — machine-verified ground truth anchored in formal logical
    validity; not subject to annotator subjectivity
  output_format_OF: LOWER — both benchmark and deployment use three-way categorical
    classification accuracy; exact match
flagged_gaps_for_downstream_search:
- gap_id: 1
  dimension: IF
  description: 'Input format mismatch: pure-symbolic vs. NL-first presentation'
  search_target: 'RESOLVED — see input_format_considerations.closest_alternative_for_pure_symbolic.
    Key candidates for pure-symbolic or depth-controlled FOL evaluation: ProverQA
    (ICLR 2025, [|https://proceedings.iclr.cc/paper_files/paper/2025/file/862819c227b16f9af64dd6ad6cfdf275-Paper-Conference.pdf|]),
    LogicGraph (2025, [|https://arxiv.org/html/2602.21044v1|]), ProntoQA ([|https://www.emergentmind.com/topics/prontoqa|]).
    All provide symbolic structure but differ in linguistic naturalness and depth
    coverage.'
- gap_id: 2
  dimension: IF + OF
  description: 'Hybrid NL+FOL pipeline: unclear whether lab accuracy metric covers
    translation quality or only downstream classification given correctly formed FOL'
  search_target: '[NEEDS VERIFICATION — deferred: below search budget; FOLIO paper
    defines tasks separately (Section 4) but downstream guidance for pipeline separation
    not found in searched literature; lab should consult FOLIO GitHub issues and follow-on
    work (LLM-ARC, Logic-LM) for pipeline design patterns]'
- gap_id: 3
  dimension: IO
  description: Per-depth example counts at high deduction-chain depths (depth ≥ 5,
    especially 6–7) not documented with sufficient granularity
  search_target: 'SEARCHED — NOT FOUND at per-depth granularity. See deduction_chain_depth_coverage.per_depth_example_counts
    for statistical power caveat. Approximate estimate: ~65 test examples at depth
    ≥5 out of 226 total; depth 6–7 subsets likely single-digit to low double-digit
    counts.'
- gap_id: 4
  dimension: OF
  description: 'GPT-4 ceiling concern: near-random performance at publication; unknown
    whether current frontier models (2024–2025) have saturated the benchmark'
  search_target: 'PARTIALLY RESOLVED — neuro-symbolic systems have substantially closed
    the gap (LLM-ARC: 88.32% SotA on FOLIO validation, 2024). Vanilla prompting baselines
    for GPT-4o, Claude 3.5, Gemini 1.5 on FOLIO were not found in public literature.
    Ceiling concern is reduced for neuro-symbolic pipelines but remains live for standard
    prompting. See discriminability_and_ceiling_concerns for details.'
net_new_fields:
  folio_benchmark_ecosystem_2024_2025:
    note: Several new FOL reasoning benchmarks have emerged since FOLIO (2022) that
      address limitations relevant to the lab's use case.
    proofwriter:
      description: 500k synthetic deductive examples; binary (T/F) labels; uses handcrafted
        NL templates; reasoning depth 0–5; 48 distinct ASTs. Near-saturated by current
        frontier models via CoT. Relevant as a lower-complexity baseline for depth-stratified
        analysis.
      source: '[|https://aclanthology.org/2024.emnlp-main.1229.pdf|]'
    prontoqa:
      description: 200 synthetic examples generated from FOL ontologies; supports
        proof-chain verification; depth levels 1, 3, 5; binary labels; intentionally
        avoids real-world concepts. GPT-4 CoT achieves ~98.79% — near ceiling for
        current models. Useful for symbolic-input evaluation but insufficient depth
        and size for discriminating frontier models.
      source: '[|https://www.emergentmind.com/topics/prontoqa|]'
    proverqa:
      description: ICLR 2025 benchmark; 1,500 instances (500 each easy/medium/hard);
        depth bands 1–2 / 3–5 / 6–9; ternary labels (True/False/Uncertain); generated
        by ProverGen (LLMs + Prover9); includes intermediate reasoning steps. State-of-the-art
        LLMs still struggle on hard subset. Best candidate for labs wanting depth-stratified,
        symbolically grounded, scalable FOL evaluation with harder chains than FOLIO.
      source: '[|https://proceedings.iclr.cc/paper_files/paper/2025/file/862819c227b16f9af64dd6ad6cfdf275-Paper-Conference.pdf|]'
    logicgraph:
      description: February 2026 preprint; average depth 6.01; 2–19 valid paths per
        query; supports symbolic notation; verified with Prover9; evaluates both convergent
        and divergent reasoning. Frontier models (including GPT-5.1, Gemini 3) show
        significant performance gaps on divergent (multi-path) reasoning. Most challenging
        depth coverage of any publicly available FOL benchmark found.
      source: '[|https://arxiv.org/html/2602.21044v1|]'
    logiconbench:
      description: A 2024/2025 benchmark specifically designed to remain discriminative
        when existing benchmarks are saturated; targets logical consistency evaluation
        with enumerative tasks. Authors report existing benchmarks are saturated for
        frontier models while LogiConBench remains challenging.
      source: '[|https://openreview.net/pdf?id=ULEHJkolxB|]'
  folio_annotation_cleaning_2025:
    description: A 2025 study (arxiv 2603.02788) found annotation errors in the public
      FOLIO dataset using the Vampire theorem prover and established a cleaned validation
      set. The auto-formalization baseline on the cleaned set is 86.70% versus 73.89%
      for CoT, suggesting score comparability between clean and original datasets
      may be affected. Lab should verify whether it uses the original or cleaned annotation
      set.
    source: '[|https://arxiv.org/pdf/2603.02788|]'
  neuro_symbolic_pipeline_consideration:
    description: 'Multiple 2024–2025 papers (LLM-ARC, Logic-LM, LINC, agentified assessment)
      demonstrate that the standard prompting evaluation paradigm and a neuro-symbolic
      pipeline (NL → FOL → symbolic solver) are not interchangeable on FOLIO: the
      neuro-symbolic approach achieves 88.32% vs. ~64% for standard prompting. If
      the lab''s use case involves neuro-symbolic architectures, FOLIO remains appropriately
      challenging; if it targets vanilla prompting, discriminability among frontier
      models is less clear.'
    source: '[|https://arxiv.org/pdf/2406.17663|]'
cultural_norms_notes: Not applicable to this deployment. Users are expert AI researchers
  evaluating formal logical reasoning benchmarks. Cultural loading, regional sensitivity,
  formality norms, and consumer-facing accessibility considerations are irrelevant
  to this population and task.
domain_specific_notes: 'The core domain is formal classical first-order logic reasoning,
  independent of any applied subject-matter domain. FOLIO''s content spans real-world
  topics (Wikipedia-seeded stories), but the reasoning task is purely deductive and
  domain-agnostic. The lab''s evaluation is focused on model capability, not applied
  domain knowledge. Key domain-specific considerations for this assessment are methodological:
  input format sensitivity, deduction-chain depth coverage, label-class asymmetry
  in model performance, and benchmark discriminability among frontier LLMs. As of
  2024–2025, the field has bifurcated into (a) neuro-symbolic pipelines that achieve
  near-human expert accuracy on FOLIO (~88%) and (b) standard prompting baselines
  that still show substantial headroom — the lab should specify which evaluation paradigm
  it targets before treating FOLIO ceiling concerns as resolved.'
