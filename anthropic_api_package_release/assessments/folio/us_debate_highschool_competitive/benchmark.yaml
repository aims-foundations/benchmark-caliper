- id: Q18
  page: 2
  dimension: input_ontology
  text: Based on our annotations, we propose a new NL-FOL translation task where an NL reasoning example is translated into
    its FOL counterpart.
- id: Q19
  page: 2
  dimension: output_form
  text: Finally, we benchmark the performance of strong LMs in both fully supervised and few-shot settings to understand their
    capabilities in logical reasoning (i.e., deriving the truth value of a logical conclusion from NL premises).
- id: Q20
  page: 2
  dimension: output_form
  text: Under the few-shot setting, the most capable publicly available LLM so far achieves only 53.1% on the stories written
