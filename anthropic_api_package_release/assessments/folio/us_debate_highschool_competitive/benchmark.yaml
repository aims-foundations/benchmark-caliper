- id: Q25
  page: 3
  dimension: output_content
  text: Writing natural language reasoning stories with FOL requires sufficient knowledge in both semantic parsing and first-order
    logic, as well as strong analytical skills.
- id: Q26
  page: 3
  dimension: output_content
  text: Given the complexities of such annotations, we selected annotators based on a few important criteria to ensures that
