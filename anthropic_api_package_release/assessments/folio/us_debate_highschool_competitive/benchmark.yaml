  benchmark_coverage: NOT DOCUMENTED — FOLIO is exclusively deductive; all tasks involve formal FOL entailment [Q7, Q15] with
    no evidentiary or inductive argument structures and no content resembling cited evidence or disputed empirical claims
    [Q47]
