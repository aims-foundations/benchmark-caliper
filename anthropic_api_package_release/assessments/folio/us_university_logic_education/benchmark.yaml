  benchmark_coverage: 'NOT DOCUMENTED — FOLIO is built entirely around FOL predicate structures. No quantifier-free

    or propositional-only subset is documented. The benchmark''s design rationale emphasizes

    AST diversity and syllogistic complexity [Q33, Q61], and the HybLogic pipeline is based

    on syllogisms (inherently predicate-level) [Q40, Q41]. No quote establishes a propositional

    sub-corpus.

    '
  gap_type: full
  web_search_target: FOLIO propositional logic subset quantifier-free examples benchmark coverage
- user_priority: Hurley-style templated sentence register (dominant course-packet input style)
  benchmark_coverage: 'FOLIO explicitly avoids template-based generation in WikiLogic [Q35], and its naturalness

    conventions produce phrasing (e.g., "Some A is B" over bare existential notation [Q132],

    epistemic qualifiers on generalizations [Q129]) that differs from unqualified Hurley-style

    templates ("All A are B," "If P then Q"). HybLogic uses syllogistic templates but

    instantiates them with human-authored prose fillers [Q44], not the bare syntactic forms

    of course-packet problems. The mismatch in register is a documented design choice [Q35].

    '
  gap_type: partial
  web_search_target: FOL benchmark textbook-style templated sentences Hurley logic course evaluation
- user_priority: 'Clean valid/invalid/indeterminate label mapping (strict: invalid = entailment of negation)'
  benchmark_coverage: 'The proving pipeline [Q153] returns False when the negation is provable from the premises

    via the FOL theorem prover, which aligns with the course''s strict "invalid = premises entail

    negation" definition. However, the paper does not explicitly state whether "False" is

    reserved solely for provable negation entailment or could also include cases where the

    conclusion simply fails to follow; this distinction is not documented in any extracted

    quote. The Unknown label is defined by the inference engine returning neither True nor False

    [Q70], which operationally maps onto indeterminate, but whether this excludes undecidable

    formulas (as the course requires) is not documented.

    '
  gap_type: partial
  web_search_target: FOLIO false label annotation protocol entailment negation vs failure to entail FOL prover semantics
- user_priority: Sufficient indeterminate/unknown example frequency to evaluate rubric's third category
  benchmark_coverage: 'The test set contains 87 True, 78 False, and only 61 Unknown examples, yielding a majority

    baseline of 38.5% [Q94]. Unknown constitutes approximately 27% of the test set — the

    smallest class. Confusion matrix analysis shows False and Unknown accuracy is only 61.9%

    under fine-tuning and 54.0% under few-shot prompting [Q155, Q156], indicating that

    Unknown-class performance is already identified as unreliable. If the course''s indeterminate

    rate differs from FOLIO''s ~27%, overall accuracy metrics will not reliably predict

    indeterminate-case performance.

    '
  gap_type: partial
  web_search_target: FOLIO unknown indeterminate class distribution base rate logic benchmark three-way classification
