- id: Q28
  page: 3
  dimension: output_content
  text: They possess formal education in first-order logic, having either completed relevant coursework or undertaken self-directed
    studies in first-order logic or seman-
- id: Q29
  page: 4
  dimension: output_content
  text: At the NL quality check stage, only annotators who are experts in natural language processing or computational linguistics
    are involved. For the FOL quality check, only annotators who are experts in first-order logic are involved.
- id: Q30
  page: 4
  dimension: output_content
  text: We also give the annotators several training sessions on how to write a story, by providing them with detailed annotation
    guidelines.
- id: Q31
  page: 4
  dimension: output_content
  text: All stories and FOL annotations in FOLIO are written and reviewed by expert annotators, including CS undergraduate
    and graduate students, and senior researchers, who met the aforementioned criteria.
- id: Q32
  page: 4
  dimension: input_content
  text: 'We develop our dataset in six stages: WikiLogic collection, HybLogic collection, NL quality control, FOL quality
    control, NL-FOL alignment and FOL verification, spending 980 man-hours in total.'
- id: Q33
  page: 4
  dimension: input_content
  text: We collected our dataset using two different methods in order to obtain examples that are both logically diverse and
    complex and have abundant abstract syntax tree (AST) variations.
- id: Q34
  page: 4
  dimension: input_content
  text: 'WikiLogic: annotation from scratch using Wikipedia articles as seeds. At this annotation stage, the annotators are
    asked to select random Wikipedia pages by repeatedly using the Wikipedia Special Random link. The Wikipedia articles are
    used to develop ideas for topics to write new stories.'
- id: Q35
  page: 4
  dimension: input_content
  text: We ask the annotators to create new stories from scratch without using templates based on real-world knowledge, which
    should be plausible in general.
- id: Q36
  page: 4
  dimension: output_ontology
  text: Each of the stories is composed of several premises and conclusions with truth values of True, False, or Unknown (see
    Table 2 for an example).
- id: Q37
  page: 4
  dimension: input_form
  text: We also ask the annotators to write parallel FOL sentences for both the premises and conclusions.
- id: Q38
  page: 4
  dimension: input_content
  text: This results in a wide range of topics, abundant AST variations, and a wide vocabulary for FOLIO.
- id: Q39
  page: 4
  dimension: input_content
  text: 'HybLogic: hybrid annotation The task of generating logically sound stories from scratch for a set of facts is very
    time-consuming for human writers, where the main challenge is to create complex and varied logical patterns to arrive
    at a conclusion.'
- id: Q40
  page: 4
  dimension: input_content
  text: 'To address the problems of solely using manual annotation, we also consider a hybrid approach to facilitate the process.
    Our hybrid method is based on a common form of logical stories: syllogisms.'
- id: Q41
  page: 4
  dimension: input_ontology
  text: A syllogism consists of two premises and a single conclusion, and the conclusion states some facts about the entities
    and categories in the premises.
- id: Q42
  page: 4
  dimension: input_content
  text: 'In this approach, we first generate logically valid stories, which are templates containing abstract categories and
    entities, by combining multiple syllogisms into a single story template: the conclusion of one syllogism is used as a
    premise for the next syllogism.'
- id: Q43
  page: 4
  dimension: input_ontology
  text: There are 256 logically distinct types of syllogisms and 24 of them are valid (Lehman, 1973). We use various combinations
    of 24 valid syllogisms. We also add in conjunction, disjunction, and implication.
- id: Q44
  page: 4
  dimension: input_content
  text: We then ask human annotators to assign nouns, phrases, or clauses to the abstract entities or categories that reflect
    real-life scenarios to each template and write logically-valid stories in natural language.
- id: Q45
  page: 4
  dimension: input_form
  text: The usage of the template is to ensure that we have a set of varied and complex logical stories with multiple conclusions.
    There are many ways of expressing the same logic template in natural language, and so the generated templates augment,
    rather than limit, the creativity of humans.
- id: Q46
  page: 4
  dimension: output_content
  text: To ensure the highest quality of the dataset, we dedicated considerable attention to the following key aspects of
    the natural language sentences during the quality control process.
- id: Q47
  page: 4
  dimension: input_content
  text: Our dataset prioritizes realism and factual accuracy, steering clear of biases and stereotypes linked to identity
    markers like race, ethnicity, gender, sexuality, nationality, class, and religion.
- id: Q48
  page: 4
  dimension: output_content
  text: Toward these objectives, we manually screened all stories and found that 39.2% of the stories suffer from at least
    one of these issues. We implemented a detailed protocol to rewrite these stories.
- id: Q49
  page: 4
  dimension: input_form
  text: Apart from grammar, we make sure the sentences in our dataset are highly natural. All the sentences are first checked
    with a grammar checking tool, Grammarly.
- id: Q50
  page: 4
  dimension: output_content
  text: Our annotators who have graduated from or are senior students studying English Literature conducted a thorough round
    of review for grammatical correctness and language naturalness.
- id: Q51
  page: 4
  dimension: input_form
  text: We also eliminate natural language ambiguity when it is possible.
- id: Q52
  page: 5
  dimension: input_form
  text: We adopt the FOL definitions and syntax most widely used in the AI community (Russell and Norvig, 2010).
- id: Q53
  page: 5
  dimension: output_content
  text: In preliminary investigations, we found that the human-written FOL formulas suffer from FOL consistency issues, which
    necessitates an additional round of quality control for FOL formulas.
- id: Q54
  page: 5
  dimension: output_content
  text: One NL sentence can be translated into FOL through multiple non-equivalent ways. For example, sometimes additional
    information inferred from a sentence can be represented in FOL, leading to multiple representations. We therefore design
    an annotation protocol for FOL translation in order to ensure that our FOL translations are as consistent as possible
    across all examples in our dataset.
- id: Q55
  page: 5
  dimension: input_content
  text: Apart from checking whether NL and FOL express equivalent meanings, we also add necessary commonsense knowledge in
    both the NL and FOL premises. Sometimes humans do not write certain commonsense knowledge in the premises that is required
    in the FOL reasoning process, which is based solely on the premises given. We add such knowledge as additional premises
    at this stage.
- id: Q56
  page: 5
  dimension: input_form
  text: In particular, intrinsic properties of some predicates are required in the FOL reasoning process. For example, "LocatedIn(x,y)"
    should be transitive and "BeFamily(x,y)" should be symmetric.
- id: Q57
  page: 5
  dimension: output_content
  text: Recognizing that the FOL formula annotations can be error-prone, we verify the syntactic validity and label consistency
    of FOL formula annotations with an FOL inference engine.
- id: Q58
  page: 5
  dimension: input_content
  text: Table 3 shows that examples based on Wikipedia make up the largest portion of FOLIO, with 304 stories, 1,353 NL and
    FOL premise pairs, and 753 NL and FOL conclusion pairs. Hybrid annotations consist of 183 stories with 1,054 NL and FOL
    premise pairs, and 682 NL and FOL conclusion pairs in total.
- id: Q59
  page: 5
  dimension: input_form
  text: We use the Dale-Chall Readability Formula (Dale and Chall, 1948, 1995) to show the text complexity of FOLIO following
    (Singh et al., 2023; Arps et al., 2022; Wei et al., 2021).
- id: Q60
  page: 5
  dimension: input_ontology
  text: As shown in Figure 1, the mode of reasoning depths is four in FOLIO. 28.7% of the examples need five or more depths
    of reasoning to infer the conclusions, while the previous datasets needed at most five reasoning depths as shown in Table
    1.
- id: Q61
  page: 5
  dimension: input_ontology
  text: Table 1 shows that FOLIO also has a much larger number of distinct ASTs than the previous datasets, indicating that
    FOLIO is much more logically diverse.
- id: Q62
  page: 5
  dimension: input_content
  text: Table 3 shows that our dataset has a vocabulary of 4,351 words, and the examples based on Wikipedia account for 74%
    of the total vocabulary even though the WikiLogic stories take up only 63% of the total number of stories.
- id: Q63
  page: 6
  dimension: input_ontology
  text: We define two new tasks based on FOLIO, natural language reasoning with first-order logic and NL-FOL translation.
- id: Q64
  page: 6
  dimension: input_form
  text: 'Each natural language (NL) story S in FOLIO consists of n premises: P = {p1, p2, ..., pn} and m conclusions: H =
    {h1, h2, ..., hm}.'
- id: Q65
  page: 6
  dimension: input_form
  text: All NL stories are annotated with parallel FOL stories SF, which are sets of FOL formulas consisting of n premises
    PF = {pf1, pf2, ..., pfn} and m conclusions HF = {hf1, hf2, ..., hfm}.
- id: Q66
  page: 6
  dimension: output_ontology
  text: 'Given P and H, the goal is to determine the truth values of the conclusions: "True", "False" or "Unknown", based
    on FOL reasoning.'
- id: Q67
  page: 6
  dimension: input_ontology
  text: We propose a new natural language to first-order logic translation (NL-FOL translation) task alongside our reasoning
    dataset.
- id: Q68
  page: 6
  dimension: input_form
  text: In particular, each of the NL sentence pi or hi and the parallel FOL formula pfi or hfi should be logically and semantically
    equivalent.
- id: Q69
  page: 6
  dimension: input_form
  text: Moreover, the truth values for the conclusions should be the same based on the NL story S and the parallel FOL story
    FS.
- id: Q70
  page: 6
  dimension: input_form
  text: In our dataset, the premises and conclusions are set up in such a way to ensure that the inference engine always returns
    an answer given enough resources such as time and memory.
- id: Q71
  page: 6
  dimension: input_ontology
  text: Unlike previous work (Singh et al., 2020) which translates problems with a single premise and a single hypothesis,
    our task is on translating examples of various lengths with a focus on stories with multiple premises.
- id: Q72
  page: 6
  dimension: input_ontology
  text: Thus, it also requires the models to consider discourse-level consistencies as opposed to translation at the sentence
    level.
- id: Q73
  page: 6
  dimension: output_form
  text: 'Two metrics are adopted to evaluate NL-FOL translation to capture different aspects of the generation results: 1).
    Syntactic validity (SynV).'
- id: Q74
  page: 6
  dimension: output_form
  text: The Syntactic Validity score measures whether the FOL formulas are syntactically valid. The score will be 1 if all
    FOL formulas of an example can pass the syntactic check and 0 otherwise 2).
- id: Q75
  page: 6
  dimension: output_form
  text: Inference Engine execution accuracy (ExcAcc). The group of translated FOL for premises and conclusions in one story
    is fed into our inference engine to output the truth value for each conclusion.
- id: Q76
  page: 6
  dimension: output_form
  text: We define the accuracy of the output labels as the execution accuracy.
- id: Q77
  page: 6
  dimension: output_form
  text: We leave for future work the design of a more reliable metric of NL-FOL translation.
