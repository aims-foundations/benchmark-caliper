- id: Q15
  page: 1
  dimension: input_ontology
  text: We present a natural language reasoning dataset, FOLIO, with first-order logic reasoning problems which require the
    models to decide the correctness of conclusions given a world defined by the premises.
- id: Q16
  page: 2
  dimension: output_content
  text: FOLIO is a high-quality and manually curated dataset, written by CS undergraduate and graduate students and researchers
