  page: 6
  dimension: input_form
  text: We split FOLIO by 70%/15%/15% split for the train/validation/test sets with 1,001/203/226 examples respectively.
- id: Q79
  page: 6
  dimension: input_form
  text: We split by story so that models are evaluated on unseen stories.
- id: Q80
  page: 6
  dimension: output_form
  text: We use accuracy for evaluating logical reasoning performance.
- id: Q81
  page: 6
  dimension: output_form
  text: For NL-FOL translation, we use the metrics in Section 4.2.
- id: Q82
  page: 6
  dimension: input_ontology
  text: We test the logical reasoning capabilities of LMs using fully supervised fine-tuning and few-shot prompting.
- id: Q83
  page: 6
  dimension: input_ontology
  text: We also test NL-FOL translation with few-shot prompting.
- id: Q84
  page: 7
  dimension: input_ontology
  text: As fine-tuning baselines, we experiment with BERT (Devlin et al., 2019), and RoBERTa (Liu et al., 2020).
- id: Q85
  page: 7
  dimension: input_form
  text: We fine-tune the base and large versions of both BERT and RoBERTa, with an additional two-layer classification layer
    to predict the truth values.
- id: Q86
  page: 7
  dimension: input_ontology
  text: For the second task, i.e., NL-FOL translation, we only report few-shot prompting methods.
- id: Q87
  page: 7
  dimension: input_ontology
  text: We conduct zero-shot and few-shot prompting experiments on larger LMs with few-shot capabilities.
- id: Q88
  page: 7
  dimension: input_ontology
  text: For open-source models, we test LLaMA-13B and LLaMA-70B (Touvron et al., 2023), GPT-NeoX-20B (Black et al., 2022);
    for proprietary models we test GPT-3 (Brown et al., 2020), GPT-3.5-Turbo and GPT-4 (OpenAI et al., 2023) using prompts
    with 8 examples.
- id: Q89
  page: 7
  dimension: input_ontology
  text: We experiment with incorporating recent prompting strategies into GPT-4 as they have shown improvements in the general
    reasoning performance of LLMs.
- id: Q90
  page: 7
  dimension: input_ontology
  text: The prompting strategies include chain-of-thought (CoT) prompting (Wei et al., 2022b), chain-of-thought prompting
    with self-consistency (Wang et al., 2023) and tree-of-thought prompting (Yao et al., 2023).
- id: Q91
  page: 7
  dimension: input_ontology
  text: 'We also test recent methods specifically designed for logical reasoning: Logic-LM (2023), LINC (Olausson et al.,
    2023) and DetermLR(Sun et al., 2023), using GPT-4 as the base model.'
- id: Q92
  page: 7
  dimension: input_form
  text: For the second task (NL-FOL translation), we use the same examples as in the Few-Shot NL experiments except that all
    the conclusions are included in each example.
- id: Q93
  page: 7
  dimension: output_form
  text: We run experiments on five randomly sampled sets of examples from the training set and report the average accuracy.
- id: Q94
  page: 7
  dimension: output_ontology
  text: The majority baseline of our dataset is 38.5% since in our test set, there are 87, 78 and 61 examples with labels
    of true, false and unknown respectively.
- id: Q95
  page: 7
  dimension: input_form
  text: In experimenting with different prompts, we found 8 shot examples to perform slightly better. It is also the maximum
    number of examples that fits in the text-davinci-002 context.
- id: Q96
  page: 8
  dimension: output_form
  text: Table 5 shows the results of NL-FOL translation. The syntactic validity scores are around 93% with both GPT-3.5-Turbo
    and GPT-4. This indicates that language models with sufficient scales are good at picking up the patterns for FOL formulas
    and generating syntactically valid FOL formulas.
- id: Q97
  page: 8
  dimension: output_form
  text: However, GPT-3.5-Turbo and GPT-4 are not yet good at translating an NL story to a logically or semantically similar
    FOL counterpart, as indicated by the low inference engine execution accuracy score.
- id: Q98
  page: 8
  dimension: output_form
  text: Below we provide analysis of our results and key findings, providing additional insights into our dataset FOLIO and
    the current capabilities of LLMs in logical reasoning.
- id: Q99
  page: 8
  dimension: output_form
  text: With few-shot prompting, GPT-3.5 and GPT-4 both perform much better on examples with a 0 ∼ 3 reasoning depth, indicating
    that examples with a 4 ∼ 7 reasoning depth pose a challenge to the SoTA LMs.
- id: Q100
  page: 8
  dimension: output_form
  text: This indicates that fine-tuning on longer and more difficult reasoning chains in the training set can improve model
    performance on equally-long test example chains.
- id: Q101
  page: 8
  dimension: input_ontology
  text: FOLIO's unique complexity reveals that current LMs are limited in their ability to extrapolate to longer and more
    complex reasoning chains, and suggests an avenue for further study.
- id: Q102
  page: 8
  dimension: output_form
  text: As shown in Table 6, in logical reasoning, GPT-3.5 and GPT-4 achieve substantially lower results on HybLogic than
    on WikiLogic and the result is slightly higher than chance.
- id: Q103
  page: 8
  dimension: input_ontology
  text: We hypothesize that this is because HybLogic has high logical complexity that the SoTA LLMs like GPT-4 cannot solve
    yet while WikiLogic examples require shorter reasoning chains which the model is already capable of solving.
- id: Q104
  page: 8
  dimension: input_content
  text: Moreover, since the examples in WikiLogic are created from scratch by humans, it is possible that LLMs have seen similar
    texts with similar logical patterns in the training data.
- id: Q105
  page: 8
  dimension: input_content
  text: However, fine-tuning RoBERTa-large achieves higher performance on HybLogic than on WikiLogic. This is likely because
    HybLogic is created from templates and some of the logical patterns can be learned during fine-tuning.
- id: Q106
  page: 8
  dimension: input_form
  text: In NL-FOL translation, performs 10 points better on HybLogic than WikiLogic. This could be because WikiLogic has more
    distinct and diverse sentence-level logical and language patterns and FOL annotations. WikiLogic has 53 ASTs while HybLogic
    has 33.
- id: Q107
  page: 9
  dimension: output_content
  text: We collected truth value annotations of logical reasoning for FOLIO test set from expert and non-expert annotators.
- id: Q108
  page: 9
  dimension: output_content
  text: Our expert annotators are computer science college students familiar with FOL.
- id: Q109
  page: 9
  dimension: output_content
  text: Non-expert annotators are community college or high school students who have not taken the SAT.
- id: Q110
  page: 9
  dimension: output_content
  text: Both expert and non-expert annotators are native English speakers.
- id: Q111
  page: 9
  dimension: output_content
  text: Expert annotations achieve an accuracy of 95.98% while non-expert annotations achieves 61.82%, with a gap of 34.16%.
- id: Q112
  page: 9
  dimension: input_ontology
  text: This shows that sufficient domain knowledge of FOL is necessary for good performance on FOLIO.
- id: Q113
  page: 9
  dimension: output_form
  text: The expert and GPT-4 gap is 31.82%, suggesting significant room for model improvement.
- id: Q114
  page: 9
  dimension: output_content
  text: We focus on collecting a very high-quality dataset in evaluating logical reasoning rather than merely a large dataset.
- id: Q115
  page: 9
  dimension: output_content
  text: 'Optimizing for quality required us to adopt a rigorous annotation process with domain experts selected based on a
    few important criteria as mentioned in Appendix A: Annotator Selection.'
- id: Q116
  page: 9
  dimension: input_content
  text: Significantly scaling up this process would have required resources beyond our current means and we are unable further
    expand our dataset for investigating how the size of training data affects the performance of fine-tuning experiments.
- id: Q117
  page: 9
  dimension: input_content
  text: We encourage the community to apply our annotation protocol to expand this realistic and complex FOL reasoning story
    set.
- id: Q118
  page: 9
  dimension: output_form
  text: Approximately 65% of the time, the model struggles to construct accurate reasoning chains for complex problems with
    intricate steps, leading to faulty reasoning paths and indicating a limited ability to solve problems with long reasoning
    chains.
- id: Q119
  page: 9
  dimension: output_form
  text: In 25% of cases, erroneous derivations occur within certain reasoning steps, highlighting potential inaccuracies and
    flaws in logical deductions.
- id: Q120
  page: 9
  dimension: output_ontology
  text: 5% of conclusions in FOLIO have a complex syntactic structure, posing comprehension challenges for GPT-4.
- id: Q121
  page: 9
  dimension: output_form
  text: 5% of outputs show that GPT-4 leverage commonsense reasoning to employ spurious shortcuts that lead to the wrong truth
    value for the conclusion.
- id: Q122
  page: 12
  dimension: output_content
  text: Given the complexities of our annotations, we selected annotators based on a few important criteria 1). Our annotators
    are either college or graduate students who are native English speakers or possess near-native proficiency in English.
- id: Q123
  page: 12
  dimension: output_content
  text: They possess formal education in first-order logic, having either completed relevant coursework or undertaken self-directed
    studies in first-order logic or semantic parsing.
- id: Q124
  page: 12
  dimension: output_content
  text: At the NL quality check stage, only annotators who are experts in natural language processing or computational linguistics
    are involved.
- id: Q125
  page: 12
  dimension: output_content
  text: For the FOL quality check, only annotators who are experts in first-order logic are involved.
- id: Q126
  page: 13
  dimension: input_content
  text: We rewrote those that are not reflective of well-established scientific, historical, or legal facts.
- id: Q127
  page: 13
  dimension: input_content
  text: We took out stories that had strongly opinionated language and contained gender, racial, and classist biases.
- id: Q128
  page: 13
  dimension: input_content
  text: We accept certain classes of "psychologically fundamental generalizations" (Leslie, 2008), however, such as "Covid
    is transmitted through the air" or "Tigers eat other animals," that may not be factually invariant but add logical and
    semantic nuances to the stories.
- id: Q129
  page: 13
  dimension: input_form
  text: For stories that pertain to generalization, such as "All As are Bs," we have added specifiers like "all Dan knows"
    to give a degree of reasonable factuality.
- id: Q130
  page: 13
  dimension: input_form
  text: We always use "either-or" to express exclusive disjunction.
- id: Q131
  page: 13
  dimension: input_form
  text: We use either "A or B" or "A or B, or both" to express inclusive disjunction.
- id: Q132
  page: 13
  dimension: input_form
  text: It is more natural to say "Some A is B" rather than "there exists an A such that A is B."
- id: Q133
  page: 13
  dimension: input_form
  text: '"All A are B" can be more natural than "If A then B".'
- id: Q134
  page: 13
  dimension: input_form
  text: Other common issues in NL quality include singular/plural issues, especially in statements that deal with both categories
    and individual members of those categories; as well as ambiguities resulting from improper introduction of, or failure
    to introduce, proper nouns.
- id: Q135
  page: 13
  dimension: output_ontology
  text: FOL enables deriving facts from other facts (Russell and Norvig, 2010).
- id: Q136
  page: 13
  dimension: output_ontology
  text: FOL, as a logical form, is a more explicit logical representation than its NL counterpart and can be used as input
    to an FOL prover in order to obtain the exact truth values for the conclusions.
- id: Q137
  page: 13
  dimension: output_ontology
  text: FOL has no ambiguity while ambiguity can occur at various levels of NLP.
- id: Q138
  page: 13
  dimension: output_ontology
  text: 'We include the following operators: negation ¬, conjunction ∧, disjunction ∨, implication →, universal quantifier
    ∀, existential quantifier ∃, equal =.'
- id: Q139
  page: 13
  dimension: input_ontology
  text: Following (Russell and Norvig, 2010), we consider temporal logic and modal logic as special-purpose logics.
- id: Q140
  page: 13
  dimension: input_ontology
  text: Consequently, they are beyond the scope of the definition of first-order logic used in our dataset.
- id: Q141
  page: 13
  dimension: output_ontology
  text: We use n-place predicates when applicable for the expressivity of the FOL formulas.
- id: Q142
  page: 13
  dimension: output_ontology
  text: However, we do not use the Davidsonian (Davidson, 2001) or neo-Davidsonian semantics (Parsons, 1990) because translating
    the majority of the FOL formulas in our dataset only requires one-place and two-place predicates.
- id: Q143
  page: 14
  dimension: output_content
  text: We therefore design an annotation protocol for first-order logic translation in order to ensure that our FOL translations
    are as consistent as possible across all examples in our dataset.
- id: Q144
  page: 14
  dimension: output_content
  text: First-order logic formulas need to preserve as much as possible the semantics of natural language sentences.
- id: Q145
  page: 14
  dimension: output_content
  text: First-order logic formulas should stay as faithful to the structure of the original NL sentence as possible.
- id: Q146
  page: 14
  dimension: output_content
  text: Semantic decomposition is not needed unless necessary for maintaining the NL expressivity.
- id: Q147
  page: 14
  dimension: output_content
  text: In terms of abstraction, we neglect tense and remove all the plural forms of verbs.
- id: Q148
  page: 14
  dimension: output_form
  text: Although there are many provers widely used in the community (McCune, 2005–2010; Sutcliffe, 2017; Nipkow et al., 2002),
    we adopt the inference engine provided in the Stanford CS221 course page, which is a compact module designed specifically
    for procesing first-order logic statements.
- id: Q149
  page: 14
  dimension: output_form
  text: The inference engine does not support input in the FOL syntax adopted by standard education material (Russell and
    Norvig, 2010), which is used in our dataset.
- id: Q150
  page: 14
  dimension: output_form
  text: We therefore developed a FOL parser in order to convert the FOL formulas written by humans to the input format of
    the inference engine.
- id: Q151
  page: 14
  dimension: output_form
  text: The converter is a semantic parser tool written in Python.
- id: Q152
  page: 14
  dimension: output_form
  text: Although LLMs such as GPT-4 can be utilized to conduct the conversion, it is hard to ensure the GPT-4 outputs are
    always correct.
- id: Q153
  page: 14
  dimension: output_form
  text: Proving a story requires three steps. First, the FOL statements of the premises and conclusions of a story annotated
    by humans are converted to Python code. Then, the code snippets are used as input to the theorem prover. Finally, the
    theorem prover outputs whether the conclusions are True / False / Unknown, based on the premises.
- id: Q154
  page: 14
  dimension: input_form
  text: We show the distribution of readability in Figure 3.
- id: Q155
  page: 15
  dimension: output_form
  text: Confusion matrices in Figure 4 for the fine-tuning and 8-shot NL prompt results both show that LLMs are significantly
    better at making the correct predictions for conclusions with labels of True than the conclusions with labels of False
    or Unknown.
- id: Q156
  page: 15
  dimension: output_form
  text: The accuracy on examples with False or Unknown conclusions is 61.9% with fine-tuning and 54.0% with few-shot prompting.
- id: Q157
  page: 15
  dimension: output_form
  text: They also tend to make more predictions of True than the other labels.
- id: Q158
  page: 15
  dimension: output_form
  text: To test if the premise ordering in FOLIO has spurious correlations with the conclusion label which a model can exploit,
    we shuffle the input premises to evaluate models.
- id: Q159
  page: 15
  dimension: output_form
  text: We find that accuracy increases or decreases by roughly 1% in most settings compared to our unshuffled premises.
- id: Q160
  page: 15
  dimension: output_form
  text: This indicates that the ordering of premises in FOLIO examples does not yield significant information about the label,
    and thus models will not be able to use the premise ordering as a strong heuristic or statistical feature for its predictions.
- id: Q161
  page: 15
  dimension: input_form
  text: FOL formulas have a clearer and more straightforward logical structure than NL sentences.
- id: Q162
  page: 15
  dimension: output_form
  text: As shown in Table 11, the performance slightly increases in the NL+FOL setting for GPT-4 while GPT-3.5 performs worse
    in both the NL+FOL and the FOL-only settings.
- id: Q163
  page: 15
  dimension: output_form
  text: FOL always serves as additional useful information for GPT-4, but not for GPT-3.5 regardless of whether FOL is concatenated
    with NL.
