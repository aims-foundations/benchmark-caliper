    execution accuracy metrics [Q73, Q74, Q75, Q76], covering multi-premise discourse-level translation [Q71, Q72] rather
    than single-sentence pairs — partially matching the deployment''s need for natural-language argument formalization.

    '
  dimension: input_ontology
