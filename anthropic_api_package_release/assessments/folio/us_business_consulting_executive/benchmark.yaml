coverage_strengths:
- user_priority: Logical reasoning as a component of consulting argumentation
  benchmark_coverage: FOLIO provides rigorous evaluation of formal deductive reasoning with reasoning depths up to seven steps,
    a large distinct AST count [Q60, Q61], and testing of state-of-the-art LLMs including GPT-4 [Q88]. This establishes a
    documented baseline for one narrow sub-component of the consulting reasoning task.
  dimension: input_ontology
- user_priority: English-language, text-based reasoning evaluation
  benchmark_coverage: FOLIO is entirely text-based in English [Q64], with grammar and naturalness verified by English Literature
    specialists [Q49, Q50] — matching the consulting deployment's language and modality requirements without friction.
  dimension: input_form
- user_priority: Expert annotator validation as a signal of output label quality
  benchmark_coverage: FOLIO documents a multi-stage annotation pipeline with FOL-expert quality control [Q29, Q125], an FOL-engine
    verification step [Q57], and human expert performance benchmarking (95.98% accuracy) [Q111]. This provides a documented
    upper-bound on the deductive reasoning sub-component that could serve as a component baseline.
  dimension: output_content
- user_priority: Reasoning difficulty and model performance headroom
  benchmark_coverage: GPT-4 achieves only 53.1% on HybLogic examples (near chance) [Q20], and the expert–GPT-4 accuracy gap
    is 31.82% [Q113], documenting that significant headroom remains on the deductive reasoning sub-task. This is useful for
    establishing a minimum deductive reasoning floor before evaluating broader consulting argumentation.
  dimension: output_form
coverage_gap_analysis:
- user_priority: Inductive, abductive, and analogical reasoning (majority of consulting reasoning)
  benchmark_coverage: NOT DOCUMENTED — FOLIO's task taxonomy covers only formal deductive reasoning within closed logical
    worlds [Q15]. Inductive inference from incomplete data, abductive best-explanation reasoning from business signals, and
    analogical reasoning from comparable engagements have no representation in the benchmark [Q43, Q138]. Temporal and modal
    logics are explicitly excluded [Q139, Q140].
  gap_type: full
  web_search_target: business reasoning benchmark inductive abductive analogical LLM evaluation MBA case consulting
- user_priority: Business domain knowledge — financial metrics, sector benchmarks, regulatory context, competitive dynamics
  benchmark_coverage: FOLIO explicitly instructs annotators to avoid domain-specific knowledge [Q35], and the paper acknowledges
    that none of its examples are grounded in real-world knowledge [Q14]. WikiLogic stories use Wikipedia as a seed for general
    plausibility, not domain grounding [Q34]. No financial, regulatory, or competitive content is present.
  gap_type: full
  web_search_target: financial domain reasoning benchmark LLM FinQA BusinessBench consulting domain knowledge evaluation
- user_priority: Persuasiveness, narrative coherence, executive-audience calibration, and objection anticipation
  benchmark_coverage: NOT DOCUMENTED — FOLIO's output ontology is a three-way logical-validity label [Q36, Q66] with no scoring
    dimension for rhetorical effectiveness, audience calibration, or argument quality. The NL-FOL translation subtask evaluates
    syntactic validity and execution accuracy [Q73, Q74, Q75], not communicative quality. The paper itself notes that more
    reliable translation metrics are needed [Q77] but does not extend this to persuasion or audience calibration.
  gap_type: full
  web_search_target: argument quality evaluation benchmark LLM persuasion executive communication rhetorical effectiveness
    scoring rubric
- user_priority: Open-ended long-form argumentative text generation evaluation
  benchmark_coverage: FOLIO produces only discrete three-way classification labels as output [Q36, Q66, Q80]; the NL-FOL translation
    subtask generates FOL syntax strings, not natural language. No evaluation infrastructure exists in FOLIO for assessing
    the quality of open-ended, structured, long-form natural language generation [Q85, Q93]. The authors acknowledge GPT-4
    cannot reliably perform even the FOL format conversion [Q152].
  gap_type: full
  web_search_target: long-form argument generation evaluation LLM structured business narrative scoring rubric-based assessment
- user_priority: Partner-review-aligned ground truth — expert professional judgment as annotation standard
  benchmark_coverage: FOLIO's ground truth is defined by formal FOL prover output [Q2, Q57], not by domain-expert professional
    judgment. While human annotator expertise is documented for FOL [Q108, Q122, Q123], no business professionals, consulting
    practitioners, or management domain experts are involved in annotation. The 34.16% accuracy gap between FOL experts and
    non-experts [Q111] demonstrates that the benchmark's human-performance ceiling is specific to formal logic training, not
    general professional reasoning.
  gap_type: full
  web_search_target: professional expert annotation benchmark consulting business reasoning LLM evaluation partner review
    judgment ground truth
- user_priority: Reasoning under uncertainty and over time (market conditions, Q3 planning horizons)
  benchmark_coverage: Temporal logic and modal logic are explicitly excluded from FOLIO's scope [Q139, Q140]. The closed-world
    assumption [Q15] means all premises are fully specified and certain — reasoning under incomplete information or probabilistic
    belief is not represented.
  gap_type: full
  web_search_target: temporal reasoning under uncertainty benchmark LLM business planning modal logic probabilistic inference
    evaluation
