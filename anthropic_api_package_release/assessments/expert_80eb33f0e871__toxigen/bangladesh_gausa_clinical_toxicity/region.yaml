name: Gazipur District Clinical Chatbot Users — Bangladeshi Peri-Urban Patient Population
abbreviation: BGD-GAZ-CLINICAL
assessment_context:
  benchmark: toxigen
  deployment_type: Patient-centric clinical chatbot with content moderation layer
    evaluating toxic content generation robustness
  deployment_location: Gazipur district, Bangladesh (industrial/peri-urban context)
  moderation_task: Detection of both intentional adversarial attacks and unintentional
    harmful prompts from users with limited literacy interacting via text
target_population:
  description: Patients and caregivers in Gazipur district, Bangladesh interacting
    with a clinical health chatbot via text. The population is primarily low-literacy
    peri-urban residents in an industrial zone, many of whom are garment or industrial
    workers or their dependents. Users communicate in degraded, code-switched, or
    phonetically spelled Bengali/Banglish rather than standard orthographic forms.
  geography:
    country: Bangladesh
    district: Gazipur
    urban_classification: Peri-urban / industrial (not rural, not major city-centre)
    notes: Gazipur is a rapidly urbanising district adjacent to Dhaka, characterized
      by large-scale garment and manufacturing industries. Population is a mix of
      long-term residents and in-migrant workers from rural Bangladesh.
  roles:
  - Patients seeking clinical health guidance
  - Caregivers (family members, informal health workers) acting on behalf of patients
languages:
  primary: Bengali (Bangla)
  code_switched_register: Banglish — Bengali lexical content written in Roman/Latin
    script; common in informal digital communication among urban Bangladeshi users
  additional_forms:
  - Phonetic ASCII Bengali (Unicode Bengali words rendered in approximate Latin transliteration)
  - Standard Bengali in Unicode script (less common among low-literacy users in this
    context)
  - English (single words and short phrases code-switched into Bengali utterances)
  minority_languages: 'Garo (Mandi), Santal, Rajbangshi (Koach), Bhangor, and Nunia
    communities are documented as present in Gazipur district upazilas. Garo/Mandi
    is the most numerically significant indigenous language community. These communities
    are small minorities relative to the predominantly Bengali-speaking Muslim majority.
    Source: Banglapedia — [|https://en.banglapedia.org/index.php/Gazipur_District|]'
  note: Input signal is not expected to arrive in standard orthographic form. Irregular
    punctuation, non-standard spacing, phonetic misspellings, and mixed-script tokens
    are the norm rather than the exception for this population.
writing_systems:
  scripts:
  - Bengali script (Unicode, right-to-left vowel attachment, conjunct consonants)
  - Latin/Roman script (for Banglish and phonetic Bengali)
  note: Bengali script has no uppercase/lowercase distinction. Code-switched Banglish
    in Roman script inherits Latin case conventions inconsistently. Toxicity classifiers
    trained on Latin-script English are not directly applicable to Unicode Bengali,
    and vice versa; Banglish falls in a gap between both. Conjunct consonant handling
    and vowel diacritic rendering create unique tokenisation challenges for Bengali
    NLP.
literacy_and_input_form:
  general_literacy_rate_bangladesh: '74.23% general literacy rate (ages 7+); functional
    literacy rate 62.92% (ages 7+); functional literacy among ages 15+ is 60.77%;
    urban functional literacy (ages 11–45) is 80.35% vs. rural 70.54%. Source: Bangladesh
    Bureau of Statistics Literacy Assessment Survey 2020–2023 — [|https://www.dhakatribune.com/bangladesh/education/319301/bbs-functional-literacy-rate-7-above-years-in|].
    Note: these are national aggregates. The Gazipur City Corporation 2022 census
    literacy rate (ages 7+) was 83.57%, substantially above the national average,
    reflecting its urban/industrial workforce character. Source: Wikipedia Gazipur
    — [|https://en.wikipedia.org/wiki/Gazipur|]. However, in-migrant garment workers
    drawn from rural Bangladesh may have literacy profiles closer to rural averages
    (functional literacy ~70%) than to the city-wide figure.'
  gazipur_district_literacy_rate: 'Gazipur district average literacy 62.6% (male 66.0%,
    female 58.9%) per Banglapedia (citing 2001/2011 census data — [|https://en.banglapedia.org/index.php/Gazipur_District|]).
    The 2022 census yielded a Gazipur City Corporation literacy rate of 83.57% (ages
    7+) for the urban core (Source: Wikipedia Gazipur — [|https://en.wikipedia.org/wiki/Gazipur|]).
    There is significant intra-district variation: the urban city corporation rate
    (83.57%) substantially exceeds the broader district figure. In-migrant garment
    workers, who are the primary chatbot target population, are likely to reflect
    the lower end of this range. No 2022 district-wide disaggregated literacy figure
    with factory-worker breakdown has been found.'
  functional_digital_literacy: Low; many users are expected to have limited experience
    with standard orthographic text input
  expected_input_characteristics:
  - Phonetic spelling of Bengali words in Roman characters (Banglish)
  - Omitted vowel diacritics in Unicode Bengali
  - Irregular word spacing and punctuation (missing or excess spaces, punctuation
    absent)
  - Frequent code-switching mid-utterance between Bengali and English
  - Non-standard capitalization in Latin-script input
  - Abbreviations and SMS-style shortening
  implication_for_benchmark: TOXIGEN's fluent machine-generated English text represents
    a severe input-form mismatch with this population's actual signal distribution.
    Classifiers fine-tuned on TOXIGEN are unlikely to parse degraded Banglish correctly.
demographics:
  population_gazipur_district: '5,263,450 (2022 Bangladesh Population and Housing
    Census). This represents rapid growth from 3,403,912 in 2011, driven by in-migration
    to garment and manufacturing zones. Urban residents account for 64.3% of the total.
    Source: Wikipedia Gazipur District — [|https://en.wikipedia.org/wiki/Gazipur_District|];
    Grokipedia Gazipur District — [|https://grokipedia.com/page/Gazipur_District|]'
  religious_composition:
    majority: Muslim (94.4–94.5% per 2022 census)
    minorities:
    - Hindu (approx. 5.0%, ~263,000 persons per 2022 census)
    - Christian (approx. 0.5%, ~27,000 persons per 2022 census)
    - Buddhist and others (<0.1%)
    - Adivasi (indigenous communities including Garo/Mandi, Santal, Rajbangshi/Koach,
      Bhangor, Nunia — present in district upazilas, numbers small relative to total
      population)
    note: 'Religious minority targeting — especially anti-Hindu content (e.g., use
      of slurs such as ''malaun'') — is a primary toxicity fault line for this deployment
      context. Source for composition: Grokipedia Gazipur District — [|https://grokipedia.com/page/Gazipur_District|];
      Banglapedia — [|https://en.banglapedia.org/index.php/Gazipur_District|]'
  caste_and_social_hierarchy:
    relevance: Caste-coded language and social hierarchy-based insults are present
      in Bangladeshi Bengali even in a nominally caste-abolishing Muslim-majority
      context; caste-based slurs targeting both Hindu and low-caste Muslim communities
      exist
    lexicon_coverage: '[NEEDS VERIFICATION — deferred: likely unsearchable (lived
      practice / community-compiled sources not digitised); academic lexicons of caste-coded
      slurs specific to Bangladeshi Bengali not found in searches to date]'
  gender_dynamics:
    relevance: Gender hierarchies shape locally harmful language; son-preference norms
      (valuing male children over female) are prevalent and can manifest as discriminatory
      health requests; gender-based harmful content is a primary toxicity category
    son_preference_framing: Requests premised on differential value of male vs. female
      children or patients constitute a toxicity category specific to this clinical
      context and absent from TOXIGEN
    gender_mobile_gap: '85% of Bangladeshi men own a mobile device vs. only 68% of
      women (GSMA Mobile Gender Gap Report 2024). This gender gap in device ownership
      is directly relevant to the deployment''s user population composition and implies
      female patient queries may be disproportionately mediated through male family
      members. Source: Freedom House Freedom on the Net 2024 — [|https://freedomhouse.org/country/bangladesh/freedom-net/2024|]'
  age_profile: 'Bangladesh national age distribution (SVRS 2023): 18.56% aged 5–14,
    18.67% aged 15–24, 22.28% aged 25–39, 11.87% aged 40–49. Gazipur''s industrial
    workforce is predominantly working-age adults (20–45). The 2022 census showed
    ~30% of Gazipur''s population is under 14. Source: BBS Sample Vital Statistics
    2023 — [|https://www.bssnews.net/news/180472|]; Wikipedia Gazipur District — [|https://en.wikipedia.org/wiki/Gazipur_District|]'
  occupational_profile: Large share of garment and manufacturing industry workers
    and their families; informal sector workers also present
toxicity_fault_lines:
  description: The primary toxicity ontology for this deployment differs fundamentally
    from TOXIGEN's 13 U.S.-defined minority group categories. The relevant fault lines
    are as follows.
  categories:
  - category: Gender-discriminatory health content
    examples:
    - Requests or statements premised on son-preference over daughters
    - Advice framed around differential medical worth of female vs. male patients
    - Gendered insults embedded in clinical queries
    toxigen_coverage: None — TOXIGEN's 'women' category addresses U.S.-context gender
      harm, not South Asian son-preference or clinical gender discrimination
  - category: Religious minority targeting
    examples:
    - Slurs targeting Hindu users (e.g., 'malaun' and analogues)
    - Slurs or insults targeting Christian minority users
    - Content framing religious minority patients as less deserving of care
    toxigen_coverage: None — no Muslim-majority / Hindu-minority power dynamic is
      represented; TOXIGEN's religious targeting category reflects U.S. antisemitism
      context
  - category: Caste-coded harm
    examples:
    - Slurs referencing caste identity of patients or caregivers
    - Requests premised on caste-differential treatment
    toxigen_coverage: None
  - category: Colorism-based requests
    examples:
    - Requests for advice on how to 'make someone white' or lighten skin
    - Colorist framing of health or beauty interventions
    toxigen_coverage: None
  - category: Superstition-embedded harmful health advice
    examples:
    - Requests for confirmation of local superstitions presented as medical fact
    - Queries embedding harmful folk-medicine beliefs (e.g., beliefs about evil eye,
      jinn-caused illness, herbal treatments contradicted by clinical evidence)
    - Health misinformation framed as culturally authoritative
    toxigen_coverage: None — TOXIGEN's factuality label is insufficient to distinguish
      superstition-based clinical harm from identity-based hate speech
    clinical_salience: High — a clinical chatbot must detect and appropriately handle
      harmful health beliefs without dismissing cultural context
  - category: Adivasi / indigenous community targeting
    examples:
    - Slurs or derogatory framing targeting indigenous patients
    - Requests premised on differential treatment of Adivasi users
    toxigen_coverage: None — TOXIGEN includes Native American category framed for
      U.S. context only
cultural_norms_notes: 'Key cultural factors relevant to toxicity assessment in this
  clinical deployment context:

  - Son preference and patrilineal family norms shape gendered health-seeking behaviour
  and can manifest as discriminatory requests to a health chatbot.

  - Religious identity (Muslim-majority with Hindu, Christian, Adivasi minorities)
  creates fault lines for both explicit slur use and implicit othering in health contexts.

  - Superstition and traditional health beliefs (evil eye / nazar, jinn-related illness
  framing, herbal cure beliefs) are prevalent and clinically relevant; harmful health
  content can be embedded in culturally normative framing.

  - Caste distinctions persist informally despite legal abolition; caste-coded language
  exists in Bangladeshi Bengali.

  - Colorism is widespread; skin-lightening requests in a health chatbot context constitute
  a distinct harm category.

  - Face-saving norms may lead users to phrase requests indirectly, increasing the
  prevalence of implicit rather than explicit toxicity.

  - Authority deference to doctors and traditional healers may create adversarial
  framing where users attempt to get the chatbot to confirm harmful beliefs by presenting
  them as authoritative.'
infrastructure_notes:
  internet_penetration_bangladesh: '44.5% of population (ITU figure cited by Freedom
    House, end of 2023); ITU IDI-2024 index reports ~39% (Prothom Alo citing ITU IDI-2024
    — [|https://en.prothomalo.com/bangladesh/kjqnhopsw5|]); BBS SVRS 2023 reports
    50.1% internet use among ages 15+ in 2023. Figures vary by methodology and age-banding.
    Best single estimate: ~44–45% national internet penetration (end-2023), per ITU/Freedom
    House — [|https://freedomhouse.org/country/bangladesh/freedom-net/2024|]. Over
    134 million internet subscribers reported by BTRC in 2024 — [|https://www.ficci.org.bd/ficci-stories/the-connectivity-dividend-driving-growth-and-opportunity-in-the-digital-economy|].
    Note: this is a national aggregate; Gazipur peri-urban penetration likely higher
    than national average but rural digital literacy below 40%.'
  gazipur_mobile_internet_penetration: '[NOT FOUND — searched Freedom House, BTRC,
    ITU and DataReportal; no Gazipur district-specific mobile internet penetration
    figure is published. National context: 74.5% of Bangladesh population owned a
    smartphone in 2023 (BBS per Freedom House 2024 — [|https://freedomhouse.org/country/bangladesh/freedom-net/2024|]);
    4G network coverage exceeds 70% of population nationally (BTRC 2024 — [|https://www.ficci.org.bd/ficci-stories/the-connectivity-dividend-driving-growth-and-opportunity-in-the-digital-economy|]).
    Gazipur''s peri-urban/industrial character suggests penetration at or above national
    average but no district figure confirmed.]'
  dominant_access_device: 'Mobile phone (expected primary and likely sole access device
    for this population). Nationally 74.5% smartphone ownership (2023, BBS); mobile
    connections exceeded total population in January 2024 (GSMA Intelligence). Source:
    Freedom House 2024 — [|https://freedomhouse.org/country/bangladesh/freedom-net/2024|]'
  dominant_access_method: 'Mobile internet (3G/4G); fixed broadband unlikely for this
    population. 4G covers >70% of Bangladesh population (BTRC 2024 — [|https://www.ficci.org.bd/ficci-stories/the-connectivity-dividend-driving-growth-and-opportunity-in-the-digital-economy|]).
    Bangladesh median mobile download speed was 23.83 Mbps as of April 2024 (Ookla).
    Source: Freedom House 2024 — [|https://freedomhouse.org/country/bangladesh/freedom-net/2024|]'
  dominant_social_platform: 'Facebook is the dominant social platform in Bangladesh.
    DataReportal Digital 2024 Bangladesh reports 52.90 million social media users
    in January 2024 (30.4% of population), with Facebook/Meta having by far the largest
    ad reach. Source: DataReportal Digital 2024 Bangladesh — [|https://datareportal.com/reports/digital-2024-bangladesh|].
    Bengali toxic content datasets confirm Facebook as the primary source of hate
    speech data (Banglapedia, ToxLex_bn drawn from Facebook — [|https://pmc.ncbi.nlm.nih.gov/articles/PMC9256543/|]).
    WhatsApp, Messenger, and IMO are also widely used for messaging but Facebook/Messenger
    is the dominant platform for Banglish content generation.'
  text_input_method: Soft keyboard on mobile; phonetic Banglish input is the path
    of least resistance for users without Bengali script keyboard facility
  chatbot_interface_channel: '[NEEDS VERIFICATION — deferred: below search budget;
    deployment-specific implementation detail not publicly documented]'
  speech_interface_relevance: '[NEEDS VERIFICATION — deferred: deployment-specific
    scope not publicly documented; given low literacy and mobile-first access, voice
    input would be highly relevant but confirmation requires deployment team input]'
nlp_and_classifier_notes:
  bengali_nlp_tooling_maturity: 'Moderate and growing. BanglaBERT (BUET NLP group,
    2021/2022) is the de facto foundation model for Bengali NLP, demonstrating state-of-the-art
    performance on NLU benchmarks including hate speech, sentiment, fake news, and
    named entity recognition. Source: Emergent Mind BanglaBERT overview — [|https://www.emergentmind.com/topics/banglabert|].
    BanglaBERT achieves F1 ~0.89 on Bangla social media toxicity group detection tasks
    (Springer ICITA 2024 — [|https://link.springer.com/chapter/10.1007/978-981-96-1758-6_46|]).
    However, BanglaBERT is trained primarily on standard Unicode Bengali; performance
    on degraded Banglish (Roman-script) is substantially lower. A dedicated BanglaHateBERT
    model for abusive language detection in Bengali also exists. Key limitation: none
    of these models cover clinical-domain toxicity or the specific Bangladeshi religious/caste
    slur ontology needed for this deployment.'
  banglish_nlp_tooling_maturity: 'Sparse but now exists. BanTH (NAACL 2025 Findings)
    is the first multi-label transliterated Bangla (Banglish/Roman-script) hate speech
    dataset, comprising 37,350 YouTube comments with 7 hate categories: Political,
    Religious, Gender, Personal Offense, Abusive/Violence, Origin, and Body Shaming.
    It establishes transformer-based baselines including further pre-trained ''Transliterated
    Bangla Encoders'' (TB-Encoders). Best model achieves ~F1 0.78 on multi-label task.
    Source: arXiv 2410.13281 / NAACL 2025 — [|https://arxiv.org/abs/2410.13281|];
    GitHub — [|https://github.com/farhanishmam/BanTH|]. A smaller prior resource (Sazzed
    2021) covered ~3K transliterated Bangla-English abusive comments. BengaliHateCB
    (Saha et al. 2024) is a hybrid model trained on both Bengali and Banglish datasets.
    The BanTH dataset is sourced from YouTube (not Facebook/clinical contexts), covers
    religion and gender categories but not caste, colorism, or superstition-based
    harm.'
  known_toxicity_datasets_bengali: 'Multiple datasets exist for Unicode Bengali:

    1. Bengali Hate Speech Dataset (Karim et al. 2020/UCI): ~30,000 examples from
    Facebook/social media, categorised as political, personal, geopolitical, religious,
    gender-abusive. Covers Bangladesh and India sources. Source: UCI ML Repo — [|https://archive.ics.uci.edu/dataset/719/bengali+hate+speech+detection+dataset|];
    GitHub — [|https://github.com/rezacsedu/Bengali-Hate-Speech-Dataset|].

    2. BD-SHS (Romim et al. LREC 2022): >50,200 offensive comments from Bangladeshi
    social networking sites, hierarchical annotation. Source: ACL Anthology — [|https://aclanthology.org/2022.lrec-1.552/|].

    3. ToxLex_bn (PMC 2022): ~1,959 bigram toxic lexical entries from 2.2M Facebook
    comments (Bangladesh/India users); includes communal, misogynist, sexist categories;
    ~13% entries feature non-standard/unusual spelling; Romanised Bangla was excluded
    from this dataset. Source: PMC — [|https://pmc.ncbi.nlm.nih.gov/articles/PMC9256543/|].

    4. BLP-2023 and BLP-2025 shared tasks (ACL BanglaLP workshop): Violence-inciting
    text detection and hate speech tasks in Bangla. Source: ACL Anthology BLP-2023
    — [|https://aclanthology.org/2023.banglalp-1.29.pdf|].

    Critical gap: none of these datasets specifically address the Bangladeshi clinical
    chatbot domain, caste-coded slurs, colorism, or superstition-based harmful health
    advice. Many mix Bangladesh and West Bengal (India) sources; West Bengali cultural
    context differs meaningfully from Bangladeshi.'
  known_toxicity_datasets_banglish: 'BanTH (NAACL 2025 Findings) is the first and
    currently only large-scale multi-label hate speech dataset for transliterated
    Bangla (Banglish), with 37,350 samples and 7 hate categories. Source: arXiv 2410.13281
    — [|https://arxiv.org/abs/2410.13281|]. This directly resolves the previously
    flagged gap: a Banglish toxicity resource now exists, but it covers YouTube comments
    (not clinical chat), lacks caste/colorism/superstition categories, and is not
    fine-grained enough for the clinical deployment''s harm ontology without significant
    extension.'
  classifier_degraded_text_robustness: 'Partially addressed by BanTH and BLP-2025
    work. BanTH shows that models struggle with code-switched regional dialects and
    terms lacking direct English equivalents, leading to misclassification of subtle
    offensive content. BLP-2025 adversarial training (FGSM + text normalisation) improves
    BanglaBERT robustness on noisy social-media Bengali text, raising F1 from ~70%
    to ~72–74% on hate speech detection. Source: arXiv 2511.18324 (BLP-2025 system
    paper) — [|https://arxiv.org/html/2511.18324|]. However, no evaluation of toxicity
    classifier robustness under clinical-domain noisy Banglish inputs (phonetically
    degraded, missing punctuation, code-switched) has been published.'
  religious_slur_lexicons: 'ToxLex_bn includes communal hate terms from Facebook Bengali
    content (Bangladesh/India users), with ~1,959 bigram toxic entries across 8 thematic
    classes including communal categories. Source: PMC — [|https://pmc.ncbi.nlm.nih.gov/articles/PMC9256543/|].
    The Bengali Hate Speech Dataset (Karim et al.) includes 175 abusive terms frequently
    used in religious and political hate contexts. Source: UCI ML Repo — [|https://archive.ics.uci.edu/dataset/719/bengali+hate+speech+detection+dataset|].
    However, no published academic or community lexicon specifically cataloguing Bangladeshi
    Bengali religious minority slurs (e.g., ''malaun'' and analogues) and caste-coded
    terms as a standalone resource has been identified. These terms appear in the
    datasets above but are not isolated or documented as a dedicated deployable lexicon.'
  south_asian_clinical_nlp_safety: '[NOT FOUND — searched for South Asian clinical
    NLP safety characterising son-preference, colorism, and superstition-based harm
    as distinct toxicity categories; no published work found addressing these categories
    in a clinical chatbot safety or NLP moderation context. This remains a genuine
    research gap.]'
annotation_and_ground_truth_notes:
  current_annotator_pool: No in-region Bangladeshi annotator pool currently exists
    for this system
  minimum_viable_annotation: At least one or two native Bangladeshi annotators with
    contextual knowledge of local cultural, religious, and clinical norms are considered
    necessary; non-regional annotators are substantially inadequate for this context
  ideal_annotation: Multiple in-region annotators with contextual knowledge; ideally
    including annotators from relevant minority communities (Hindu, Adivasi) and clinical
    professionals familiar with Bangladeshi health beliefs
  participatory_annotation_initiatives: 'The BLP-2023 and BLP-2025 shared tasks (ACL
    BanglaLP workshop) have engaged Bangladeshi NLP researchers in annotation of Bengali-language
    hate speech and violence-inciting text. The BD-SHS dataset (Romim et al. 2022)
    used Bangladeshi researchers for annotation. Source: ACL Anthology — [|https://aclanthology.org/2022.lrec-1.552/|].
    However, no community-annotation or participatory NLP initiative specifically
    targeting clinical Bengali toxic content with Bangladeshi minority community annotators
    has been identified. BanTH annotators are noted as compensated, but annotator
    demographics are not detailed publicly.'
  annotation_guidelines_existing: 'BanTH (NAACL 2025) includes annotation guidelines
    for transliterated Bangla hate speech across 7 categories. BD-SHS (LREC 2022)
    used a hierarchical annotation process described as the first of its kind for
    Bangla hate speech. Source: BanTH ACL Anthology — [|https://aclanthology.org/2025.findings-naacl.403.pdf|];
    BD-SHS ACL Anthology — [|https://aclanthology.org/2022.lrec-1.552/|]. No annotation
    guidelines specific to Bangladeshi Bengali clinical-domain toxicity (covering
    superstition-based harm, son-preference framing, or colorism in health requests)
    have been found.'
  risk_of_cultural_blind_spots: 'Directly analogous to the MGTOW failure case documented
    in TOXIGEN: annotators without Bangladeshi cultural knowledge will not recognise
    ''malaun'', caste-coded terms, or superstition-embedded clinical harm as toxic'
regulatory_and_policy_context:
  applicable_data_protection_regulation: 'The Cyber Security Act 2023 (CSA) replaced
    the Digital Security Act 2018 in September 2023. The CSA governs cybercrimes and
    digital content including publication of ''offensive, false, or threatening data''
    (Section 25). It maintains most DSA provisions with reduced penalties (max 7 years
    imprisonment for various offences). Critics note the CSA retains broad and ambiguous
    provisions. A Draft Personal Data Protection Act 2023 is pending but not yet enacted;
    it would impose data localisation and explicit consent requirements on AI deployments.
    Source: Freedom House Freedom on the Net 2024 — [|https://freedomhouse.org/country/bangladesh/freedom-net/2024|];
    Mondaq CSA Primer — [|https://www.mondaq.com/security/1514296/navigating-smart-bangladesh-cybersecurity-act-2023-a-primer|]'
  health_information_regulation: '[NOT FOUND — searched for Bangladesh-specific regulatory
    framework for digital health information services and clinical chatbot deployments;
    no dedicated clinical chatbot regulation has been identified. The National AI
    Policy 2024 (Draft) identifies health as a priority sector and proposes mandatory
    compliance for high-risk AI systems, but no enacted sector-specific digital health
    information regulation was found. Source: regulations.ai Bangladesh summary —
    [|https://regulations.ai/regulations/bangladesh-summary|]]'
  content_moderation_legal_context: 'Content moderation obligations for health information
    platforms are not specifically regulated. The Cyber Security Act 2023, Section
    8, authorises removal or blocking of data threatening ''digital security or public
    order.'' The CSA''s broad provisions (undefined terms like ''religious values''
    and ''national integrity'') create legal uncertainty for clinical chatbot operators.
    Interim AI governance falls under the Cyber Security Act 2023 and institutional
    mandates of a2i (Agency to Innovate). Source: regulations.ai Bangladesh summary
    — [|https://regulations.ai/regulations/bangladesh-summary|]; Mondaq — [|https://www.mondaq.com/security/1514296/navigating-smart-bangladesh-cybersecurity-act-2023-a-primer|]'
  relevant_ministry: 'The ICT Division under the Ministry of Posts, Telecommunications
    and Information Technology is the primary architect of AI policy in Bangladesh
    and the supervisory authority for a2i. For clinical/health AI deployments, the
    Ministry of Health and Family Welfare has sectoral oversight over health services,
    but no published joint ministerial framework for clinical chatbot content moderation
    standards has been found. Source: regulations.ai Bangladesh summary — [|https://regulations.ai/regulations/bangladesh-summary|]'
benchmark_mismatch_summary:
  input_ontology: CRITICAL — TOXIGEN's 13 U.S. minority group categories have near-zero
    overlap with Bangladeshi clinical toxicity fault lines (religious minority targeting
    in Muslim-majority context, caste harm, son-preference framing, colorism, superstition-based
    health harm, Adivasi targeting)
  input_content: CRITICAL — All seed content from U.S. hate forums and English-language
    media; no Bangladeshi social media, Bengali-language, or South Asian cultural
    content present
  input_form: CRITICAL — TOXIGEN is fluent machine-generated English; deployment input
    is degraded Banglish in Roman script with irregular punctuation — fundamental
    mismatch at the signal level
  output_ontology: CRITICAL — Three-class toxic/ambiguous/benign taxonomy and supporting
    dimensions reflect U.S. harm model; insufficient for multi-dimensional Bangladeshi
    clinical harm space
  output_content: CRITICAL — All annotations by U.S.-based MTurk workers; no South
    Asian or Bangladeshi cultural competence in annotator pool; cultural blind spots
    propagated into released RoBERTa classifier
  output_form: PARTIAL MISMATCH — Text classification with probability scores is the
    dimension of closest alignment; granularity and cultural calibration of scoring
    categories remain mismatched for Bangladeshi clinical moderator workflow
net_new_fields:
  banglish_hate_speech_resource_gap_status: 'PARTIALLY RESOLVED as of 2024–2025. BanTH
    (NAACL 2025 Findings) is the first multi-label transliterated Bangla hate speech
    dataset (37,350 samples, 7 categories, YouTube-sourced). Prior assumption in the
    scaffold that ''no large-scale Banglish toxic content benchmark exists'' is now
    partially outdated. However, BanTH covers YouTube political/social discourse,
    not clinical chat; lacks caste, colorism, and superstition-embedded health harm
    categories; and its clinical transferability is unvalidated. Source: arXiv 2410.13281
    — [|https://arxiv.org/abs/2410.13281|]; ACL Anthology NAACL 2025 — [|https://aclanthology.org/2025.findings-naacl.403/|]'
  bengali_hate_speech_dataset_landscape: 'A non-trivial ecosystem of Bengali hate
    speech datasets now exists, primarily covering Unicode Bengali from Bangladeshi
    and West Bengali social media sources. Key resources: (1) Bengali Hate Speech
    Dataset / UCI (Karim et al. 2020) — political, religious, personal, geopolitical,
    gender categories; (2) BD-SHS (Romim et al. LREC 2022) — 50,200+ Bangladeshi social
    media comments with hierarchical annotation; (3) ToxLex_bn (PMC 2022) — Facebook-derived
    bigram toxic lexicon with ~13% non-standard spelling entries. None covers the
    clinical chatbot harm ontology for this deployment. Source: ACL Anthology — [|https://aclanthology.org/2022.lrec-1.552/|];
    UCI ML Repo — [|https://archive.ics.uci.edu/dataset/719/bengali+hate+speech+detection+dataset|];
    PMC — [|https://pmc.ncbi.nlm.nih.gov/articles/PMC9256543/|]'
  blp_shared_task_ecosystem: 'The BanglaLP (BLP) workshop series at ACL (BLP-2023,
    BLP-2025) constitutes the primary shared-task ecosystem for Bengali NLP safety
    tasks including violence-inciting text detection and hate speech. These tasks
    have produced annotated datasets, system papers, and benchmarks specifically for
    Bangladeshi Bengali. BLP-2025 includes multi-class hate speech detection covering
    political, religious, abusive, profane, and sexism categories. This ecosystem
    is the most directly relevant existing infrastructure for developing Bangladeshi
    annotator pools and evaluation frameworks. Source: ACL BLP-2023 Proceedings —
    [|https://aclanthology.org/2023.banglalp-1.29.pdf|]; BLP-2025 system paper — [|https://arxiv.org/html/2511.18324|]'
  adivasi_census_undercount_caveat: 'The 2022 Bangladesh census is contested by indigenous
    community leaders: Adivasi advocacy groups allege systematic undercount, with
    actual indigenous population potentially 3 million vs. the census figure of ~1.65
    million. Garo population recorded as 76,846 in 2022 census but community sources
    suggest substantially higher. Santal population recorded as 129,049 but community
    disputes this. This means Gazipur''s small recorded indigenous presence may underrepresent
    actual Adivasi users of a clinical chatbot in the district. Source: The Daily
    Star 2022 — [|https://www.thedailystar.net/news/bangladesh/news/ethnic-population-2022-census-real-picture-not-reflected-3090941|]'
  national_ai_policy_2024: 'Bangladesh''s Draft National AI Policy 2024 identifies
    health as a priority sector and proposes a risk-based classification for AI systems
    with mandatory compliance for high-risk applications, potentially including clinical
    chatbots. The policy proposes the National AI Centre of Excellence (NAICE). No
    enacted AI regulation currently exists; the CSA 2023 and institutional mandates
    of a2i provide interim governance. Source: regulations.ai Bangladesh — [|https://regulations.ai/regulations/bangladesh-summary|]'
