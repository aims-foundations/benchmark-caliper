  text: We release MRBench – a new evaluation benchmark containing 192 conversations and 1,596 responses from seven state-of-the-art
    LLM-based and human tutors, providing gold annotations for eight pedagogical dimensions.
- id: Q3
  page: 1
  dimension: output_form
  text: We assess reliability of the popular Prometheus2 and Llama-3.1-8B LLMs as evaluators and analyze each tutor's pedagogical
