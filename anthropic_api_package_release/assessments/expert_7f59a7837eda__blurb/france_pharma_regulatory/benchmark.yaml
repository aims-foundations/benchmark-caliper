  text: we discover that some common practices are unnecessary with BERT models, such as using complex tagging schemes in
    named entity recognition (NER).
- id: Q3
  page: 1
  dimension: output_form
  text: we have released our state-of-the-art pretrained and task-specific models for the community, and created a leaderboard
    featuring our BLURB benchmark (short for Biomedical Language Understanding & Reasoning Benchmark).
- id: Q4
  page: 1
  dimension: output_content
  text: Yu Gu, Robert Tinn, Hao Cheng, Michael Lucas, Naoto Usuyama, Xiaodong Liu, Tristan Naumann, Jianfeng Gao, and Hoifung
    Poon, Microsoft Research
- id: Q5
  page: 1
  dimension: input_content
  text: Existing pretraining work typically focuses on the newswire and Web domains.
- id: Q6
  page: 1
  dimension: input_content
  text: the original BERT model was trained on Wikipedia and BookCorpus [62], and subsequent efforts have focused on crawling
    additional text from the Web to power even larger-scale pretraining [39, 50].
- id: Q7
  page: 2
  dimension: input_content
  text: In specialized domains like biomedicine, past work has shown that using in-domain text can provide additional gains
    over general-domain language models [8, 34, 45].
- id: Q8
  page: 2
  dimension: input_content
  text: However, a prevailing assumption is that out-domain text is still helpful and previous work typically adopts a mixed-domain
    approach, e.g., by starting domain-specific pretraining from an existing general-domain language model (Figure 1 top).
- id: Q9
  page: 2
  dimension: input_content
  text: We observe that mixed-domain pretraining such as continual pretraining can be viewed as a form of transfer learning
    in itself, where the source domain is general text, such as newswire and the Web, and the target domain is specialized
    text such as biomedical papers.
- id: Q10
  page: 2
  dimension: input_content
  text: Based on the rich literature of multi-task learning and transfer learning [4, 13, 38, 59], successful transfer learning
    occurs when the target data is scarce and the source domain is highly relevant to the target one.
- id: Q11
  page: 2
  dimension: input_content
  text: For domains with abundant unlabeled text such as biomedicine, it is unclear that domain-specific pretraining can benefit
    by transfer from general domains.
- id: Q12
  page: 2
  dimension: input_content
  text: In fact, the majority of general domain text is substantively different from biomedical text, raising the prospect
    of negative transfer that actually hinders the target performance.
- id: Q13
  page: 4
  dimension: input_content
  text: In this paper, we will use biomedicine as a running example in our study of domain-specific pretraining. In other
    words, biomedical text is considered in-domain, while others are regarded as out-domain.
- id: Q14
  page: 4
  dimension: input_content
  text: Intuitively, using in-domain text in pretraining should help with domain-specific applications. Indeed, prior work
    has shown that pretraining with PubMed text leads to better performance in biomedical NLP tasks [8, 34, 45].
- id: Q15
  page: 4
  dimension: input_content
  text: The main question is whether pretraining should include text from other domains. The prevailing assumption is that
    pretraining can always benefit from more text, including out-domain text. In fact, none of the prior biomedical-related
    BERT models have been pretrained using purely biomedical text [8, 34, 45].
- id: Q16
  page: 4
  dimension: input_content
  text: Here, we challenge this assumption and show that domain-specific pretraining from scratch can be superior to mixed-domain
    pretraining for downstream applications.
- id: Q17
  page: 4
  dimension: input_content
  text: The standard approach to pretraining a biomedical BERT model conducts continual pretraining of a general-domain pretrained
    model, as exemplified by BioBERT [34]. Specifically, this approach would initialize with the standard BERT model [16],
    pretrained using Wikipedia and BookCorpus. It then continues the pretraining process with MLM and NSP using biomedical
    text.
- id: Q18
  page: 4
  dimension: input_content
  text: In the case of BioBERT, continual pretraining is conducted using PubMed abstracts and PubMed Central full text articles.
    BlueBERT [45] uses both PubMed text and de-identified clinical notes from MIMIC-III [26].
- id: Q19
  page: 4
  dimension: input_form
  text: Note that in the continual pretraining approach, the vocabulary is the same as the original BERT model, in this case
    the one generated from Wikipedia and BookCorpus. While convenient, this is a major disadvantage for this approach, as
    the vocabulary is not representative of the target biomedical domain.
- id: Q20
  page: 4
  dimension: input_content
  text: Compared to the other biomedical-related pretraining efforts, SciBERT [8] is a notable exception as it generates the
    vocabulary and pretrains from scratch, using biomedicine and computer science as representatives for scientific literature.
    However, from the perspective of biomedical applications, SciBERT still adopts the mixed-domain pretraining approach,
    as computer science text is clearly out-domain.
- id: Q21
  page: 4
  dimension: output_content
  text: Gu, Tinn, Cheng, et al.
- id: Q22
  page: 5
  dimension: input_content
  text: The mixed-domain pretraining approach makes sense if the target application domain has little text of its own, and
    can thereby benefit from pretraining using related domains.
- id: Q23
  page: 5
  dimension: input_content
  text: However, this is not the case for biomedicine, which has over thirty million abstracts in PubMed, and adds over a
    million each year.
- id: Q24
  page: 5
  dimension: input_content
  text: We thus hypothesize that domain-specific pretraining from scratch is a better strategy for biomedical language model
    pretraining.
- id: Q25
  page: 5
  dimension: input_form
  text: A major advantage of domain-specific pretraining from scratch stems from having an in-domain vocabulary.
- id: Q26
  page: 5
  dimension: input_form
  text: BERT models using continual pretraining are stuck with the original vocabulary from the general-domain corpora, which
    does not contain many common biomedical terms.
- id: Q27
  page: 5
  dimension: input_form
  text: Even for SciBERT, which generates its vocabulary partially from biomedical text, the deficiency compared to a purely
    biomedical vocabulary is substantial.
- id: Q28
  page: 5
  dimension: input_form
  text: As a result, standard BERT models are forced to divert parametrization capacity and training bandwidth to model biomedical
    terms using fragmented subwords.
- id: Q29
  page: 5
  dimension: input_form
  text: 'For example, naloxone, a common medical term, is divided into four pieces ([na, ##lo, ##xon, ##e]) by BERT, and acetyltransferase
    is shattered into seven pieces ([ace, ##ty, ##lt, ##ran, ##sf, ##eras, ##e]) by BERT.'
- id: Q30
  page: 5
  dimension: input_content
  text: Another advantage of domain-specific pretraining from scratch is that the language model is trained using purely in-domain
    data.
- id: Q31
  page: 5
  dimension: input_content
  text: For example, SciBERT pretraining has to balance optimizing for biomedical text and computer science text, the latter
    of which is unlikely to be beneficial for biomedical applications.
- id: Q32
  page: 5
  dimension: input_content
  text: Continual pretraining, on the other hand, may potentially recover from out-domain modeling, though not completely.
- id: Q33
  page: 6
  dimension: input_content
  text: that continual pretraining may not be able to completely undo suboptimal initialization from the general-domain language
    model.
- id: Q34
  page: 6
  dimension: input_content
  text: In our experiments, we show that domain-specific pretraining with in-domain vocabulary confers clear advantages over
    mixed-domain pretraining, be it continual pretraining of general-domain language models, or pretraining on mixed-domain
    text.
- id: Q35
  page: 6
  dimension: input_ontology
  text: The ultimate goal of language model pretraining is to improve performance on a wide range of downstream applications.
- id: Q36
  page: 6
  dimension: input_ontology
  text: In general-domain NLP, the creation of comprehensive benchmarks, such as GLUE [56, 57], greatly accelerates advances
    in language model pretraining by enabling head-to-head comparisons among pretrained language models.
- id: Q37
  page: 6
  dimension: input_ontology
  text: In contrast, prior work on biomedical pretraining tends to use different tasks and datasets for downstream evaluation,
    as shown in Table 2.
- id: Q38
  page: 6
  dimension: input_ontology
  text: To the best of our knowledge, BLUE [45] is the first attempt to create an NLP benchmark in the biomedical domain.
- id: Q39
  page: 6
  dimension: input_ontology
  text: We aim to improve on its design by addressing some of its limitations.
- id: Q40
  page: 6
  dimension: input_ontology
  text: First, BLUE has limited coverage of biomedical applications used in other recent work on biomedical language models,
    as shown in Table 2.
- id: Q41
  page: 6
  dimension: input_ontology
  text: For example, it does not include any question-answering task.
- id: Q42
  page: 6
  dimension: input_content
  text: More importantly, BLUE mixes PubMed-based biomedical applications (six datasets such as BC5, ChemProt, and HoC) with
    MIMIC-based clinical applications (four datasets such as i2b2 and MedNLI).
- id: Q43
  page: 6
  dimension: input_content
  text: Clinical notes differ substantially from biomedical literature, to the extent that we observe BERT models pretrained
    on clinical notes perform poorly on biomedical tasks, similar to the standard BERT.
- id: Q44
  page: 6
  dimension: input_ontology
  text: Consequently, it is advantageous to create separate benchmarks for these two domains.
- id: Q45
  page: 6
  dimension: input_ontology
  text: To facilitate investigations of biomedical language model pretraining and help accelerate progress in biomedical NLP,
    we create a new benchmark, the Biomedical Language Understanding & Reasoning Benchmark (BLURB).
- id: Q46
  page: 6
  dimension: input_ontology
  text: We focus on PubMed-based biomedical applications, and leave the exploration of the clinical domain, and other high-value
    verticals to future work.
- id: Q47
  page: 7
  dimension: input_ontology
  text: prior work, we prioritize the selection of datasets used in recent work on biomedical language models, and will explore
    the addition of other datasets in future work.
- id: Q48
  page: 7
  dimension: input_ontology
  text: BLURB is comprised of a comprehensive set of biomedical NLP tasks from publicly available datasets, including named
    entity recognition (NER), evidence-based medical information extraction (PICO), relation extraction, sentence similarity,
    document classification, and question answering.
- id: Q49
  page: 7
  dimension: input_ontology
  text: For question answering, prior work has considered both classification tasks (e.g., whether a reference text contains
    the answer to a given question) and more complex tasks such as list and summary [42].
- id: Q50
  page: 7
  dimension: input_ontology
  text: The latter types often require additional engineering effort that are not relevant to evaluating neural language models.
- id: Q51
  page: 7
  dimension: input_ontology
  text: For simplicity, we focus on the classification tasks such as yes/no question-answering in BLURB, and leave the inclusion
    of more complex question-answering to future work.
- id: Q52
  page: 7
  dimension: output_form
  text: To compute a summary score for BLURB, the simplest way is to report the average score among all tasks. However, this
    may place undue emphasis on simpler tasks such as NER for which there are many existing datasets. Therefore, we group
    the datasets by their task types, compute the average score for each task type, and report the macro average among the
    task types.
- id: Q53
  page: 7
  dimension: input_content
  text: The BioCreative V Chemical-Disease Relation corpus [35] was created for evaluating relation extraction of drug-disease
    interactions, but is frequently used as a NER corpus for detecting chemical (drug) and disease entities.
- id: Q54
  page: 7
  dimension: input_content
  text: The dataset consists of 1500 PubMed abstracts broken into three even splits for training, development, and test.
- id: Q55
  page: 7
  dimension: input_form
  text: We use a pre-processed version of this dataset generated by Crichton et al. [14], discard the relation labels, and
    train NER models for chemical (BC5-Chemical) and disease (BC5-Disease) separately.
- id: Q56
  page: 8
  dimension: input_content
  text: NCBI-Disease. The Natural Center for Biotechnology Information Disease corpus [18] contains 793 PubMed abstracts with
    6892 annotated disease mentions linked to 790 distinct disease entities. We use a pre-processed set of train, development,
    test splits generated by Crichton et al. [14].
- id: Q57
  page: 8
  dimension: input_content
  text: BC2GM. The Biocreative II Gene Mention corpus [53] consists of sentences from PubMed abstracts with manually labeled
    gene and alternative gene entities. Following prior work, we focus on the gene entity annotation. In its original form,
    BC2GM contains 15000 train and 5000 test sentences. We use a pre-processed version of the dataset generated by Crichton
    et al. [14], which carves out 2500 sentences from the training data for development.
- id: Q58
  page: 8
  dimension: input_content
  text: 'JNLPBA. The Joint Workshop on Natural Language Processing in Biomedicine and its Applications shared task [27] is
    a NER corpus on PubMed abstracts. The entity types are chosen for molecular biology applications: protein, DNA, RNA, cell
    line, and cell type. Some of the entity type distinctions are not very meaningful. For example, a gene mention often refers
    to both the DNA and gene products such as the RNA and protein. Following prior work that evaluates on this dataset [34],
    we ignore the type distinction and focus on detecting the entity mentions. We use the same train, development, and test
    splits as in Crichton et al. [14].'
- id: Q59
  page: 8
  dimension: input_content
  text: 'EBM PICO. The Evidence-Based Medicine corpus [44] contains PubMed abstracts on clinical trials, where each abstract
    is annotated with P, I, and O in PICO: Participants (e.g., diabetic patients), Intervention (e.g., insulin), Comparator
    (e.g., placebo) and Outcome (e.g., blood glucose levels). Comparator (C) labels are omitted as they are standard in clinical
    trials: placebo for passive control and standard of care for active control. There are 4300, 500, and 200 abstracts in
    training, development, and test, respectively.'
- id: Q60
  page: 8
  dimension: output_content
  text: The training and development sets were labeled by Amazon Mechanical Turkers, whereas the test set was labeled by Upwork
    contributors with prior medical training.
- id: Q61
  page: 8
  dimension: output_form
  text: EBM PICO provides labels at the word level for each PIO element. For each of the PIO elements in an abstract, we tally
    the F1 score at the word level, and then compute the final score as the average among PIO elements in the dataset.
- id: Q62
  page: 8
  dimension: input_content
  text: Occasionally, two PICO elements might overlap with each other (e.g., a participant span might contain within it an
    intervention span). In EBM-PICO, about 3% of the PIO words are in the overlap.
- id: Q63
  page: 8
  dimension: input_form
  text: Note that the dataset released along with SciBERT appears to remove the overlapping words from the larger span (e.g.,
    the participant span as mentioned above). We instead use the original dataset [44] and their scripts for preprocessing
    and evaluation.
- id: Q64
  page: 8
  dimension: input_content
  text: ChemProt. The Chemical Protein Interaction corpus [31] consists of PubMed abstracts annotated with chemical-protein
    interactions between chemical and protein entities. There are 23 interactions organized in a hierarchy, with 10 high-level
    interactions (including NONE). The vast majority of relation instances in ChemProt are within single sentences. Following
    prior work [8, 34], we only consider sentence-level instances.
- id: Q65
  page: 8
  dimension: output_ontology
  text: 'We follow the ChemProt authors'' suggestions and focus on classifying five high-level interactions — UPREGULATOR
    (CPR : 3), DOWNREGULATOR (CPR : 4), AGONIST (CPR : 5), ANTAGONIST (CPR : 6), SUBSTRATE (CPR : 9) — as well as everything
    else (false).'
- id: Q66
  page: 8
  dimension: input_form
  text: The ChemProt annotation is not exhaustive for all chemical-protein pairs. Following previous work [34, 45], we expand
    the training and development sets by assigning a false label for all chemical-protein pairs that occur in a training or
    development sentence, but do not have an explicit label in the ChemProt corpus.
- id: Q67
  page: 8
  dimension: output_content
  text: Note that prior work uses slightly different label expansion of the test data. To facilitate head-to-head comparison,
    we will provide instructions for reproducing the test set in BLURB from the original dataset.
- id: Q68
  page: 8
  dimension: input_content
  text: DDI. The Drug-Drug Interaction corpus [21] was created to facilitate research on pharmaceutical information extraction,
    with a particular focus on pharmacovigilance. It contains sentence-level annotation of drug-drug interactions on PubMed
    abstracts. Note that some prior work [45, 61] discarded 90 training files that the authors
- id: Q69
