- user_priority: 'Regulatory equivalence as STS output construct (HIGH: Output Ontology)'
  benchmark_coverage: 'PARTIAL — BIOSSES provides a sentence similarity regression task scored 0–4 by expert annotators [Q74,
    Q75], which is structurally analogous to STS but operationalizes general biomedical semantic proximity, not regulatory
    equivalence. The benchmark offers no label space or scoring function sensitive to legally determinative lexical differences
    (dose thresholds, contraindicated population qualifiers) required under EMA/ANSM standards. The macro-average BLURB score
    [Q150] further obscures threshold-level behavior critical to the deployment''s human-review triggering logic.

