- user_priority: 'Threshold-sensitive scoring and confidence calibration for human-review workflows (MODERATE: Output Form)'
  benchmark_coverage: 'PARTIAL — BLURB reports aggregate metrics (entity-level F1, Pearson correlation, micro F1, accuracy)
    averaged across runs [Q140, Q150, Q176]. Variance instability on small datasets is acknowledged [Q139] and mitigated by
    multi-run averaging rather than confidence calibration. No threshold-sensitivity analysis, operating characteristic curves,
    or calibration metrics are reported — leaving the benchmark unable to characterize model behavior at the decision boundaries
    where the deployment triggers human review.

    '
