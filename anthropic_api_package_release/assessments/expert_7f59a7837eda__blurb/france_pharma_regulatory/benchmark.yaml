- user_priority: 'Regulatory-expert annotator population vs. biomedical researcher norms (HIGH: Output Content)'
  benchmark_coverage: 'NOT DOCUMENTED — BLURB''s annotators range from Amazon Mechanical Turkers [Q60] to biomedical experts
    [Q74, Q88], with no representation of regulatory affairs specialists, legal experts, or individuals operating under EMA/ANSM
    normative frameworks. Inter-annotator agreement statistics are not systematically reported across datasets, and no cross-annotator-population
    agreement study is presented. The deployment anticipates systematic disagreements between biomedical NLP annotators (who
    prioritize clinical relevance) and regulatory experts (who apply rigid legal constraints) — a mismatch the benchmark provides
    no basis to quantify.

