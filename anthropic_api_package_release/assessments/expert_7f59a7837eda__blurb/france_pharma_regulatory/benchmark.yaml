- id: Q75
  page: 9
  dimension: output_ontology
  text: It is a regression task, with the average score as the final annotation.
- id: Q76
  page: 9
  dimension: output_form
  text: We use the same train/dev/test split in Peng et al. [45] and use Pearson correlation for evaluation.
- id: Q77
  page: 9
  dimension: input_content
  text: The Hallmarks of Cancer corpus was motivated by the pioneering work on cancer hallmarks [20].
