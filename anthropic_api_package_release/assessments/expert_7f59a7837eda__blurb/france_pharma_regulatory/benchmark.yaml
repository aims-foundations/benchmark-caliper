  dimension: input_form
  text: We instead use the original dataset and produce our train/dev/test split of 624/90/191 files.
- id: Q70
  page: 9
  dimension: input_content
  text: The Genetic Association Database corpus [11] was created semi-automatically using the Genetic Association Archive.
- id: Q71
