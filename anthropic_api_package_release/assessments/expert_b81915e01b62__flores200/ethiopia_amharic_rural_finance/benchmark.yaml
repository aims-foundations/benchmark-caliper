- id: Q16
  page: 6
  dimension: input_content
  text: We open source all the benchmarks, data, scripts, and models described in this effort to support further research.
- id: Q17
  page: 6
  dimension: input_ontology
  text: In addition, we focus on the practical applicability of our work for low-resource speaking communities.
- id: Q18
  page: 6
  dimension: input_ontology
  text: Section 4 summarizes the creation process of Flores-200 and NLLB-Seed + NLLB-MD, our translation seed datasets, with
    quality analysis.
- id: Q19
  page: 6
