  text: Language identification is a challenging task where numerous failure modes exist, often exacerbated by the gap between
    the clean data that LID models are trained on and the noisy data that LID models are applied to. LID models that are trained
    in a supervised manner on fluently written sentences may have difficulty identifying grammatically incorrect and incomplete
    strings extracted from the web. Furthermore, models can easily learn spurious correlations that are not meaningful for
    the task itself.
- id: Q209
