  page: 79
  dimension: output_ontology
  text: We provide the first baseline to evaluate toxicity in a massive number of languages by collecting and releasing toxicity
    wordlists in 200 languages (Section 7.3.1).
- id: Q701
  page: 79
  dimension: output_form
  text: Subsequently, in Section 7.3.3 we propose and evaluate simple yet scalable toxicity detectors that can be optimized
    in precision or recall depending on the particular application (i.e., filtering or detection, respectively).
- id: Q702
  page: 79
  dimension: output_form
  text: Then, we propose a filtering strategy to mitigate toxicity imbalance in training data and visualize the source contributions
    of several examples with added toxicity in Section 7.3.3.
- id: Q703
  page: 79
  dimension: output_ontology
  text: Note that in this section we will be giving translation examples that contain toxic language.
- id: Q704
  page: 79
  dimension: output_ontology
  text: Toxicity in natural language processing can be defined as the use of words or phrase structures that induce offensive
    utterances and bad sentiments (Google Jigsaw, 2017).
- id: Q705
  page: 79
  dimension: output_ontology
  text: In the context of translation, toxicity may originally be present in the source text or it can be generated de-novo
    in the target text (added toxicity).
- id: Q706
  page: 79
  dimension: output_ontology
  text: This added toxicity can come from a mistranslation (e.g., wrong lexical choice) or as a hallucination of a new target
    word from zero — both produce inaccurate translations.
- id: Q707
  page: 80
  dimension: output_ontology
  text: Reliable general-purpose MT systems should be able to translate any source content adequately regardless of the domain
    or register, which includes translating language that may be regarded as toxic.
- id: Q708
  page: 80
  dimension: output_ontology
  text: They should remain faithful to the source content, and should not add through the translation process any elements
    of toxicity that are not found in the source.
- id: Q709
  page: 80
  dimension: output_ontology
  text: Our main purpose is to improve translation safety through minimizing the probability of catastrophic mistranslations.
- id: Q710
  page: 80
  dimension: output_ontology
  text: Note that added toxicity represents one of several types of catastrophic mistranslations (Specia et al., 2021), along
    with mistranslations of named entities, genders (Levy et al., 2021), numbers and units, and reversal of semantic polarity.
- id: Q711
  page: 80
  dimension: output_form
  text: To enable toxicity detection at scale, we focus on a wordlist-based approach.
- id: Q712
  page: 80
  dimension: output_ontology
  text: We include items that are commonly referred to as vulgar or profane language.
- id: Q713
  page: 80
  dimension: output_ontology
  text: In addition to these, we include items more specifically associated with depictions of pornographic content or sexual
    acts, some frequently used hate speech expressions, and some bullying expressions (including language that can cause trauma
    or be used with the purpose of silencing someone).
- id: Q714
  page: 80
  dimension: output_ontology
  text: We also include items, vulgar or not, referring to body parts that are commonly associated with sexual practices.
- id: Q715
  page: 80
  dimension: output_ontology
  text: Toxicity is culturally sensitive, which constitutes a challenge when starting from one source language (in this case,
    English) and attempting to find equivalents in such a largely multilingual setting.
- id: Q716
  page: 80
  dimension: output_ontology
  text: Hate speech terms such as racial or ethnic slurs, for example, may well be the most challenging of all.
- id: Q717
  page: 80
  dimension: input_content
  text: We begin based on the professional translation of an initial list assembled in English, and allow additions to adapt
    to cultural specificities.
- id: Q718
  page: 80
  dimension: output_form
  text: We iteratively designed a template for toxicity translation that provides information for disambiguation and contextualization
    purposes.
- id: Q719
  page: 80
  dimension: output_ontology
  text: In the latest iteration of the template, the additional information includes a breakdown into domains (e.g., slurs,
    sex-related terms, abbreviations), part-of-speech information, pointers to the dictionary definitions of the words in
    their toxic sense, indications as to the language register(s) (slang, vulgar, formal, etc.).
- id: Q720
  page: 80
  dimension: output_form
  text: In addition, the template provides clearly identified areas for morphological variants to be added (if the target
    language is morphologically rich).
- id: Q721
  page: 80
  dimension: output_form
  text: For polysemous terms, which may or may not be toxic depending on context, the template offers additional room and
    guidance as to best disambiguation practices through suggesting much less ambiguous, short n-grams (typically, 0 < n <
    4).
- id: Q722
  page: 80
  dimension: output_content
  text: For the purpose of reducing cultural blind spots, another section of the template gives translators the possibility
    to insert common toxic language for which it may be difficult to find direct English equivalence.
- id: Q723
  page: 80
  dimension: output_content
  text: The translators are asked to provide explanations or verbatim descriptions.
- id: Q724
  page: 80
  dimension: output_form
  text: Suggestions were limited to around forty
coverage_strengths:
- user_priority: Amharic (Ethiopic/Ge'ez script) language support
  benchmark_coverage: 'Flores-200 explicitly includes Amharic among its 204 languages. A dedicated

    8,000-token SentencePiece vocabulary was trained specifically for Amharic and

    Tigrinya to better support the Ge''ez script [Q382], and combined supervised

    cosine-loss and unsupervised MLM training was deployed to leverage monolingual

    data for these languages [Q373, Q374]. BCP 47 tags with ISO 15924 script

    subtags are used throughout [Q79], confirming Ethiopic script is formally

    represented in the evaluation infrastructure.

    '
  dimension: input_form
- user_priority: Low-resource African language translation quality
  benchmark_coverage: '55 of the 204 languages in Flores-200 are spoken in Africa, making it the

    largest geographic block [Q367]. The project explicitly prioritized historically

    underrepresented African languages through native speaker community consultation

    [Q64] and dedicated encoder training strategies. Average BLEU score across 44

    African language directions improved from 11.0 to 14.8 with mined bitext [Q372].

    Amharic is classified as low-resource (fewer than 1M publicly available sentence

    pairs [Q83, Q85]), and the benchmark explicitly tracks performance breakdowns by

    high/low/very-low resource level [Q419, Q420].

    '
  dimension: input_ontology
- user_priority: Text-only prose output for document translation
  benchmark_coverage: 'The benchmark evaluates text output exclusively, with all evaluation and scoring

    conducted at the sentence level on prose content [Q5, Q326]. The deployer

    confirmed that prose output without layout preservation is acceptable for this

    text-only NLLB deployment [elicitation A4], creating a direct format alignment

    between the benchmark''s output modality and the deployment''s relaxed output

    requirement.

    '
  dimension: output_form
- user_priority: Translation safety and mistranslation detection
  benchmark_coverage: 'Toxicity-200 provides toxicity wordlists for all 200 languages including Amharic

    [Q700], with the taxonomy distinguishing source-present toxicity from added

    toxicity generated de novo by the model [Q705, Q706]. The paper frames added

    toxicity as a type of catastrophic mistranslation alongside mistranslations of

    named entities, genders, numbers and units, and reversal of semantic polarity

    [Q710], providing at least partial signal on translation safety.

    '
  dimension: output_ontology
- user_priority: Multi-domain generalization beyond general prose
  benchmark_coverage: 'NLLB-MD tests domain generalization across news, scripted talks, chat, and WHO

    health content for six language directions [Q159, Q166, Q167, Q168, Q169],

    explicitly motivated by the question "How well do models generalize to non-

    Wikimedia domains?" [Q159]. This provides documented evidence of domain-transfer

    methodology, even though Amharic is not among the six NLLB-MD languages and

    agricultural/financial domains are excluded.

    '
  dimension: input_ontology
