  dimension: input_form
  text: Language Model Filtering. As we are interested in keeping high quality sentences in our datasets to later train our
    final multilingual translation models, when possible, we also run a Language Model (LM) filtering. In practice, it is
    difficult to train high-quality language models for low-resource languages, so we focus on applying language model filters
    on a few high-resource languages only. Because we do most of the mining where one side of the pair is English, we believe
    that if we have high-quality content in the English corpus, the mining alignment process will also output high-quality
    content on the other side of the pair. For English, we use the KenLM (Heafield, 2011) model from CCNet (Wenzek et al.,
    2020).
- id: Q278
  page: 36
  dimension: input_content
  text: We processed around 37.7 Petabytes of data through the whole pipeline. This was a challenge for data management and
    disk usage. In particular, we had to make hard decisions when filtering high-resource languages to artificially keep only
    around 30% of data from the most voluminous languages. This threshold was identified as the limit under which the LM score
    would identify sentences of low quality.
- id: Q279
  page: 36
  dimension: input_content
  text: We realize that processing such volume of data is not always possible and are open-sourcing much of our results and
    code to make it easier for everyone to benefit from our effort.
- id: Q280
  page: 36
  dimension: input_content
  text: We started with 107.9 billion paragraphs from the web (97.4% high-resource, 2.6% low-resource) and discarded 2.8 billion
    sentences (85.3% high, 14.7% low) because of LID/Script mismatch or low LID score (see Section 5.1) to produce 43.7 billion
    monolingual sentences, of which 21.5 billion sentences are in English.
- id: Q281
  page: 37
  dimension: input_form
  text: Note that we have such a big drop in number of sentences because we drastically filtered high-resource languages to
    keep the top 30% of sentences based on LM score.
- id: Q282
  page: 37
  dimension: input_ontology
  text: Machine translation, like many machine learning applications, is heavily data-driven.
- id: Q283
  page: 37
  dimension: input_content
  text: Previous works have clearly established that translation quality generally increases with the amount of available
    high-quality training data (Koehn and Knowles, 2017).
- id: Q284
  page: 37
  dimension: input_content
  text: Existing parallel corpora for low-resource languages are often opportunistically drawn from known collections of multilingual
    content, such as the Christian Bible or publications of multinational organizations.
- id: Q285
  page: 37
  dimension: input_content
  text: These are often limited in quantity and domain.
- id: Q286
  page: 37
  dimension: input_ontology
  text: The underlying idea of our bitext mining approach is to first learn a multilingual sentence embedding space and to
    use a similarity measure in that space to decide whether two sentences are parallel or not.
- id: Q287
  page: 37
  dimension: input_ontology
  text: This comparison can be done for all possible pairs in two collections of monolingual texts, termed global mining in
    Schwenk et al. (2021a).
- id: Q288
  page: 37
  dimension: input_ontology
  text: Another common alternative approach is referred to as hierarchical or local mining and comprises of first performing
    a selection of potential document pairs, and then limiting the mining to sentences within each document pair.
- id: Q289
  page: 37
  dimension: input_ontology
  text: In this work we follow the approach from WikiMatrix (Schwenk et al., 2021a) and CCMatrix (Schwenk et al., 2021b),
    which both used global mining.
- id: Q290
  page: 37
  dimension: input_content
  text: As our mining approach requires a multilingual embedding space, we faced several challenges when scaling this representation
    to the 200 languages of the No Language Left Behind effort.
- id: Q291
  page: 37
  dimension: input_content
  text: For example, how do we make sure that all languages are well-learned? And how should we account for large imbalances
    of available training data?
- id: Q292
  page: 37
  dimension: input_ontology
  text: Training a massively multilingual sentence encoder from scratch each time a new set of languages is added would be
    computationally very expensive.
- id: Q293
  page: 38
  dimension: input_ontology
  text: the drawback that the learned embedding spaces from each new model are not (naturally) mutually compatible. This can
    make mining intractable as for each new encoder, the entirety of available monolingual data needs to be re-embedded, and
    for English alone, this means tens of billions of sentences and large compute resources.
- id: Q294
  page: 38
  dimension: input_ontology
  text: In order to overcome these issues, one approach is to train smaller mutually compatible sentence encoders using the
    teacher-student distillation technique proposed by Reimers and Gurevych (2020).
- id: Q295
  page: 38
  dimension: input_ontology
  text: Several extensions of this underlying idea were proposed by Heffernan et al. (2022) that we adopt (see Section 5.3.2).
- id: Q296
  page: 38
  dimension: input_ontology
  text: In order to find aligned texts, early approaches focused on information beyond the text itself.
- id: Q297
  page: 38
  dimension: input_ontology
  text: More recent approaches have begun to leverage advancements in representation learning by encoding texts into an embedding
    space, and then using a distance-based method to determine if a pair of texts in different languages have a similar meaning.
- id: Q298
  page: 38
  dimension: input_ontology
  text: Works such as España-Bonet et al. (2017); Guo et al. (2018); Hassan et al. (2018); Yang et al. (2019) used bilingual
    embeddings, but this has the limitation of not being able to directly mine across many languages.
- id: Q299
  page: 38
  dimension: input_ontology
  text: In order to address this, learning a massively multilingual embedding space allows for any pair of languages to be
    encoded and mined (Artetxe and Schwenk, 2019a,b; Feng et al., 2020; Kvapilíková et al., 2020; Schwenk, 2018).
- id: Q300
  page: 38
  dimension: output_form
  text: However, when applying these approaches to obtain representations at the sentence level, they can often suffer from
    the lack of an explicit sentence-based criterion during training, resulting in poor performance on tasks such as bitext
    retrieval (Hu et al., 2020).
- id: Q301
  page: 39
  dimension: input_form
  text: However, pre-training for the BERT encoders is done using both a masked language modelling (MLM) and translation language
    modelling (TLM) objective (Conneau et al., 2020).
- id: Q302
  page: 39
  dimension: output_ontology
  text: Sentence embeddings are then produced by passing bilingual translation pairs through the dual-encoder setup and then
    applying an additive margin softmax loss (Yang et al., 2019).
- id: Q303
  page: 39
  dimension: input_form
  text: Unlike the previous BERT-based approaches, there is no pre-training, and sentence embeddings are produced by using
    an encoder-decoder architecture, and then max-pooling over the encoder outputs.
- id: Q304
  page: 39
  dimension: input_ontology
  text: When attempting to learn a multilingual embedding space, one of the limitations of many existing approaches is that
    each time a model is to be expanded to include a new set of languages, the entire model must be retrained from scratch,
    which is very costly.
- id: Q305
  page: 39
  dimension: input_content
  text: In this distillation setup, English-paired bitexts are used to both learn the English embedding space of a monolingual
    teacher (SBERT), while also using the non-English side to learn a new language.
- id: Q306
  page: 39
  dimension: input_ontology
  text: Heffernan et al. (2022) further built upon this approach by experimenting with different architectures for teacher
    and student (e.g., BiLSTM and Transformer), and also applying such distilled sentence representations to the task of bitext
    mining.
- id: Q307
  page: 39
  dimension: input_ontology
  text: The overall approach focuses on starting with a massively multilingual sentence encoder teacher model and adapting
    it to several different low-resource student models.
- id: Q308
  page: 39
  dimension: input_ontology
  text: This enables us to add low-resource languages without needing to compete with high-resource languages for capacity,
    to avoid retraining the full model from scratch, and to maintain compatibility of the multilingual embedding spaces for
    subsequent mining.
- id: Q309
  page: 40
  dimension: input_form
  text: 'The original training procedure (Artetxe and Schwenk, 2019b) was changed as follows: the use of SentencePiece tokenization
