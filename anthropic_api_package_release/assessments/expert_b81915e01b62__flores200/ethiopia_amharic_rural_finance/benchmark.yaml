  text: We note that these ratios should differ between languages, and are not universally applicable. In certain languages,
    concepts may take many more words to convey, meaning that setting length-related thresholds is problematic. Similarly,
    other languages may utilize more punctuation or have shorter words. Thus, we do not set extremely stringent filters, and
