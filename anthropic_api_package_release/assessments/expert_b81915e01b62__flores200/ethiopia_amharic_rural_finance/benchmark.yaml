  dimension: output_form
  text: The BLEU score (Papineni et al., 2002) has been the standard metric for machine translation evaluation since its proposal
    two decades ago. It measures overlap between machine translation and a human reference translation by combining precision
    of 1-grams to 4-grams with a brevity penalty.
- id: Q644
  page: 73
  dimension: output_form
  text: A major downside of BLEU is that it is tokenization-dependent.
- id: Q645
  page: 73
  dimension: output_form
  text: Goyal et al. (2022) propose spBLEU, a BLEU metric based on a standardized SentencePiece model (SPM) covering 101 languages,
    released with Flores101. In this work, we provide SPM-200 along with Flores-200 to enable measurement of spBLEU.
- id: Q646
  page: 73
  dimension: output_form
  text: The chrF++ score (Popović, 2017) overcomes the limitation of the BLEU score which requires that a sentence can be
    broken up into word tokens. However, some languages, such as Chinese or Thai, do not use spaces to separate words and
    word segmentation tools may not be readily available or even exist.
- id: Q647
  page: 73
  dimension: output_form
  text: chrF++ overcomes this weakness by basing the overlap calculation on character-level n-grams F-score (n ranging from
    1 to 6) and complementing with word unigrams and bi-grams.
- id: Q648
  page: 73
  dimension: output_form
  text: In this work, we primarily evaluate using chrF++ using the settings from sacrebleu. However, when comparing to other
    published works, we utilize BLEU and spBLEU where appropriate.
- id: Q649
  page: 73
  dimension: output_form
  text: While automatic scores are a great tool to drive research, human evaluation is essential to ensure meaningful assessments
    of translation quality (Kocmi et al., 2021).
- id: Q650
  page: 73
  dimension: output_form
  text: We use two advances — the XSTS evaluation protocol and the use of calibration sets — to enable meaningful human evaluation
    scores that are comparable across language pairs.
- id: Q651
  page: 73
  dimension: output_form
  text: We adapt the recently proposed crosslingual Semantic Text Similarity (XSTS) methodology from Agirre et al. (2012).
    In short, XSTS is a human evaluation protocol that focuses on meaning preservation far more than fluency.
- id: Q652
  page: 73
  dimension: output_form
  text: For low-resource languages, translations are usually of weaker quality, and so we focus far more on usable (meaning-preserving)
    translations, even if they are not fully fluent.
- id: Q653
  page: 73
  dimension: output_ontology
  text: When building machine translation systems for many different language pairs, a core question is which language pairs
    reach certain levels of quality. Hence, we need meaningful scores that are comparable across language pairs.
- id: Q654
  page: 74
  dimension: output_ontology
  text: XSTS rates each source sentence and its machine translation on a five-point scale, where 1 is the lowest score and
    5 is the highest score.
- id: Q655
  page: 74
  dimension: output_content
  text: work has found that XSTS yields higher interannotator agreement (Licht et al., 2022).
- id: Q656
  page: 74
  dimension: output_content
  text: To enable meaningful scores that are comparable across language pairs, we ask each evaluator to provide assessments
    using the XSTS scale on exactly the same set of sentence pairs.
- id: Q657
  page: 74
  dimension: output_content
  text: The purpose of this is to identify which sets of annotators have a systemic tendency to be more harsh or generous
    in their scoring, and correct for this effect.
- id: Q658
  page: 74
  dimension: output_content
  text: While evaluators assess different languages, the calibration set consists of machine translation output into English
    paired with an English reference translation.
- id: Q659
  page: 74
  dimension: output_content
  text: Based on how evaluators use the XSTS scale on this calibration set, we adjust their raw scores on the actual evaluation
    task to ensure consistency across evaluators.
- id: Q660
  page: 74
  dimension: output_form
  text: While the monolingual task does not precisely mimic the bilingual XSTS task, it is a reasonable first approximation
    and has been shown to increase the correlation between human and automatic metrics, primarily by reducing one source of
    'noise' in the human evaluations; the lack of score calibration between annotators.
- id: Q661
  page: 74
  dimension: output_form
  text: To obtain an aggregate human quality metric for each language direction in an evaluation study, we take the majority
    XSTS score for each sentence and average these majority scores over all evaluated sentences.
