- id: Q320
  page: 40
  dimension: input_ontology
  text: Mined bitexts will be subsequently utilized to improve translation quality for 200 languages.
- id: Q321
  page: 40
  dimension: output_form
  text: Consequently, our primary metric is neural machine translation (NMT) quality.
- id: Q322
  page: 40
  dimension: output_form
  text: However, mining and NMT training are computationally expensive, and it is intractable to systematically perform this
    evaluation for many different sentence encoder variants.
- id: Q323
  page: 40
  dimension: output_form
  text: As an evaluation proxy, we use a mining-based multilingual similarity search error rate, referred to here as xsim.
- id: Q324
  page: 40
  dimension: output_form
  text: As opposed to cosine accuracy which aligns embeddings based on the highest cosine score, xsim aligns source and target
    embeddings based on the highest margin score, which was shown to be beneficial in mining (Artetxe and Schwenk, 2019a).
