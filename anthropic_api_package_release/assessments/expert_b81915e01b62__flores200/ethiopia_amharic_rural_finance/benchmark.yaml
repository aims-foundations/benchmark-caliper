  text: model that currently supports 202 languages, and analyze its quality and performance in Section 8.
- id: Q23
  page: 7
  dimension: input_content
  text: 'To make our work available to the community, we open source the following: Human-Translated Datasets Flores-200:
    Evaluation dataset in 204 languages NLLB-Seed: Seed training data in 39 languages NLLB-MD: Seed data in different domains
    in 6 languages to assess generalization Toxicity-200: wordlists to detect toxicity in 200 languages'
- id: Q24
  page: 7
  dimension: input_form
  text: 'Tools to Create Large Scale Bitext Datasets Language Identification for more than 200 languages LASER3: sentence
    encoders for identifying aligned bitext for 148 languages stopes: a data mining library that can be used to process and
    clean monolingual data, then create aligned bitext Training data recreation: Scripts that recreate our training data'
- id: Q25
  page: 7
  dimension: input_ontology
  text: 'Translation Models covering 202 languages NLLB-200: A 54.5B Sparsely Gated Mixture-of-Experts model 3.3B and 1.3B
    Dense Transformer models 1.3B and 600M Dense transformer models distilled from NLLB-200'
- id: Q26
  page: 7
  dimension: output_content
  text: To understand how low-resource language speakers perceive machine translation, we conducted an interview study with
    44 low-resource language speakers.
- id: Q27
  page: 7
  dimension: output_content
  text: Inspired by Value Sensitive Design (Friedman and Hendry, 2019; Van Der Hoven and Manders-Huits, 2020), we attribute
    community-level interests and values as the cornerstone of our research.
- id: Q28
  page: 8
  dimension: input_ontology
  text: We designed a semi-structured interview protocol aimed at exploring the needs and concerns of low-resource language
    speakers vis-à-vis machine translation.
- id: Q29
  page: 8
  dimension: input_ontology
  text: Although low-resource languages could be deemed low-resource for a variety of reasons, including being under-researched,
    digitized, or taught (Cieri et al., 2016; Magueresse et al., 2020), for the purpose of the study, we define low-resource
    as languages which had less than 1 million sentences of publicly available example translations at the time of the study.
- id: Q30
  page: 8
  dimension: output_content
  text: Overall, our recruitment effort led us to 44 native speakers of low-resource languages from diverse backgrounds, with
    ages ranging from 23 to 58.
- id: Q31
  page: 8
  dimension: output_content
  text: 'Covering a total of 36 languages, the distribution is as follows: 5 languages are spoken predominantly in North America,
    8 in South America, 4 in Europe, 12 in Africa, and 7 in Asia.'
- id: Q32
  page: 8
  dimension: output_content
  text: Although our sample has breadth in terms of race, education, and location, the majority of our participants are immigrants
    living in the U.S. and Europe, and about a third of them (n = 17) identify as tech workers.
- id: Q33
  page: 8
  dimension: output_content
  text: All interviews were conducted remotely via video conferencing software.
- id: Q34
  page: 8
  dimension: output_content
  text: On average, the interviews lasted 1.5 hours.
- id: Q35
  page: 8
  dimension: input_form
  text: Two-third of the interviews were recorded and transcribed.
- id: Q36
  page: 8
  dimension: input_form
  text: For unrecorded interviews, two researchers took extensive notes throughout.
- id: Q37
  page: 8
  dimension: output_content
  text: Bringing all 44 interviews together, responses were then systematically coded to allow major themes and ideas to emerge.
- id: Q38
  page: 8
  dimension: output_content
  text: We acknowledge that sampling low-resource language speakers from diasporic contexts comes with its limitations.
- id: Q39
  page: 8
  dimension: output_content
  text: For one, as immigrants, their perspectives may not consummately capture the sentiments of their communities back home.
- id: Q40
  page: 8
  dimension: output_content
  text: Over-sampling tech workers may introduce another form of selection bias.
- id: Q41
  page: 9
  dimension: output_content
  text: These nuanced perspectives were vital in shaping our research processes and procedures.
- id: Q42
  page: 9
  dimension: output_content
  text: Even though many of our low-resource language interviewees are also fluent English speakers, almost all of them maintain
    that their native tongue remains a foundational part of their identity.
- id: Q43
  page: 9
  dimension: output_content
  text: more than half of the participants of our study lament that without sustained efforts at prioritizing the usage and
    application of their native languages, many of them would face endangerment in time to come.
- id: Q44
  page: 10
  dimension: input_content
  text: When asked about translation coverage, most low-resource language speakers express comfort in the fact that their
    respective languages are supported by existing systems.
- id: Q45
  page: 10
  dimension: input_form
  text: For a select group of low-resource language speakers, whose languages contain multiple scripts and variants, full
    coverage remains lacking.
- id: Q46
  page: 10
  dimension: input_form
  text: A Moroccan Arabic speaker said that fully supporting the Arabic language requires us to take the various extant Arabic
    languoids into account so that we do not end up favoring one form over another.
- id: Q47
  page: 10
  dimension: input_form
  text: By excluding certain languoids or scripts and propping more well-resourced variants as the "default" option (Sunstein
    and Thaler, 2003), we not only jeopardize accurate cultural representation, but also exacerbate the unequal field that
    already plagues language distribution and usage across different parts of the world.
- id: Q48
  page: 10
  dimension: output_content
  text: Reflecting on a sizable quality gap pitching high-resource language translation against low-resource language translation
    (Joshi et al., 2019), many interviewees cite poor and unreliable results as the key reason for irregular or discontinued
    use.
- id: Q49
  page: 10
  dimension: output_ontology
  text: A few interviewees even mentioned that the lack of care given to their languages in some translation platforms have
    led to occasional toxic or crude translations, further eroding their confidence in these systems.
- id: Q50
  page: 10
  dimension: input_content
  text: A Tigrinya speaker notes that in Ethiopia, where less than 20 percent of the country has internet access, actual access
    to what the web offers is even more restricted due to the lack of quality translation.
- id: Q51
  page: 11
  dimension: output_content
  text: 'Combining insights drawn from interviews with low-resource language speakers and good practices distilled from literature
    on responsible AI (Arrieta et al., 2020; Bender et al., 2021; Blodgett et al., 2022; Paullada et al., 2021; Sambasivan
    and Holbrook, 2018), we introduce four key guiding principles underlying our research:'
- id: Q52
  page: 11
  dimension: input_ontology
  text: Prioritize the needs of underserved communities. As aforementioned, we put the needs of low-resource language communities
    at the front and center of our effort. Recognizing that machine translation is a value-laden technological artifact that
    has historically de-prioritized certain populations, we use this effort to redistribute power and resources to underserved
    communities.
- id: Q53
  page: 11
  dimension: input_ontology
  text: Sharing through open-sourcing. Low-resource language speakers across the board remind us that transparency ought to
    be a key emphasis when developing NLLB. With the dual intent to foster transparency and avoid a duplication of effort,
    we decided early on that we were going to open source NLLB.
- id: Q54
  page: 11
  dimension: input_content
  text: low-resource language communities are not a monolithic group; they each navigate unique sociopolitical and cultural
    contexts.
- id: Q55
  page: 12
  dimension: output_content
  text: our research effort is taken on by an interdisciplinary team with scholars from a wide array of humanities (i.e.,
    Philosophy, Ethics), social scientific (i.e., Sociology, Linguistics), and technical (i.e., Computer Science, Statistics)
    backgrounds.
- id: Q56
  page: 12
  dimension: input_ontology
  text: Broadly accessible machine translation systems support around 130 languages; our goal is to bring this number up to
    200.
- id: Q57
  page: 12
  dimension: input_content
  text: In deciding what languages to offer, we first parsed through the 101 languages covered in Flores-101, a dataset for
    translation evaluation covering predominantly low-resource languages.
- id: Q58
  page: 12
  dimension: input_ontology
  text: From there, we generated a preliminary list of over 250 possible language candidates, eventually trimming it down
    to around 210 for final expansion from 101 to 200+ languages.
- id: Q59
  page: 12
  dimension: input_content
  text: First, we considered all languages with a Wikipedia presence.
- id: Q60
  page: 12
  dimension: input_content
  text: Wikipedia is a key site of knowledge dissemination for many speaking low-resource languages, making it a pertinent
    place to start.
- id: Q61
  page: 12
  dimension: input_content
  text: Currently, Wikipedia supports over 300 languages, extending mindfully its content beyond English (Johnson and Lescak,
    2022), and new languages can be added
- id: Q62
  page: 13
  dimension: input_form
  text: Code Language Script Family Subgrouping Res. Specification
- id: Q63
  page: 16
  dimension: input_content
  text: We display the language Code, language name, Script, and language Family. The symbol 🌐 indicates machine translation
    support by Google and/or Microsoft, whereas ✗ indicates support by neither. Res. indicates if we classify the language
    as high or low-resource. Specification contains, if available, additional information on the language variant collected
    in Flores-200. The superscript new indicates new languages added to Flores-200 compared to Flores-101.
- id: Q64
  page: 16
  dimension: input_content
  text: as part of a community request process. Next, we solicited lists of languages spoken in various regions by native
    speakers, focusing particularly on African languages—a category of languages that have historically been underrepresented
    in translation efforts (Nekoto et al., 2020).
- id: Q65
  page: 16
  dimension: input_content
  text: We then examined language coverage in multiple existing datasets in the natural language processing community, paying
    focused attention on training datasets without accompanying evaluation datasets.
- id: Q66
  page: 16
  dimension: input_content
  text: Finally, we considered the adoption and usage of each language by looking at the approximate number of native speakers
    and other community-level variables relevant to our work.
- id: Q67
  page: 16
  dimension: output_content
  text: Next, for each of the language candidates, we partnered with linguists from various specialized language service providers
    to understand if each of these languages has a standardized written form.
- id: Q68
  page: 16
  dimension: output_form
  text: We did this because having a reliable, high-quality evaluation dataset is critical to accelerated experimental progress.
- id: Q69
  page: 16
  dimension: input_form
  text: However, prioritizing languages with fairly standardized written forms has notable downsides (see Appendix A).
- id: Q70
  page: 16
  dimension: input_form
  text: For one, many languages have natural variations and are being written in different standards or scripts in different
    regions.
- id: Q71
  page: 16
  dimension: input_form
  text: For instance, languages such as Fulah include several distinct varieties and languages such as Kashmiri and Central
    Kanuri contain multiple scripts in common use.
- id: Q72
  page: 16
  dimension: input_form
  text: Systematically documenting these dimensions helped us assess how we could best support multiple variants of different
    languages (such as languages with multiple writing systems or natural variation).
- id: Q73
  page: 17
  dimension: input_ontology
  text: In tandem with these considerations, deciding which languages to include in the final list ultimately came down to
    assessing the potential impact we might have on the respective low-resource language communities.
- id: Q74
  page: 17
  dimension: input_ontology
  text: For instance, we exclude languages with extremely low number of native speakers.
- id: Q75
  page: 17
  dimension: input_ontology
  text: Without a concerted plan to thoroughly understand the needs of these communities and potential risks we could cause,
    we do not feel comfortable including their languages in our effort.
- id: Q76
  page: 17
  dimension: input_content
  text: Many of the languages that made the final cut have a presence on Wikipedia and are from historically underrepresented
    regions.
- id: Q77
  page: 17
  dimension: input_ontology
  text: In this work, we exclude many languages that do not have written standards or are predominantly oral.
- id: Q78
  page: 17
  dimension: input_ontology
  text: 'In accordance with the #BenderRule (Bender, 2019), we summarize information about each of our 204 supported languages
    in Table 1.'
- id: Q79
  page: 17
  dimension: input_form
  text: We represent each language with a BCP 47 tag sequence using a three-letter ISO 639-3 code as the base subtag, which
    we complement with ISO 15924 script subtags, as we collected resources for several languages in more than one script.
- id: Q80
  page: 17
  dimension: input_content
  text: The language names have been cross-referenced with major linguistic information platforms such as Ethnologue (Lewis,
    2009) and Glottolog (Hammarström et al., 2022).
- id: Q81
  page: 17
  dimension: input_content
  text: We provide Language family information for each language based on the Glottolog database (Hammarström et al., 2022).
- id: Q82
  page: 17
  dimension: input_content
  text: We examine if each language is supported by Google Translate and/or Microsoft Translate.
- id: Q83
  page: 17
  dimension: output_ontology
  text: We categorize a language as low-resource if there are fewer than 1M publicly available, de-duplicated bitext samples
    with any other language within our set of 200 languages.
- id: Q84
  page: 17
