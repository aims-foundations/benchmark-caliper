- id: Q253
  page: 34
  dimension: input_content
  text: In this section, we describe our end-to-end process for both curating and cleaning monolingual data.
- id: Q254
  page: 34
  dimension: input_content
  text: We begin with web data as our starting point, provided by CommonCrawl (CC) and ParaCrawl (Bañón et al., 2020).
- id: Q255
