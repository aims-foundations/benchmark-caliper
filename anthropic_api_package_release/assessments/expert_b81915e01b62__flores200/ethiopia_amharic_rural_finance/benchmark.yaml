- user_priority: Domain-consistent rendering of technical terms across clauses (OO)
  benchmark_coverage: 'NOT DOCUMENTED — All evaluation scores are computed at the sentence level

    [Q5, Q326, Q336]. No document-level coherence metric, cross-sentence terminology

    consistency check, or clause-level correctness rubric exists in the benchmark.

    The paper''s own human evaluation focused on meaning preservation via the XSTS

    five-point scale [Q654], which cannot detect consistent mistranslation of a

    domain-specific term repeated across multiple clauses. The chrF++ metric measures

    n-gram overlap against a single reference [Q647] and is structurally incapable

    of capturing cross-clause consistency.

    '
