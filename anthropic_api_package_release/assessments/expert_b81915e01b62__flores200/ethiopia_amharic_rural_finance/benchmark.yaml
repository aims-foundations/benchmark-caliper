- id: Q249
  page: 34
  dimension: input_content
  text: Additionally, data quality can have a large impact on the performance of such tasks.
- id: Q250
  page: 34
  dimension: input_content
  text: In order to maximize the potential benefits of leveraging these data sources, we aim to produce high quality and clean
    monolingual data.
- id: Q251
  page: 34
  dimension: input_content
  text: As discussed earlier in this section, such data can be scarce, particularly in the low-resource setting.
- id: Q252
  page: 34
  dimension: input_content
  text: We therefore decided to extend the work done in CCNet, CCMatrix (Schwenk et al., 2021b; Wenzek et al., 2020), and
