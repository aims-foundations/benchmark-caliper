  dimension: output_form
  text: Various metrics for automatic translation quality assessment exist, including model-based metrics such as COMET (Rei
    et al., 2020) and BLEURT (Sellam et al., 2020).
- id: Q638
  page: 72
  dimension: output_form
  text: While model-based metrics have shown better correlation with human judgment in recent metrics shared tasks (Freitag
    et al., 2021), they require training and are not easily extended to a large set of low-resource languages.
- id: Q639
  page: 72
  dimension: output_form
  text: Another approach is to use highly approximate metrics based on roundtrip translations such as RttLangIDChrF (Bapna
    et al., 2022), although roundtrip translation may not correlate well with translation quality (Koehn, 2005).
- id: Q640
  page: 72
  dimension: output_form
  text: While such methods are more easily scaled to new languages, they are highly dependent on factors which makes results
    difficult to replicate.
- id: Q641
  page: 72
  dimension: output_form
  text: In this work, we therefore choose not make use of model-based and roundtrip-based metrics, and rely instead on BLEU
    and chrF++.
- id: Q642
