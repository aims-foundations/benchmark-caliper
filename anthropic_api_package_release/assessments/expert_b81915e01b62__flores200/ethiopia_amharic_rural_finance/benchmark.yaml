- id: Q8
  page: 5
  dimension: input_content
  text: We begin by creating Flores-200, a many-to-many multilingual dataset that allows us to measure translation quality
    through any of the 40,602 total translation directions.
- id: Q9
  page: 5
  dimension: input_content
  text: We developed a distillation-based sentence encoding technique, LASER3 (Heffernan et al., 2022), that helped us mine
    web data to create parallel datasets for low-resource languages.
- id: Q10
  page: 5
  dimension: input_content
  text: Using both mined data and a set of human-translated seed data, we trained multilingual Mixtures-of-Experts models
    with state of the art performance.
- id: Q11
  page: 5
  dimension: output_form
  text: Despite doubling the number of languages, our final model performs 40% better than the previous state of the art on
    Flores-101.
- id: Q12
  page: 5
  dimension: output_ontology
  text: To detect and prevent potentially harmful translations that are hallucinated by the translation models, we created
    a dataset of toxic words for all 200 languages by combining automatic and
- id: Q13
  page: 5
  dimension: input_ontology
  text: Finally, developing translation models for low-resource languages requires the existence of high-quality, human-translated
    evaluation benchmarks.
- id: Q14
  page: 5
  dimension: output_content
  text: The latter techniques are often plagued by noise and biases, making it difficult to validate the quality of the created
    datasets (Kreutzer et al., 2022).
- id: Q15
  page: 6
  dimension: output_form
  text: We proposed and conducted human evaluations on many languages our models cover, in addition to the common automatic
