coverage_strengths:
- user_priority: Amharic as primary target language
  benchmark_coverage: 'AFRIDOC-MT explicitly includes Amharic as one of its five target languages,

    and the paper documents Amharic-specific processing decisions including increased

    token limits to handle the Ethiopic script [Q162] and analysis of token-count

    profiles [Q127, Q33]. Inter-annotator agreement for Amharic is separately

    reported (α = 0.46) [Q211], and Amharic translation performance is tracked

    across all model and domain conditions [Q206].

    '
  dimension: input_form
- user_priority: Health-domain translation for MOH distribution
  benchmark_coverage: 'The benchmark dedicates 334 documents (approximately 10,000 sentences) to the

    health domain sourced from WHO articles [Q22, Q80], and evaluation tables are

    separately reported for health and technology domains [Q226, Q228, Q230].

    The health domain is thus the primary domain of the benchmark, directly matching

    the deployment''s focus on WHO-level health prose.

    '
  dimension: input_content
- user_priority: Document-level translation fidelity (not only sentence-level)
  benchmark_coverage: 'AFRIDOC-MT was explicitly designed to advance beyond sentence-level MT by

    evaluating document-level and pseudo-document-level translation [Q3, Q15],

    with cohesion phenomena (lexical and grammatical cohesion errors) defined as

    explicit scoring dimensions [Q185, Q186, Q187, Q188]. This directly matches

    the deployment''s need to evaluate context-dependent phenomena across full

    clinical documents.

    '
  dimension: output_ontology
- user_priority: Multi-metric evaluation including automatic and human assessment
  benchmark_coverage: 'The benchmark employs a layered evaluation strategy combining d-BLEU, d-chrF

    with bootstrap confidence intervals [Q51, Q52], GPT-4o-as-judge for fluency

    and cohesion errors [Q54, Q55], and human direct assessment on a 0–100 scale

    using the ESA protocol [Q195, Q196]. chrF is specifically prioritized for its

    morphological richness capture in African languages including Amharic [Q53].

    '
  dimension: output_form
- user_priority: Faithfulness to source meaning as a quality criterion
  benchmark_coverage: 'Content errors (CE) — defined as incorrect translations, omissions, and

    additions — are explicitly operationalized as a scored dimension in the

    GPT-4o-as-judge protocol [Q183, Q184], providing a proxy for faithfulness to

    source meaning that partially aligns with the deployment''s quality requirements.

    '
  dimension: output_ontology
coverage_gap_analysis:
- user_priority: MOH/EFDA glossary compliance as primary success criterion
  benchmark_coverage: 'NOT DOCUMENTED — The benchmark''s scoring functions (d-BLEU, d-chrF, GPT-4o

    fluency/CE/LE/GE, human DA) are all agnostic to institutionally approved

    terminology lists. No mechanism exists to measure compliance with MOH or EFDA

    glossaries. The planned terminology harmonization step [Q121] during translation

    is described only as a list to be shared with translators; there is no evidence

    it was implemented or that scores capture glossary conformance.

    '
  gap_type: full
  web_search_target: Ethiopia Ministry of Health EFDA approved medical terminology glossary Amharic translation evaluation
- user_priority: Annotator credentials — MOH-trained clinical translators or Amharic-speaking physicians as ground-truth authority
  benchmark_coverage: 'PARTIAL — Four Amharic translators are named [Q109], recruited through a

    native-speaking language coordinator [Q24], and paid $1,250 per 2,500 sentences

    [Q31]. However, the paper documents no professional credentials, institutional

    affiliations, clinical backgrounds, or MOH certification for any translator.

    It is unknown whether any Amharic translator holds MOH clinical translation

    credentials or has been trained under Ethiopia''s Ministry of Health terminology

    standards — the user''s explicitly preferred ground-truth authority.

    '
  gap_type: partial
  web_search_target: Amharic clinical translation credentials Ethiopia MOH health translator qualifications benchmark annotation
- user_priority: Ethiopia-specific clinical content (endemic diseases, referral pathways, regional health bureau structures)
  benchmark_coverage: 'NOT DOCUMENTED — All source documents are scraped from WHO and Techpoint Africa

    [Q18], and the paper acknowledges that all source material originates in English

    with possible English-centric structural, semantic, and cultural framing [Q105].

    No Ethiopia-specific clinical content (kala-azar, trachoma, regional referral

    pathways, HMIS forms, Ethiopian calendar dates) is represented. The paper

    explicitly notes that Africa''s diversity could not be covered due to cost and

    funding limitations [Q93].

    '
  gap_type: full
  web_search_target: Amharic health MT benchmark Ethiopia-specific clinical terminology endemic disease kala-azar evaluation
- user_priority: Regional Amharic register variation across Tigray, Oromia, Amhara, and Somali bureaus
  benchmark_coverage: 'NOT DOCUMENTED — The benchmark does not address sub-national or regional

    variation in Amharic. All four Amharic translators produce a single reference

    translation; no documentation of regional register variation, dialectal

    differences, or bureau-specific health terminology preferences is provided.

    Inter-annotator agreement for Amharic (α = 0.46) is low [Q211], but this

    is attributed to fine annotation granularity rather than regional dialect

    variation.

    '
  gap_type: full
  web_search_target: Amharic dialect variation regional health terminology Tigray Oromia Somali region Ethiopia NLP benchmark
- user_priority: GPT-4o reliability as judge for Amharic health translation
  benchmark_coverage: 'PARTIAL — The paper explicitly documents that GPT-4o produced inconsistent

    judgments when translating into African languages [Q66, Q67, Q99, Q218, Q219],

    and that its ratings did not align with human evaluation for African-language

    outputs [Q218]. The benchmark consequently deprioritizes GPT-4o-as-judge in

    favor of human DA for African languages [Q68]. This directly applies to Amharic,

    meaning the deployment cannot rely on GPT-4o as a scalable quality proxy for

    its primary target language.

    '
  gap_type: partial
  web_search_target: GPT-4o Amharic translation quality evaluation reliability low-resource language judge alternative
- user_priority: Document-level embedding-based metrics validated for Amharic
  benchmark_coverage: 'NOT DOCUMENTED — No embedding-based metric is validated for Amharic at

    document level. AfriCOMET is excluded from document-level evaluation due to its

    512-token limit [Q175, Q176], and the experimental long-context QE model

    (ModernBERT-based) was trained on Hausa, Xhosa, and Zulu but not Amharic [Q97].

    The paper explicitly acknowledges this gap as an open research area [Q50, Q96].

    '
