  page: 19
  dimension: input_form
  text: Given that the translated documents vary in length in terms of sentences and tokens, and considering the maximum token
    length limitations of the different LLMs used, we adopted a chunking approach for document-level evaluation.
- id: Q124
  page: 19
  dimension: input_form
  text: In this approach, documents were divided into smaller pseudo-documents that fit within the maximum length constraints
    of the models.
- id: Q125
  page: 19
  dimension: input_form
  text: To establish an appropriate chunk size, each document was divided into fixed-size chunks of k sentences, with the
    possibility that the final chunk may contain fewer than k sentences.
- id: Q126
  page: 19
  dimension: input_form
  text: We conducted an initial analysis, testing different values for k (5, 10, and 25), with k=1 serving as our sentence-level
    setup.
- id: Q127
  page: 19
  dimension: input_form
  text: Our analysis revealed that Amharic and Yorùbá—languages with unique characteristics such as non-Latin scripts and
    diacritics, respectively—had the largest average token counts across the tokenizers.
- id: Q128
  page: 19
  dimension: input_form
  text: To accommodate both languages in our experiments, we chose pseudo-documents with k=10.
- id: Q129
  page: 19
  dimension: input_form
  text: However, for the SFT models described in Appendix B.2, we used both k=5 and k=10.
- id: Q130
  page: 19
  dimension: input_ontology
  text: M2M-100 (Fan et al., 2020) is a transformer-based multilingual neural translation model from Meta, trained to translate
    between 100 languages, including several African languages.
- id: Q131
  page: 19
  dimension: input_ontology
  text: 'It has three variants of different sizes: 400M parameters, 1.2B parameters, and 12B parameters.'
- id: Q132
  page: 19
  dimension: input_ontology
  text: For our experiments, we evaluated the 400M and 1.2B variants.
- id: Q133
  page: 19
  dimension: input_ontology
  text: NLLB (NLLB Team et al., 2024) is a model similar to M2M-100, with broader coverage, trained to translate between just
    over 200 languages, including more than 50 African languages.
- id: Q134
  page: 19
  dimension: input_ontology
  text: 'It also has different sizes: 600M, 1.3B, 3.3B, and 54B parameters.'
- id: Q135
  page: 19
  dimension: input_ontology
  text: For this work, we evaluated the first three variants.
- id: Q136
  page: 19
  dimension: input_ontology
  text: MADLAD-400 (Kudugunta et al., 2023) is a multilingual translation model based on the T5 architecture (Raffel et al.,
    2020), covering 450 languages, including many African languages.
- id: Q137
  page: 19
  dimension: input_content
  text: It was trained on data collected from the Common Crawl dataset.
- id: Q138
  page: 19
  dimension: input_content
  text: The dataset underwent a thorough self-audit to filter out noisy content and ensure its quality for training MT models.
- id: Q139
  page: 19
  dimension: input_ontology
  text: Toucan (Elmadany et al., 2024; Adebara et al., 2024) is another multilingual but Afro-centric translation model based
    on the T5 architecture, covering 150 language pairs of African languages.
- id: Q140
  page: 19
  dimension: input_content
  text: It was first pre-trained on large multilingual texts covering over 500 African languages and then finetuned on translation
    task covering over 100 language pairs.
- id: Q141
  page: 20
  dimension: input_ontology
  text: Aya-101 (Üstün et al., 2024) is an instruction-tuned mT5 model (Xue et al., 2021) designed to handle both discriminative
    and generative multilingual tasks. With 13B parameters, it covers 100 languages and is capable of translating between
    a wide range of languages, including African languages.
- id: Q142
  page: 20
  dimension: input_ontology
  text: Gemma2 (Gemma Team et al., 2024) is a decoder-only LLM trained on billions of tokens sourced from the web. The training
    data primarily consists of English-language text, but it also includes code and mathematical content. While Gemma2 has
    an English-centric focus, it also possesses multilingual capabilities. We evaluate the base Gemma2 model with 9B parameters,
    as well as its instruction-tuned version.
- id: Q143
  page: 20
  dimension: input_ontology
  text: LLama3.1 (Dubey et al., 2024) is another decoder-only LLM trained on trillions of tokens across multiple languages.
    It was fine-tuned using existing instruction datasets as well as synthetically generated instruction data to create its
    instruction-tuned version. One advantage LLama3.1 has over other models is its context window of 128K tokens, the largest
    among all models considered in this work, making it particularly suitable for document-based tasks such as document-level
    translation. We evaluate the base LLama3.1 model with 8B parameters, as well as its instruction-tuned version.
- id: Q144
  page: 20
  dimension: input_ontology
  text: LLaMAX3 (Lu et al., 2024) is a multilingual LLM built on the LLama3 with 8B parameters as its base. It was trained
    on 102 languages, including several African languages, through continued pretraining. Using an English instruction dataset
    (Alpaca), it was further fine-tuned to create LLaMAX3-Alpaca. We evaluated both models and compared their performance
    across various tasks.
- id: Q145
  page: 20
  dimension: input_form
  text: We perform supervised fine-tuning to tailor LLMs for translation tasks. To train sentence-level MT systems, we use
    all parallel sentences from AFRIDOC-MT to construct the training set, enabling the LLMs to translate across multiple directions
    and domains. Following Zhu et al. (2024b), we augment the parallel data with translation instructions, which are randomly
    sampled from a predefined set of 31 MT instructions for each training example.
- id: Q146
  page: 21
  dimension: input_form
  text: To train document-level MT systems, we follow the same process, but train on longer segments formed by concatenating
    multiple sentences.
- id: Q147
  page: 21
  dimension: input_form
  text: When fine-tuning, we use a learning rate of 5e−6 and an effective batch size of 64.
- id: Q148
  page: 21
  dimension: input_ontology
  text: Models are trained for only one epoch, as further training does not result in improvements and may even lead to performance
    degradation.
- id: Q149
  page: 21
  dimension: input_form
  text: we fine-tuned the 1.3B version of NLLB-200 for sentence and pseudo-document (with 10 sentences) translation using
    the Fairseq (Ott et al., 2019) codebase.
- id: Q150
  page: 21
  dimension: input_content
  text: We used all the training examples from 30 language directions across both domains.
- id: Q151
  page: 21
  dimension: input_form
  text: The model was fine-tuned for 50k steps using a learning rate of 5e−5, token batch size of 2048 and a gradient accumulation
    of 2.
- id: Q152
  page: 21
  dimension: input_form
  text: The checkpoint with the lowest validation loss was selected as the best model for evaluation.
- id: Q153
  page: 21
  dimension: output_form
  text: The models were evaluated using different tools. For example, both the NLLB-200 and M2M-100 models were evaluated
    with the Fairseq codebase, while Toucan and MADLAD-400 were evaluated using the Hugging Face (HF) codebase.
- id: Q154
  page: 21
  dimension: output_form
  text: All other LLMs, including LLama3.1 (both instruction-tuned and SFT models), Gemma, and Aya-101, were evaluated using
    EleutherAI LM Evaluation Harness (lm-eval) tool (Biderman et al., 2024).
- id: Q155
  page: 21
  dimension: output_form
  text: In all cases, greedy decoding was used.
- id: Q156
  page: 21
  dimension: input_form
  text: The models evaluated have different context lengths. For encoder-decoder models, M2M-100 and NLLB have a maximum sequence
    length of 1024 and 512 respectively.
- id: Q157
  page: 21
  dimension: output_form
  text: Aya-101 and MADALAD, based on the T5 architecture, do not have a pre-specified maximum sequence length, so we fixed
    their maximum sequence length to 1024 for all experiments involving encoder-decoder models.
- id: Q158
  page: 21
  dimension: input_form
  text: However, for decoder-only models, Gemma and LLaMAX3 (based on LLama3) have a maximum sequence length of 8192, while
    LLama3.1 has a maximum sequence length of 128K.
- id: Q159
  page: 21
  dimension: output_form
  text: Since all the decoder-only models were evaluated using LM Evaluation Harness, we used a similar setup for them, selecting
    the maximum length based on the specific needs of each model.
- id: Q160
  page: 21
  dimension: input_form
  text: These numbers were chosen based on the statistics from Table 11.
- id: Q161
  page: 21
  dimension: input_form
  text: However, for Amharic, when translating pseudo-documents with 25 sentences and full documents, there were instances
    exceeding the 95th percentile derived from the training statistics.
- id: Q162
  page: 21
  dimension: input_form
  text: Therefore, we increased the token limit specifically for Amharic.
- id: Q163
  page: 21
  dimension: output_form
  text: While the translation models we evaluated do not require prompts, MADLAD-400, requires a prefix of the form <2xx>
    token, which is prepended to the source sentence.
- id: Q164
  page: 21
  dimension: output_form
  text: Similarly, Toucan uses just the target language ISO-693 code as prefix, which is prepended to the source sentence
