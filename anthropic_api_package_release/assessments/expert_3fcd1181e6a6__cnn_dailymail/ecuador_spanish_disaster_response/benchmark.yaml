name: cnn_dailymail_rc
full_name: Teaching Machines to Read and Comprehend (CNN/Daily Mail Reading Comprehension Benchmark)
source_url: https://github.com/deepmind/rc-data
paper_url: https://arxiv.org/abs/1506.03340
year: 2015
domain: Machine reading comprehension
porting_strategy: none
languages:
- en
primary_region: United States / United Kingdom
description: 'The CNN/Daily Mail Reading Comprehension benchmark introduced a large-scale supervised

  dataset for machine reading comprehension, consisting of approximately one million

  document–query–answer triples derived from CNN and Daily Mail news articles. Cloze-style

  queries are generated by replacing a named entity in a bullet-point summary with a

  placeholder; a coreference-based entity anonymization procedure ensures that answers

  can only be inferred from document context, not world-knowledge co-occurrence statistics.

  The benchmark evaluates neural architectures (Deep LSTM Readers, Attentive Readers,

  Impatient Readers) alongside frame-semantic and distance-based baselines on entity

  prediction accuracy over a closed candidate set drawn from each document.

  '
documentation_excerpts: '## Key characteristics relevant to validity analysis


  ### Input Ontology

  The benchmark defines a single unified task type: supervised reading comprehension

  via Cloze-style entity fill-in, formalized as estimating p(a|c, q) over a context

  document, query, and answer [Q10]. The task is explicitly scoped to document-internal

  linguistic relationship detection, with world knowledge and co-occurrence statistics

  deliberately excluded as confounds [Q11, Q17]. The paper taxonomizes model architectures

  across Deep LSTM Readers [Q39, Q44], Attentive Readers, and Impatient Readers [Q54],

  and contrasts traditional NLP pipeline approaches against neural models [Q23, Q24, Q55],

  but does not subdivide the task by content domain, crisis type, or cultural category.

  There are no humanitarian crisis subtasks, no disaster-response categories, no

  socio-political emergency classifications, and no temporal event-sequencing components

  [Q41] — the task is a single-document, single-answer entity lookup.


  For the Ecuador humanitarian deployment, this task taxonomy is entirely misaligned.

  Operational users require coverage of compound and socio-political crises scored by

  population impact and response-gap severity, not entity retrieval from news summaries.

  No benchmark category corresponds to disaster type classification, needs-evolution

  tracking, or timeline generation.


  ### Input Content

  Data is drawn exclusively from two English-language Western news outlets: CNN

  (~93,000 articles) and the Daily Mail (~220,000 articles), spanning April 2007 /

  June 2010 through April 2015 [Q4, Q9, Q14]. Queries are generated fully automatically

  by applying entity detection and anonymization algorithms to machine-extracted

  bullet-point summaries [Q3, Q14, Q16]; no human curation, community sourcing, or

  regional editorial input is involved. The corpus is rooted in US/UK institutional

  news register, Western geographic references, and anglophone journalistic conventions.

  Articles exceeding 2,000 tokens or lacking the answer entity in context were filtered

  out [Q9], and average CNN validation documents contain 763 tokens and 27 entities [Q76].


  For the Ecuador deployment, this content grounding represents a critical gap: the

  source corpus contains zero coverage of Latin American administrative structures,

  Ecuadorian emergency agencies (SGR, Cuerpo de Bomberos), informal disaster-register

  vocabulary, or indigenous-language entity names. The automated label generation

  [Q16] reflects anglophone editorial judgment, not the operational relevance assessments

  of humanitarian field coordinators or affected Ecuadorian communities.


  ### Input Form

  Benchmark inputs are formal, written English text drawn from a structured news domain,

  processed as sequences of tokens fed into Deep LSTM encoders [Q40, Q42, Q43] or

  bidirectional LSTM encoders for attention models [Q46, Q47, Q48]. The entity

  anonymization and random permutation procedure [Q18] replaces all named entities

  with abstract markers (ent5, ent85, etc.), which suppresses lexical surface form in

  favor of structural context. Frame-semantic model variants additionally require

  unanonymized text for PropBank parser compatibility [Q25, Q26, Q28, Q30]. The paper

  notes that anonymization may favor models capable of exploiting syntax over

  semantics [Q56].


  The input form is categorically mismatched with the Ecuador deployment''s tweet stream.

  The deployment processes informal-to-semi-formal Ecuadorian Spanish tweets with

  non-standard orthography, crisis-specific abbreviations, and indigenous-language

  (Kichwa) terms in place and entity names. The anonymization procedure [Q18] would

  entirely suppress the dialect-specific and register-specific entity signals that are

  diagnostically critical for anchoring events to Ecuadorian geographic and institutional

  references. The benchmark''s sensitivity to document length [Q78] — designed for

  documents averaging 763 tokens [Q76] — also raises questions about applicability to

  short, fragmented tweet-length inputs.


  ### Output Ontology

  The benchmark''s implicit output ontology is a closed entity-classification schema:

  the model must select the correct anonymized entity token from the candidate set

  appearing in the context document [Q34], scored by classification accuracy [Q22, Q52].

  No structured label taxonomy, multi-class output schema, or humanitarian category

  hierarchy is described anywhere in the paper — the label space is a vocabulary of

  anonymized entity markers drawn from individual news documents. The paper is entirely

  silent on any output category taxonomy beyond this implicit structure.


  NOT DOCUMENTED: No label ontology, output category schema, or structured decision

  taxonomy beyond entity token prediction is described.


  For the Ecuador deployment, this output ontology has no correspondence to any

  humanitarian coordination output structure. The deployment requires temporally ordered,

  operationally relevant narrative timeline summaries — a fundamentally different output

  structure from token-level entity fill-in. No mapping exists between entity prediction

  accuracy and timeline coherence, operational relevance, or needs-evolution tracking.


  ### Output Content

  NOT DOCUMENTED: The paper contains no human annotation process. Ground-truth labels

  are generated entirely algorithmically by replacing entities in machine-extracted

  bullet-point summaries [Q16]. No annotator demographics, inter-annotator agreement

  statistics, human quality assurance, or community validation procedures are described

  anywhere in the paper. The authors acknowledge that the frame-semantic approach does

  not generalize beyond its parsing phase [Q27] and that many queries remain ambiguous

  or unanswerable even under human evaluation [Q81, Q82, Q83, Q84].


  For the Ecuador deployment, this absence is critical. The authoritative quality standard

  rests with an inter-operational team of field coordinators, social analysts, and domain

  experts who collectively judge relevance and summary quality for Ecuadorian crisis content.

  The benchmark''s automated label generation rooted in anglophone editorial conventions

  provides no approximation of this multi-role humanitarian validation structure.


  ### Output Form

  The benchmark evaluates models on classification accuracy over a closed entity token

  set — a single discrete entity label per query [Q34, Q52]. Multiple evaluation strategies

  are defined including majority-frequency baselines [Q22], word-distance alignment [Q32,

  Q33], frame-semantic rule-based heuristics tuned iteratively on validation data [Q29,

  Q31], and neural models whose output is a probability distribution over document tokens

  [Q49, Q50, Q51]. Performance is reported as accuracy on held-out test sets [Q59], with

  hyperparameters tuned on validation sets [Q58, Q60, Q61, Q62]. Attention heat maps are

  used to interpret model behavior [Q79, Q85, Q86, Q87, Q88], and performance is analyzed

  as a function of document length [Q78].


  For the Ecuador deployment, this output form is categorically mismatched. The deployment

  requires temporally ordered, multi-sentence narrative summaries suited to NGO coordination

  workflows. Entity prediction accuracy [Q34] has no analog in timeline quality assessment,

  and attention visualization [Q88] does not translate to metrics for evaluating timeline

  coherence, geographic anchoring precision, or operational relevance as judged by

  humanitarian coordinators.


  ### Stated Limitations

  The authors acknowledge several relevant limitations. They critique prior synthetic

  data approaches for failing to "capture the complexity, richness, and noise of natural

  language" [Q6] — a criticism that applies with force to the benchmark''s own anonymization

  procedure when evaluated against informal social media. Training corpus limitations are

  acknowledged [Q12, Q13], but the solution remains narrowly scoped to English news.

  The frame-semantic pipeline is flagged for poor coverage due to PropBank parser

  limitations [Q64] and inability to scale to multi-sentence inference [Q66, Q67], with

  predicted worse performance "on other types of machine reading data where questions

  rather than Cloze queries are used" [Q68]. The fixed-width LSTM hidden vector is

  identified as an information bottleneck [Q45], memory constraints limited architectural

  depth [Q69], and ambiguous geographic queries are explicitly flagged as a failure mode

  [Q81, Q82] — particularly for queries where anonymization makes it impossible to

  distinguish between administrative levels. The authors acknowledge that "many queries

  requiring complex inference and long range reference resolution" remain unsolved [Q75],

  and that world knowledge and multi-document queries would require fundamentally different

  architectures [Q74].

  '
verbatim_quotes:
- id: Q1
  page: 1
  dimension: input_ontology
  text: Machine reading systems can be tested on their ability to answer questions posed on the contents of documents that
    they have seen, but until now large scale training and test datasets have been missing for this type of evaluation.
- id: Q2
  page: 1
  dimension: input_ontology
  text: In this work we define a new methodology that resolves this bottleneck and provides large scale supervised reading
    comprehension data.
- id: Q3
  page: 1
  dimension: input_content
  text: We observe that summary and paraphrase sentences, with their associated documents, can be readily converted to context–query–answer
    triples using simple entity detection and anonymisation algorithms.
- id: Q4
  page: 1
  dimension: input_content
  text: Using this approach we have collected two new corpora of roughly a million news stories with associated queries from
    the CNN and Daily Mail websites.
- id: Q5
  page: 1
  dimension: input_content
  text: While obtaining supervised natural language reading comprehension data has proved difficult, some researchers have
    explored generating synthetic narratives and queries [3, 4].
- id: Q6
  page: 1
  dimension: input_content
  text: Historically, however, many similar approaches in Computational Linguistics have failed to manage the transition from
    synthetic data to real environments, as such closed worlds inevitably fail to capture the complexity, richness, and noise
    of natural language [5].
- id: Q7
  page: 1
  dimension: output_form
  text: These models draw on recent developments for incorporating attention mechanisms into recurrent neural network architectures
    [6, 7, 8, 4].
- id: Q8
  page: 1
  dimension: output_content
  text: Karl Moritz Hermann, Tomáš Kočiský, Edward Grefenstette, Lasse Espeholt, Will Kay, Mustafa Suleyman, Phil Blunsom
    are from Google DeepMind and University of Oxford.
- id: Q9
  page: 2
  dimension: input_content
  text: Articles were collected starting in April 2007 for CNN and June 2010 for the Daily Mail, both until the end of April
    2015. Validation data is from March, test data from April 2015. Articles of over 2000 tokens and queries whose answer
    entity did not appear in the context were filtered out.
- id: Q10
  page: 2
  dimension: input_ontology
  text: The reading comprehension task naturally lends itself to a formulation as a supervised learning problem. Specifically
    we seek to estimate the conditional probability p(a|c, q), where c is a context document, q a query relating to that document,
    and a the answer to that query.
- id: Q11
  page: 2
  dimension: input_ontology
  text: For a focused evaluation we wish to be able to exclude additional information, such as world knowledge gained from
    co-occurrence statistics, in order to test a model's core capability to detect and understand the linguistic relationships
    between entities in the context document.
- id: Q12
  page: 2
  dimension: input_content
  text: Such an approach requires a large training corpus of document–query–answer triples and until now such corpora have
    been limited to hundreds of examples and thus mostly of use only for testing [9].
- id: Q13
  page: 2
  dimension: input_content
  text: This limitation has meant that most work in this area has taken the form of unsupervised approaches which use templates
    or syntactic/semantic analysers to extract relation tuples from the document to form a knowledge graph that can be queried.
- id: Q14
  page: 2
  dimension: input_content
  text: We have collected 93k articles from the CNN and 220k articles from the Daily Mail websites. Both news providers supplement
    their articles with a number of bullet points, summarising aspects of the information contained in the article.
- id: Q15
  page: 2
  dimension: input_form
  text: Of key importance is that these summary points are abstractive and do not simply copy sentences from the documents.
- id: Q16
  page: 2
  dimension: output_content
  text: We construct a corpus of document–query–answer triples by turning these bullet points into Cloze [12] style questions
    by replacing one entity at a time with a placeholder. This results in a combined corpus of roughly 1M data points (Table
    1).
- id: Q17
  page: 2
  dimension: input_ontology
  text: Note that the focus of this paper is to provide a corpus for evaluating a model's ability to read and comprehend a
    single document, not world knowledge or co-occurrence.
- id: Q18
  page: 3
  dimension: input_form
  text: To prevent such degenerate solutions and create a focused task we anonymise and randomise our corpora with the following
    procedure, a) use a coreference system to establish coreferents in each data point; b) replace all entities with abstract
    entity markers according to coreference; c) randomly permute these entity markers whenever a data point is loaded.
- id: Q19
  page: 3
  dimension: input_form
  text: Clearly a human reader can answer both queries correctly. However in the anonymised setup the context document is
    required for answering the query, whereas the original version could also be answered by someone with the requisite background
    knowledge.
- id: Q20
  page: 3
  dimension: input_ontology
  text: Therefore, following this procedure, the only remaining strategy for answering questions is to do so by exploiting
    the context presented with each question. Thus performance on our two corpora truly measures reading comprehension capability.
- id: Q21
  page: 3
  dimension: output_ontology
  text: Table 2 gives an indication of the difficulty of the task, showing how frequent the correct answer is contained in
    the top N entity markers in a given document. Note that our models don't distinguish between entity markers and regular
    words. This makes the task harder and the models more general.
- id: Q22
  page: 3
  dimension: output_form
  text: We define two simple baselines, the majority baseline (maximum frequency) picks the entity most frequently observed
    in the context document, whereas the exclusive majority (exclusive frequency) chooses the entity most frequently observed
    in the context but not observed in the query.
- id: Q23
  page: 3
  dimension: input_ontology
  text: Traditionally, a pipeline of NLP models has been used for attempting question answering, that is models that make
    heavy use of linguistic annotation, structured world knowledge and semantic parsing and similar NLP pipeline outputs.
- id: Q24
  page: 3
  dimension: input_ontology
  text: Frame-semantic parsing attempts to identify predicates and their arguments, allowing models access to information
    about "who did what to whom".
- id: Q25
  page: 4
  dimension: input_form
  text: makes use of frame-semantic annotations which we obtained by parsing our model with a state-of-the-art frame-semantic
    parser [13, 14].
- id: Q26
  page: 4
  dimension: input_form
  text: As the parser makes extensive use of linguistic information we run these benchmarks on the unanonymised version of
    our corpora.
- id: Q27
  page: 4
  dimension: output_content
  text: There is no significant advantage in this as the frame-semantic approach used here does not possess the capability
    to generalise through a language model beyond exploiting one during the parsing phase.
- id: Q28
  page: 4
  dimension: input_form
  text: Extracting entity-predicate triples—denoted as (e1, V, e2)—from both the query q and context document d, we attempt
    to resolve queries using a number of rules with an increasing recall/precision trade-off as follows (Table 4).
- id: Q29
  page: 4
  dimension: output_content
  text: Strategies are ordered by precedence and answers determined accordingly. This heuristic algorithm was iteratively
    tuned on the validation data set.
- id: Q30
  page: 4
  dimension: input_form
  text: For reasons of clarity, we pretend that all PropBank triples are of the form (e1, V, e2). In practice, we take the
    argument numberings of the parser into account and only compare like with like, except in cases such as the permuted frame
    rule, where ordering is relaxed.
- id: Q31
  page: 4
  dimension: output_form
  text: In the case of multiple possible answers from a single rule, we randomly choose one.
- id: Q32
  page: 4
  dimension: output_form
  text: We consider another baseline that relies on word distance measurements. Here, we align the placeholder of the Cloze
    form question with each possible entity in the context document and calculate a distance measure between the question
    and the context around the aligned entity.
- id: Q33
  page: 4
  dimension: output_form
  text: We tune the maximum penalty per word (m = 8) on the validation data.
- id: Q34
  page: 4
  dimension: output_ontology
  text: 'We propose three neural models for estimating the probability of word type a from document d answering query q: p(a|d,
    q) ∝ exp (W(a)g(d, q)), s.t. a ∈ V, where V is the vocabulary, and W(a) indexes row a of weight matrix W and through a
    slight abuse of notation word types double as indexes.'
- id: Q35
  page: 4
  dimension: input_ontology
  text: Note that we do not privilege entities or variables, the model must learn to differentiate these in the input sequence.
- id: Q36
  page: 4
  dimension: input_form
  text: The function g(d, q) returns a vector embedding of a document and query pair.
- id: Q37
  page: 4
  dimension: input_ontology
  text: Long short-term memory (LSTM, [18]) networks have recently seen considerable success in tasks such as machine translation
    and language modelling [17].
- id: Q38
  page: 4
  dimension: input_ontology
  text: When used for translation, Deep LSTMs [19] have shown a remarkable ability to embed long sequences into a vector representation
    which contains enough information to generate a full translation in another language.
- id: Q39
  page: 4
  dimension: input_ontology
  text: Our first neural model for reading comprehension tests the ability of Deep LSTM encoders to handle significantly longer
    sequences.
- id: Q40
  page: 4
  dimension: input_form
  text: We feed our documents one word at a time into a Deep LSTM encoder, after a delimiter we then also feed the query into
    the encoder. Alternatively we also experiment with processing the query then the document.
- id: Q41
  page: 4
  dimension: input_ontology
  text: The result is that this model processes each document query pair as a single long sequence. Given the embedded document
    and query the network predicts which token in the document answers the query.
- id: Q42
  page: 5
  dimension: input_form
  text: 'We employ a Deep LSTM cell with skip connections from each input x(t) to every hidden layer, and from every hidden
    layer to the output y(t):'
- id: Q43
  page: 5
  dimension: input_form
  text: Thus our Deep LSTM Reader is defined by g^LSTM(d, q) = y(|d|+|q|) with input x(t) the concatenation of d and q separated
    by the delimiter |||.
- id: Q44
  page: 5
  dimension: input_ontology
  text: The Deep LSTM Reader must propagate dependencies over long distances in order to connect queries to their answers.
- id: Q45
  page: 5
  dimension: input_form
  text: The fixed width hidden vector forms a bottleneck for this information flow that we propose to circumvent using an
    attention mechanism inspired by recent results in translation and image recognition [6, 7].
- id: Q46
  page: 5
  dimension: input_form
  text: This attention model first encodes the document and the query using separate bidirectional single layer LSTMs [19].
- id: Q47
  page: 5
  dimension: input_form
  text: The encoding u of a query of length |q| is formed by the concatenation of the final forward and backward outputs,
    u = −→yq (|q|) || ←−yq (1).
- id: Q48
  page: 5
  dimension: input_form
  text: For the document the composite output for each token at position t is, yd(t) = −→yd(t) || ←−yd(t).
- id: Q49
  page: 5
  dimension: output_form
  text: The representation r of the document d is formed by a weighted sum of these output vectors.
- id: Q50
  page: 5
  dimension: output_form
  text: 'These weights are interpreted as the degree to which the network attends to a particular token in the document when
    answering the query:'
- id: Q51
  page: 5
  dimension: output_form
  text: The variable s(t) is the normalised attention at token t.
- id: Q52
  page: 6
  dimension: output_form
  text: Having described a number of models in the previous section, we next evaluate these models on our reading comprehension
    corpora.
- id: Q53
  page: 6
  dimension: input_ontology
  text: Our hypothesis is that neural models should in principle be well suited for this task.
- id: Q54
  page: 6
  dimension: input_ontology
  text: We expect that the attention-based models would therefore outperform the pure LSTM-based approaches.
- id: Q55
  page: 6
  dimension: input_ontology
  text: Considering the second dimension of our investigation, the comparison of traditional versus neural approaches to NLP,
    we do not have a strong prior favouring one approach over the other.
- id: Q56
  page: 6
  dimension: input_form
  text: The entity anonymisation and permutation aspect of the task presented here may end up levelling the playing field
    in that regard, favouring models capable of dealing with syntax rather than just semantics.
- id: Q57
  page: 6
  dimension: output_form
  text: With these considerations in mind, the experimental part of this paper is designed with a threefold aim. First, we
    want to establish the difficulty of our machine reading task by applying a wide range of models to it. Second, we compare
    the performance of parse-based methods versus that of neural models. Third, within the group of neural models examined,
    we want to determine what each component contributes to the end performance; that is, we want to analyse the extent to
    which an LSTM can solve this task, and to what extent various attention mechanisms impact performance.
- id: Q58
  page: 6
  dimension: output_form
  text: All model hyperparameters were tuned on the respective validation sets of the two corpora.
- id: Q59
  page: 6
  dimension: output_form
  text: Our experimental results are in Table 5, with the Attentive and Impatient Readers performing best across both datasets.
- id: Q60
  page: 6
  dimension: output_form
  text: For the Deep LSTM Reader, we consider hidden layer sizes [64, 128, 256], depths [1, 2, 4], initial learning rates
    [1E−3, 5E−4, 1E−4, 5E−5], batch sizes [16, 32] and dropout [0.0, 0.1, 0.2]. We evaluate two types of feeds. In the cqa
    setup we feed first the context document and subsequently the question into the encoder, while the qca model starts by
    feeding in the question followed by the context document. We report results on the best model (underlined hyperparameters,
    qca setup).
- id: Q61
  page: 6
  dimension: output_form
  text: For the attention models we consider hidden layer sizes [64, 128, 256], single layer, initial learning rates [1E−4,
    5E−5, 2.5E−5, 1E−5], batch sizes [8, 16, 32] and dropout [0, 0.1, 0.2, 0.5].
- id: Q62
  page: 6
  dimension: output_form
  text: For all models we used asynchronous RmsProp [20] with a momentum of 0.9 and a decay of 0.95.
- id: Q63
  page: 7
  dimension: output_ontology
  text: While the one frame-semantic model proposed in this paper is clearly a simplification of what could be achieved with
    annotations from an NLP pipeline, it does highlight the difficulty of the task when approached from a symbolic NLP perspective.
- id: Q64
  page: 7
  dimension: output_ontology
  text: First, the frame-semantic pipeline has a poor degree of coverage with many relations not being picked up by our PropBank
    parser as they do not adhere to the default predicate-argument structure.
- id: Q65
  page: 7
  dimension: input_content
  text: This effect is exacerbated by the type of language used in the highlights that form the basis of our datasets.
- id: Q66
  page: 7
  dimension: output_ontology
  text: The second issue is that the frame-semantic approach does not trivially scale to situations where several sentences,
    and thus frames, are required to answer a query.
- id: Q67
  page: 7
  dimension: output_ontology
  text: This was true for the majority of queries in the dataset.
- id: Q68
  page: 7
  dimension: output_ontology
  text: We expect that on other types of machine reading data where questions rather than Cloze queries are used this particular
    model would perform significantly worse.
- id: Q69
  page: 7
  dimension: output_form
  text: Memory constraints prevented us from experimenting with deeper Attentive Readers.
- id: Q70
  page: 8
  dimension: input_ontology
  text: The supervised paradigm for training machine reading and comprehension models provides a promising avenue for making
    progress on the path to building full natural language understanding systems.
- id: Q71
  page: 8
  dimension: input_ontology
  text: We have demonstrated a methodology for obtaining a large number of document-query-answer triples and shown that recurrent
    and attention based neural networks provide an effective modelling framework for this task.
- id: Q72
  page: 8
  dimension: output_form
  text: Our analysis indicates that the Attentive and Impatient Readers are able to propagate and integrate semantic information
    over long distances.
- id: Q73
  page: 8
  dimension: output_form
  text: In particular we believe that the incorporation of an attention mechanism is the key contributor to these results.
- id: Q74
  page: 8
  dimension: output_ontology
  text: However, the incorporation of world knowledge and multi-document queries will also require the development of attention
    and embedding mechanisms whose complexity to query does not scale linearly with the data set size.
- id: Q75
  page: 8
  dimension: output_ontology
  text: There are still many queries requiring complex inference and long range reference resolution that our models are not
    yet able to answer.
- id: Q76
  page: 8
  dimension: input_form
  text: Note that these examples were chosen as they were short, the average CNN validation document contained 763 tokens
    and 27 entities, thus most instances were significantly harder to answer than these examples.
- id: Q77
  page: 10
  dimension: output_form
  text: The precise hyperparameters used for the various attentive models are as in Table 6. All models were trained using
    asynchronous RmsProp [20] with a momentum of 0.9 and a decay of 0.95.
- id: Q78
  page: 10
  dimension: output_form
  text: To understand how the model performance depends on the size of the context, we plot performance versus document lengths
    in Figures 4 and 5. The first figure (Fig. 4) plots a sliding window of performance across document length, showing that
    performance of the attentive models degrades slightly as documents increase in length. The second figure (Fig. 5) shows
    the cumulative performance with documents up to length N, showing that while the length does impact the models' performance,
    that effect becomes negligible after reaching a length of ~500 tokens.
- id: Q79
  page: 10
  dimension: output_form
  text: We expand on the analysis of the attention mechanism presented in the paper by including visualisations for additional
    queries from the CNN validation dataset below. We consider examples from the Attentive Reader as well as the Impatient
    Reader in this appendix.
- id: Q80
  page: 10
  dimension: input_ontology
  text: Figure 6 shows two positive examples from the CNN validation set that require reasonable levels of lexical generalisation
    and co-reference in order to be answered. The first query in Figure 7 contains strong lexical cues through the quote,
    but requires identifying the entity
- id: Q81
  page: 11
  dimension: output_content
  text: Figures 8 and 9 show examples of queries where the Attentive Reader fails to select the correct answer. The two examples
    in Figure 8 highlight a fairly common phenomenon in the data, namely ambiguous queries, where—at least following the anonymisation
    process—multiple entities are plausible answers even when evaluated manually.
- id: Q82
  page: 11
  dimension: output_content
  text: Note that in both cases the query searches for an entity marker that describes a geographic location, preceded by
    the word "in". Here it is unclear whether the placeholder refers to a part of town, town, region or country.
- id: Q83
  page: 11
  dimension: output_content
  text: Figure 9 contains two additional negative cases. The first failure is caused by the co-reference entity selection
    process. The correct entity, ent15, and the predicted one, ent81, both refer to the same person, but not being clustered
    together. Arguably this is a difficult clustering as one entity refers to "Kate Middleton" and the other to "The Duchess
    of Cambridge".
- id: Q84
