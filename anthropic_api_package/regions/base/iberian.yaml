cultural_norms_notes: |
  - Significant cultural variation between Iberian Peninsula and Latin American countries
  - Regional humor norms differ (Iberian vs. Latin American comedy traditions)
  - Formality levels in language vary (e.g., voseo in Argentina vs. tuteo in Spain)
  - Political and historical sensitivities differ across regions (colonialism,
    dictatorships, indigenous rights)
  - Religious and social norms vary (more secular in Spain/Uruguay, more conservative
    in some Central American countries)

infrastructure_notes: |
  - High internet penetration in Spain, Portugal, and urban Latin America
  - Mobile internet dominant in many Latin American countries
  - Text-based interfaces appropriate given high literacy rates
  - Good NLP tooling availability for Spanish and Portuguese

domain_specific_notes: |
  - Legal systems: Civil law tradition across all countries, but specific laws and
    precedents vary significantly
  - Healthcare: Mix of public and private systems; traditional medicine practices
    in indigenous communities
  - Education: National curricula vary; language of instruction debates (Catalan
    in Catalonia, Basque in Basque Country)
  - Media: Rich tradition of regional journalism, social media, and online discourse
