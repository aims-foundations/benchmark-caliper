# Latin America (Indigenous Focus) - Regional Context for Validity Analysis

name: "Latin America (Indigenous)"
abbreviation: "LatAm-Indig"

countries:
  - Mexico
  - Guatemala
  - Peru
  - Bolivia
  - Ecuador
  - Paraguay
  - Colombia
  - Brazil
  - Chile
  - Argentina

languages:
  major_indigenous:
    - Quechua (Peru, Bolivia, Ecuador - ~10 million speakers)
    - Guarani (Paraguay, Argentina, Brazil - ~6 million speakers)
    - Nahuatl (Mexico - ~2 million speakers)
    - Aymara (Bolivia, Peru - ~2 million speakers)
    - Maya languages (Mexico, Guatemala - ~6 million speakers)
    - Mapudungun (Chile, Argentina)
    - Wayuunaiki (Colombia, Venezuela)
  colonial:
    - Spanish (most countries)
    - Portuguese (Brazil)
  note: "Over 800 indigenous languages across the region. Many are endangered with few speakers. Code-switching between indigenous and colonial languages is common."

writing_systems:
  - Latin alphabet (Spanish, Portuguese, most written indigenous languages)
  - Various indigenous orthographies (Latin-based with adaptations)
  note: "Many indigenous languages were primarily oral; written orthographies are relatively recent and sometimes contested."

literacy_rates:
  Mexico_national: 0.95
  Mexico_indigenous: 0.75
  Peru_national: 0.94
  Peru_indigenous: 0.80
  Bolivia_national: 0.92
  Bolivia_indigenous: 0.78
  Guatemala_national: 0.81
  Guatemala_indigenous: 0.65
  Paraguay_national: 0.94
  note: "Significant literacy gap between national averages and indigenous populations. Many indigenous speakers are literate in Spanish/Portuguese but not in their native language."

cultural_norms_notes: |
  - Cosmovision (worldview) differs fundamentally from Western epistemology in many
    indigenous cultures (e.g., Andean reciprocity/ayni, Maya cyclical time)
  - Oral tradition remains the primary mode of knowledge transmission in many communities
  - Communal land ownership and collective decision-making (asamblea)
  - Buen vivir / sumak kawsay (good living) philosophy in Andean cultures
  - Syncretic religious practices blending indigenous and Catholic traditions
  - Traditional ecological knowledge systems
  - Different concepts of property, time, and social organization
  - Code-switching and translanguaging as normal communicative practice

infrastructure_notes: |
  - Internet access limited in many indigenous communities (rural, mountainous terrain)
  - Mobile phones increasingly available but smartphones less common in remote areas
  - Electricity not universal in remote indigenous communities
  - Speech-based interfaces important given oral tradition emphasis
  - NLP tools for indigenous languages are extremely limited or nonexistent
  - Most AI systems interact with indigenous users through Spanish/Portuguese

domain_specific_notes: |
  - Healthcare: Traditional medicine systems (curanderismo, Andean medicine) widely practiced.
    Health conditions and terminology differ from Global North contexts.
  - Legal: Indigenous legal systems (usos y costumbres) recognized in some countries
    alongside national law. Land rights are a critical domain.
  - Education: Bilingual intercultural education programs exist but quality varies.
    Indigenous knowledge systems not well represented in standardized testing.
  - Agriculture: Traditional farming systems (milpa, waru waru) and ecological knowledge
    highly relevant for agricultural AI applications.
