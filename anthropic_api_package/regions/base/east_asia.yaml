# East Asia - Regional Context for Validity Analysis

name: "East Asia"
abbreviation: "EA"

countries:
  - China
  - South Korea
  - Japan
  - Taiwan
  - Mongolia

languages:
  major:
    - Mandarin Chinese (China, Taiwan)
    - Korean (South Korea)
    - Japanese (Japan)
    - Cantonese (Hong Kong, Guangdong)
  minority:
    - Mongolian
    - Tibetan
    - Uyghur
    - Various Chinese dialects (Wu, Min, Hakka)

writing_systems:
  - Simplified Chinese characters (mainland China)
  - Traditional Chinese characters (Taiwan, Hong Kong)
  - Korean Hangul (+ limited Hanja)
  - Japanese (Kanji + Hiragana + Katakana)
  - Mongolian Cyrillic / traditional Mongolian script
  note: "CJK character sets pose unique NLP challenges (tokenization, character-level vs. word-level)."

literacy_rates:
  China: 0.97
  South_Korea: 0.98
  Japan: 0.99
  Taiwan: 0.99
  Mongolia: 0.98
  note: "Universally high literacy rates. Text-based interfaces fully appropriate."

cultural_norms_notes: |
  - Confucian values (filial piety, social hierarchy, education emphasis) across region
  - Concept of "face" (面子/체면) central to social interactions
  - Collectivism over individualism in many social norms
  - Political sensitivities differ significantly: Chinese censorship norms, Korean
    reunification sensitivity, Japan's wartime history
  - Distinct value systems despite shared Confucian roots (Chinese socialism with
    characteristics, Korean chaebŏl culture, Japanese wa/harmony)
  - Traditional medicine systems (Chinese TCM, Korean hanbang, Japanese kampo)
  - Distinct internet/social media ecosystems (WeChat, Weibo, KakaoTalk, Line)

infrastructure_notes: |
  - Advanced digital infrastructure across the region
  - High-speed internet widely available
  - Smartphone penetration near-universal
  - Strong domestic AI industries and research ecosystems
  - China: domestic AI models and evaluation platforms (distinct from Western ecosystem)
  - South Korea/Japan: advanced but often using Western AI tools

domain_specific_notes: |
  - Legal: Civil law tradition with regional variations. Chinese legal system unique.
    Korean/Japanese systems influenced by German civil law tradition.
  - Healthcare: TCM integrated into healthcare in China. Different drug approval
    systems and medical licensing exams.
  - Education: Highly competitive exam systems (Gaokao, Suneung, Center Test).
    National curricula differ significantly from Western education.
  - History: Contested histories (Japanese colonialism, Korean War, Chinese Civil War)
    make historical knowledge questions particularly sensitive.
