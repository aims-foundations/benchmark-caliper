name: SEA-HELM
full_name: 'SEA-HELM: A Holistic Linguistic and Cultural LLM Evaluation Suite for
  Southeast Asian Languages'
source_url: https://aisingapore.org/sea-helm
paper_url: https://arxiv.org/abs/2501.04694
year: 2025
domain: Regional LLM evaluation for Southeast Asian languages and cultures
porting_strategy: mixed
languages:
- fil
- id
- ta
- th
- vi
primary_region: Southeast Asia
description: 'SEA-HELM is a holistic LLM evaluation suite designed specifically for
  Southeast Asian

  languages and cultures. It is organized around five core pillars: (1) NLP Classics,

  covering NLU, NLG, and NLR tasks; (2) LLM-Specifics, covering instruction-following

  and multi-turn chat; (3) SEA Linguistics (LINDSEA), a handcrafted diagnostic dataset

  targeting syntactic, semantic, and pragmatic phenomena; (4) SEA Culture, including
  the

  KALAHI dataset of culturally-grounded Filipino-language prompts; and (5) Safety.

  SEA-HELM currently supports Filipino, Indonesian, Tamil, Thai, and Vietnamese, and

  has been integrated with the HELM leaderboard infrastructure. New datasets (SEA-IFEval,

  SEA-MTBench, LINDSEA) are released under CC-BY-SA 4.0.

  '
documentation_excerpts: '## Key characteristics relevant to validity analysis:


  ### 1. Input Ontology

  SEA-HELM organizes its evaluation around five core pillars — NLP Classics, LLM-Specifics,

  SEA Linguistics, SEA Culture, and Safety — representing a deliberate and granular
  taxonomy

  of the capabilities expected of LLMs deployed in the SEA region [Q1, Q15, Q60].
  Within

  NLP Classics, the taxonomy further subdivides into three competencies: NLU (question

  answering and sentiment analysis), NLG (translation and summarization), and NLR
  (causal

  reasoning and NLI) [Q17]. LLM-Specifics covers instruction-following (SEA-IFEval)
  and

  multi-turn chat (SEA-MTBench), with the latter organized around categories such
  as

  creative writing, mathematics, STEM, and humanities [Q30]. LINDSEA, the SEA Linguistics

  pillar, targets a "granular taxonomy of syntactic, semantic and pragmatic phenomena"

  handcrafted for SEA languages [Q32]. The SEA Culture pillar addresses culturally-specific

  situations Filipino people may encounter in daily life [Q40]. However, the authors

  acknowledge that SEA-HELM "is not yet exhaustive in its coverage of languages and
  tasks"

  [Q62], and plan future expansion of language, cultural, and task coverage [Q63,
  Q67].

  A notable gap in input ontology is that the cultural pillar currently covers only
  Filipino

  (KALAHI), with Indonesian, Thai, Vietnamese, and Filipino covered for safety tasks
  [Q42],

  leaving Tamil and some other languages underrepresented in the cultural and safety
  pillars.


  ### 2. Input Content

  SEA-HELM grounds its input content firmly in the SEA region. The benchmark serves
  a

  region of nearly 700 million speakers across more than 1,000 languages [Q6], and
  the

  five currently supported languages — Filipino, Indonesian, Tamil, Thai, and Vietnamese
  —

  are drawn from this ecosystem [Q2, Q16]. A foundational data selection principle
  is to

  prefer data originally written in native languages, resorting to careful translation
  by

  native speakers only when native-language originals are unavailable [Q18]. SEA-IFEval

  was manually translated and crucially localised from the English IF-Eval benchmark
  to

  fit linguistic and cultural nuances of SEA languages [Q22]. Manual translations
  were

  verified for linguistic faithfulness, cultural authenticity, and relevance [Q23].
  KALAHI

  consists of 150 high-quality Filipino-language prompts created collaboratively with
  native

  Filipino speakers, representing situations Filipino people can reasonably encounter
  in

  daily life [Q40]. Newly created datasets (SEA-IFEval, SEA-MTBench, LINDSEA) are
  released

  under CC-BY-SA 4.0 [Q12]. The use of translated datasets is flagged as a potential

  concern: "translated datasets often contain elements of translationese (Gellerstam,
  1986),

  which can differ significantly from natively written text" [Q19]. Community participation

  by native speakers at each stage of dataset planning and construction is a stated
  design

  principle [Q13]. Prior cultural evaluation work is critiqued for not starting from

  consulting speaker communities and for relying on aggregate reference sources that
  "cannot

  comprehensively represent the complex nature of culture" [Q37, Q38]; SEA-HELM responds

  with a participatory approach [Q39].


  ### 3. Input Form

  SEA-HELM is a text-based benchmark and explicitly addresses script-level mismatches

  between its constituent inputs and the diverse writing systems of the SEA region.
  SEA-IFEval

  construction involved filtering out instructions inapplicable to SEA scripts — for
  example,

  "prompts asking to change the capitalisation or punctuation do not make sense in
  many scripts

  in the region, such as Burmese, Tamil, or Thai" [Q24]. Letter-count instructions
  were

  converted to number-count instructions to handle non-Latin scripts: e.g., requiring
  a

  specific letter to appear at least six times was adapted to require a specific numeral
  [Q25].

  Each evaluation prompt is given in the target language rather than in English (except
  for

  English tasks) and is manually translated by native speakers [Q46]. An example Vietnamese

  instruction-following prompt is provided in the appendix [Q84], and Indonesian-language

  prompt templates are likewise shown [Q85, Q86]. The instruction-following metric
  penalises

  responses in the wrong language by multiplying accuracy by the rate at which the
  model

  responds in the correct target language [Q27]. LINDSEA examples are handcrafted
  from

  scratch rather than automatically generated, to ensure they "sound natural, are
  semantically

  coherent and target the relevant phenomena effectively" [Q34].


  ### 4. Output Ontology

  SEA-HELM employs distinct output taxonomies tuned to task type. For the SEA Culture
  pillar,

  KALAHI responses are classified as either culturally-relevant (helpful and harmless
  within

  the given culture) or culturally-irrelevant (unhelpful and harmful within a culture)
  [Q87] —

  a binary taxonomy explicitly grounded in cultural context rather than generic helpfulness.

  For LINDSEA syntactic minimal pair tasks, a binary forced-choice label schema (A
  or B) is

  used, while pragmatic reasoning tasks use true/false labels [Q85, Q86]. For multi-turn
  chat

  (SEA-MTBench), judging criteria include accuracy, relevance, and coherence [Q31].
  Instruction-

  following accuracy penalises wrong-language responses, ensuring the output taxonomy
  rewards

  culturally and linguistically appropriate outputs [Q27, Q47]. The authors acknowledge
  that

  "it is not possible to enumerate every type of unsafe response in real-world scenarios"
  [Q68],

  so the safety evaluation taxonomy is framed as necessary but not sufficient [Q69].
  The

  framework''s explicit goal is "fair, transparent, and authentic multilingual and
  multicultural

  evaluations" [Q14], with the output taxonomy designed to reflect regional deployment
  realities

  rather than English-centric defaults.


  ### 5. Output Content

  SEA-HELM makes strong efforts to ground its labels and ground-truth in regional
  stakeholder

  perspectives. The benchmark involves native speakers at each stage of dataset planning
  and

  construction [Q13], and the QA team consists of paid native speakers of SEA languages
  who

  worked as translators and annotators [Q70]. LINDSEA examples are handcrafted by
  linguists

  in collaboration with native speakers and iteratively reviewed [Q34]. Manual translations

  for SEA-IFEval were verified for linguistic faithfulness, cultural authenticity,
  and

  relevance [Q23]. The QA team was recruited through public advertisements, composed

  predominantly of students at local universities and members of the public who are
  adults

  [Q72, Q73]. Participation was voluntary, PII was removed, and participants could
  withdraw

  at any time [Q74, Q75, Q77, Q78]. The project received full IRB approval [Q71].
  Annotator

  demographics are withheld for anonymity but available upon request [Q20]. Workers
  were not

  involved in the construction of sensitive SAFETY pillar data [Q76]. A methodological

  limitation is that leaderboard results are based on single model runs without error
  bars,

  though the authors argue deterministic evaluation (temperature=0) justifies this
  approach

  in line with common benchmark practice [Q64, Q65].


  ### 6. Output Form

  SEA-HELM evaluates text-based model outputs exclusively, appropriate for the target

  languages and their high-literacy written traditions. Instruction-following accuracy

  is computed using the same verifiers as English IF-Eval, then adjusted by the rate

  of correct-language responses [Q27]. Models that fail to append the required answer

  tag are deemed to have given a null response [Q45], enabling efficient automatic

  evaluation at scale even for verbose models. For multiple-choice tasks, answer options

  are extracted via regular expressions and compared against gold labels [Q44]. SEA-MTBench

  uses an LLM-as-a-Judge paradigm with gpt-4-1106-preview as judge, comparing each

  candidate model''s win rate against gpt-3.5-turbo-0125 [Q29, Q31]. Scores are normalized

  by subtracting a random baseline and rescaling to 0–100, with negative scores clamped
  to

  zero [Q49, Q50]. Aggregation proceeds from task level to competency level to language
  level

  to a final SEA average [Q51, Q52]. Instruction-tuned models are evaluated zero-shot;

  pre-trained models use 5-shot examples [Q48].

  '
