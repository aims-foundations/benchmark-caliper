- id: Q1
  text: 'SEA-HELM, a holistic linguistic and cultural LLM evaluation suite that emphasises
    SEA languages, comprising five core pillars: (1) NLP CLASSICS, (2) LLM-SPECIFICS,
    (3) SEA LINGUISTICS, (4) SEA CULTURE, (5) SAFETY.'
  page: 1
  dimension: input_ontology
- id: Q2
  text: SEA-HELM currently supports Filipino, Indonesian, Tamil, Thai, and Vietnamese.
  page: 1
  dimension: input_content
- id: Q3
  text: We also introduce the SEA-HELM leaderboard, which allows users to understand
    models' multilingual and multicultural performance in a systematic and user-friendly
    manner.
  page: 1
  dimension: output_form
- id: Q4
  text: Traditional approaches to NLP evaluation, which emphasise on alignment with
    a predefined ground truth reference, are not sufficient in measuring the complex
    abilities of LLMs.
  page: 1
  dimension: output_ontology
- id: Q5
  text: This gap is further exacerbated in lower-resource languages in South East
    Asia (SEA), owing to a lack of both training and testing data on the internet.
  page: 1
  dimension: input_content
- id: Q6
  text: The SEA region is home to nearly 700 million speakers across more than 1,000
    languages.
  page: 1
  dimension: input_content
- id: Q7
  text: While this region represents almost 10% of the global population and constitutes
    approximately one-seventh of the world's total languages, most of these languages
    remain unsupported by major LLMs, such as Mistral (Mistral AI, 2023) and Claude
    (Anthropic, 2023).
  page: 1
  dimension: input_content
- id: Q8
  text: Yosephine Susanto, Adithya Venkatadri Hulagadri, Jann Railey Montalan, Jian
    Gang Ngui, Xian Bin Yong, Weiqi Leong, Hamsawardhini Rengarajan, Peerat Limkonchotiwat,
    Yifan Mai, William Chandra Tjhi from AI Singapore, National University of Singapore,
    and Center for Research on Foundation Models (CRFM), Stanford University.
  page: 1
  dimension: output_content
- id: Q9
  text: We make the SEA-HELM evaluation code publicly available.
  page: 1
  dimension: output_form
- id: Q10
  text: Over the years, AI practitioners have employed either an individual task-based
    or, more rarely, a holistic approach to assess the performance and capabilities
    of LLMs.
  page: 2
  dimension: input_ontology
- id: Q11
  text: Popular tasks for evaluating LLMs include translation (Hendy et al., 2023),
    summarisation (Zhang et al., 2023), decision-making (Shen et al., 2023), detecting
    scalar implicatures (Jeretic et al., 2020; Pandia et al., 2021; Hu et al., 2023;
    Liu et al., 2023)
  page: 2
  dimension: input_ontology
- id: Q12
  text: We release SEA-IFEval, SEA-MTBench and LINDSEA datasets under the Creative
    Commons Attribution Share-Alike 4.0 (CC-BY-SA 4.0) license.
  page: 2
  dimension: input_content
- id: Q13
  text: We deliberately incorporate community participation by involving native speakers
    of the SEA languages at each stage of the dataset planning and construction to
    ensure linguistic accuracy and cultural authenticity.
  page: 2
  dimension: output_content
- id: Q14
  text: The five pillars are also meticulously and rigorously crafted to achieve fair,
    transparent, and authentic multilingual and multicultural evaluations of LLMs
    in the region.
  page: 2
  dimension: output_ontology
- id: Q15
  text: 'This evaluation suite consists of five core pillars: (1) NLP CLASSICS, (2)
    LLM-SPECIFICS, (3) SEA LINGUISTICS, (4) SEA CULTURE, and (5) SAFETY, and has been
    recently integrated with HELM.'
  page: 3
  dimension: input_ontology
- id: Q16
  text: SEA-HELM currently supports five SEA languages – Filipino, Indonesian, Tamil,
    Thai, and Vietnamese, enabling users and AI practitioners to assess the overall
    performance of LLMs for these languages.
  page: 3
  dimension: input_content
- id: Q17
  text: First, for the Natural Language Understanding (NLU) competency, we include
    QA (extractive question answering) and sentiment analysis tasks. Second, for the
    Natural Language Generation (NLG) competency, we include translation (English
    to native language and native language to English) and abstractive summarisation
    tasks. Third, for the Natural Language Reasoning (NLR) competency, we include
    causal reasoning and natural language inference (NLI) tasks.
  page: 3
  dimension: input_ontology
- id: Q18
  text: We selected datasets that comprised of data originally written in the native
    language as far as possible. Otherwise, existing datasets in English were carefully
    translated by native speakers.
  page: 3
  dimension: input_content
- id: Q19
  text: This is important because translated datasets often contain elements of translationese
    (Gellerstam, 1986), which can differ significantly from natively written text
    (Baker, 1993; Lembersky et al., 2012; Volansky et al., 2015; Riley et al., 2020).
  page: 3
  dimension: input_form
- id: Q20
  text: Annotator demographics are not included in this paper for anonymity, demographics
    can be provided upon request.
  page: 3
  dimension: output_content
- id: Q21
  text: With LLMs enabling unprecedented NLP applications, there is a need to develop
    automated, dedicated evaluation metrics for these higher-order tasks. SEA-HELM
    focuses on two specific capabilities - the ability to follow human
  page: 3
  dimension: output_form
- id: Q22
  text: SEA-IFEval is an instruction-following benchmark we created collaboratively
    with native speakers. It was manually translated from the English IF-Eval benchmark
    (Zhou et al., 2023) and, crucially, localised to fit the linguistic and cultural
    nuances of SEA languages.
  page: 4
  dimension: input_content
- id: Q23
  text: Manual translations ensured faithful and accurate linguistic representation,
    while localisation ensured cultural authenticity and removed any unintended or
    inherent biases. Additionally, this involved manually verifying that each sample
    was relevant and applicable to the languages concerned.
  page: 4
  dimension: output_content
- id: Q24
  text: Specifically, to create the SEA-IFEval dataset, we first filtered out instructions
    that could not reasonably apply to most SEA languages. For example, prompts asking
    to change the capitalisation or punctuation do not make sense in many scripts
    in the region, such as Burmese, Tamil, or Thai.
  page: 4
  dimension: input_form
- id: Q25
  text: We also changed instructions that required inclusion of a stated quantity
    of instances of letters to instead require a stated quantity of instances of numbers
    as it was not easy to localise them for non-Latin scripts. An example of this
    change is to convert the instruction of "[respond] with the letter 'l' appearing
    at least 6 times" to "[respond] with the number '4' appearing at least 6 times.
  page: 4
  dimension: input_form
- id: Q26
  text: Thus, by filtering out and adapting instructions given the SEA context, we
    ensure a fair basis of comparison for the instruction-following competency.
  page: 4
  dimension: input_form
- id: Q27
  text: The accuracy with which LLMs follow the exact instruction following requirements
    is calculated using the same verifiers as those found in the English IF-Eval benchmark
    (Zhou et al., 2023). The model's accuracy is then adjusted to penalise instructions
    that responded in the wrong language by multiplying its accuracy with the rate
    at which it responds in the correct target language.
  page: 4
  dimension: output_form
- id: Q28
  text: SEA-MTBench is a manually translated and localised version of the popular
    MT-Bench dataset (Zheng et al., 2023), which also introduced the paradigm of LLM-as-a-Judge
    to approximate human preferences.
  page: 4
  dimension: input_content
- id: Q29
  text: grading approach, where we compare the win-rate of each candidate model against
    a fixed reference model, namely gpt-3.5-turbo-0125. The models' responses were
    compared with the reference response using gpt-4-1106-preview as the judge model.
    This setup sees the number of judge calls scale linearly with the number of models
    being compared, whereas pairwise comparisons would scale quadratically.
  page: 5
  dimension: output_form
- id: Q30
  text: Models receive an initial prompt based on a category such as creative writing,
    mathematics, STEM or humanities. They are then given a follow-up instruction which
    related to the initial prompt, and are expected to respond appropriately.
  page: 5
  dimension: input_ontology
- id: Q31
  text: Finally, a model's responses to both the initial and follow-up prompts are
    evaluated as a whole given accuracy, relevance, and coherence as judging criteria.
    Results are reported based on each model's average win rate against the reference
    model.
  page: 5
  dimension: output_ontology
- id: Q32
  text: As one of the five core evaluation pillars, LINDSEA (LINguistic Diagnostics
    for SouthEast Asian languages) is a high quality, manually-crafted linguistic
    dataset that systematically diagnoses models' language proficiency and grammatical
    understanding based on a granular taxonomy of syntactic, semantic and pragmatic
    phenomena. It is also the first to be created for SEA languages.
  page: 5
  dimension: input_ontology
- id: Q33
  text: 'The design of LINDSEA is based on three principles: breadth, depth, and quality.'
  page: 5
  dimension: input_ontology
- id: Q34
  text: That is, rather than using a small set of lexical items and grammatical rules
    to automatically generate large numbers of test sentences, the examples in LINDSEA
    are handcrafted from scratch by linguists in collaboration with native speakers
    and reviewed iteratively to ensure that they sound natural, are semantically coherent
    and target the relevant phenomena effectively (quality).
  page: 5
  dimension: output_content
- id: Q35
  text: While there are existing syntactic and semantic diagnostic datasets for English
    (Warstadt et al., 2020; Jeretic et al., 2020; Liu et al., 2023), Mandarin (Xiang
    et al., 2021) and even Japanese (Someya and Oseki, 2023), none yet exist for SEA
    languages, and, to our knowledge, there has yet to be such an extensive coverage
    of linguistic phenomena in any dataset.
  page: 5
  dimension: input_ontology
- id: Q36
  text: Cultural representation and bias have also become increasingly important with
    LLM use (Adilazuarda et al., 2024) since a lack thereof can potentially cause
    social harm (Solaiman et al., 2023).
  page: 5
  dimension: input_content
- id: Q37
  text: Much prior work on analysing or evaluating cultural representation in LLMs
    is created in ways that do not start from consulting the communities of speakers
    of the language but instead starts from reference sources that aggregate cultural
    knowledge, opinions, and values at a population level.
  page: 5
  dimension: output_content
- id: Q38
  text: Such datasets are inherently limited and cannot comprehensively represent
    the complex nature of culture (Causadias, 2020), even if they can capture aggregated
    value alignment.
  page: 6
  dimension: output_content
- id: Q39
  text: Thus, we place emphasis on a strong participatory approach that includes the
    native speaker communities in order to authentically represent the target culture.
  page: 6
  dimension: output_content
- id: Q40
  text: The KALAHI dataset is designed to determine if LLMs can provide culturally-relevant
    responses to culturally-specific situations that Filipino people can reasonably
    encounter in their daily lives, and the dataset is composed of 150 high-quality
    Filipino-language prompts created in collaboration with native Filipino speakers.
  page: 6
  dimension: input_content
- id: Q41
  text: Multilingual inputs, especially when given in lower-resource languages such
    as those in the SEA region, can increase the likelihood that LLMs produce unsafe
    responses (Song et al., 2024; Shen et al., 2024).
  page: 6
  dimension: output_ontology
- id: Q42
  text: Currently, we cover Indonesian, Thai, Vietnamese, and Filipino for this task.
  page: 6
  dimension: input_ontology
- id: Q43
  text: For each task, we opted to be explicit in instructing the LLM to output the
    answer following a specified format.
  page: 6
  dimension: output_form
- id: Q44
  text: The answer can then be extracted using regular expressions and compared against
    the corresponding gold label.
  page: 6
  dimension: output_form
- id: Q45
  text: tag to its answer, the model is deemed to have given a null response. This
    approach allows for more efficient automatic evaluation at scale, even for models
    that may tend to have lengthy outputs.
  page: 7
  dimension: output_form
- id: Q46
  text: It should also be noted that each prompt is given in the target language rather
    than in English (except for the English tasks) and is manually translated by native
    speakers of each language.
  page: 7
  dimension: input_form
- id: Q47
  text: In our view, for full SEA languages support, an LLM should be able to output
    coherent responses and should also be able to correctly interpret native instructions.
  page: 7
  dimension: output_ontology
- id: Q48
  text: Instruction-tuned models were evaluated in a zero-shot manner while pre-trained
    models are evaluated with 5-shot examples.
  page: 7
  dimension: output_form
- id: Q49
  text: As per equation 1, the normalised metric score (snorm) is calculated by subtracting
    the random baseline score (sbaseline) from the raw metric score (sraw). This is
    then divided by the difference between the maximum score (smax) and the random
    baseline score. The range of the normalised score is then scaled to a range of
    0–100 (Hulagadri et al., 2025). For negative normalised score, we set the score
    to 0.
  page: 7
  dimension: output_form
- id: Q50
  text: For multiple-choice task with n options, the baseline score using a random
    strategy is (100/n)%. For open ended questions with a score range between 0–1,
    we set the guessing score to 0% and the best possible score to 100%.
  page: 7
  dimension: output_form
- id: Q51
  text: First, metrics are aggregated at the competency level. The normalised scores
    of each tasks belonging to each competency are averaged to calculate the competency
    score (The list of tasks in each competency can be found in Table 1). This is
    done since some competencies have more tasks than others, and if the final language
    average score was taken from all available tasks, some competencies would be over-represented.
  page: 7
  dimension: output_form
- id: Q52
  text: Next, the language score is calculated by taking the average of the competency
    scores for each language. This provides an indication of how well the models are
    performing at a per-language basis Finally, a SEA average score is calculated
    as the mean of all the language score in SEA-HELM.
  page: 7
  dimension: output_form
- id: Q53
  text: Of all the open-sourced models tested, DeepSeek-R1 was the strongest performing
    model and showed comparable results to gpt-4o-2024-08-06 on the SEA-HELM suite
    (Figure 2a, Table 2).
  page: 8
  dimension: output_form
- id: Q54
  text: Given the large size of DeepSeek-R1 (671B), finding comparisons to other models
    that support SEA languages was not trivial.
  page: 8
  dimension: input_content
- id: Q55
  text: Thus, we chose to focus our discussion on LLMs of sizes ranging between 7-9B
    parameters (See Table 2 for the full list of models) and used both the DeepSeek-R1
    and gpt-4o-2024-08-06 as the reference models for what was the best available
    open-sourced and closed-sourced model respectively.
  page: 8
  dimension: output_form
- id: Q56
  text: We also observe that the gap between the smaller models and the reference
    models is closing, as evidenced by the smaller gap between gpt-4o-2024-08-06 with
    the newer LLaMA model Llama-3.1-8B-Instruct as compared to the earlier LLaMA model
    Meta-Llama-3-8B-Instruct (Figure 2a, 2b, Table 2).
  page: 8
  dimension: output_form
- id: Q57
  text: Notably, continued pre-training and further tuning for the SEA languages resulted
    in this gap closing even further (Figure 2b; llama3.1-8b-cpt-sea-lionv3-instruct
    compared against Llama-3.1-8B-Instruct).
  page: 8
  dimension: output_form
- id: Q58
  text: This suggests that there is still room for improvement and spending the effort
    to train LLMs to target the specific SEA languages can result in models that are
    more suited for the SEA region and thus work better for the region's use cases.
  page: 8
  dimension: input_content
- id: Q59
  text: In conclusion, we introduce SEA-HELM, a holistic evaluation suite that caters
    to the SEA languages and cultures.
  page: 9
  dimension: input_ontology
- id: Q60
  text: 'To achieve a comprehensive evaluation suite, SEA-HELM was designed around
    the following five core pillars: (1) NLP CLASSICS, (2) LLM-SPECIFICS, (3) SEA
    LINGUISTICS, (4) SEA CULTURE, (5) SAFETY.'
  page: 9
  dimension: input_ontology
- id: Q61
  text: Our results show that there are still significant gaps between high-resource
    languages such as English and the mid- to low-resource languages in Southeast
    Asia, including several with official status and millions of speakers.
  page: 9
  dimension: input_content
- id: Q62
  text: While aiming to achieve holistic and authentic evaluations for LLMs in Southeast
    Asia, SEA-HELM is not yet exhaustive in its coverage of languages and tasks.
  page: 9
  dimension: input_ontology
- id: Q63
  text: As we iteratively improve the coverage of the various SEA-HELM pillars, more
    language and cultural coverage will added and refined in the future.
  page: 9
  dimension: input_ontology
- id: Q64
  text: Our leaderboard results are based on single model runs.
  page: 9
  dimension: output_form
- id: Q65
  text: However, as we have assumed deterministic model behaviour and set every model's
    temperature to 0, we did not publish error bars for the results, in line with
    most other benchmarks in the field.
  page: 9
  dimension: output_form
- id: Q66
  text: We recognise that although SEA-HELM currently covers Filipino, Indonesian,
    Tamil, Thai, and Vietnamese, we still have much more work to do and therefore
    we are committed to iteratively expanding each pillar.
  page: 9
  dimension: input_ontology
- id: Q67
  text: Specifically, we plan to expand SEA-HELM to include a broader range of languages,
    cultures, tasks and models to encourage stronger SEA representation in models.
  page: 9
  dimension: input_ontology
- id: Q68
  text: acknowledge that passing our evaluations with a high score is not necessarily
    a guarantee of the safety of an LLM in the SEA context, as it is not possible
    to enumerate every type of unsafe response in real-world scenarios.
  page: 10
  dimension: output_ontology
- id: Q69
  text: Thus, passing the safety evaluations in SEA-HELM must be seen as a necessary
