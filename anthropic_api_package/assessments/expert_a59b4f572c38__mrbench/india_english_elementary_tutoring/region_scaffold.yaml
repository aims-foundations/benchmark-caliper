  in Indian metropolitan areas

  - Metropolitan India has high smartphone penetration relative to rural India, but
  exact device distribution for the school-age target demographic is [NEEDS VERIFICATION]

  - Mobile internet connectivity in Indian metros is generally strong (4G/5G), but
  bandwidth variability during peak usage hours is [NEEDS VERIFICATION]

  - Enterprise software channel suggests some deployments may be school- or institution-mediated,
  with institutional device or network constraints [NEEDS VERIFICATION]

  - Text-based interaction in English only; no speech, image, or multilingual modality
  required by deployment

  - Data localization requirements under India''s personal data protection framework
  may apply: [NEEDS VERIFICATION — current Indian data protection law applicability
  to AI tutoring services for minors]'
