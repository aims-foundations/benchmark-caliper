- id: Q8
  page: 1
  dimension: input_content
  text: Our dataset, code, and models are publicly available.
- id: Q9
  page: 1
  dimension: output_content
  text: Hossein Rajaby Faghihi, Bashar Alhafni, Ke Zhang, Shihao Ran, Joel Tetreault, Alejandro Jaimes
- id: Q10
  page: 1
  dimension: output_content
  text: Michigan State University, New York University Abu Dhabi, Dataminr, Inc.
- id: Q11
  page: 2
  dimension: input_ontology
  text: To the best of our knowledge, this is the first annotated dataset for such an extraction task, while this problem
    has been tackled before in unsupervised settings (Zhang et al., 2018).
- id: Q12
  page: 2
  dimension: input_ontology
  text: Moreover, we focus on the extraction of local crisis events. The term "local" indicates that an event is bound to
    an exact location, such as a building, a street, or a county, and usually lasts for a short period.
- id: Q13
  page: 2
  dimension: input_content
  text: Building a corpus of local crisis events is particularly useful for first responders but also challenging because
    the timelines of these events are often not captured in existing knowledge sources.
- id: Q14
  page: 2
  dimension: input_ontology
  text: This means one has to design mechanisms for automatically detecting and tracking events directly from the Twitter
    stream, which is especially hard for existing clustering methods (Guille and Favre, 2015; Asgari-Chenaghlu et al., 2021)
    given the low number of available tweets for each local event.
- id: Q15
  page: 2
  dimension: input_content
  text: First, the process of identifying and extracting relevant updates for a specific event has to contend with the large
    volume of noise (Alam et al., 2021a) and informal tone (Rudra et al., 2018) compared to other domains such as news.
- id: Q16
  page: 2
  dimension: input_ontology
  text: Additionally, summarizing an on-going event helps toward a quick and better understanding of its progress. This requires
    a good level of abstraction with important details covered and properly presented (e.g., the temporal order of event evolution).
- id: Q17
  page: 2
  dimension: output_form
  text: CrisisLTLSum is the first dataset to provide human-written timeline summaries to support research in this direction.
- id: Q18
  page: 2
  dimension: input_content
  text: CrisisLTLSum is developed through a two-step semi-automated process to create 1,000 local crisis timelines from the
    public Twitter stream.
- id: Q19
  page: 2
  dimension: input_ontology
  text: To our best knowledge, this is the first timeline dataset focusing on "local" crisis events with the largest number
    of unique events.
- id: Q20
  page: 2
  dimension: input_ontology
  text: We propose CrisisLTLSum, which is the largest dataset over local crisis event timelines. Notably, this is the first
    benchmark for abstractive timeline summarization in the crisis domain or on Twitter.
- id: Q21
  page: 2
  dimension: output_form
  text: We develop strong baselines for both tasks, and our experiments show a considerable gap between these models and human
    performance, indicating the importance of this dataset for enabling future research on extracting timelines of crisis
    event updates and summarizing them.
- id: Q22
  page: 2
  dimension: input_ontology
  text: While existing datasets on crisis event timelines (Binh Tran et al., 2013; Tran et al., 2015; Pasquali et al., 2021)
    are limited to a small set of large-scale events, CrisisLTLSum covers a thousand timelines compared to only tens of events
    covered by each of the existing datasets.
- id: Q23
  page: 2
  dimension: input_ontology
  text: Additionally, we further go beyond the simple tweet categorization by enabling the extraction of information that
    include updates over the events' progress.
- id: Q24
  page: 2
  dimension: input_ontology
  text: Timeline summarization (TLS) was firstly proposed in Allan et al. (2001), which extracts a single sentence from the
    news stream of an event topic.
- id: Q25
  page: 2
  dimension: input_ontology
  text: In general, the TLS task aims to summarize the target's evolution (e.g., a topic or an entity) in a timeline (Martschat
    and Markert, 2018; Ghalandari and Ifrim, 2020).
- id: Q26
  page: 2
  dimension: input_ontology
  text: Existing approaches of TLS are mainly based on extractive methods, which are often grouped into several categories.
- id: Q27
  page: 3
  dimension: input_content
  text: This section presents our semi-automated approach to collect CrisisLTLSum. We first extract clusters of tweets as
    noisy timelines and then refine them via human annotation to get clean timelines that only include non-redundant, informative,
    and relevant tweets.
- id: Q28
  page: 3
  dimension: input_form
  text: Figure 2 shows the process for generating a set of noisy timelines starting from the Twitter stream and followed by
    pre-processing and knowledge enhancement steps, the online clustering method, and post-processing & cleaning steps.
- id: Q29
  page: 3
  dimension: input_content
  text: We limit the incoming tweets to specific geographical areas, periods, and domains of interest.
- id: Q30
  page: 3
  dimension: input_content
  text: The location filtering relies on a list of location candidates created by gathering cities, towns, and famous neighborhoods
    in a big area of interest. A tweet is considered relevant to our area of interest if 1) the text mentions one of the candidates,
    2) the geo-tag matches the area of interest, or 3) the user location matches the area of interest.
- id: Q31
  page: 3
  dimension: input_content
  text: To limit the tweets to a specified crisis domain, we curate domain-specific keywords and only select tweets with phrases
    matching one of the keywords. This approach is not comprehensive or exhaustive but somewhat representative of each crisis
    domain.
- id: Q32
  page: 3
  dimension: input_content
  text: The combinations of (area a, domain d, time t) are manually selected so that the events of type d at location a are
    more frequent during time period t.
- id: Q33
  page: 3
  dimension: input_form
  text: We use three different modules. First, we use a pre-trained neural model from AllenNLP (Gardner et al., 2018), trained
    on CoNLL03 (Tjong Kim Sang and De Meulder, 2003), to extract entities with types of people, location, and organization.
- id: Q34
  page: 3
  dimension: input_content
  text: Although this module extracts some important entities in the text, it fails to extract uncommon entities or special
    mentions
- id: Q35
  page: 4
  dimension: input_form
  text: Since location mentions are crucial in extracting local events and existing models have low performance detecting
    them from noisy tweets text, we further developed a BERT-based NER model tuned on Twitter data to detect location mentions.
- id: Q36
  page: 4
  dimension: input_form
  text: Location Augmentation We use OpenStreetMap API to map location mentions to physical addresses.
- id: Q37
  page: 4
  dimension: input_form
  text: This step provides complementary information about each location while reducing the noise introduced by the entity
    extraction module through removing location mentions that are wrongly detected or are not located in the area of interest.
- id: Q38
  page: 4
  dimension: input_ontology
  text: Online Clustering This step aims to mimic the real-life scenario where tweets are sequentially fed into a clustering
    algorithm (Wang et al., 2015).
- id: Q39
  page: 4
  dimension: input_ontology
  text: We further choose this method since this is a lot faster than the retro-spective (all data available at the same time)
    clustering methods for a large pool of input data.
- id: Q40
  page: 4
  dimension: input_ontology
  text: Here, the clustering objective is to group tweets related to the same local event, such as a "fire in building A"
    or a "wildfire in a specific area".
- id: Q41
  page: 4
  dimension: output_form
  text: The online clustering method utilizes a custom similarity metric that combines the similarity of the entities, the
    closeness of locations in the real world, and the existence of shared hashtags.
- id: Q42
  page: 4
  dimension: output_form
  text: The mindist, maxdist, shashtag, and sdist are hyper-parameters of the clustering algorithm.
- id: Q43
  page: 4
  dimension: output_form
  text: We have only used heuristics and a small set of executions to tune these hyper-parameters.
- id: Q44
  page: 4
  dimension: input_ontology
  text: The new tweet is added to the highest matching-score cluster where the similarity score is higher than simthreshold
    and the time elapsed between the new tweet and the last update of the cluster is less than timethreshold.
- id: Q45
  page: 4
  dimension: input_ontology
  text: If the previous criteria are met for none of the clusters, a new cluster is created based on the new tweet.
- id: Q46
  page: 4
  dimension: input_ontology
  text: During this process, we remove inactive clusters whose last update was at least expirationthreshold minutes ago and
    have less than tweetthreshold number of tweets available.
- id: Q47
  page: 4
  dimension: input_ontology
  text: A cluster head is always the tweet with the most entity mentions; In case of a tie, the more recent tweet becomes
    the head of the cluster.
- id: Q48
  page: 4
  dimension: input_ontology
  text: The hyper-parameters of this method is noted in Appendix A.
- id: Q49
  page: 4
  dimension: input_form
  text: Cluster Post-Processing We apply three post-processing steps to improve the quality of the generated clusters.
- id: Q50
  page: 4
  dimension: input_content
  text: First, we manually merge pairs of clusters with a cluster head similarity higher than a threshold headmin.
- id: Q51
  page: 4
  dimension: input_content
  text: This step compensates for some of the errors from missing entities in the pre-processing step, which affects the intermediate
    similarity scores in the clustering algorithm.
- id: Q52
  page: 5
  dimension: input_content
  text: We, authors of this work, manually selected 1,000 clusters that contain enough tweets describing how a crisis event
    evolves, while specifying the "seed tweet" (i.e. the first observed post that describes the ongoing event) of each timeline.
- id: Q53
  page: 5
  dimension: input_ontology
  text: The selected clusters cover events mainly from four crisis domains, including wildfire, local fire, storm, and traffic.
- id: Q54
  page: 5
  dimension: output_content
  text: We use the Amazon Mechanical Turk (MTurk) platform to label and refine the noisy clusters to generate a clean timeline
    and collect the summaries.
- id: Q55
  page: 5
  dimension: output_content
  text: We split the annotation into multiple batches of Human Intelligence Tasks (HITs), where each batch contains timelines
    from the same domain.
- id: Q56
  page: 5
  dimension: output_content
  text: Each HIT contains three noisy timelines, and we collect annotations from 3 different workers on each.
- id: Q57
  page: 5
  dimension: output_content
  text: The workers are given the seed tweet and the subsequent tweets sorted by time, and they were asked to read the tweet
    one by one and answer i) whether the tweet should be part of the timeline, and ii) what is the reason if not.
