  page: 8
  dimension: output_form
  text: This highlights the difficulty of the timeline extraction task and indicates that more involved models are needed
    to close the gap between model performance and human-level performance.
- id: Q98
  page: 8
  dimension: output_form
  text: We evaluate all timeline summarization models with ROUGE (Lin and Och, 2004).
- id: Q99
  page: 8
  dimension: output_form
  text: The summarization output of each model is evaluated in a multi-reference setting against the two summaries written
    by the two workers who agree the most based on the timeline extraction labels.
- id: Q100
  page: 8
  dimension: output_form
  text: We use SacreROUGE (Deutsch and Roth, 2020) to compute multi-reference ROUGE scores.
- id: Q101
  page: 8
  dimension: output_form
  text: 'For the Seq2Seq pretrained models, we present results in two settings: 1) using the oracle timeline; and 2) using
    the extracted timeline from the best timeline extraction model.'
- id: Q102
  page: 8
  dimension: input_form
  text: In the oracle setting, we use the gold labels in the DEV set to identify tweets that are part of each timeline to
    the summarization models.
- id: Q103
  page: 8
  dimension: output_form
  text: We further conducted a human evaluation to better assess the quality of the summaries.
- id: Q104
  page: 8
  dimension: output_form
  text: 'We take the whole TEST set and we evaluate eight summaries per timeline: 1) the three human-written summaries; 2)
    three model-generated summaries using the three models we develop for timeline summarization in the oracle setting; 3)
    two summaries from random systems: a random tweet that is part of the timeline, and a summary from a randomly selected
    timeline that belongs to a different crisis domain.'
- id: Q105
  page: 8
  dimension: output_content
  text: Following a similar process in 3.2, we recruit a group of workers from MTurk with the same Location restriction (QC1),
    who can pass our pilot study as a qualification test.
- id: Q106
  page: 8
  dimension: output_form
  text: 'Each summary was evaluated by five different workers on a scale from 1 to 5 across four axes: Coherence, Accuracy,
    Coverage, and Overall quality, as was done by Lai et al. (2022).'
- id: Q107
  page: 8
  dimension: output_content
  text: Detailed instructions and annotation workflows are presented as Figures 15–21 in Appendix E.
- id: Q108
  page: 8
  dimension: output_form
  text: Looking at the results over all the timelines, the human-written summaries are significantly better than the ones
    generated by models, in terms of overall quality with an average rating of 4.12.
- id: Q109
  page: 9
  dimension: input_content
  text: We presented CrisisLTLSum, the first dataset on local crisis timelines extracted from Twitter and the first to provide
    human-written summaries on information extracted from Twitter.
- id: Q110
  page: 9
  dimension: input_ontology
  text: 'We showed that CrisisLTLSum supports two downstream tasks: Timeline Extraction and Timeline Summarization.'
- id: Q111
  page: 9
  dimension: output_form
  text: Our experiments with SOTA baselines indicate that both of these tasks are challenging and encourage future research.
- id: Q112
  page: 9
  dimension: input_ontology
  text: Our dataset further provides a resource for developing methods on utilizing microblogs toward aiding first-responders
    in evaluating ongoing crisis events.
- id: Q113
  page: 9
  dimension: output_content
  text: For timeline extraction, 66 timelines (77%) have at least one error, in which 272 out of 958 tweets (28%) are wrong.
- id: Q114
  page: 9
  dimension: output_form
  text: We observe that the model performance decreases with increasing timeline length for both timeline extraction and summarization
    tasks, with significant drops in accuracy and ROUGE scores when timelines get longer.
- id: Q115
  page: 9
  dimension: output_form
  text: Most of the summarization errors were due to hallucinations or to copying specific sentences that are present in the
    timeline without covering all the important event details described in the timeline.
- id: Q116
  page: 10
  dimension: output_content
  text: We thank Aoife Cahill for providing detailed feedback on this paper, Alison Smith-Renner and Wenjuan Zhang for helpful
    discussions on MTurk annotations, our colleagues at Dataminr, and the EMNLP reviewers for their helpful and constructive
    comments.
- id: Q117
  page: 10
  dimension: input_content
  text: This study has some limitations on the dataset generation workflow. First, our noisy timeline collection process is
    not a comprehensive and exhaustive extraction to find all available information about a local crisis event. Here, our
    focus is to provide a representative dataset rather performing a comprehensive set containing all the local crisis events
    and their updates.
- id: Q118
  page: 10
  dimension: input_content
  text: Second, the proposed noisy timeline collection pipeline is highly dependent to the performance of the entity extraction
    modules, especially for the location extraction, and the accuracy of the OpenStreetMap API to find the correct physical
    address of each location mention.
- id: Q119
  page: 10
  dimension: input_content
  text: Accordingly, replicating the same process for other language or based on other locations may be hard because of such
    dependencies.
- id: Q120
  page: 10
  dimension: output_form
  text: Furthermore, the online clustering method used in this paper has a set of hyperparameters which are tuned heuristically
    from a small set of experiments. More comprehensive and large scale experiments on tuning those parameters could potentially
    impact the quality of the generated timelines.
- id: Q121
  page: 10
  dimension: input_content
  text: Generating similar results by following our noisy timeline collection process is in general limited by the users'
    access to the public Twitter stream and the changes in the available posts (they may become restricted or deleted).
- id: Q122
  page: 12
  dimension: input_ontology
  text: 'We build CrisisLTLSum by limiting the search to four crisis domains: wildfire, local fire, traffic, and storm.'
- id: Q123
  page: 12
  dimension: input_content
  text: We collect CrisisLTLSum across seven states in the USA and two states of Australia during 2020 and 2021. The selected
    states in the USA are New York, Illinois, Massachusetts, California, Texas, and Florida. From Australia, we have selected
    the states of New South Wales and Victoria.
- id: Q124
  page: 13
  dimension: input_content
  text: These states are selected as they are some of the areas subject to the most events falling into our crisis domains
    of interest. California, Victoria, and New South Wales are mainly selected due to the abundance of wildfires in hot seasons.
    Texas and Florida have been selected as they are both subject to wildfires and storm events during different months. Massachusetts
    and Illinois are selected first because those areas are frequently subjected to bad weather, and second as they contain
    big cities subject to traffic and local fire events alongside New York.
- id: Q125
  page: 13
  dimension: input_form
  text: This step selects the subset of filtered tweets related to a specific crisis category of interest. Ideally, this task
    can be performed by a neural model trained on a large set of tweets with labeled data indicating the categories. However,
    as such a large amount of labeled data is unavailable, we rely on a common approach of designing keywords.
- id: Q126
  page: 13
  dimension: input_content
  text: We carefully curate a keyword list for each of our categories of interest by employing expert knowledge gathered through
    over-viewing crisis stories in news, social media, and related big disaster events of the past.
- id: Q127
  page: 13
  dimension: input_content
  text: Please note that these lists are generic for each category and not specific to unique events. For instance, instead
    of defining keywords specific to an event called "Hurricane Ida", our keywords list includes phrases such as "fallen tree",
    "building collapse", or "storm".
- id: Q128
  page: 13
  dimension: input_content
  text: The quality of the keywords list is crucial to the final quality of the generated timelines, and we polish this list
    multiple times based on small sets of experiments before using them for the final task.
- id: Q129
  page: 13
  dimension: input_form
  text: To avoid making a long list of keywords and ensure that different lexical formats of the same word are still considered
    in the keyword matching process, we maintain both a lower-cased and a lemittized version of the keywords and the tweet's
    text.
- id: Q130
  page: 13
  dimension: input_form
  text: If any of the keywords exist in the text and in any of these formats, then the tweet is considered related to the
    category.
- id: Q131
  page: 13
  dimension: input_form
  text: The multi-word keywords are not considered n-grams but as an indication that all the words in the keyword should exist
    in the text, even if not as a sequence.
- id: Q132
  page: 13
  dimension: input_content
  text: This approach will not be comprehensive or exhaustive but rather representative of each crisis domain. Improving this
    method to be more encompassing is an area for future research.
- id: Q133
  page: 13
  dimension: input_form
  text: 'We use the following parameters shared among all different domains: shashtag is set to 0.2 and sdist is 0.3. The
    simthreshold and timethreshold are set to 0.7 and 15 hours respectively. The timethreshold is reduced to 3 hours to avoid
    merging various accidents at different times but in the same location. The mindist and maxdist are set to 0.4 kilometer
    and 4 kilometer for fire and traffic events while having the larger range of 0.4 and 10 kilometers for the wildfire and
    storm extraction. The expirationthreshold is set to 15 hours and tweetthreshold is 4.'
- id: Q134
  page: 13
  dimension: input_content
  text: The online clustering approach may fail to properly relate some tweets due to missing entities, clustering method
    hyper-parameters, or the difference in the description of various angles of the same story.
- id: Q135
  page: 13
  dimension: output_content
  text: To address this, we merge clusters by comparing all cluster heads with each other and combining those with a higher
    similarity score than a threshold shead. Additionally, we use human feedback to merge clusters where their similarity
    score is below shead but higher than a second hyper parameter s min head.
- id: Q136
  page: 13
  dimension: input_form
  text: Here, the goal is to remove tweets from the same cluster with identical or similar text. The duplicate removal relies
    on a fuzzy string sequence-matching technique to compute the similarity between a pair of tweets. We simply go over each
    tweet sorted in chronological order and remove the ones that match any of the previous tweets in the same cluster with
    a matching score higher than dmatch.
- id: Q137
  page: 13
  dimension: input_content
  text: Although the keyword filtering step would reduce the number of tweets unrelated to the category of interest, this
    step aims to further remove the unrelated clusters generated from the pipeline.
- id: Q138
  page: 14
  dimension: input_content
  text: Our goal is to select 1000 clusters that contain enough tweets describing an evolving crisis event.
- id: Q139
  page: 14
  dimension: input_content
  text: In particular, we first identify a "seed tweet" as the first observed post mentioning a local crisis event, then roughly
    check whether the following tweets in the cluster contain updates about the same event.
- id: Q140
  page: 14
  dimension: input_ontology
  text: We select clusters across four crisis domains, including wildfire, fire, storm, and traffic, depending on how frequently
    each type of event happens in extracted noisy clusters.
- id: Q141
  page: 14
  dimension: output_form
  text: We fine-tune BERT base uncased on a single GPU for 10 epochs with a learning rate of 5e-5, batch size of 32, a seed
    of 42, and a maximum sequence length of 512.
- id: Q142
  page: 14
  dimension: output_form
  text: The GRU has one layer with a hidden size of 128. The model was trained for 50 epochs with early stopping after five
    epochs if the performance did not improve on the DEV set. We use a learning rate of 5e-5, a batch size of 16, and a seed
    of 42.
- id: Q143
  page: 14
  dimension: output_form
  text: We fine-tune BART based on a single GPU for ten epochs with a learning rate of 5e-5, batch size of 16, a seed of 42,
    and a maximum target sequence length of 512.
- id: Q144
  page: 14
  dimension: output_form
  text: During inference, we use beam search with a beam size of 4.
- id: Q145
  page: 14
  dimension: output_content
  text: To ensure the workers have a good understanding of the QE dimensions listed in the rubrics, as shown in Figure 18,
    the workers are asked to pass a screening test before they can access the quality rating part of the task interface.
- id: Q146
  page: 15
  dimension: input_content
  text: 'Table 8: Aggregated data statistics based on crisis domains and timeline lengths of the TRAIN, DEV, and TEST splits.'
- id: Q147
  page: 15
  dimension: output_content
  text: Once they answer the test question with the correct answer, the rating interface will show up, as shown in Figure
    19.
- id: Q148
  page: 15
  dimension: output_content
  text: In this page, we display the original tweet timeline on the left hand side of the rating interface.
- id: Q149
  page: 15
  dimension: output_content
  text: Before displaying all the summaries and the rating options, to make sure the workers go over the timeline carefully,
    we ask them to use the length of the timeline to answer the last screening question before conducting the rating task.
- id: Q150
  page: 15
  dimension: output_content
  text: The rating part of the interface is shown in Figures 20 and 21.
- id: Q151
  page: 21
  dimension: output_ontology
  text: 'During this task, you will be reading a timeline that consists of a sequence of tweets describing an event and eight
    different summaries for the event in the timeline. You will rate the quality of each of the eight summaries by four axes:
    coherence, accuracy, coverage, and overall quality.'
- id: Q152
  page: 21
  dimension: output_content
  text: The rubrics below give specific guidance on how each axis should be rated. Please read the rubrics carefully before
    continuing to the task.
- id: Q153
  page: 21
  dimension: output_ontology
  text: For each summary, answer the question "how coherent is the summary on its own?" on a scale 1 to 5. A summary is coherent
    if when read by itself, it's easy to understand and free of English errors. A summary is not coherent if it's difficult
    to understand what the summary is trying to say. Generally, it's more important that the summary is understandable than
    it being free of grammar errors.
- id: Q154
  page: 21
  dimension: output_ontology
  text: 'Score of 1: The summary is impossible to understand. Score of 2: The summary has many mistakes or confusing phrasing.
    Score of 3: The summary has some mistakes or confusing phrasing that made it hard to understand. Score of 4: The summary
    is mostly clear with only a few minor mistakes or confusing phrasing. Score of 5: The summary is perfectly clear.'
- id: Q155
  page: 21
  dimension: output_ontology
  text: For each summary, answer the question "Does the factual information in the summary accurately match the information
    in the timeline?" on a scale of 1 to 5. A summary is accurate if it doesn't say things that aren't in the timeline, it
    doesn't mix up information, and generally is not misleading.
- id: Q156
  page: 21
  dimension: output_ontology
  text: 'Score of 1: The summary is completely wrong, made up, or exactly contradicts what is written in the timeline. Score
    of 2: The summary says many things not mentioned in or contradicting the timeline. Score of 3: The summary says at least
    one crucial piece of information that is not in the timeline, or it contradicts something in the timeline. Score of 4:
    The summary says anything at all that is not mentioned in the timeline or contradicts something in the timeline. Score
    of 5: The summary has no incorrect statements or misleading implications.'
- id: Q157
  page: 21
  dimension: output_ontology
  text: For each summary, answer the question "How well does the summary cover the important information in the timeline?"
    on a scale of 1 to 5. A good summary has good coverage if it mentions the main information from the timeline that's important
    to understand the event. A summary has poor coverage if someone reading only the summary would be missing several important
    pieces of information about the event in the timeline.
- id: Q158
  page: 21
  dimension: output_ontology
  text: 'Score of 1: The summary contains no information relevant to the timeline. Score of 2: The summary is missing many
    important pieces of information required to understand the timeline. Score of 3: The summary is missing at least one crucial
    piece of information required to understand the timeline. Score of 4: The summary is missing some important information
    from the timeline. Score of 5: The summary covers all of the important information required to understand the timeline.'
- id: Q159
  page: 21
  dimension: output_ontology
  text: For each summary, answer the question "How good is the summary overall at representing the timeline?" on a scale of
    1 to 5. This encompasses all of the above axes, as well as the information included in the summary and if it has helped
    you understand the event. If it's hard to find ways to make the summary better, give the summary a high score. If there
    are lots of different ways the summary could be better, give the summary a low score.
- id: Q160
  page: 21
  dimension: output_ontology
  text: 'Score of 1: The summary is terrible. Score of 2: The summary is a pretty bad representation of the timeline and needs
    significant improvement. Score of 3: The summary is an okay representation of the timeline, but could be significantly
    improved. Score of 4: The summary is a pretty good representation of the timeline, but it''s not perfect. Score of 5:
    The summary is an excellent representation of the timeline.'
- id: Q161
  page: 21
  dimension: output_content
  text: Now you will review an example timeline and two associated summaries.
- id: Q162
  page: 21
  dimension: output_content
  text: 'For each of the summaries, we have provided ratings on the four axes: coherence, accuracy, coverage, and overall
    quality with explanations for why these ratings were chosen.'
coverage_strengths:
- user_priority: Timeline extraction from social media posts for crisis events
  benchmark_coverage: 'The benchmark is purpose-built for exactly this task: given a seed tweet marking the first mention
    of a crisis event, the extraction task identifies which subsequent tweets represent genuine, non-redundant updates [Q5,
    Q83]. The online clustering mechanism explicitly mimics a real-time stream scenario [Q38], matching the deployment''s
    requirement to monitor and aggregate breaking-crisis social media.

    '
  dimension: input_ontology
- user_priority: Abstractive summarization of event evolution for journalist use
  benchmark_coverage: 'CrisisLTLSum is documented as the first benchmark for abstractive timeline summarization in the crisis
    domain on Twitter [Q20], with human-written reference summaries designed to describe how an event progresses over time
    [Q59]. The summarization task explicitly requires temporal and incremental aggregation of important details [Q6, Q16]
    — closely matching the journalist workflow of synthesizing breaking-news updates into a coherent narrative.

    '
  dimension: input_ontology
- user_priority: Text-only social-media post modality
  benchmark_coverage: 'The benchmark operates exclusively on text tweets from the public Twitter stream [Q2], with no image,
    audio, or structured-data components. This matches the target deployment''s input modality without any cross-modal translation
    requirement.

    '
  dimension: input_form
- user_priority: Quantitative evaluation framework for extraction and summarization quality
  benchmark_coverage: 'The benchmark documents concrete evaluation protocols: average timeline-level accuracy for extraction
    [Q91] and multi-reference ROUGE via SacreROUGE for summarization [Q98, Q100], supplemented by a human evaluation rubric
    with four axes (Coherence, Accuracy, Coverage, Overall Quality) scored on a 1–5 scale [Q106]. These provide at least a
    methodological template that could be adapted for a localized evaluation framework.

    '
  dimension: output_form
- user_priority: Local, geographically bounded event scope
  benchmark_coverage: 'The benchmark''s "local" event definition — an event bound to an exact location such as a building,
    street, or county and usually short-lived [Q12] — aligns structurally with the target deployment requirement for city-
    and neighborhood-level crisis tracking in dense urban environments like Mexico City.

    '
  dimension: input_ontology
