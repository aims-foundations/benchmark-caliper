  text: 'CrisisLTLSum supports two complex downstream tasks: timeline extraction and timeline summarization.'
- id: Q5
  page: 1
  dimension: input_ontology
  text: 'The timeline extraction task is formalized as: given a seed tweet as the initial mention of a crisis event, extract
    relevant tweets with updates on the same event from the incoming noisy tweet stream.'
- id: Q6
  page: 1
  dimension: input_ontology
  text: The timeline summarization task aims to generate abstractive summaries of evolving events by aggregating important
    details from temporal and incremental information.
- id: Q7
  page: 1
  dimension: output_form
  text: Our initial experiments indicate a significant gap between the performance of strong baselines compared to the human
