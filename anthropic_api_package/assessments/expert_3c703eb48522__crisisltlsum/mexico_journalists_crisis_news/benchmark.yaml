  dimension: input_content
  text: We built CrisisLTLSum using a semi-automated cluster-then-refine approach to collect data from the public Twitter
    stream.
- id: Q3
  page: 1
  dimension: output_ontology
  text: A timeline is a chronologically sorted set of posts, where each brings in new information or updates about an ongoing
    event (such as a fire, storm, or traffic incident).
