  benchmark_coverage: 'The benchmark is English-only throughout [Q33, Q35, Q129]. Preprocessing applies

    English lemmatization, lowercasing, and English keyword matching [Q129, Q130].

    NER models are trained on English corpora (CoNLL03 [Q33], English Twitter data

    [Q35]). The authors themselves acknowledge that "replicating the same process for

    other language or based on other locations may be hard because of such dependencies"

