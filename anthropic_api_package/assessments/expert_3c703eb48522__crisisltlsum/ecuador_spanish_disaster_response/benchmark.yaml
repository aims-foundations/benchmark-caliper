  benchmark_coverage: 'All tweet content is drawn from US states and Australian states [Q123]. Location

    filtering uses city/neighborhood lists from Anglo-American areas of interest [Q30].

    Keyword lists were curated from US/Australian crisis contexts [Q126]. No

    Ecuadorian administrative units, local emergency agencies, or Ecuador-specific

