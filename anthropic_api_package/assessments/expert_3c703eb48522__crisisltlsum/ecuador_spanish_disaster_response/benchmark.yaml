    corpus
- user_priority: ROUGE and automated metrics applicability to Spanish-language summaries
  benchmark_coverage: 'ROUGE is computed as English n-gram overlap against English reference summaries

    [Q98, Q99, Q100]. The multi-reference setting uses the two MTurk summaries written

    by workers with the highest extraction agreement [Q87, Q88], all produced in English.

    No documentation of multilingual ROUGE, BERTScore, or Spanish-language evaluation

