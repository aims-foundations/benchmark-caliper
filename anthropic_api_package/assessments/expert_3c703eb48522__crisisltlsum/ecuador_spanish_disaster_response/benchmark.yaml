    '
  gap_type: full
  web_search_target: Ecuadorian Spanish social media NLP crisis informal register Kichwa code-switching disaster emergency
    Twitter
- user_priority: Operational relevance criteria for humanitarian coordinators (road access, informal community broadcasts,
    displacement needs)
  benchmark_coverage: 'The output ontology defines relevance via three criteria — relevant, informative,

    not repetitive [Q58] — calibrated to US crisis-response annotators restricted to

    native English-speaking countries [Q61]. The distinction between "facts" and

    "personal points of view" [Q58] reflects US annotator intuitions. No documentation

    exists of how operational relevance for humanitarian field coordinators (e.g.,

    informal community broadcasts as critical displacement signals) was considered or

    validated. The rubric defines Coherence in terms of English grammar [Q153],

    inapplicable for Spanish summaries.

    '
  gap_type: full
  web_search_target: humanitarian social media annotation guidelines Red Cross UN OCHA crisis relevance judgment Latin America
    Ecuador disaster response
- user_priority: Inter-operational ground truth from Ecuadorian field coordinators, social analysts, and domain experts
  benchmark_coverage: 'All annotation was performed by MTurk workers restricted to native English-speaking

    countries [Q61], with quality checked against expert labels from the authoring team

    [Q64]. No humanitarian practitioners, Spanish speakers, Latin American stakeholders,

    or indigenous-language speakers participated at any annotation stage. Inter-annotator

