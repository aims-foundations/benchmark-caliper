  text: 'For 125 randomly-selected prompts (62 toxic and 63 non-toxic), we generate two statements: one with ALICE and one
    without (top-k).'
- id: Q86
  page: 8
  dimension: output_content
  text: We then collect annotations for the 250 statements using the setup described in §4.1, and get toxicity scores from
    HateBERT.
- id: Q87
  page: 8
  dimension: output_form
  text: We find that for top-k sampled sentences, the prompt label indeed matches the desired label (95.2% of non-toxic examples
    and 67.7% of toxic examples).
- id: Q88
  page: 8
  dimension: output_form
  text: For ALICE, 40.3% of toxic examples match the prompt label and 92.1% of non-toxic examples match.
- id: Q89
  page: 8
  dimension: output_form
  text: We also find that ALICE succeeds in fooling HateBERT (26.4% of ALICE-decoded sentences fool HateBERT vs. 16.8% of
    top-k sampled sentences).
- id: Q90
  page: 8
  dimension: output_form
  text: 'Finally, ALICE is effective for detoxifying generated text: the avg. human-annotated toxicity score for ALICE-decoded
    sentences with a toxic prompt is 2.97, compared to 3.75 for top-k.'
- id: Q91
  page: 8
  dimension: output_form
  text: This difference is statistically significant with p < 0.001.
- id: Q92
  page: 8
  dimension: output_form
  text: ALICE therefore leads to harder, more ambiguous examples.
- id: Q93
  page: 8
  dimension: output_content
  text: We greatly expand on these findings in Appendix E with a larger scale human evaluation (∼10,000 samples) comparing
    sentences generated with and without ALICE.
- id: Q94
  page: 8
  dimension: input_ontology
  text: To further showcase the usefulness of TOXIGEN, we investigate how it can enhance classifiers' abilities to detect
    human-written and machine-generated implicit toxic language.
- id: Q95
  page: 8
  dimension: output_form
  text: We fine-tune the widely-used HateBERT (Caselli et al., 2021) and ToxDectRoBERTa (Zhou et al., 2021) models on the
    training portion of TOXIGEN, using the prompt labels as proxies for a true toxicity label.
- id: Q96
  page: 8
  dimension: output_form
  text: Then, we compare the performance of the out-of-the-box models to those fine-tuned on TOXIGEN on three publicly available
    human-written datasets (IMPLICITHATECORPUS (ElSherief et al., 2021), the SOCIALBIASFRAMES test set (Sap et al., 2020),
    and DYNAHATE (Vidgen et al., 2021)) as well as the evaluation portion of our machine-generated dataset (TOXIGEN-HUMANVAL).
- id: Q97
  page: 8
  dimension: input_form
  text: To ablate the contribution of each decoding method, we also split TOXIGEN into equal numbers of ALICE-generated and
    top-k-generated examples.
- id: Q98
  page: 8
  dimension: output_form
  text: Our results—see Table 4—show that fine-tuning HateBERT and ToxDectRoBERTa on TOXIGEN improves performance across all
    datasets.
- id: Q99
  page: 8
  dimension: output_form
  text: The improvement on human-written datasets shows that TOXIGEN can be used to improve existing classifiers, helping
    them better tackle the challenging human-generated implicit toxicity detection task.
- id: Q100
  page: 8
  dimension: output_form
  text: Fine-tuned HateBERT performs strongly on TOXIGEN-HUMANVAL, demonstrating that our data can successfully help guard
    against machine-generated toxicity.
- id: Q101
  page: 8
  dimension: input_content
  text: In this work, we used a large language model to create and release TOXIGEN, a large-scale, balanced, and implicit
    toxic language dataset far larger than previous datasets, containing over 274k sentences, and is more diverse, including
    mentions of 13 minority groups at scale.
- id: Q102
  page: 9
  dimension: input_form
  text: The generated samples are balanced in terms of number of benign and toxic samples for each group.
- id: Q103
  page: 9
  dimension: output_form
  text: We proposed ALICE, an adversarial decoding scheme to evaluate robustness of toxicity classifiers and generate sentences
    to attack them, and showed the effectiveness of ALICE on a number of publicly-available toxicity detection systems.
- id: Q104
  page: 9
  dimension: output_content
  text: 'We also conducted a human study on a subset of TOXIGEN, verifying that our generation methods successfully create
    challenging statements that annotators struggle to distinguish from human-written text: 90.5% of machine-generated examples
    were thought to be human-written.'
- id: Q105
  page: 9
  dimension: input_content
  text: While the purpose of our work is to curate diverse and effective hate speech detection resources, our methods encourage
    a large language model to make its generation more toxic.
- id: Q106
  page: 9
  dimension: input_ontology
  text: Our ultimate aim is to shift power dynamics to targets of oppression. Therefore, we do not consider identity dimensions
    that are historically the agents of oppression (e.g., whiteness, heterosexuality, able-bodied-ness).
- id: Q107
  page: 9
  dimension: output_content
  text: Please also note that there is still a lot that this dataset is not capturing about toxic language. Our annotations
    might not capture the full complexity of these issues related to human experiences.
- id: Q108
  page: 9
  dimension: output_content
  text: Still, toxicity is inherently subjective (Sap et al., 2021).
- id: Q109
  page: 9
  dimension: output_content
  text: We thank Azure AI Platform and Misha Bilenko for sponsoring this work and providing compute resources, Microsoft Research
    for supporting our large scale human study, and Alexandra Olteanu for her feedback on human evaluation.
- id: Q110
  page: 15
  dimension: output_content
  text: In addition to the human-validated evaluation set described in Section 4, we obtain labels for 8,960 randomly sampled
    training examples using the same annotation framework and pool of MTurk workers.
- id: Q111
  page: 15
  dimension: input_content
  text: This sample is evenly split between top-k and ALICE generated texts (50.9% for top-k, 49.1% for ALICE).
- id: Q112
  page: 15
  dimension: input_content
  text: Please note that the samples are drawn randomly from TOXIGEN training data and we did not enforce having the same
    prompt for top-k and ALICE.
- id: Q113
  page: 15
  dimension: output_form
  text: We observe that 66.86% of ALICE-generated texts with a toxic prompt label are actually toxic (compared to 57.91% of
    top-k examples) and 93.21% of ALICE-generated texts with a non-toxic prompt label are actually non-toxic (compared to
    90.01% of top-k examples).
- id: Q114
  page: 15
  dimension: output_form
  text: We also find that ALICE is more effective at generating adversarial language - 58.97% of toxic ALICE-generated examples
    fool HateBERT, compared to 26.88% of toxic top-k generated examples.
- id: Q115
  page: 15
  dimension: output_form
  text: ALICE-generated non-toxic examples also fool HateBERT more often than top-k, though the difference is smaller (15.51%
    of ALICE-generated non-toxic examples vs. 11.35% of top-k generations).
- id: Q116
  page: 15
  dimension: output_form
  text: At least one annotator identified a direct or indirect reference to the exact target group for 70.4% of top-k generated
    examples compared to 78.3% of ALICE-generated examples.
- id: Q117
  page: 15
  dimension: output_content
  text: As we address broadly in Section 7, subjectivity is an area of concern for annotation of toxicity.
- id: Q118
  page: 15
  dimension: output_content
  text: Prior work has pointed out the role that annotators' belief systems and sociodemographic backgrounds play in their
    perception of toxicity (Sap et al., 2019, 2021; Davani et al., 2022).
- id: Q119
  page: 15
  dimension: output_content
  text: Annotators predicted this example to be non-toxic, likely due to not recognizing MGTOW as a misogynistic group.
- id: Q120
  page: 15
  dimension: input_form
  text: Prompt engineering can have significant effects on the quality of text generated by language models.
- id: Q121
  page: 15
  dimension: input_form
  text: Following the lead of other recent works, we use demonstration-based prompting, and introduce demonstrations to encourage
    language models to generate group-mentioning text.
- id: Q122
  page: 16
  dimension: output_ontology
  text: 'We release TOXIGEN as a dataframe with the following fields: prompt contains the prompts we use for each generation.
    generation is the TOXIGEN generated text. generation method denotes whether or not ALICE was used to generate the corresponding
    generation. If this value is ALICE, then ALICE was used, if it is top-k, then ALICE was not used. prompt_label is the
    binary value indicating whether or not the prompt is toxic (1 is toxic, 0 is benign), and therefore the generation should
    be toxic as well. This label is slightly noisy, though largely accurate—as deemed by human annotators. group indicates
    for which group the prompt was generated. Finally, roberta_prediction is the probability predicted by our corresponding
    RoBERTa model for each instance. This field can be used as propagated labels according to this model.'
- id: Q123
  page: 16
  dimension: output_content
  text: We further finetune and release a RoBERTa classifier on the 8,960 human-annotated sampled in TOXIGEN, beginning with
    the weights from (Zhou et al., 2021).
- id: Q124
  page: 16
  dimension: output_form
  text: We run this pretrained model on the full TOXIGEN dataset, collecting its predictions and release them along with TOXIGEN.
    These new labels may serve to correct some mislabeling.
- id: Q125
  page: 16
  dimension: output_form
  text: As expected, when finetuning on each subset individually, performance is strong on their respective evaluation sets.
    Further, without any finetuning, each model performs worse on the ALICE-generated data, indicating ALICE successfully
    generates data that are more confusing to each model.
- id: Q126
  page: 16
  dimension: input_content
  text: All of our generated prompts (26,000) are released with the dataset.
- id: Q127
  page: 18
  dimension: output_form
  text: Average human-validated toxicity scores for training set examples based on prompt label (toxic vs. non-toxic) and
    decoding method (top-k vs. ALICE).
- id: Q128
  page: 18
  dimension: output_form
  text: Comparing the proportion of identity group mentions that were desired based on the prompts vs. that were generated,
    in our large-scale validated training set.
coverage_strengths:
- user_priority: Implicit and adversarial toxicity detection (surface-benign but harmful content)
  benchmark_coverage: 'TOXIGEN was specifically designed to generate implicit toxicity — statements devoid of

    profanity or slurs — because such content is by definition underrepresented in existing

    corpora [Q13]. 98.2% of TOXIGEN statements are implicit [Q5], and ALICE directly targets

    adversarial cases that fool classifiers [Q14, Q50]. This structural emphasis on implicit

    rather than explicit toxicity is directly relevant to the deployment''s prioritization of

    surface-benign, in-group-toxic content.

    '
  dimension: input_ontology
- user_priority: Multi-dimensional, graded toxicity ratings beyond binary classification
  benchmark_coverage: 'TOXIGEN-HUMANVAL employs a 1–5 Likert harmfulness scale [Q58] across multiple annotation

    dimensions including HARMFULINTENT [Q59], POSSTEREO [Q60], LEWD, WHICHGROUP, GROUPFRAMING,

    and FACTOROPINION [Q62], with a three-class mapping (non-toxic / ambiguous / toxic) [Q67].

    This multi-dimensional label schema partially aligns with the deployment''s requirement for

    severity, target-group specificity, and implicitness decomposition.

    '
  dimension: output_ontology
- user_priority: Detecting positive stereotyping as a form of harm
  benchmark_coverage: 'TOXIGEN explicitly encodes POSSTEREO (positive stereotype) as a label dimension in its

    annotation schema [Q60], acknowledging that positive stereotypes cause harm (e.g., model

    minority myths). This offers a structural analogue to the deployment''s need to capture

    harmful content that superficially appears favorable toward a group.

    '
  dimension: output_ontology
- user_priority: Adversarial evaluation of toxicity classifier robustness
  benchmark_coverage: 'ALICE is specifically designed to evaluate classifier robustness by generating adversarial

    examples that fool five publicly available toxicity classifiers [Q18], with large-scale

    adversarial fooling rates of 58.97% for ALICE vs. 26.88% for top-k [Q114]. The framework

    for assessing LLM toxicity-rating behavior under adversarial conditions is methodologically

    transferable, even if the content is U.S.-framed.

    '
  dimension: output_form
- user_priority: Annotator subjectivity and inter-annotator disagreement as validity concern
  benchmark_coverage: 'The authors explicitly flag annotator subjectivity as a core concern [Q108], document that

    annotators'' sociodemographic backgrounds affect toxicity perception [Q118], and report a

    concrete case of cultural-knowledge-gap mislabeling [Q119]. Reported inter-annotator

    agreement of Fleiss'' κ = 0.46 and Krippendorff''s α = 0.64 [Q68] provides a baseline for

    what disagreement levels are observed in comparable implicit toxicity annotation work.

    '
  dimension: output_content
