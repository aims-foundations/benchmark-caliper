  text: Between CrisisLex and CrisisNLP, the performance is higher on CrisisLex dataset for both informativeness and humanitarian
    tasks (1st vs. 4th row in Table 6 for the informativeness, and 10th vs. 13th row for the humanitarian task in the same
    table.).
- id: Q86
  page: 8
  dimension: input_content
  text: This might be due to the CrisisLex dataset being larger than the CrisisNLP dataset.
- id: Q87
  page: 8
  dimension: output_content
  text: The cross dataset (i.e., train on CrisisLex and evaluate on CrisisNLP) results shows that there is a drop in performance.
    For example, there is 14.3% difference in F1 on CrisisNLP data using the CrisisLex model for the informativeness task.
- id: Q88
  page: 8
  dimension: output_ontology
  text: In the humanitarian task, for different datasets in Table 6, we have different number of class labels. We report the
    results of those classes only for which the model is able to classify.
- id: Q89
  page: 8
  dimension: input_ontology
  text: Note that humanitarian task is a multi-class classification problem, which makes it a much more difficult task than
    the binary informativeness classification.
- id: Q90
  page: 8
  dimension: output_form
  text: The transformer based models achieve higher performance compared to the CNN and fastText. We used three transformer
    based models, which varies in the parameter sizes. However, in terms of performance, they are quite similar.
- id: Q91
  page: 8
  dimension: output_form
  text: BERT performs better than or on par with CNN across all classes. More importantly, BERT performs substantially better
    than CNN in the case of minority classes as highlighted in the table.
- id: Q92
  page: 8
  dimension: output_form
  text: The event-aware training improves the classification performance by 1.3 points (F1) using CNN for the humanitarian
    task compared to the results without using event information (see Table 6). However, no improvement has been observed
    for the informativeness task.
- id: Q93
  page: 8
  dimension: input_ontology
  text: The training using event information enables the system to use data of all disasters while preserving the disaster-specific
    distribution.
- id: Q94
  page: 9
  dimension: output_content
  text: Social media data is noisy and it often poses a challenge for labeling and training classifiers.
- id: Q95
  page: 9
  dimension: input_form
  text: Our analysis on publicly available datasets reveals that one should follow a number of steps before preparing and
    labeling any social media dataset, not just the dataset for crisis computing. Such steps include (i) tokenization to help
    in the subsequent phase, (ii) remove exact- and near-duplicates, (iii) check for existing data where the same tweet might
    be annotated for the same task, and then (iv) labeling.
- id: Q96
  page: 9
  dimension: output_form
  text: For designing the classifier, we postulate checking the overlap between training and test splits to avoid any misleading
    performance.
- id: Q97
  page: 9
  dimension: input_form
  text: It is important to emphasize the fact that the results reported in this study are reliable as they are obtained on
    a dataset that has been cleaned from duplicate content, which might have led to misleading performance results otherwise.
- id: Q98
  page: 9
  dimension: input_content
  text: Our initial consolidated datasets (i.e., Table 3 and 4) contains multilingual content with more class labels and different
    types of content (e.g., disease-related), therefore, an interesting future research could be to try different pre-trained
    multilingual models to classify tweets in different languages.
- id: Q99
  page: 9
  dimension: output_form
  text: We observe that performance dropped significantly for the humanitarian task compared to English-only dataset. For
    example, ∼8% drop using BERT model.
- id: Q100
  page: 9
  dimension: input_content
  text: The resulting dataset covers a time-span starting from 2010 to 2017, which can be used to study temporal aspects in
    crisis scenarios.
- id: Q101
  page: 9
  dimension: input_form
  text: We tried to bridge this gap by consolidating existing datasets, filtering exact- and near-duplicates, and providing
    benchmarks based on state-of-the-art CNN, FastText, and transformer-based models.
- id: Q102
  page: 9
  dimension: input_content
  text: The developed consolidated labeled dataset is curated from different publicly available sources.
- id: Q103
