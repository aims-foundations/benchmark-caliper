coverage_strengths:
- user_priority: Top-level disaster classification categories (informativeness, humanitarian type) adequate for Argentine
    triage
  benchmark_coverage: Benchmark implements binary informativeness and multi-class humanitarian type classification across
    166,100 and 141,500 tweets respectively, providing a consolidated, deduplicated, and standardized schema [Q1, Q3, Q23]
  dimension: input_ontology
- user_priority: Text-only input modality matching Argentine deployment channel
  benchmark_coverage: Benchmark is exclusively tweet-text based with standardized preprocessing (tokenization, deduplication,
    language tagging), aligning with text-based input requirements of the deployment [Q38, Q59]
  dimension: input_form
- user_priority: Transformer-based models as foundation for downstream credibility scoring
  benchmark_coverage: Benchmark provides BERT, DistilBERT, and RoBERTa baselines achieving 0.866 F1 (informativeness) and
    0.829 F1 (humanitarian) on consolidated English test set, establishing a strong classification foundation on which credibility
    scoring can be layered [Q84, Q90, Q91]
  dimension: output_form
- user_priority: Temporal breadth of disaster event coverage
  benchmark_coverage: Consolidated dataset covers disaster events from 2010 through 2017 across eight source datasets, providing
    temporal breadth for model training [Q100, Q105]
  dimension: input_content
- user_priority: Label schema transparency and reproducibility for adaptation
  benchmark_coverage: Full label mapping tables are documented for all eight constituent datasets [Q106, Q107, Q108, Q109,
    Q110, Q123, Q124, Q125], and the dataset is released in multiple forms (mapped, duplicate-filtered, experiment-ready)
    to support reproducibility and downstream adaptation [Q13]
  dimension: output_ontology
coverage_gap_analysis:
- user_priority: Spanish-language / Rioplatense social media content (HIGH — Input Content)
  benchmark_coverage: English tweets constitute 94.46% of the informativeness set [Q46]; non-English content is largely confined
    to CrisisLex [Q47]; all classification experiments are English-only [Q59]. No Argentine or Latin American disaster events
    are documented as represented across any of the eight source datasets [Q27, Q28, Q29, Q30, Q31].
  gap_type: full
  web_search_target: CrisisBench Spanish-language Argentine disaster tweets Latin America crisis NLP benchmark
- user_priority: Source credibility and reliability scoring dimension (HIGH — Output Ontology)
  benchmark_coverage: Output space is limited to binary informativeness and multi-class humanitarian type; no credibility,
    misinformation likelihood, or signal-to-noise reliability label is present [Q12, Q18]. User acknowledges this requires
    downstream construction combining model outputs with external metadata [Q2, Q96].
  gap_type: full
  web_search_target: crisis NLP credibility scoring benchmark CREDBANK CrisisMMD TREC-IS veracity disaster social media
- user_priority: Sub-label granularity for Argentine hazard types (pampero, ENSO drought, Río de la Plata flooding, informal-settlement
    impacts)
  benchmark_coverage: Humanitarian taxonomy covers broad ISCRAM-derived categories (infrastructure damage, affected individuals,
    etc.) but does not include sub-labels for regional Argentine hazard types or informal-settlement framing [Q3, Q61]. Some
    rare labels (terrorism, disease) have very low support even in existing taxonomy [Q52, Q53].
  gap_type: full
  web_search_target: ISCRAM humanitarian taxonomy South America Argentina disaster classification sub-labels informal settlements
- user_priority: Annotator demographics and label provenance for Argentine institutional norms (MODERATE — Output Content)
  benchmark_coverage: Annotation process is minimally documented; the only attested detail is that AIDR data was labeled by
    domain experts [Q111]. No annotator demographics, IAA statistics, or cultural calibration are reported for any of the
    seven remaining source datasets. Social media noisiness is acknowledged as a labeling challenge [Q94] but not addressed
    through annotator diversity.
  gap_type: full
  web_search_target: CrisisLex CrisisNLP annotator demographics inter-annotator agreement crowdsourcing crisis dataset annotation
    protocol
- user_priority: Cross-channel generalization from tweets to news articles and press releases (MODERATE — Input Form)
  benchmark_coverage: Benchmark is exclusively tweet-derived; preprocessing pipeline is Twitter-specific (Tweet NLP tokenizer,
    URL/user-ID removal) [Q38]. No evaluation of generalization to longer-form news or institutional press content is documented.
    Pre-trained models trained on non-Twitter text are used [Q65], but this is not framed as a cross-channel transfer study.
  gap_type: full
  web_search_target: crisis NLP tweet to news article transfer domain adaptation disaster classification press release generalization
- user_priority: Aggregated credibility score output form for policy maker consumption (MODERATE — Output Form)
  benchmark_coverage: Benchmark produces discrete classification labels evaluated by weighted F1 [Q75]. No continuous credibility
    score, confidence calibration, or aggregation methodology is provided. Cross-dataset F1 drop of 14.3% [Q87] and transformer
    instability requiring ten re-runs [Q72] further limit reliability of output as a stable foundation for downstream scoring.
  gap_type: partial
  web_search_target: disaster classification credibility aggregation policy maker score F1 calibration reliability humanitarian
    NLP
