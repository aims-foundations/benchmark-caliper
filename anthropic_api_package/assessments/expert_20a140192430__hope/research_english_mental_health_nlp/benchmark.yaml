coverage_strengths:
- user_priority: Individual counseling-style conversations (CBT-compatible modalities)
  benchmark_coverage: All 212 sessions in HOPE are dyadic individual counseling conversations, explicitly distinguished from
    goal-oriented and chit-chat paradigms [Q7, Q8, Q9]. Sessions are lengthy and naturalistic, with ~59 utterances per session
    [Q56], providing rich coverage of the individual counseling interaction structure the user's chatbots emulate.
  dimension: input_ontology
- user_priority: Transformer-based dialogue systems (e.g., SPARTA) for clinical NLP evaluation
  benchmark_coverage: SPARTA is evaluated against six baseline architectures across three modelling categories [Q79, Q80],
    with ablations isolating local context, global context, and speaker-awareness [Q115]. Results are statistically significant
    at >95% confidence [Q88] and consistent across 3-fold cross-validation [Q87], providing a rigorous evaluation protocol
    for transformer-based dialogue systems.
  dimension: output_form
- user_priority: 12 domain-specific dialogue-act labels for counseling NLP
  benchmark_coverage: The 12 DAC labels were co-designed with therapists and counseling experts [Q27] and are explicitly distinguished
    from general-purpose schemes (Switchboard) on domain-specificity grounds. Labels cover the full speaker-initiative/speaker-responsive/general
    hierarchy [Q29, Q32] and are documented at per-label granularity [Q33–Q44], making the output ontology directly usable
    for chatbot dialogue trajectory design.
  dimension: output_ontology
- user_priority: Speaker role as a structurally significant signal for chatbot deployment
  benchmark_coverage: Speaker role is foregrounded as a primary structural signal [Q125], with ablations showing 3–4% performance
    degradation when speaker information is removed [Q124]. Label distributions are documented by speaker role [Q60], providing
    direct evidence relevant to chatbot architectures that must handle asymmetric therapist/patient conversational dynamics.
  dimension: input_ontology
coverage_gap_analysis:
- user_priority: Cultural adaptation of dialogue acts for underrepresented communities (South Asian, African American, Latin
    American)
  benchmark_coverage: The paper explicitly states that the majority of sessions 'belong to the mental health professionals
    and patients based in United States' [Q98] and that 'the effectiveness of SPARTA on data from other geographical or demographical
    regions may vary' [Q99]. No culturally adapted label definitions, no minority-community sessions, and no annotator cultural
    diversity documentation exist in the benchmark.
  gap_type: full
  web_search_target: culturally adapted dialogue-act taxonomy counseling NLP South Asian African American Latin American mental
    health chatbot evaluation
- user_priority: Annotator demographics and inter-annotator reliability for culturally loaded utterances
  benchmark_coverage: Only aggregate Cohen's Kappa (0.7234) is reported [Q48, Q49]; no label-stratified IAA, no annotator
    cultural background information, no analysis of disagreement patterns on utterances from minority-community clients. Annotator
    bias is flagged as unresolvable [Q96] but not further characterized.
  gap_type: full
  web_search_target: HOPE dataset counseling dialogue-act inter-annotator agreement label-stratified annotator demographics
    cultural bias audit
- user_priority: Multi-label or ranked dialogue-act outputs for downstream chatbot pipelines
  benchmark_coverage: The benchmark is strictly single-label per utterance [Q14, Q104], with multi-intent acknowledged as
    'rare' and deferred as 'simplicity' [Q30]. No multi-label or ranked-output evaluation metric is employed anywhere in the
    paper. The emotion annotation experiment [Q126, Q127] was abandoned due to imbalance [Q129], leaving the single-label
    output form unchallenged.
  gap_type: full
  web_search_target: multi-label dialogue-act classification counseling NLP motivational interviewing crisis intervention
    ranked output mental health benchmark
- user_priority: Substance use counseling and crisis intervention sub-corpus coverage
  benchmark_coverage: HOPE does not disaggregate sessions by therapy type, client demographic, or clinical modality. No performance
    breakdown by therapy sub-type (CBT, child, family, substance use) is reported. The paper describes data collection as
    covering publicly available YouTube sessions without specifying sub-corpus composition [Q3, Q23, Q26].
  gap_type: partial
  web_search_target: HOPE counseling dataset therapy type breakdown substance use crisis intervention session composition
    performance disaggregation
- user_priority: Non-US English clinical NLP deployment contexts
  benchmark_coverage: The dataset's US-clinical origin is explicitly acknowledged as a geographic limitation [Q98, Q99]. No
    adaptation, validation, or performance reporting for non-US English-speaking clinical contexts (e.g., South Asian English,
    African diaspora communities) is included in the paper.
  gap_type: full
  web_search_target: HOPE counseling dialogue-act benchmark non-US deployment South Asian English clinical NLP performance
    degradation adaptation
- user_priority: Input content representativeness for downstream communities (HIGH priority)
  benchmark_coverage: All source sessions are US-clinical [Q98]; utterance length distribution (~103–124 words per turn [Q56,
    Q57]) reflects structured therapeutic sessions rather than text-based chatbot interaction. Synthetic name masking [Q24]
    protects identity but does not address cultural content gaps. No demographic metadata about session participants (race,
    ethnicity, socioeconomic status) is documented.
  gap_type: partial
  web_search_target: mental health counseling NLP dataset demographic diversity ethnicity race clinical NLP benchmark underrepresented
    communities
- user_priority: Output content validity for underrepresented communities (HIGH priority)
  benchmark_coverage: Annotators are described only by age range (25–35) and professional experience (2–10 years) [Q50], with
    no cultural, linguistic, or clinical-exposure background documented. Expert therapist moderation [Q47] and mental health
    professional consultation [Q95] are noted, but no evidence these consultants represented minority community clinical perspectives.
    The paper's own ethical statement acknowledges bias mitigation as future deployment responsibility [Q103].
  gap_type: partial
  web_search_target: counseling dialogue annotation cultural validity minority community communicative norms annotator diversity
    mental health NLP label bias
