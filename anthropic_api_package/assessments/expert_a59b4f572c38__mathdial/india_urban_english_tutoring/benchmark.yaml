  dimension: output_ontology
  text: In summary, Focus comprises of all conversation elements that direct the student towards the solution without actually
    giving out any of the solution, while Probing attempts to develop reasoning skills and world knowledge relevant to the
    problem, but not necessarily specific to the given problem.
- id: Q152
  page: 17
  dimension: output_ontology
  text: Telling is giving out parts of the solution, either calculations or strategy or both.
- id: Q153
