coverage_strengths:
- user_priority: Pedagogical quality evaluation across multiple dimensions
  benchmark_coverage: 'The benchmark provides three human-rated dimensions (Coherence, Correctness, Equitable

    Tutoring) [Q97, Q166] plus automatic metrics (BLEU, BERTScore, Uptake) [Q89, Q93] and

    interactive simulation metrics (Success@k, Telling@k) [Q95, Q96], offering a

    multi-layered evaluation framework that covers the eight pedagogical categories the

    user confirmed as necessary and sufficient.

    '
  dimension: output_ontology
- user_priority: Providing guidance as primary evaluation criterion
  benchmark_coverage: 'The benchmark explicitly operationalizes guidance quality through the Equitable Tutoring

    dimension [Q98, Q166] and via the Telling@k metric, which measures how often a teacher

    reveals the answer before the student solves it [Q96], directly capturing the guidance

    trade-off the user prioritizes.

    '
  dimension: output_ontology
- user_priority: Professional teacher annotators with domain expertise
  benchmark_coverage: 'MATHDIAL recruited 91 annotators with verified teaching experience via Prolific [Q23,

    Q26], filtered for quality [Q132], and trained with comprehension tests [Q24, Q25],

    distinguishing the dataset from crowdworker-based corpora with documented quality

    problems [Q13, Q14, Q15].

    '
  dimension: output_content
- user_priority: English-only, text-based tutoring dialogue format
  benchmark_coverage: 'The benchmark is entirely English text-based [Q32, Q84], with no modality mismatch

    relative to the Indian metro deployment context, making input and output form

    directly compatible with the user''s system.

    '
  dimension: input_form
- user_priority: Curriculum-agnostic math error coverage
  benchmark_coverage: 'GSM8k-derived math word problems are noted as sufficiently generic (elementary school

    level, covering equations and percentages) [Q118], and student confusion types are

    drawn from prior research on algebra misconceptions [Q124–Q130], providing broad

    curriculum-agnostic error coverage the user confirmed as sufficient.

    '
  dimension: input_ontology
coverage_gap_analysis:
- user_priority: Indian classroom interaction norms in benchmark dialogues (IC — HIGH)
  benchmark_coverage: 'The LLM student simulation was not calibrated to Indian classroom norms. The authors

    acknowledge the simulation has "a limited understanding of human learning" and that

    certain confusions may be under- or over-represented [Q106]. Teachers may have adapted

    to the LLM''s patterns rather than exhibiting naturalistic classroom behavior [Q108].

    Student profiles use diverse names [Q123] but this nominal diversity does not capture

    deferential, low-verbalization Indian student behavior. All MWPs are US-origin [Q103,

    Q118] with no Indian cultural content.

    '
  gap_type: full
  web_search_target: Indian classroom tutoring dialogue dataset deferential student behavior CBSE NCERT math benchmark
- user_priority: Annotator provenance — Indian educator representation (OC — HIGH)
  benchmark_coverage: 'Annotators are predominantly UK nationals, followed by USA, Canada, Australia, India,

    and Germany [Q27]. India appears as a minority contributor. Annotators were explicitly

    instructed to favor Socratic scaffolding over direct correction [Q148], encoding

    Western constructivist norms in the ground truth. Inter-annotator agreement on

    Equitable Tutoring is κ=0.34 [Q100], the lowest of the three human evaluation

    dimensions, suggesting this dimension is particularly subjective and cross-culturally

    variable.

    '
  gap_type: partial
  web_search_target: Indian teacher pedagogical norms evaluation AI tutoring direct correction versus scaffolding annotation
- user_priority: Guidance dimension weighting relative to Indian exam-oriented pedagogy (OC — HIGH)
  benchmark_coverage: 'The benchmark treats Equitable Tutoring (its closest proxy for guidance quality) as

    one of three co-equal human evaluation dimensions [Q97] and systematically discourages

    direct solution revelation via Telling@k [Q96]. Telling is explicitly positioned as a

    last resort [Q155], and scaffolding moves are designated as "productive for long-term

    learning" [Q154]. This Socratic weighting may systematically disadvantage the

    directive, exam-readiness-oriented responses that Indian professional teachers judge

    as high-quality.

    '
  gap_type: full
  web_search_target: exam-oriented direct instruction pedagogy India evaluation rubric teacher quality CBSE tutoring
- user_priority: Socratic vs. directive pedagogy alignment (OC — HIGH)
  benchmark_coverage: 'MATHDIAL is explicitly designed around scaffolding theory [Q3, Q36, Q37, Q156] and

    the avoidance of premature solution revelation [Q5, Q96]. The benchmark''s entire

    framing — including its title (''A Good Teacher Knows When to Tell'') — encodes

    the premise that Telling is a failure mode rather than a pedagogically legitimate

    strategy. This orientation is structurally at odds with teacher-directed, direct

    correction norms prevalent in Indian metro professional teaching contexts.

    '
