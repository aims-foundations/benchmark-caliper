  dimension: input_content
  text: We introduce a new framework for semi-synthetic dialogue dataset collection. We use it to collect a pedagogically
    rich dataset for tutoring math word problems that follow equitable tutoring practices and learning sciences research on
    scaffolding student understanding, called MATHDIAL.
