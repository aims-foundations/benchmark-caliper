  dimension: input_ontology
  text: In this work, we assessed the state-of-the-art LLMs on the aspect-based summarization task of mental health therapy
    conversations.
- id: Q59
  page: 15
  dimension: output_form
  text: Specifically, we benchmarked 11 LLMs for aspect-based summarization and evaluated them using both automatic and human
    evaluation approaches.
- id: Q60
  page: 15
  dimension: input_content
  text: The counseling dataset was curated from multiple multimedia online sources such as youtube transcripts [37].
- id: Q61
  page: 15
  dimension: input_form
  text: Hence, most of these natural conversations are incoherent and grammatically unfluent.
- id: Q62
  page: 15
  dimension: output_ontology
