    also not recorded, and in at least one instance, the presence of suicide risk was not identified.
- id: Q65
  page: 15
  dimension: output_ontology
  text: In general, the models exhibited stronger performance in handling medical histories and examinations but struggled
    when faced with more technical and sensitive aspects, such as conversations related to actual therapeutic strategies.
- id: Q66
  page: 16
  dimension: input_ontology
  text: First, this work aims to benchmark the efficacy of only 11 LLMs on the aspect-based summarization task.
- id: Q67
  page: 16
  dimension: input_ontology
  text: Second, for faster and easier reproduction, we did not assess models larger than 7 billion parameters; however, such
    models can be part of future examinations.
- id: Q68
  page: 16
  dimension: input_ontology
  text: Third, for the initial study and to promote research in this field, only open-source models were assessed in this
    work.
- id: Q69
  page: 16
  dimension: input_ontology
  text: Finally, this work explored only three aspects (counseling component) of the conversation.
- id: Q70
  page: 16
  dimension: input_content
  text: Additionally, the counseling sessions in this work represented a certain demographic region (American) and thus may
    not apply to therapy counseling for other demographics.
- id: Q71
  page: 16
  dimension: input_ontology
  text: Our study benchmarked the efficacy and role of large language models towards component-guided counseling summarization
    tasks.
- id: Q72
  page: 16
  dimension: input_content
  text: In doing so, we introduced a new dataset, MentalCLOUDS, which comprises summaries corresponding to three counseling
    components.
- id: Q73
  page: 16
  dimension: input_content
  text: The dataset will be available upon request.
