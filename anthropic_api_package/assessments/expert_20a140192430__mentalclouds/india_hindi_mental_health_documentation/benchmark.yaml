    and history", "patient discovery", and "reflection" frequently overlap, posing clinical and legal problems.
- id: Q63
  page: 15
  dimension: input_ontology
  text: The models are also unable to identify psychotherapy types (e.g., cognitive behavior therapy) and therapy techniques,
    which form an integral part of counseling notes.
- id: Q64
  page: 15
  dimension: output_ontology
