coverage_strengths:
- user_priority: Document-level translation structural demands
  benchmark_coverage: 'The benchmark explicitly targets document-level translation of multi-sentence

    texts, evaluating context-dependent phenomena (coreference, lexical cohesion,

    lexical disambiguation) that the user acknowledges are broadly shared across

    genres [Q15, Q16]. Pseudo-document chunking at k=10 sentences mirrors the

    multi-sentence structure of bureau notices [Q48, Q49].

    '
  dimension: input_ontology
- user_priority: Amharic language coverage in Ethiopic script
  benchmark_coverage: 'Amharic is one of the five target languages and is explicitly handled in

    Ethiopic script. The benchmark documents tokenization challenges specific to

    Amharic''s non-Latin script and accommodates them with increased token limits

    [Q127, Q162], providing operational evidence that Amharic script processing

    has been addressed. d-chrF is selected as the primary metric partly because

    it captures morphological richness relevant to Amharic [Q53].

    '
  dimension: input_form
- user_priority: Human annotation with native Amharic speakers
  benchmark_coverage: 'Four expert Amharic translators (named: Bereket Tilahun, Hana M. Tamiru,

    Biniam Asmlash, Lidetewold Kebede) were recruited through a native-speaker

    language coordinator [Q109, Q24]. Human evaluation annotators were also

    native speakers, primarily drawn from the translation team [Q194]. This

    provides a documented native-speaker annotation chain for Amharic, even if

    domain expertise is unverified.

    '
  dimension: output_content
- user_priority: Multi-model evaluation breadth
  benchmark_coverage: 'The benchmark evaluates 12 model configurations including NLLB-200, GPT-4o,

    LLaMAX3, and fine-tuned variants [Q37, Q39, Q41], providing comparative

    baselines across encoder-decoder and decoder-only architectures relevant to

    translation system selection for the deployment context.

    '
  dimension: input_ontology
- user_priority: Translation quality metrics for morphologically rich Amharic
  benchmark_coverage: 'chrF is explicitly selected as the primary metric because it better captures

    the morphological richness of African languages including Amharic [Q53].

    Multi-layered evaluation combines d-chrF, d-BLEU, GPT-4o-as-judge, and human

    direct assessment [Q83], providing redundant quality signals.

    '
  dimension: output_form
coverage_gap_analysis:
- user_priority: Agricultural input subsidy, land-use policy, and credit-scheme document genres
  benchmark_coverage: 'NOT DOCUMENTED — the benchmark covers only health and IT news genres [Q1, Q2,

    Q80]. No agricultural proclamation, land-use regulation, or financial

    credit-scheme document type appears in any split. The paper acknowledges that

    TICO-19 is the only other document-level African-language MT dataset and it

    is restricted to COVID-19 health topics [Q14], confirming the complete absence

    of regulatory/agricultural genres from the benchmarking landscape. The

    translationese risk compounds this: all source material originates in English

    [Q103], whereas the target deployment translates from Amharic bureau documents.

    '
  gap_type: full
  web_search_target: Amharic machine translation benchmark agricultural legal regulatory Ethiopian government proclamation
    evaluation dataset
- user_priority: Proclamation-register Amharic terminology (subsidy schemes, land-tenure, cooperative law)
  benchmark_coverage: 'NOT DOCUMENTED — the benchmark''s vocabulary is drawn entirely from health and

    technology news sources [Q18, Q22]. A pre-translation terminology workshop was

    conducted and a harmonization list promised [Q26, Q121], but these resources

    are specific to health and IT terminology, not to Ethiopian federal proclamation

    register vocabulary. The paper explicitly acknowledges that AFRIDOC-MT may

    reflect a bias toward English structure and cultural framing [Q105], further

    distancing it from the legal-administrative Amharic register operative in the

    deployment.

    '
  gap_type: full
  web_search_target: Ethiopian agricultural proclamation Amharic terminology glossary ministry agriculture ATA subsidy cooperative
    land tenure translation
- user_priority: Annotators with federal bureau or agricultural/legal translation domain expertise
  benchmark_coverage: 'PARTIAL — expert translators were recruited through a native-speaker coordinator

    [Q24] and a terminology workshop was held [Q26], but no documentation of

    institutional affiliation, domain specialization, or familiarity with

    agricultural/legal Amharic is provided for the four named Amharic translators

    [Q109]. The preferred ground-truth authority identified by the user (domain-

    trained federal bureau translators) is entirely absent from the annotator pool.

    Inter-annotator agreement for Amharic was only 0.46 (Krippendorff''s alpha)

    [Q211], suggesting labeling consistency challenges that would compound in a

    specialized domain.

    '
  gap_type: partial
  web_search_target: AFRIDOC-MT Amharic translator background domain expertise institutional affiliation Ethiopia government
    translation
- user_priority: Terminological consistency scoring across multi-clause documents
  benchmark_coverage: 'NOT DOCUMENTED — the output scoring framework evaluates fluency, content

    errors, and lexical/grammatical cohesion [Q54, Q55, Q187–Q190] but contains

    no rubric component for terminological consistency — the stable cross-clause

    rendering of specific proclamation-derived term names. The scoring definitions

    address vocabulary usage and synonym issues [Q189] but in the context of news

    discourse flow rather than legal term stability. GPT-4o''s unreliability for

    African language translation [Q67, Q99, Q219] further limits confidence in

    the cohesion error counts as proxies for terminological precision.

    '
  gap_type: full
  web_search_target: terminological consistency evaluation metric machine translation legal administrative documents African
    languages
- user_priority: Amhara sub-regional Amharic register and dialect features
  benchmark_coverage: 'NOT DOCUMENTED — the benchmark targets Amharic broadly without specifying

    which regional variety or administrative register is represented. No

    documentation discusses whether the four Amharic translators reflect a

    national standard Amharic, Addis Ababa register, or Amhara-region bureau

    register. The translationese risk [Q103, Q104, Q105] means translated

    Amharic may not reflect the vocabulary patterns of Amhara regional bureau

    documents at all.

    '
  gap_type: full
  web_search_target: Amhara region Amharic dialect administrative register variation Ethiopian NLP benchmark sub-national
- user_priority: Document structure fidelity (numbered clauses, tables, signature blocks)
  benchmark_coverage: 'PARTIAL — the benchmark preserves paragraph structure in its annotation

    workflow [Q119] and realigns translated sentences into complete documents for

    metric computation [Q51, Q57], but no metric evaluates structural fidelity

    of numbered clauses, tables, or signature blocks. The user indicates format

    preservation is contingent on model modality and is not an absolute

    requirement for text-only models, making this a partial gap relevant primarily

    if the deployment evolves toward multimodal or format-preserving translation.

    '
  gap_type: partial
  web_search_target: document structure preservation evaluation machine translation tables numbered clauses administrative
    legal African languages benchmark
