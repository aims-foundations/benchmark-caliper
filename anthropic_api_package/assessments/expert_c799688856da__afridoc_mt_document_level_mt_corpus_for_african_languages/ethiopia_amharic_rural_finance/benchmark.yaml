- id: Q179
  page: 22
  dimension: output_ontology
  text: We compared translations performed at the sentence-level and pseudo-document level in terms of fluency, content errors,
    and cohesion errors—specifically lexical (LE) and grammatical (GE) errors—using the same definitions as Sun et al. (2025).
- id: Q180
  page: 22
  dimension: output_ontology
  text: GPT-4o is prompted to rate the fluency of a document on a scale from 1 to 5, where 5 indicates high fluency and 1
    represents low fluency.
- id: Q181
  page: 22
  dimension: output_form
  text: This evaluation is conducted without providing any reference document.
- id: Q182
  page: 22
  dimension: output_form
  text: For the final fluency score, we report the average rating across all documents.
- id: Q183
  page: 22
  dimension: output_ontology
  text: GPT-4 is prompted to identify and list the mistakes, such as incorrect translations, omissions, additions, and any
    other errors, by comparing the model's output to the reference translation.
- id: Q184
  page: 22
  dimension: output_ontology
  text: After identifying these errors, we count all of them and compute the average across all documents, reporting that
    as the content error (CE).
- id: Q185
  page: 23
  dimension: output_ontology
  text: 'Cohesion: GPT-4 is prompted to rate cohesion-related mistakes, including lexical and grammatical errors, in the model''s
    output, comparing it to the reference translation.'
- id: Q186
  page: 23
  dimension: output_ontology
  text: We count each error individually, compute the average across the documents, and report them as lexical errors (LE)
    and grammatical errors (GE).
- id: Q187
  page: 23
  dimension: output_ontology
  text: Cohesion refers to how different parts of a text are connected using language structures like grammar and vocabulary.
- id: Q188
  page: 23
  dimension: output_ontology
  text: It ensures that sentences flow smoothly and the text makes sense as a whole.
- id: Q189
  page: 23
  dimension: output_ontology
  text: 'Lexical Cohesion Mistakes: Issues with vocabulary usage, incorrect or missing synonyms, or overuse of certain words
    that disrupt the flow.'
- id: Q190
  page: 23
  dimension: output_ontology
  text: 'Grammatical Cohesion Mistakes: Problems with pronouns, conjunctions, or grammatical structures that link sentences
    and clauses.'
- id: Q191
  page: 24
  dimension: output_ontology
  text: Fluency can only have values between 1 and 5. However, the other metrics, including CE, GE, and LE, do not have a
    specific range and can take on any value because they are counts.
- id: Q192
  page: 24
  dimension: output_content
  text: Beyond using GPT-4o as a judge, we also conduct human evaluation on a subset of outputs from GPT-3.5, LLaMAX3-SFT1,
    and LLaMAX3-SFT10 for two domains, focusing specifically on translation into five African languages due to cost constraints.
- id: Q193
  page: 24
  dimension: output_content
  text: Translation into English was excluded, as existing automatic metrics, including GPT-based evaluations, are already
    reliable for this direction.
- id: Q194
  page: 24
  dimension: output_content
  text: For the human evaluation, three native speakers of the African languages—primarily translators involved in the dataset
    creation—were recruited.
- id: Q195
  page: 24
  dimension: output_content
  text: Each annotator was assigned 80 documents to evaluate, tasked with marking as many error spans as possible and rating
    the overall quality on a scale from 0 to 100.
- id: Q196
  page: 24
  dimension: output_form
  text: This annotation followed the error span annotation (ESA) (Kocmi et al., 2024) protocol as implemented within the Appraise
    Evaluation Framework (Federmann, 2018).
- id: Q197
  page: 24
  dimension: output_content
  text: To assess consistency and inter-annotator agreement, 30 of the 80 documents were shared among all three annotators.
- id: Q198
  page: 24
  dimension: output_content
  text: Each annotator was remunerated with $55.15
- id: Q199
  page: 24
  dimension: output_content
  text: Alongside the human direct assessment of the translation outputs, we shared a subset of the outputs with one author
    per language, each a native speaker.
- id: Q200
  page: 24
  dimension: output_content
  text: 'They were tasked with analyzing the outputs to answer two key questions: (1) What common errors or flaws do the models
    exhibit across different setups? and (2) How fluent are the translation outputs produced by the models across the various
    settings?'
- id: Q201
  page: 24
  dimension: output_form
  text: Given that AFRIDOC-MT is a document-level translation dataset, and due to the limited context length of most translation
    models and LLMs, which makes it impossible to translate a full document at once, we opted to translate the sentences within
    the documents and then merge them back to form the complete document. For document-level evaluation, we split the documents
    into chunks of 10 sentences and translate these chunks using the different models.
- id: Q202
  page: 25
  dimension: output_form
  text: In Tables 19 and 20 we provide the full results on the merged pseudo-documents using d-chrF and d-BLEU.
- id: Q203
  page: 25
  dimension: output_form
  text: It is important to note that we also trained and evaluated NLLB-200 for pseudo-document translation. However, due
    to its 512-token maximum sequence length, it is not competitive.
- id: Q204
  page: 25
  dimension: output_form
  text: Our results show that both LLama3.1 and LLaMAX3 models, when fine-tuned on sentences, performed significantly worse
    on pseudo-document evaluations compared to the same models fine-tuned on pseudo-documents for both domains.
- id: Q205
  page: 25
  dimension: input_form
  text: All these models were trained using a similar setup, with the primary difference being the data used for fine-tuning.
- id: Q206
  page: 25
  dimension: output_form
  text: Overall, no clear trend is observed in MT performance across language family classes. However, Amharic (a non-Latin
    script language) and Yorùbá (a heavily diacriticitized language) result in the lowest chrF scores, while Swahili—the most
    widely spoken indigenous African language—performs best.
- id: Q207
  page: 25
  dimension: output_form
  text: In Tables 21 and 22 we present the average GPT-4o evaluation results for four models.
- id: Q208
  page: 25
  dimension: output_ontology
  text: 'When translating into African languages, there is no clear pattern: for example, GPT-3.5, despite having the lowest
    fluency score, also had the fewest content, lexical, and grammatical errors, which is counterintuitive.'
- id: Q209
  page: 26
  dimension: output_content
  text: We were able to obtain DA scores from three annotators for all the languages.
- id: Q210
  page: 26
  dimension: output_content
  text: For each language, we calculated inter-annotator agreement using Krippendorff's alpha α over 30 document instances.
- id: Q211
  page: 26
  dimension: output_content
  text: We obtained α scores of 0.46, 0.57, 0.40, and 0.81, and 0.54 for Amharic, Hausa, Swahili, Yorùbá, and Zulu respectively.
- id: Q212
  page: 26
  dimension: output_content
  text: These are relatively low scores, except for Yorùbá.
- id: Q213
  page: 26
  dimension: output_form
  text: We present the average DA scores in Tables 10 and 14 for the health and tech domains, respectively.
- id: Q214
  page: 26
  dimension: output_form
  text: The results show that annotators rate documents translated at the sentence-level as higher quality than those translated
    at the pseudo-document level.
- id: Q215
  page: 26
  dimension: output_form
  text: Additionally, GPT-3.5 received the lowest ratings among the three models.
- id: Q216
  page: 26
  dimension: output_form
  text: LLaMAX3-SFT1, a model trained on sentence-level data, was rated the best across all languages when evaluated on sentences.
- id: Q217
  page: 26
  dimension: output_form
  text: However, when evaluated on pseudo-documents, its performance was rated lower than that of LLaMAX3-SFT10.
- id: Q218
  page: 26
  dimension: output_ontology
  text: These findings are consistent with the d-chrF scores for the models, but they do not align with the evaluations from
    GPT-4o as a judge.
- id: Q219
  page: 26
  dimension: output_ontology
  text: These results suggest that using GPT-4o as a translation judge is not yet well-suited for low-resource languages.
- id: Q220
  page: 26
  dimension: output_form
  text: We focus on the sentence-level task and translated across all 30 directions for which the model was trained, evaluating
    both NLLB-200 (1.3B) and its fine-tuned version using d-chrF.
- id: Q221
  page: 26
  dimension: output_form
  text: The results shows that translating into Yorùbá, which is the direction with the lowest d-chrF score from English among
    all the languages, benefited the most.
- id: Q222
  page: 26
  dimension: input_form
  text: One major factor contributing to this is the presence of diacritics.
- id: Q223
  page: 26
  dimension: output_form
  text: Furthermore, looking at their actual performances and not just the differences, our results show that translations
    into Swahili and English—both relatively high-resource languages—yield higher BLEU and chrF scores (see Figures 11 and
    12), even after supervised finetuning.
- id: Q224
  page: 26
  dimension: output_form
  text: Hence, there is much to be done to improve translation performance between low-resource language pairs.
