name: afridoc_mt
full_name: 'AFRIDOC-MT: A Document-Level Multi-Parallel Translation Dataset for African Languages'
year: 2024
domain: Document-level machine translation evaluation for African languages
porting_strategy: ground_up
languages:
- en
- am
- ha
- sw
- yo
- zu
primary_region: Sub-Saharan Africa (East and West Africa)
description: 'AFRIDOC-MT is a document-level multi-parallel translation benchmark covering

  English and five African languages: Amharic, Hausa, Swahili, Yorùbá, and Zulu.

  The dataset comprises 334 health and 271 information technology news documents,

  all human-translated from English. It supports both sentence-level and

  pseudo-document-level translation experiments evaluated using standard MT

  metrics (d-BLEU, d-chrF), GPT-4o-as-judge, and human direct assessment.

  The benchmark evaluates encoder-decoder NMT systems and decoder-only LLMs

  across 12 model configurations in health and technology news genres.

  '
documentation_excerpts: '## Key characteristics relevant to validity analysis:


  ### Input Ontology

  AFRIDOC-MT covers a single task type: document-level machine translation

  between English and five African languages (plus multi-way translation among

  the six languages). The benchmark supports both sentence-level and

  pseudo-document-level (fixed-size chunk) translation as subtasks [Q3, Q35].

  Document-level translation is motivated by the need to handle context-dependent

  phenomena including coreference resolution, lexical disambiguation, and lexical

  cohesion [Q16], and the authors situate the benchmark as addressing the gap left

  by existing sentence-level MT datasets [Q13, Q15]. The genres evaluated are

  exclusively health and information technology news [Q1, Q2, Q80]; no

  agricultural, legal, regulatory, administrative, or financial document types are

  included. The only competing document-level dataset acknowledged, TICO-19, is

  restricted to COVID-19 health topics [Q14], confirming that regulatory and

  policy genres remain entirely absent from the benchmarking landscape covered by

  this work. Twelve model configurations are evaluated [Q41] spanning five

  encoder-decoder systems [Q37] and multiple decoder-only LLMs [Q39], with prompt

  sensitivity assessed using three prompts per LLM [Q91].


  ### Input Content

  English source documents were scraped from Techpoint Africa (technology news)

  and the World Health Organization (health news), yielding approximately 10,000

  English sentences per domain from 334 health and 271 technology articles [Q18,

  Q22]. Data is dual-licensed under CC BY-NC-SA 3.0/4.0 and characterized as

  ethically sourced from publicly available materials selected to represent

  different cultural perspectives and minimize bias [Q34, Q106]. MADLAD-400, one

  of the evaluated models, was trained on Common Crawl [Q137]; Toucan was

  pre-trained on large multilingual texts covering over 500 African languages [Q140].

  The dataset authors acknowledge that since all source material originates in

  English, translated African-language sentences may exhibit translationese —

  unnatural syntax, overly literal phrasing, and a structural and semantic bias

  toward English [Q103, Q104, Q105]. No agricultural proclamation texts,

  cooperative membership regulations, land-tenure documents, subsidy scheme

  notices, or microfinance credit-scheme terms appear anywhere in the source

  corpus.


  ### Input Form

  The benchmark is entirely text-based. Amharic is explicitly present in Ethiopic

  (non-Latin) script [Q1, Q127]; Yorùbá uses a Latin-based script with diacritics

  [Q77]; the remaining languages (Hausa, Swahili, Zulu) use Latin script. Token

  length statistics show meaningful cross-lingual variation: Hausa and Yorùbá

  produce longer tokenizations than English, while Amharic and Zulu produce shorter

  ones [Q33]. Non-Latin script and diacritics caused Amharic and Yorùbá to exceed

  model token limits, requiring chunking into pseudo-documents of k=10 sentences

  [Q47, Q48, Q128]; the token limit for Amharic was specifically increased to

  accommodate its script properties [Q162]. The annotation workflow used .csv files

  in Google Sheets or Excel [Q122], with explicit instructions to preserve

  paragraph-separating empty rows [Q119]. No audio, image, or OCR components are

  involved.


  ### Output Ontology

  The benchmark''s output scoring framework evaluates translation adequacy,

  fluency, and discourse coherence. Automated metrics are document-level chrF

  (d-chrF) and document-level BLEU (d-BLEU), computed via SacreBLEU with

  bootstrap resampling [Q51, Q52]; d-chrF is reported as primary because it

  better captures the morphological richness of African languages [Q53]. GPT-4o

  evaluates fluency on a 1–5 scale and counts content errors (CE), lexical

  cohesion errors (LE), and grammatical cohesion errors (GE) [Q54, Q55, Q180,

  Q191]. The benchmark explicitly defines cohesion as how text is connected using

  grammar and vocabulary to ensure smooth sentence flow [Q187, Q188], with lexical

  cohesion mistakes involving vocabulary usage and synonym issues [Q189] and

  grammatical cohesion mistakes involving pronoun, conjunction, and clause-linking

  problems [Q190]. Human direct assessment uses a 0–100 continuous quality scale

  [Q195] via the ESA protocol in the Appraise framework [Q196]. No rubric

  component addresses terminological consistency — the stable cross-clause

  rendering of named entities such as subsidy scheme names, land-tenure category

  labels, or proclamation-derived legal terms. The label ontology is calibrated

  for news discourse adequacy and fluency, not for the regulatory precision

  required in legal-administrative translation. GPT-4o''s reliability as a judge

  for African language translation directions is explicitly questioned [Q67, Q85,

  Q219]; human evaluation is ultimately preferred for translations into African

  languages [Q68].


  ### Output Content

  Translation was performed by four expert translators per language, recruited

  through a native-speaker language coordinator [Q23, Q24]. The 10,000 sentences

  per language were distributed equally among translators who worked sentence-by-

  sentence with access to full document context [Q25]. A pre-translation workshop

  was conducted to share terminology creation experience and existing resources

  [Q26]; translators were instructed not to use machine translation engines [Q120],

  and a terminology harmonization list was promised during the process [Q121].

  Quality control used AfriCOMET quality estimation (threshold 0.65 for manual

  review) [Q28, Q29] and manual inspection by language coordinators [Q27]. Human

  evaluation for model outputs used three native-speaker annotators per language,

  primarily drawn from the translation team [Q194], each evaluating 80 documents

  with 30 shared for inter-annotator agreement [Q197]. Inter-annotator agreement

  (Krippendorff''s alpha) was 0.46, 0.57, 0.40, and 0.54 for Amharic, Hausa,

  Swahili, and Zulu respectively — relatively low [Q71, Q211, Q212]. Named

  Amharic translators are listed [Q109] but no documentation of their

  institutional affiliation, domain expertise, or familiarity with

  agricultural/legal Amharic is provided. Human evaluation for Zulu could not

  be conducted due to annotator recruitment difficulties [Q100].


  ### Output Form

  The benchmark produces and evaluates text-only translation outputs. All

  automated metrics (d-chrF, d-BLEU, s-COMET/chrF/BLEU) and human assessments

  operate on plain text [Q51, Q52, Q170, Q172]. Document structure is partially

  preserved at the corpus level — paragraph-separating rows are maintained in the

  annotation workflow [Q119] and sentence-to-document realignment is performed

  for metric computation [Q51, Q57] — but no metric assesses structural fidelity

  (preservation of numbered clauses, tables, or signature blocks). Due to context

  length limits, full documents are not translated atomically; they are processed

  as pseudo-document chunks of k=10 sentences [Q48, Q49] or sentence-by-sentence

  [Q201], with outputs merged for evaluation. Embedding-based document-level

  metrics for African languages remain unavailable [Q50, Q96, Q176]: AfriCOMET

  cannot be applied at document level due to its 512-token backbone limit [Q175],

  and ModernBERT-based QE produced undifferentiated scores across all models

  [Q97, Q98]. Greedy decoding is used throughout [Q155].

  '
verbatim_quotes:
- id: Q1
  page: 1
  dimension: input_ontology
  text: 'This paper introduces AFRIDOC-MT, a document-level multi-parallel translation dataset covering English and five African
    languages: Amharic, Hausa, Swahili, Yorùbá, and Zulu.'
- id: Q2
  page: 1
  dimension: input_content
  text: The dataset comprises 334 health and 271 information technology news documents, all human-translated from English
    to these languages.
- id: Q3
  page: 1
  dimension: input_ontology
  text: We conduct document-level translation benchmark experiments by evaluating the ability of neural machine translation
    (NMT) models and large language models (LLMs) to translate between English and these languages, at both the sentence and
    pseudo-document levels, the outputs being realigned to form complete documents for evaluation.
- id: Q4
  page: 1
  dimension: output_form
  text: Our results indicate that NLLB-200 achieves the best average performance among the standard NMT models, while GPT-4o
    outperforms general-purpose LLMs.
- id: Q5
  page: 1
  dimension: input_ontology
  text: Fine-tuning selected models leads to substantial performance gains, but models trained on sentences struggle to generalize
    effectively to longer documents.
- id: Q6
  page: 1
  dimension: output_form
  text: Furthermore, our analysis reveals that some LLMs exhibit issues such as under-generation, over-generation, repetition
    of words and phrases, and off-target translations, specifically for translation into African languages.
- id: Q7
  page: 1
  dimension: input_ontology
  text: In addition, AFRIDOC-MT supports multi-way translation, allowing translations not only between English and the African
    languages but also between any two of the languages covered.
- id: Q8
  page: 1
  dimension: output_form
  text: We evaluate performance using automatic metrics and compare the results of encoder-decoder models with decoder-only
    LLMs
- id: Q9
  page: 1
  dimension: output_content
  text: Jesujoba O. Alabi, Israel Abebe Azime, Miaoran Zhang, Cristina España-Bonet, Rachel Bawden, Dawei Zhu, David Ifeoluwa
    Adelani, Clement Oyeleke Odoje, Idris Akinade, Iffat Maab, Davis David, Shamsuddeen Hassan Muhammad, Neo Putini, David
    O. Ademuyiwa, Andrew Caines, Dietrich Klakow
- id: Q10
  page: 1
  dimension: output_content
  text: Masakhane NLP, Saarland University, Saarland Informatic Campus, DFKI GmbH, Barcelona Supercomputing Center, Inria
    Paris France, Mila McGill University & Canada CIFAR AI Chair, University of Ibadan Nigeria, National Institute of Informatics
    Japan, Selcom Tanzania, Imperial College London, University of KwaZulu-Natal, Loughborough University U.K, University
    of Cambridge U.K.
- id: Q11
  page: 2
  dimension: input_ontology
  text: There exist several MT evaluation benchmark datasets for African languages.
- id: Q12
  page: 2
  dimension: input_ontology
  text: They can be categorized into two kinds. First, evaluation datasets specifically designed for translating into or from
    African languages (Ezeani et al., 2020; Azunre et al., 2021; Adelani et al., 2021, 2022, inter alia). Second, benchmark
    datasets covering many languages, including African languages.
- id: Q13
  page: 2
  dimension: input_form
  text: However, most of these datasets are designed for sentence-level MT, primarily drawn from religious or news domains,
    although some consist of translated sentences originating from the same document.
- id: Q14
  page: 2
  dimension: input_ontology
  text: To the best of our knowledge, only TICO-19, a health domain translation benchmark, has the potential to be used for
    document-level MT, while it is restricted to topics related to COVID-19.
- id: Q15
  page: 2
  dimension: input_ontology
  text: Document-level NMT aims to overcome the limitations of sentence-level systems by translating an entire document as
    a whole.
- id: Q16
  page: 2
  dimension: input_ontology
  text: Both document-level and context-aware MT allow for the possibility of improving translation quality for context-dependent
    phenomena such as coreference resolution (Müller et al., 2018; Bawden et al., 2018; Voita et al., 2018; Herold and Ney,
    2023), lexical disambiguation (Rios Gonzales et al., 2017; Martínez Garcia et al., 2019), and lexical cohesion (Wong and
    Kit, 2012; Garcia et al., 2014, 2017; Bawden et al., 2018; Voita et al., 2019).
- id: Q17
  page: 2
  dimension: input_ontology
  text: Various methods have been proposed to extend sentence-level models to capture document-level context (Tiedemann and
    Scherrer, 2017; Libovický and Helcl, 2017; Bawden et al., 2018; Miculicich et al., 2018; Sun et al., 2022).
- id: Q18
  page: 3
  dimension: input_content
  text: We scraped English articles from the websites of Techpoint Africa and the World Health Organization (WHO). The articles
    cover different topics of different lengths with an average length of 30 and 37 sentences for health and tech respectively.
- id: Q19
  page: 3
  dimension: input_form
  text: While our corpus is initially structured at the article level, we aim to make it suitable for sentence-level translation
    tasks as well.
- id: Q20
  page: 3
  dimension: input_form
  text: To achieve this, we segmented the raw articles into sentences using NLTK (Bird et al., 2009).
- id: Q21
  page: 3
  dimension: input_form
  text: To ensure high segmentation quality, we recruited a linguist and a professional translator to verify the correctness
    of the segmentation and make corrections as needed.
- id: Q22
  page: 3
  dimension: input_content
  text: Finally, we selected 334 and 271 English articles/documents from the health and tech domains respectively, which represents
    10k sentences each per domain.
- id: Q23
  page: 3
  dimension: output_content
  text: We translated the extracted 10k English sentences to the 5 African languages through 4 expert translators per language.
- id: Q24
  page: 3
  dimension: output_content
  text: The translators were recruited through a language coordinator who is also a native speaker of the language.
- id: Q25
  page: 3
  dimension: output_content
  text: The 10k sentences were distributed equally among the translators and the translations were done in-context (i.e. the
    translators translated on the sentence level but had access to the whole document).
- id: Q26
  page: 3
  dimension: output_content
  text: Due to the domain-specific nature of the task, before starting the translation process, we conducted a translation
    workshop, during which three translation experts shared their experiences in creating terminologies and they also shared
    existing resources with the translators including short translation guidelines (Appendix A.1).
- id: Q27
  page: 3
  dimension: output_content
  text: Quality control was conducted using automated quality estimation, followed by manual inspections by our language coordinators.
- id: Q28
  page: 3
  dimension: output_content
  text: We also used Quality Estimation (QE), specifically AfriCOMET (Wang et al., 2024a), Given a translated sentence in
    any African language and its corresponding source English sentence, AfriCOMET generates a score between 0 and 1, where
    0 indicates poor quality and higher values signify better quality.
- id: Q29
  page: 3
  dimension: output_content
  text: The translators, in collaboration with the language coordinators, were tasked with reviewing instances that had quality
    estimation scores below 0.65.
- id: Q30
  page: 3
  dimension: output_content
  text: Manual inspection indicates that QE scores below 0.65 do not necessarily reflect poor translations, consistent with
    Adelani et al. (2024b), likely due to
- id: Q31
  page: 3
  dimension: output_content
  text: Each translator was paid $1, 250 for 2, 500 sentences.
- id: Q32
  page: 4
  dimension: input_form
  text: We created train, development (dev), and test splits for each domain. To prevent data leakage, documents sharing sentences
    with the same English translation were assigned to the training set. The dev set contains 25–33 documents, and the test
    set 59–61 documents, drawn from the remaining data.
- id: Q33
  page: 4
  dimension: input_form
  text: Table 4 shows the average number of whitespace-separated tokens per sentence across domains and languages, including
    English. The health domain has more tokens than tech. Hausa and Yorùbá are longer than English, likely due to their descriptive
    nature, while Swahili is similar in length. Amharic and Zulu are relatively shorter, reflecting interesting linguistic
    properties.
- id: Q34
  page: 4
  dimension: input_content
  text: The health data is licensed under CC BY-NCSA 3.0, while the tech data is licensed under CC BY-NC-SA 4.0.
- id: Q35
  page: 4
  dimension: input_ontology
  text: 'Given the AFRIDOC-MT data, we conducted both sentence- and document-level translation, evaluating two types of models:
    encoder-decoder and decoder-only models. While the majority of these models are open-source, we also evaluated two proprietary
    models of the same type.'
- id: Q36
  page: 4
  dimension: output_form
  text: Our evaluation primarily focuses on document-level translation, reflecting the availability of our document-level
    translation corpus. For completeness, we also conduct a series of sentence-level experiments, with the results presented
    in Appendix C.
- id: Q37
  page: 4
  dimension: input_ontology
  text: We evaluate five kinds of open encoder-decoder model including Toucan (Elmadany et al., 2024; Adebara et al., 2024),
    M2M-100 (Fan et al., 2020), NLLB200 (NLLB Team et al., 2024), MADLAD400 (Kudugunta et al., 2023), and Aya-101 (Üstün et
    al., 2024).
- id: Q38
  page: 4
  dimension: input_ontology
  text: Toucan is an Afro-centric multilingual MT model supporting 150 African language pairs. In comparison, M2M-100, NLLB-200,
    and MADLAD-400 cover between 100 and 450 language pairs. Aya-101, an instruction-tuned mT5 model (Xue et al., 2021), supports
    100 languages and can translate between various languages, including those considered in AFRIDOC-MT.
- id: Q39
  page: 4
  dimension: input_ontology
  text: We also evaluate open and closed decoder-only models. Open models include LLama3.1 (Dubey et al., 2024), Gemma2 (Gemma
    Team et al., 2024), their instruction-tuned variants, and LLaMAX3 (Lu et al., 2024)—a LLama3-based model further pre-trained
    on 100+ languages, including several African ones. The closed models include OpenAI GPT models (GPT-3.5 Turbo and GPT-4o)
    (OpenAI, 2024), which have been shown to have document-level translation ability (Wang et al., 2023).
- id: Q40
  page: 4
  dimension: input_content
  text: While their language coverage is not well documented, they show some ability to handle African languages (Adelani
    et al., 2024b; Bayes et al., 2024), though far below their performance in English, their primary training language.
- id: Q41
  page: 4
  dimension: input_ontology
  text: We present the result of 12 models in total, including the 1.2B version of Toucan, 1.3B and 3.3B versions of NLLB-200,
    3B and 13B versions of MADLAD-400 and Aya-101 respectively. We also have the 8B instruction tuned version of LLama3.1
    (LLama3.1-IT), 9B version of Gemma-2 (Gemma2-IT), and LLaMAX3-Alpaca.
- id: Q42
  page: 4
  dimension: input_ontology
  text: For sentence-level evaluation, we jointly fine-tune NLLB-200 with 1.3B parameters on the 30 language directions and
    on the two domains to make the models more specialized. Similarly, we did supervised fine-tuning (SFT) on LLaMAX3
- id: Q43
  page: 5
  dimension: input_form
  text: We perform SFT on LLaMAX3 and LLama3.1 for document-level translation, using pseudo-documents with k=10.
- id: Q44
  page: 5
  dimension: output_form
  text: Given that our created dataset can be used for sentence-level translation and as a baseline for document-level translation,
    we evaluate all models on the test splits for each domain.
- id: Q45
  page: 5
  dimension: output_form
  text: We evaluate the translation models (M2M-100, NLLB-200, and MADLAD-400) using the Fairseq (Ott et al., 2019) codebase
    for (M2M-100 and NLLB-200), and the Transformers (Wolf et al., 2020) codebase for MADLAD-400.
- id: Q46
  page: 5
  dimension: output_form
  text: However, for other models including Aya-101, we use the EleutherAI LM Evaluation Harness (lm-eval) tool (Biderman
    et al., 2024) using the three templates listed in Table 23 of Appendix B.4.
- id: Q47
  page: 5
  dimension: input_form
  text: An initial analysis showed that some models were unable to process entire documents due to input length limits, which
    were exceeded by token counts in some languages (Amharic and Yorùbá).
- id: Q48
  page: 5
  dimension: input_form
  text: To address this, we adopted a similar approach to Lee et al. (2022), splitting documents into fixed-size chunks of
    k sentences to fit within token limits; the final chunk may contain fewer than k sentences.
- id: Q49
  page: 5
  dimension: output_form
  text: To select an appropriate chunk size, we conducted initial tests with k = 1 (sentence-level), 5, 10, and 25, choosing
    k = 10 for our experiments.
- id: Q50
  page: 5
  dimension: output_form
  text: Evaluating document-level translation remains challenging, as existing automatic metrics struggle to capture improvements
    and account for discourse phenomena (Jiang et al., 2022; Dahan et al., 2024), and embedding-based metrics have not been
    explored in this context for African languages due to the lack of data.
- id: Q51
  page: 5
  dimension: output_form
  text: Hence, we realigned sentence-level or pseudo-translation outputs into full documents, then computed BLEU (Papineni
    et al., 2002) and chrF (Popović, 2015) to create document BLEU (d-BLEU) and document chrF (d-chrF).
- id: Q52
  page: 5
  dimension: output_form
  text: Metrics were computed using SacreBLEU (Post, 2018) with bootstrap resampling (n = 1000) to report 95% confidence intervals.
- id: Q53
  page: 5
  dimension: output_form
  text: We report d-chrF scores for the best prompt per model and language direction in the main text, as chrF better captures
    the morphological richness of African languages (Adelani et al., 2022), with full results provided in Appendix C.
- id: Q54
  page: 5
  dimension: output_ontology
  text: We use GPT-4o as a judge to evaluate translation outputs, following recent work showing LLMs' effectiveness in assessing
    translation quality and analyzing errors (Wu et al., 2024; Sun et al., 2025).
- id: Q55
  page: 5
  dimension: output_ontology
  text: Following Sun et al. (2025), we assess each translated document's fluency, content errors (CE), and cohesion errors—specifically
    lexical (LE) and grammatical (GE) errors—using GPT-4o, with evaluation limited to a few model outputs due to cost constraints
    (Appendix B.6).
- id: Q56
  page: 5
  dimension: output_content
  text: We also complement this with human evaluation for direct assessment scores (Appendix B.7) and qualitative analysis
    through manual inspection (Appendix B.8).
- id: Q57
  page: 5
  dimension: output_form
  text: In Tables 5 and 6 we present d-chrF scores based on the realigned documents, created by merging the translated sentences
    into their corresponding documents.
- id: Q58
  page: 5
  dimension: output_form
  text: On average the NLLB models obtain scores of 65.4/66.6 and 64.3/65.0 on health and tech domains respectively, with
    3.3B outperforming 1.3B except when translating into Yorùbá.
- id: Q59
  page: 5
  dimension: output_form
  text: Furthermore, translating to African languages is significantly worse compared to translating to English for all the
    models.
- id: Q60
  page: 6
  dimension: output_form
  text: In Tables 7 and 8 we present d-chrF scores based on the best prompt per language for the translation output of the
    models when evaluated on the realigned documents from pseudo-documents with k =10 sentences per pseudo-document.
- id: Q61
  page: 6
  dimension: output_form
  text: Pseudo-document translation is worse than sentence-level translation when translating into African languages Our results
    from pseudo-document translation show a performance drop across different models compared to sentence-level translation,
    especially when translating into African languages.
- id: Q62
  page: 6
  dimension: output_form
  text: However, GPT-4o demonstrates similar and consistent performance in both setups and domains.
- id: Q63
  page: 6
  dimension: output_form
  text: Additionally, we observe that GPT-3.5 is the next best performing decoder-only LLM, which contrasts with its performance
    in sentence-level translation.
- id: Q64
  page: 7
  dimension: output_form
  text: Table 9 presents average GPT-4o evaluations for fluency and content errors (CE) of realigned outputs from sentence-level
    and pseudo-document-level tasks (k=10) across four models in the health domain.
- id: Q65
  page: 7
  dimension: output_form
  text: When translating into English, pseudo-document outputs are generally rated as more fluent and show fewer content errors,
    except for LLaMAX3-SFT1, which, when evaluated on pseudo-documents, shows lower fluency but still fewer content errors—an
    outcome that is counterintuitive.
- id: Q66
  page: 7
  dimension: output_form
  text: However, when translating into African languages, the results are less consistent.
- id: Q67
  page: 7
  dimension: output_ontology
  text: These inconsistencies raise concerns about GPT-4o's reliability.
- id: Q68
  page: 7
  dimension: output_form
  text: Consequently, we focus on human evaluation going forward.
- id: Q69
  page: 7
  dimension: output_content
  text: In Table 10 we report average direct assessment (DA) scores (on a scale from 0 to 100) from three annotators per language
    for the health domain, when translating into four African languages.
- id: Q70
  page: 7
  dimension: output_content
  text: For each language, we used 30 documents across models and both domains to compute inter-annotator
- id: Q71
  page: 8
  dimension: output_content
  text: We obtained Krippendorff's alpha values of ≥ 0.40, which are relatively low due to the fine granularity of the evaluation
    scale.
- id: Q72
  page: 8
  dimension: output_form
  text: Human evaluation results align closely with d-chrF, which favors sentence-level translations over pseudo-document
    translations when translating into African languages.
- id: Q73
  page: 8
  dimension: output_form
  text: Among the models, LLaMAX3-SFT1 receives higher ratings at the sentence-level but is rated lower when translating pseudo-documents.
- id: Q74
  page: 8
  dimension: output_form
  text: In contrast, LLaMAX3-SFT10 receives slightly lower ratings than LLaMAX3-SFT1 at the sentence-level but is rated higher
    in the pseudo-document setting.
- id: Q75
  page: 8
  dimension: output_form
  text: GPT-3.5 is generally rated as the weakest model across languages, except for Swahili, where its performance is comparatively
    better.
- id: Q76
  page: 8
  dimension: output_content
  text: Our qualitative analysis, based on feedback from native speakers who are also authors, indicates that GPT-3.5 frequently
    over-generates in the pseudo-document setup by repeating words and phrases—except in Swahili, where it performs best.
- id: Q77
  page: 8
  dimension: input_form
  text: However, for Yorùbá, it often uses inconsistent or partial diacritics, resulting in inaccuracies.
- id: Q78
  page: 8
  dimension: output_form
  text: LLaMAX3-SFT1 also exhibits repetition in pseudo-document translations, likely due to a length generalization problem
    (Anil et al., 2022), and does so more than LLaMAX3-SFT10.
- id: Q79
  page: 8
  dimension: output_form
  text: For the other four languages, LLaMAX3-SFT1 with the sentence-level setup was rated higher than other models and configurations,
    owing to better context preservation and fewer repetitions.
- id: Q80
  page: 9
  dimension: input_content
  text: We introduce AFRIDOC-MT, a document-level translation dataset in the health and tech domains for five African languages.
- id: Q81
  page: 9
  dimension: input_ontology
  text: We benchmarked various models, fine-tuning selected ones.
