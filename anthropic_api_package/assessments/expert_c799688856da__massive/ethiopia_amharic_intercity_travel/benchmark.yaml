- id: Q1
  page: 1
  dimension: input_ontology
  text: MASSIVE contains 1M realistic, parallel, labeled virtual assistant utterances spanning 51 languages, 18 domains, 60
    intents, and 55 slots.
- id: Q2
  page: 1
  dimension: input_content
  text: MASSIVE was created by tasking professional translators to localize the English-only SLURP dataset into 50 typologically
    diverse languages from 29 genera.
- id: Q3
  page: 1
  dimension: input_form
  text: With the English seed data included, there are 587k train utterances, 104k dev utterances, 152k test utterances, and
    153k utterances currently held out for the MMNLU-22 competition, which will be released after the competition.
- id: Q4
  page: 1
  dimension: input_content
  text: MASSIVE was created by localizing the SLURP NLU dataset (created only in English) in a parallel manner.
- id: Q5
  page: 1
  dimension: output_form
  text: We also present modeling results on XLM-R and mT5, including exact match accuracy, intent classification accuracy,
    and slot-filling F1 score.
- id: Q6
  page: 1
  dimension: output_content
  text: one difficulty in creating massively multilingual NLU models is the lack of labeled data for training and evaluation,
    particularly data that is realistic for the task and that is natural for each given language.
- id: Q7
  page: 1
  dimension: output_content
  text: High naturalness typically requires human-based vetting, which is often costly.
- id: Q8
  page: 1
  dimension: input_content
  text: Jack FitzGerald, Christopher Hench, Charith Peris, Scott Mackie, Kay Rottmann, Ana Sanchez, Aaron Nash, Liam Urbach,
    Vishesh Kakarala, Richa Singh, Swetha Ranganath, Laurie Crist, Misha Britan, Wouter Leeuwis, Gokhan Tur, Prem Natarajan
    from Amazon, Microsoft, Tripadvisor, and Capital One.
- id: Q9
  page: 2
  dimension: input_content
  text: The first iteration for the foundation of the MASSIVE dataset was the NLU Evaluation Benchmarking Dataset, with 25k
    utterances across 18 domains (Liu et al., 2019a).
- id: Q10
  page: 2
  dimension: input_form
  text: The authors updated the dataset and added audio and ASR transcriptions in the release of the Spoken Language Understanding
    Resource Package (SLURP) (Bastianelli et al., 2020), allowing for full end-to-end Spoken Language Understanding (SLU)
    evaluation similar to the Fluent Speech Commands dataset (Lugosch et al., 2019) and Chinese Audio-Textual Spoken Language
    Understanding (CATSLU) (Zhu et al., 2019).
- id: Q11
  page: 2
  dimension: input_ontology
  text: We release the MASSIVE dataset along with baselines from large pre-trained models fine-tuned on the NLU slot and intent
    prediction tasks.
- id: Q12
  page: 2
  dimension: input_ontology
  text: This work focuses on the general multi-domain NLU task and builds off the SLURP (Bastianelli et al., 2020) benchmark
    dataset to extend to an unprecedented 50 new languages.
- id: Q13
  page: 2
  dimension: input_ontology
  text: The Snips datasets (both the original English only and the English and French releases) are most similar to the NLU
    contained in the MASSIVE dataset, spanning smart home and music domains for a generic voice-based virtual assistant.
- id: Q14
  page: 2
  dimension: input_content
  text: Facebook released a general Intelligent Virtual Assistant (IVA) dataset across the domains of Alarm, Reminder, and
    Weather (Schuster et al., 2019) created for the purpose of demonstrating cross-lingual transfer learning; and so did not
    need to be parallel or have an equal number of datapoints, resulting in far fewer examples in Thai (5k) compared to Spanish
    (7.6k) and English (43k).
- id: Q15
  page: 3
  dimension: input_content
  text: The languages in MASSIVE were chosen according to the following considerations. First, we acquired cost and worker
    availability estimates for over 100 languages, providing a constraint to our choices given our fixed budget.
- id: Q16
  page: 3
  dimension: input_ontology
  text: Second, we determined existing languages available in major virtual assistants, such that the dataset could be used
    to benchmark today's systems.
- id: Q17
  page: 3
  dimension: input_content
  text: Third, we categorized the full pool of languages according to their genera as taken from the World Atlas of Linguistic
    Structures (WALS) database (Dryer and Haspelmath, 2013), where a genus is a language group that is clear to most linguists
    without systematic comparative analysis.
- id: Q18
  page: 3
  dimension: input_ontology
  text: Genus is a better indicator of typological diversity, which we sought to maximize, than language family (Dryer, 1989).
- id: Q19
  page: 3
  dimension: input_content
  text: Fourth, we used the eigenvector centrality of Wikipedia articles, tweets, and book translations (Ronen et al., 2014)
    as proxies for the internet influence and thus the resource availability of a given language, particularly for self-supervised
    pretraining applications, and we chose languages spanning the breadth of resource availability.
- id: Q20
  page: 3
  dimension: input_form
  text: Fifth, we examined the script of each language, seeking to increase script diversity to drive experimentation in tokenization
    and normalization.
- id: Q21
  page: 3
  dimension: input_content
  text: Ultimately, we created 50 new, distinct text corpora, representing 49 different spoken languages.
- id: Q22
  page: 3
  dimension: input_content
  text: Mandarin Chinese was collected twice, once with native speakers who use the traditional set of characters, and once
    with native speakers who use the modern simplified set of characters.
- id: Q23
  page: 3
  dimension: input_content
  text: There are 14 language families in the dataset.
- id: Q24
  page: 3
  dimension: input_ontology
  text: In MASSIVE, we also include "language isolates" as families. These are languages that have no clear relationship to
    any known language.
- id: Q25
  page: 3
  dimension: input_form
  text: There are 21 distinct scripts used in the dataset.
- id: Q26
  page: 3
  dimension: input_form
  text: The majority of languages in MASSIVE (28 including English) use some variety of the Latin alphabet, which is also
    the most widely used script in the world.
- id: Q27
  page: 3
  dimension: input_form
  text: The Arabic script is used for three languages, the Cyrillic script for two languages, and the remaining 18 languages
    have "unique" scripts, in the sense that only one language in the dataset uses that script.
- id: Q28
  page: 3
  dimension: input_form
  text: Fourteen scripts are unique to a single language, although they may belong to a larger family of writing systems.
- id: Q29
  page: 4
  dimension: input_content
  text: MASSIVE consists of utterances directed at a device, rather than a person, which has some consequences for the type
    of linguistic patterns it contains.
- id: Q30
  page: 4
  dimension: input_ontology
  text: Specifically, the corpus primarily consists of interrogatives (i.e., questions) and imperatives (commands or requests).
- id: Q31
  page: 4
  dimension: input_ontology
  text: There are relatively few declarative utterances in the set.
- id: Q32
  page: 4
  dimension: input_ontology
  text: This is in contrast to many large datasets from other sources (e.g., wikipedia, movie scripts, newspapers) which contain
    a high proportion of declaratives, since the language is collected from situations where humans are communicating with
    humans.
- id: Q33
  page: 4
  dimension: input_content
  text: In the context of a voice assistant, a user typically asks a device to perform an action or answer a question, so
    declaratives are less common.
- id: Q34
  page: 4
  dimension: input_ontology
  text: In MASSIVE, 39 languages are subject-initial (24 SVO and 15 SOV), while only three are verb-initial (VSO specifically).
- id: Q35
  page: 4
  dimension: input_ontology
  text: No object-initial languages are represented.
- id: Q36
  page: 4
  dimension: input_ontology
  text: Five languages are marked in WALS as having no preferred word order, and four do not have any word order data at all.
- id: Q37
  page: 4
  dimension: input_ontology
  text: The majority of them (33) use some kind of verb morphology, such as adding a suffix.
- id: Q38
  page: 4
  dimension: input_ontology
  text: About half of those languages (18) have distinct imperative
- id: Q39
  page: 5
  dimension: input_content
  text: We randomly sampled a subset of the English seed data which was then paraphrased by professional annotators, resulting
    in new, more challenging utterances, including 49% more slots per utterance.
- id: Q40
  page: 5
  dimension: output_form
  text: These utterances were localized along with the other splits to be used as a held out evaluation set for the Massively
    Multilingual NLU-22 competition and workshop.
- id: Q41
  page: 5
  dimension: input_content
  text: The MASSIVE dataset was collected using a customized workflow powered by Amazon MTurk.
- id: Q42
  page: 5
  dimension: input_content
  text: We required a vendor pool with the capability and resources to collect a large multilingual dataset.
- id: Q43
  page: 5
  dimension: output_content
  text: Our original vendor pool consisted of five vendors adjudicated based on previous engagements.
- id: Q44
  page: 5
  dimension: output_content
  text: This vendor pool was reduced to three based on engagement and resource availability.
- id: Q45
  page: 5
  dimension: output_content
  text: Vendors for each language were selected based on their resource
- id: Q46
  page: 5
  dimension: input_ontology
  text: Nearly half of the languages in MASSIVE (21) make a two-way formal/informal distinction in their second-person pronouns.
- id: Q47
  page: 5
  dimension: input_ontology
  text: A further eight languages have more than two levels of formality, such as informal, formal, and honorific.
- id: Q48
  page: 5
  dimension: input_ontology
  text: Seven languages have an "avoidance" strategy, which means that pronouns are omitted entirely in a polite scenario.
- id: Q49
  page: 5
  dimension: input_ontology
  text: Finally, eleven languages have no data on politeness in WALS at all.
- id: Q50
  page: 6
  dimension: input_content
  text: A majority of languages were supported by a single vendor, while some languages required cross-vendor support to be
    completed with the required quality and within the required timeline.
- id: Q51
  page: 6
  dimension: output_content
  text: We offered two mechanisms to vendors for evaluating workers to be selected for each language. The first, which was
    used to select workers for the translation task, was an Amazon MTurk-hosted fluency test where workers listen to questions
    and statements in the relevant language and were evaluated using a multiple-choice questionnaire.
- id: Q52
  page: 6
  dimension: output_content
  text: The second, which was used to select workers for the judgment task, was a test with a set of three judgments that
    the vendor could use to assess if workers were able to detect issues in the translated utterances.
- id: Q53
  page: 6
  dimension: output_content
  text: In order to further improve worker selection quality, we created a translator quiz using the Amazon MTurk instructions
    that were created for translation and judgment tasks, coupled with customized local-language examples.
- id: Q54
  page: 6
  dimension: output_content
  text: Before commencing operations, an initial pilot run of this customized workflow was completed in three languages.
- id: Q55
  page: 6
  dimension: input_form
  text: The collection was conducted by locale on an individual utterance level. Each utterance from the "train," "dev," "test,"
    and "heldout" splits of the SLURP dataset went through two sequential task workflows and a judgment workflow.
- id: Q56
  page: 6
  dimension: input_ontology
  text: The first task is slot translation or localization (see Figure 1). Workers are presented the entire utterance with
    colored highlighting of the slot values for the utterance (if any) and then presented with each slot value and its corresponding
    label individually.
- id: Q57
  page: 6
  dimension: input_ontology
  text: The worker is asked to either localize or translate the slot, depending on whether the value should be translated
    (e.g., "tomorrow") or localized (e.g., the movie "La La Land", which in French is "Pour l'amour d'Hollywood.")
- id: Q58
  page: 6
  dimension: output_ontology
  text: The metadata of the released dataset includes whether the worker elected to "localize," "translate," or keep the slot
    "unchanged," primarily for the purposes of researchers evaluating machine translation systems, where it would be unreasonable
    to expect the system to "localize" to a specific song name the worker selected.
- id: Q59
  page: 6
  dimension: input_ontology
  text: After the slot task, the second worker is asked to translate or localize the entire phrase using the slot task output
    provided by the first worker (see Figure 2).
- id: Q60
  page: 6
  dimension: input_ontology
  text: The phrase worker can decide to keep the slot as it was translated, modify it, or remove it entirely if it is not
    relevant for the language in that scenario.
- id: Q61
  page: 6
  dimension: input_ontology
  text: This worker is also responsible for aligning grammatical genders or prepositional affixes to any of the slots.
- id: Q62
  page: 6
  dimension: output_content
  text: Note that this two-step system alleviates the annotation burden often encountered with such work. Traditionally in
    such collections, workers would be given a light annotation guide and asked to highlight spans of the slots in a translated
    or localized utterance.
- id: Q63
  page: 6
  dimension: output_form
  text: The output of the second workflow (the fully localized utterance) is judged by three workers for (1) whether the utterance
    matches the intent semantically, (2) whether the slots match their labels semantically, (3) grammaticality and naturalness,
    (4) spelling, and (5) language identification—English or mixed utterances are acceptable if that is natural for the language,
    but localizations without any tokens in the target language were not accepted.
- id: Q64
  page: 6
  dimension: output_ontology
  text: These judgments are also included in the metadata of the dataset.
- id: Q65
  page: 6
  dimension: output_content
  text: In addition to the workers judging each other's work, the collection system had alarms in place for workers with high
    rejection rates, high rates of slot deletion, and high rates of English tokens in the translations.
- id: Q66
  page: 6
  dimension: output_content
  text: Workers were also monitored to see if their tasks were primarily machine translated. Such workers were removed from
    the pool and all of their work was resubmitted to be completed by the other workers.
- id: Q67
  page: 7
  dimension: input_ontology
  text: As initial model benchmarks, we fine-tuned publicly-available pre-trained language models on the MASSIVE dataset and
    evaluated them on intent classification and slot filling.
- id: Q68
  page: 7
  dimension: output_form
  text: Our models of choice for this exercise were XLM-Roberta (XLM-R; Conneau et al. 2020) and mT5 (Xue et al., 2021).
- id: Q69
  page: 7
  dimension: output_form
  text: In the case of XLM-R, we utilized the pretrained encoder with two separate classification heads trained from scratch,
    based on JointBERT (Chen et al., 2019a).
- id: Q70
  page: 7
  dimension: output_form
  text: The first classification head used the pooled output from the encoder to predict the intent and the second used the
    sequence output to predict the slots.
- id: Q71
  page: 7
  dimension: output_form
  text: As pooling for the intent classification head, we experimented with using hidden states from the first position, averaged
    hidden states across the sequence, and the maximally large hidden state from the sequence.
- id: Q72
  page: 7
  dimension: output_form
  text: With mT5, we explored two separate architectures. In one architecture, we only used the pre-trained encoder extracted
    from mT5, and we trained two classification heads from scratch similarly to the XLM-R setup. We refer to this setup as
    mT5 Encoder-Only. In the other architecture, we used the full sequence-to-sequence mT5 model in text-to-text mode, where
    the input is "Annotate:" followed by the unlabeled utterance.
- id: Q73
  page: 7
  dimension: output_ontology
  text: The decoder output is a sequence of labels (including the Other label) for all of the tokens followed by the intent.
- id: Q74
  page: 7
  dimension: output_form
  text: For all models, we used the Base size, which corresponds to 270M parameters for XLM-R, 258M parameters for mT5 Encoder-Only,
    and 580M parameters for mT5 Text-to-Text, including 192M parameters for embeddings for all three.
- id: Q75
  page: 7
  dimension: output_form
  text: For each model, we performed 128 trials of hyperparameter tuning using the Tree of Parzen Estimators algorithm and
    Asynchronous Successive Halving Algorithm (ASHA) (Li et al., 2018a) for scheduling, which are both part of the hyperopt
    library (Bergstra et al., 2013) integrated into the ray[tune] library (Liaw et al., 2018).
- id: Q76
  page: 7
  dimension: output_form
  text: We trained our models with the Adam optimizer (Kingma and Ba, 2017) and chose the best performing model checkpoint
    based on overall exact match accuracy across all locales.
- id: Q77
  page: 7
  dimension: output_form
  text: Hyperparameter tuning and fine-tuning was performed using single p3dn.24xlarge instances (8 x Nvidia v100) for XLM-R
    and mT5 Text-to-Text and a single g4dn.metal instance (8 x Nvidia T4) for mT5 Encoder-Only.
- id: Q78
  page: 7
  dimension: output_form
  text: Hyperparameter tuning times were less than 4 days per model and training times were less than 1 day per model.
- id: Q79
  page: 7
  dimension: input_form
  text: Our dataset includes several languages where white spacing is not used as a word delimiter. In some cases, spaces
    do occur, but they might serve as phrase delimiters or denote the end of a sentence.
- id: Q80
  page: 7
  dimension: input_form
  text: Three of these written languages, Japanese, Chinese (Traditional), and Chinese (Simplified), do not use spaces anywhere
    except to identify the end of a sentence. For these languages, we separate each character in the unlabeled input with
    a whitespace.
- id: Q81
  page: 7
  dimension: input_form
  text: We leave exploration of more sophisticated techniques (such as MeCab for Japanese; Kudo 2005) to future work.
- id: Q82
  page: 7
  dimension: input_form
  text: We use the default spacing provided by annotators for all other languages.
- id: Q83
  page: 7
  dimension: output_form
  text: Zero-shot performance was also assessed, in which the models were trained on English data, validation was performed
    on all languages, and testing was performed on all non-English locales.
- id: Q84
  page: 7
  dimension: output_form
  text: Table 3 shows the results for each model and training setup, including those for the best performing locale, the worst
    performing locale, and locale-averaged results for intent accuracy, micro-averaged slot F1 score, and exact match accuracy.
- id: Q85
  page: 7
  dimension: output_form
  text: Zero-shot exact match performance is 25-37 points worse than that of full-dataset training runs.
- id: Q86
  page: 7
  dimension: output_form
  text: Additionally, the variance in task performance across locales is significantly greater for the zero-shot setup than
    for full-dataset training. For example, there is a 15 point difference in exact match accuracy between the highest and
    lowest locales for mT5 Text-to-Text when using the full training set, while the gap expands to 44 points with zero-shot.
- id: Q87
  page: 7
  dimension: output_form
  text: We compared the pretraining data quantities by language for XLM-R to its per-language task performance values, and
    in the zero shot setup, we found a Pearson correlation of 0.54 for exact match
- id: Q88
  page: 8
  dimension: output_form
  text: Each table includes the highest locale, the lowest locale, and locale-averaged results for intent accuracy, micro-averaged
    slot F1 score, and exact match accuracy.
- id: Q89
  page: 8
  dimension: output_form
  text: Intervals for 95% confidence are given assuming normal distributions.
- id: Q90
  page: 8
  dimension: output_form
  text: In the full dataset training setup, the correlations decrease to 0.42 for exact match accuracy, 0.47 for intent accuracy,
    and 0.24 for micro-averaged slot F1 score.
- id: Q91
  page: 8
  dimension: input_form
  text: In Thai, for which spacing is optional, the model can learn from artificial spacing in the input (around where the
    slots will be) to improve task performance.
- id: Q92
  page: 8
  dimension: output_content
  text: For Khmer, the workers had a difficult time adapting their translations and localizations to properly-slotted outputs
    given the space-optional nature of the language.
- id: Q93
  page: 8
  dimension: input_form
  text: Additionally, for Japanese and Chinese, we added spaces between all characters when modeling.
- id: Q94
  page: 8
  dimension: input_form
  text: By splitting into single characters, we don't allow the model to the use embeddings learned for chunks of characters.
- id: Q95
  page: 8
  dimension: output_form
  text: This is a likely major cause of the drop in exact match accuracy for Japanese from 58.3% when training on the full
    dataset to 9.4% for zero shot.
- id: Q96
  page: 8
  dimension: input_form
  text: character spacing was necessary in order to properly assign the slots to the right characters.
- id: Q97
  page: 8
  dimension: input_form
  text: As mentioned in Section 5.1, we leave exploration of more sophisticated spacing techniques for slot filling (such
    as MeCab; Kudo 2005) to future work.
- id: Q98
  page: 8
  dimension: output_form
  text: Discounting for artificial spacing effects, Germanic genera and Latin scripts performed the best overall (See Appendix
    E), which is unsurprising given the amount of pretraining data for those genera and scripts, as well as the quantity of
    Germanic and Latin-script languages in MASSIVE.
- id: Q99
  page: 8
  dimension: output_form
  text: Within the Germanic genera, Swedish, English, Danish, Norwegian, and Dutch all performed comparably (within 95% confidence
    bounds) for exact match accuracy.
- id: Q100
  page: 8
  dimension: output_form
  text: Icelandic was the lowest-performing Germanic language, likely due to a lack of pretraining data, as well as to its
    linguistic evolution away from the others due to isolated conditions.
- id: Q101
  page: 8
  dimension: input_ontology
  text: We have released a truly MASSIVE multilingual dataset for NLU spanning 51 typologically diverse languages.
- id: Q102
  page: 9
  dimension: input_content
  text: There are several significant limitations of the MASSIVE dataset and of our modeling.
- id: Q103
  page: 9
  dimension: input_content
  text: Starting with the dataset, the per-language data quantities are relatively small at 19.5k total records and 11.5k
    records for training.
- id: Q104
  page: 9
  dimension: output_content
  text: Second, there are some low-quality utterances, both in the seed data and in the translations.
- id: Q105
  page: 9
  dimension: output_content
  text: For the most part, these are surfaced through the judgment scores we provide for each record, but if a user does filtering
    based on these judgments, then the data size decreases even further.
- id: Q106
  page: 9
  dimension: input_content
  text: Third, the data were originally created through crowd-sourcing, not from a real virtual assistant, which introduces
    artificialities.
- id: Q107
  page: 9
  dimension: input_content
  text: Relatedly, allowing the worker to decide on translation versus localization of slot entities added further noise to
    the dataset, although we try to store this decision in the metadata.
- id: Q108
  page: 9
  dimension: output_ontology
  text: Fourth, our labeling schema is relatively simple when compared with hierarchical labeling schemata or flat schemata
    with more intent and slot options.
- id: Q109
  page: 9
  dimension: input_form
  text: Fifth, our collection system did not have a robust method to preserving or denoting native tokenization practices—some
    languages do not separate with whitespace, while others do but there is no set practice.
- id: Q110
  page: 9
  dimension: input_form
  text: This results in potentially easier (larger chunks to predict slot labels) or harder (each character individually predicted)
    tasks.
- id: Q111
  page: 9
  dimension: output_content
  text: Sixth, it's possible, though unlikely, that some of our new crowd-sourced records may contain toxic or otherwise objectionable
    content.
- id: Q112
  page: 9
  dimension: output_content
  text: We performed analyses to check for such malicious activities and did not find any as such.
- id: Q113
  page: 9
  dimension: output_form
  text: Regarding modeling, we have only investigated base-sized models in relatively standard setups, leaving room for much
    more sophisticated modeling.
- id: Q114
  page: 9
  dimension: output_content
  text: The risks associated with this dataset and work are relatively low, given that we have released a research dataset
    meant to promote better multilinguality in NLP systems.
