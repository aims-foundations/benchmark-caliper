coverage_strengths:
- user_priority: French biomedical NER and STS tasks
  benchmark_coverage: 20 tasks including NER, STS, and classification across clinical cases, scientific literature, and clinical
    trial protocols — the first large benchmark specifically for French biomedical NLP [Q1, Q83]
  dimension: input_ontology
- user_priority: 'Drug labeling text (partial): EMEA drug leaflets and regulatory sources'
  benchmark_coverage: QUAERO corpus includes 103,056 words sourced from EMEA drug leaflets (alongside MEDLINE biomedical titles),
    annotated for NER [Q33, Q34]; Mantra-GSC includes a French drug label subset evaluated separately [Q40]
  dimension: input_content
- user_priority: Metropolitan France primary scope
  benchmark_coverage: All 11 authors are affiliated with French academic and clinical institutions; the benchmark is explicitly
    designed for the French biomedical domain [Q7, Q8, Q83]
  dimension: input_content
- user_priority: Multi-candidate confidence scoring with human-in-the-loop adjudication
  benchmark_coverage: Evaluation protocol averages results over four runs with statistical significance testing [Q51]; the
    best model is saved on validation metrics to mitigate overfitting [Q100]; inter-annotator agreement for DiaMed computed
    with Kappa and Gwet's AC1 [Q46], providing a reference baseline for label uncertainty
  dimension: output_content
- user_priority: Domain-specialized French biomedical language models
  benchmark_coverage: Domain- and language-specialized biomedical models (DrBERT-FS, DrBERT-CP, CamemBERT-bio) lead on up
    to 75% of tasks; DrBERT-FS achieves top performance on 8 tasks [Q61, Q62], demonstrating benchmark sensitivity to domain
    specialization
  dimension: output_form
- user_priority: Semantic textual similarity evaluation for compliance checking
  benchmark_coverage: STS tasks evaluated with both Spearman correlation and EDRM (mean relative solution distance accuracy)
    metrics as defined by DEFT-2020 authors [Q54]; CLISTER provides 1,000 manually annotated French clinical sentence pairs
    [Q41]
  dimension: output_form
coverage_gap_analysis:
- user_priority: EU regulatory submission document genres (SmPCs, PILs, CTD modules)
  benchmark_coverage: No task explicitly covers EU regulatory submission genres. QUAERO includes EMEA drug leaflets for NER
    [Q34] and Mantra-GSC includes drug labels [Q40], but no STS or compliance-checking task is framed around legally constrained
    regulatory document types. Clinical cases and research abstracts dominate the corpus [Q19].
  gap_type: partial
  web_search_target: French biomedical NLP benchmark SmPC patient information leaflet regulatory text NER STS EMA ANSM
- user_priority: Regulatory entity vocabulary (INNs, ATC codes, excipient nomenclature, EMA posology templates)
  benchmark_coverage: NER label sets use UMLS Semantic Groups [Q35, Q103], ICD-10 chapter labels [Q107], and MeSH axes [Q27]
    — clinical/research ontologies that do not map to regulatory labeling entity types. No dataset explicitly targets INNs,
    ATC codes, or EMA posology expression patterns.
  gap_type: partial
  web_search_target: NER benchmark INN ATC code excipient EMA regulatory entity annotation French pharmaceutical labeling
- user_priority: STS scoring calibrated for regulatory equivalence (legally significant small-magnitude differences)
  benchmark_coverage: STS tasks use a coarse 0–5 Likert-style scale representing general semantic proximity [Q22, Q41, Q54].
    No evidence that the scoring rubric distinguishes legally significant lexical differences (dose thresholds, contraindicated
    population qualifiers) from semantically proximate but legally equivalent phrasings.
  gap_type: full
  web_search_target: semantic textual similarity fine-grained regulatory equivalence drug labeling scoring rubric EMA ANSM
    compliance French NLP
- user_priority: Annotation authority aligned with EMA/ANSM regulatory standards
  benchmark_coverage: Annotators are clinical professionals, NLP researchers, and one medical expert [Q45]. No regulatory
    affairs specialists, pharmacovigilance officers, or legal experts are identified in any annotation team. CAS POS labels
    are silver-standard (automatic + 98% precision validation) [Q42], not gold-standard adjudicated labels.
  gap_type: full
  web_search_target: regulatory affairs annotation ground truth EMA SmPC ANSM NLP benchmark pharmacovigilance expert annotator
    French
- user_priority: French overseas territories and tropical disease vocabulary
  benchmark_coverage: DiaMed is drawn from the Pan African Medical Journal [Q45] and may incidentally include tropical pathology
    cases, but no data source is described as specifically targeting French overseas territories (Martinique, Guadeloupe,
    French Guiana, Réunion, Mayotte) or tropical disease terminology. This dimension is entirely undocumented.
  gap_type: full
  web_search_target: French overseas territories biomedical NLP tropical pathology dengue paludisme chikungunya NER benchmark
    Martinique Réunion
- user_priority: Confidence calibration and uncertainty thresholds for human review triggering
  benchmark_coverage: The benchmark evaluates classification performance against a majority-class baseline [Q56] and STS performance
    with Spearman/EDRM [Q54], but does not document confidence calibration, probability estimation quality, or score thresholds
    that would trigger mandatory human review. The leading model fails to excel on both MLC and STS simultaneously [Q82],
    underscoring that no single model meets the output granularity required for automated compliance routing.
  gap_type: partial
  web_search_target: confidence calibration uncertainty quantification biomedical NLP regulatory compliance human-in-the-loop
    French NER STS threshold
- user_priority: ANSM vs. EMA normative divergence in safety warning standards
  benchmark_coverage: NOT DOCUMENTED — no dataset, task, or annotation guideline references ANSM national circulars or the
    distinction between ANSM national procedure and EMA centralized procedure compliance standards.
  gap_type: full
  web_search_target: ANSM EMA divergence safety warning SmPC labeling standards France national vs centralized procedure regulatory
    compliance
