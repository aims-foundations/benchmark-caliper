  text: Unsurprisingly, in almost all scenarios, having the complete training set yields better results than having only 25%
    of it.
- id: Q73
  page: 7
  dimension: output_form
  text: However, all the models based on CamemBERT face difficulties in corpora with limited amount of data, such as MantraGSC
    Patents, where they fail to generate labels other than 'O'.
- id: Q74
  page: 7
  dimension: output_form
  text: On the other hand, in the same low-resource scenarios, CamemBERTa models exhibit greater robustness and achieve superior
    performance.
- id: Q75
  page: 8
  dimension: input_form
  text: Tokenizers play a crucial role in MLMs by utilizing size-limited vocabularies to split texts into sub-units, aiming
    to handle out-of-vocabulary (OOV) words.
- id: Q76
  page: 8
  dimension: input_content
  text: Due to variations in the training data, vocabularies differ across different models, as illustrated in Figure 2.
- id: Q77
  page: 8
  dimension: input_form
  text: So far, there has been a prevailing notion in the community that excessive segmentation of words in tokenization leads
    to a loss of morphological form and semantic meaning, introducing noise and adversely affecting performance (Church, 2020;
    Hofmann et al., 2021; Bostrom and Durrett, 2020).
- id: Q78
  page: 8
  dimension: input_form
  text: However, our experiments, as shown in Table 7, reveal that FlauBERT is the model with the least word segmentation
    (1.43 in average), while DrBERT-CP tends to have the highest average segmentation (1.90 in average).
- id: Q79
  page: 8
  dimension: input_form
  text: Surprisingly, when comparing the performance of these two models on the benchmark tasks, we observe that DrBERT-CP
    outperforms FlauBERT on 16 out of the 20 tasks, thus contradicting previous conclusions drawn by the community.
- id: Q80
  page: 8
  dimension: input_form
  text: Yet, tokenization, as it is currently done in MLMs, seems to play a minor role in the performance of systems.
- id: Q81
  page: 8
  dimension: input_ontology
  text: 'Table 8 summarizes the results obtained on average by the considered MLMs when aggregating the tasks into one of
    the five designated categories: POS, NER, MCQA, MCC (Multi-class classification), MLC (Multi-label classification), or
    STS tasks.'
- id: Q82
  page: 8
  dimension: output_ontology
  text: Upon analyzing the average performance by task category, it becomes evident that the leading model, DrBERT-FS, does
    not excel in tasks such as MLC or STS.
- id: Q83
  page: 9
  dimension: input_ontology
  text: In this paper, we introduced DrBenchmark, the first large language understanding benchmark tailored for the French
    biomedical domain.
- id: Q84
  page: 9
  dimension: input_ontology
  text: We conducted a qualitative evaluation of 8 state-of-the-art masked language models (MLMs) on this comprehensive benchmark,
    encompassing 20 diverse downstream tasks.
- id: Q85
  page: 9
  dimension: output_form
  text: Our findings illuminate the limitations of generalist models in tackling complex biomedical tasks, emphasizing the
    importance of employing domain-specific models to achieve peak performance.
- id: Q86
  page: 9
  dimension: output_form
  text: We have observed that several biomedical tasks in DrBenchmark exhibit relatively poor performance, even when utilizing
    specialized biomedical models.
- id: Q87
  page: 9
  dimension: output_ontology
  text: We postulate that the models examined in this study, here state-of-the-art MLMs, may not be the most effective choices
    for specific tasks such as question-answering or multi-label classification.
- id: Q88
  page: 9
  dimension: output_form
  text: The quantitative study we conducted on the PLMs requires further in-depth analysis to comprehend the impact of different
    parameters.
- id: Q89
