  dimension: input_ontology
  text: In this paper, we introduced DrBenchmark, the first large language understanding benchmark tailored for the French
    biomedical domain.
- id: Q84
  page: 9
  dimension: input_ontology
  text: We conducted a qualitative evaluation of 8 state-of-the-art masked language models (MLMs) on this comprehensive benchmark,
    encompassing 20 diverse downstream tasks.
- id: Q85
  page: 9
  dimension: output_form
  text: Our findings illuminate the limitations of generalist models in tackling complex biomedical tasks, emphasizing the
    importance of employing domain-specific models to achieve peak performance.
- id: Q86
  page: 9
  dimension: output_form
  text: We have observed that several biomedical tasks in DrBenchmark exhibit relatively poor performance, even when utilizing
    specialized biomedical models.
- id: Q87
  page: 9
  dimension: output_ontology
  text: We postulate that the models examined in this study, here state-of-the-art MLMs, may not be the most effective choices
    for specific tasks such as question-answering or multi-label classification.
