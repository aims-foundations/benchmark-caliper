coverage_strengths:
- user_priority: French biomedical NLP foundational engine for regulatory extraction
  benchmark_coverage: 'DrBenchmark is the first large-scale French biomedical NLU benchmark, covering NER

    and STS tasks across 20 datasets [Q83, Q84], providing a comprehensive foundation

    for evaluating French biomedical language models that could serve as the base engine

    for regulatory extraction workflows.

    '
  dimension: input_ontology
- user_priority: Drug labeling documents — EMEA drug leaflets and drug labels
  benchmark_coverage: 'QUAERO explicitly includes drug leaflet text sourced from EMEA (103,056 words total)

    [Q33, Q34], and Mantra-GSC includes EMEA drug labels and patent text as separate

    annotated subsets [Q40] — the two closest genre matches to the deployment''s SmPC

    and patient leaflet documents.

    '
  dimension: input_content
- user_priority: Pharmaceutical/chemical entity extraction (CHEM, SUBSTANCE, DOSAGE)
  benchmark_coverage: 'Multiple NER schemas include chemical and substance entity categories: QUAERO and

    Mantra-GSC both annotate CHEM entities [Q103, Q106]; PxCorpus annotates SUBSTANCE,

    DOSAGE, MODE, and TREATMENT among its 38 NER classes [Q108], providing partial

    coverage of the pharmaceutical entity types central to the deployment.

    '
  dimension: output_ontology
- user_priority: STS baseline for semantic proximity in French biomedical text
  benchmark_coverage: 'CLISTER provides 1,000 manually annotated French clinical sentence pairs with 0–5

    similarity scores averaged across multiple annotators [Q41], evaluated via Spearman

    correlation and the EDRM metric [Q54], offering a validated STS baseline in French

    biomedical language even if not calibrated for regulatory equivalence.

    '
  dimension: output_form
- user_priority: Specialized French biomedical language model selection
  benchmark_coverage: 'Domain- and language-specialized models (DrBERT-FS, DrBERT-CP, CamemBERT-bio)

    achieve top performance on 75% of DrBenchmark tasks [Q62], with DrBERT-FS leading

    on 8 tasks [Q61], enabling informed model selection for regulatory NLP deployment

    in French.

    '
  dimension: output_form
coverage_gap_analysis:
- user_priority: EU regulatory document genres (SmPCs, CTD modules, patient information leaflets, Risk Management Plans)
  benchmark_coverage: 'The task taxonomy is organized around clinical cases, research abstracts, and

    clinical trial protocols [Q19]. While QUAERO includes EMEA drug leaflet text [Q34]

    and Mantra-GSC includes EMEA subsets [Q40], SmPCs, CTD modules, and EU Risk

    Management Plans are not explicitly included as task categories or document sources.

    The benchmark acknowledges that general benchmarks may not adequately evaluate

    specialized-domain models [Q10], but does not address regulatory submission genres.

    '
  gap_type: partial
  web_search_target: French NLP benchmark SmPC ANSM EMA regulatory submission NER STS evaluation dataset
- user_priority: Regulatory entity types (INNs, ATC codes, excipient nomenclature, EMA-templated posology, contraindication
    qualifiers)
  benchmark_coverage: 'NER schemas across the benchmark are calibrated for clinical entities (pathologies,

    anatomical structures, procedures, UMLS Semantic Groups) [Q35, Q103, Q104]. While

    SUBSTANCE, DOSAGE, MODE [Q108] and CHEM [Q103, Q106] appear in some schemas, INN

    nomenclature, ATC codes, excipient names, and EMA-templated contraindication

    phrasing are not documented as distinct annotated entity categories anywhere in the

    benchmark. The elicitation confirmed these are precisely the entity types the

    deployment must detect [A2].

    '
  gap_type: partial
  web_search_target: INN ATC code excipient NER French regulatory NLP annotation benchmark EMA ANSM
- user_priority: STS scoring calibrated for regulatory equivalence (dose threshold sensitivity, contraindicated-population
    qualifiers)
  benchmark_coverage: 'STS tasks use a continuous 0–5 general semantic similarity scale averaged across

    annotators [Q41], evaluated via Spearman correlation and EDRM [Q54]. The leading

    model does not excel on STS tasks [Q82]. There is no documentation of annotator

    instructions designed to treat small lexical differences (e.g., dose thresholds,

    population qualifiers) as legally critical mismatches rather than near-synonymy.

    The EDRM metric is specific to DEFT-2020 task design [Q54] with no documented

    calibration for regulatory equivalence judgment.

    '
  gap_type: full
  web_search_target: regulatory equivalence STS semantic textual similarity drug labeling EMA scoring rubric French NLP
- user_priority: Ground-truth annotation by regulatory affairs specialists or EMA/ANSM-aligned experts
  benchmark_coverage: 'Annotation documentation is sparse across most datasets. The only confirmed medical

    expert contributor (DiaMed) annotated ICD-10 classification categories, not NER or

    STS tasks [Q45]. Annotator demographics and professional backgrounds are NOT

    DOCUMENTED for the majority of corpora. No annotation guidelines referencing

    EMA/ANSM regulatory standards are mentioned. Authors are affiliated with French

    academic NLP and clinical medicine institutions [Q8] — not regulatory affairs or

    pharmacovigilance units.

    '
  gap_type: full
  web_search_target: biomedical NLP annotation regulatory affairs pharmacologist EMA ground truth label quality French
- user_priority: Regulatory register of French (EMA/ANSM formal legal prose vs. clinical or research prose)
  benchmark_coverage: 'The benchmark''s French text is predominantly drawn from clinical cases, hospital

    records, research abstracts, and clinical trials [Q19]. QUAERO''s EMEA subset [Q34]

    provides the only documented instance of regulatory-register French, but it

    constitutes a minor fraction of total benchmark content. The distinctively formulaic,

    legally constrained register of ANSM circulars, EMA assessment reports, and SmPC

    templates is not explicitly characterized or represented as a benchmark design

    priority.

    '
  gap_type: partial
  web_search_target: ANSM EMA French regulatory language register NLP corpus SmPC legal prose evaluation
- user_priority: Patent claims language as a distinct document type for regulatory/IP workflows
  benchmark_coverage: 'Mantra-GSC includes a Patents subset (French) with 10 NER classes [Q40, Q106], and

    CamemBERT-based models exhibit poor performance on this low-resource corpus [Q73].

    However, the patent genre is not a primary benchmark focus, the subset is small, and

    the NER schema for patents does not appear to include INN/ATC/excipient-specific

    categories distinct from the EMEA annotation scheme [Q106].

    '
  gap_type: partial
  web_search_target: French patent NLP NER drug claim regulatory entity recognition benchmark evaluation
