  dimension: output_ontology
  text: 'Table 8 summarizes the results obtained on average by the considered MLMs when aggregating the tasks into one of
    the five designated categories: POS, NER, MCQA, MCC (Multi-class classification), MLC (Multi-label classification), or
    STS tasks.'
- id: Q82
  page: 8
  dimension: output_form
  text: Upon analyzing the average performance by task category, it becomes evident that the leading model, DrBERT-FS, does
    not excel in tasks such as MLC or STS.
- id: Q83
