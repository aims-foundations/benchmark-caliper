name: unintended_bias_metrics
full_name: Nuanced Metrics for Measuring Unintended Bias Against Identity Groups
source_url: https://git.io/fhpcC
paper_url: https://arxiv.org/abs/1903.04561
year: 2019
domain: Toxicity detection / unintended bias measurement in text classifiers
porting_strategy: none
languages:
- en
primary_region: United States / Global North (English-language online platforms)
description: 'This benchmark introduces a suite of five threshold-agnostic metrics — Subgroup AUC,

  BPSN AUC, BNSP AUC, Positive AEG, and Negative AEG — for measuring unintended bias

  in toxicity classifiers. Bias is operationalized as systematic variation in model

  performance across identity-group subgroups. The benchmark is demonstrated on two

  versions of the Perspective API toxicity classifier (TOXICITY@1 and TOXICITY@6) using

  two test sets: a synthetic dataset of ~77,000 examples generated from templates over

  50 identity terms, and a large human-labeled corpus of 1.8 million online comments

  with toxicity and identity annotations. All data is sourced from English-language

  online comment forums, and the identity taxonomy reflects Western online-community

  demographics. The benchmark was developed by the Jigsaw team at Google.

  '
documentation_excerpts: '## Key characteristics relevant to validity analysis:


  ### Input Ontology

  The benchmark''s primary task taxonomy is narrow: it evaluates whether a toxicity

  classifier''s performance degrades systematically when text mentions particular identity

  groups [Q13]. Evaluation is stratified by two model versions — TOXICITY@1 and

  TOXICITY@6, the latter incorporating bias mitigation [Q37, Q39] — and by comment

  length, with short comments (under 100 characters) broken out because the known bias

  mitigation specifically targeted short-form text [Q63]. There is no subtask taxonomy

  covering health-query-induced toxicity, implicit culturally embedded harmful content,

  or identity dimensions beyond those salient in English-language online comment

  communities. The authors acknowledge the need for "a full taxonomy of different

  possible biases and a systematic approach for these metrics to be used in their

  diagnosis" [Q81], implicitly conceding that the current taxonomy is incomplete.

  No subtasks correspond to son-preference gender discrimination, religiously coded

  slurs, or superstition-encoded health misinformation of the type relevant to the

  Gazipur deployment.


  ### Input Content

  Both test sets are derived entirely from English-language online comment platforms

  [Q29, Q30]. The synthetic set contains ~77,000 examples built from templates over

  50 manually curated identity terms [Q40, Q44], explicitly designed so toxicity

  judgment should be independent of the identity term present [Q41, Q42]. The

  real-data component comprises 1.8 million comments sourced from online comment

  forums, with a 450,000-comment subset labeled for identity [Q56, Q57]. The authors

  describe this as "one of the first studies of unintended bias based on identity

  references in text classification on real data" [Q76]. The 50 identity terms were

  manually curated [Q46] and reflect Western online demographics; no Bangladeshi

  religious, caste, or colorism-coded identity categories are documented. The

  synthetic examples are "simple sentences" [Q42] — structurally unlike the

  health-context conversational prompts, code-switched Banglish, or phonetic Bengali

  ASCII that would appear in the Gazipur deployment. The paper acknowledges that

  synthetic sets are "unlikely to capture the true diversity of ways that identities

  are discussed in real conversation" [Q46].


  ### Input Form

  The benchmark assumes clean, standard English text throughout. Synthetic examples

  are explicitly described as "simple sentences that should be clearly toxic or clearly

  non-toxic" [Q42], and the real-data corpus is sourced from structured online comment

  forums [Q56]. Comment length is the only documented formal variation, with a 100-

  character threshold distinguishing short from all comments [Q62], and identity-labeled

  subgroups restricted to those with more than 100 short-comment examples [Q64]. No

  preprocessing pipeline for degraded, code-switched, or non-Latin-script text is

  documented. The benchmark provides no coverage of Roman-script Bangla (Banglish),

  phonetic ASCII approximations of Bengali, or the absent-punctuation/irregular-spacing

  register that characterizes real user inputs in the Gazipur deployment. This is a

  severe mismatch for a deployment where toxic signals are embedded within

  systematically degraded input forms indistinguishable from ordinary user messages.


  ### Output Ontology

  The benchmark scores toxicity on a single continuous axis corresponding to a

  classifier output, with ground-truth derived from a four-point ordinal scale

  ("Very Toxic," "Toxic," "Hard to Say," "Not Toxic") [Q54]. Toxicity is defined as

  "anything that is rude, disrespectful, or unreasonable that would make someone want

  to leave a conversation" [Q2] — a definition anchored in the norms of English-

  language online discourse. Subtypes of toxicity were collected but explicitly not

  used in any analysis [Q55]. The output ontology does not distinguish health-context

  harmful content, son-preference discriminatory framing, inter-communal religious

  slurs, colorist remarks, or superstition-encoded health misinformation — all

  categories operationally relevant to the Gazipur deployment. The fairness criterion

  is defined as equality of model performance across designated identity groups [Q5],

  where those groups are defined by the Western online-comment identity taxonomy;

  groups such as Muslim/Hindu inter-communal distinctions or caste categories are

  outside the scoring framework. The "Hard to Say" label [Q54] acknowledges annotator

  uncertainty but provides no mechanism for culturally specific judgment.


  ### Output Content

  Identity labels were collected by crowd raters presented with structured questions

  about gender, race, and ethnicity references in comments, selecting from a provided

  identity list [Q47, Q48, Q49]. The approach was chosen because "human labeling for

  identity content allows us to capture nuanced identity content" [Q50]. Toxicity

  labels used the Perspective API crowd rating guidelines [Q53]. Some identity-labeled

  comments were preselected using iterative identity-labeling models [Q58]. The paper

  explicitly acknowledges that "the set of identities labelled by raters is not

  comprehensive and does not provide universal coverage" [Q51]. No annotator

  demographics, geographic origin, or cultural expertise are documented. Given that

  the source data is English-language online comments and the platform is a commercial

  crowdsourcing service [Q48], there is no documented representation of Bangladeshi

  or South Asian annotators. The identity category list provided to raters [Q49]

  would not have included religiously coded South Asian slurs, caste terminology,

  or colorism-specific categories. The paper acknowledges that "unintended model bias

  could be due to the demographic composition of the online user pool, the latent or

  overt biases of those doing the labelling, or the very selection and sampling process

  used to choose which items to label" [Q4], but provides no remediation for the

  absence of regional annotator representation relevant to the Gazipur context.


  ### Output Form

  The benchmark evaluates continuous toxicity scores output by the Perspective API

  classifier, assessed via five threshold-agnostic metrics derived from ROC-AUC,

  Equality Gap, and Mann-Whitney U statistics [Q11]. The threshold-agnostic design

  is explicitly motivated by the observation that threshold-dependent metrics "can

  obscure the view of unintended bias and thus be misleading to practitioners" [Q8].

  AUC is noted to be robust to class imbalances [Q17], and the metrics are described

  as providing "more nuanced insight into the types of bias present in the model"

  [Q16]. The paper applies these metrics across both short and all-comment strata

  [Q62] and confirms that bias manifests as skewing of non-toxic identity-mentioning

  comments toward higher toxicity scores [Q69]. The output modality — text-in,

  continuous-score-out — is broadly matched to the Gazipur deployment pipeline.

  However, score calibration and threshold assumptions were derived from English-

  language online comment distributions, and the paper itself cautions that "the

  correct handling of subtle variations in distributions must be decided on a case by

  case basis" [Q35], implicitly flagging that deployment-context distribution shifts

  require re-evaluation. The metrics would be measuring noise rather than valid

  toxicity signal if applied to Banglish or phonetic Bengali inputs, because the

  underlying classifier scores would themselves be unreliable for those input forms.


  ### Stated Limitations

  The authors acknowledge: the assumption of reliable labels is significant and does

  not hold in all use cases [Q6]; toxicity models reproduce societal biases by

  mis-associating identity group names with toxicity [Q3], potentially due to

  annotator demographics or sampling [Q4]; the synthetic identity term set is

  unlikely to capture real conversational diversity [Q46]; real data reveals more

  unintended bias than synthetic data while also being noisier [Q65, Q66]; bias

  remains present even after mitigation [Q77]; and that "any suite of metrics…

  always possible that there is subtle bias that the metrics cannot detect" [Q36].

  Forward-looking gaps include developing optimal threshold strategies [Q78],

  evaluating dataset-based vs. substring identity detection [Q79], and building a

  full bias taxonomy [Q81].

  '
verbatim_quotes:
- id: Q1
  page: 1
  dimension: input_content
  text: We also introduce a large new test set of online comments with crowd-sourced annotations for identity references.
- id: Q2
  page: 1
  dimension: output_ontology
  text: Toxicity, defined as anything that is rude, disrespectful, or unreasonable that would make someone want to leave a
    conversation, is an inherently complex and subjective classification task.
- id: Q3
  page: 1
  dimension: output_ontology
  text: Toxicity models specifically have been shown to capture and reproduce biases common in society, for example mis-associating
    the names of frequently attacked identity groups (such as "gay", and "muslim" etc.) with toxicity.
- id: Q4
  page: 1
  dimension: output_content
  text: This unintended model bias could be due to the demographic composition of the online user pool, the latent or overt
    biases of those doing the labelling, or the very selection and sampling process used to choose which items to label.
- id: Q5
  page: 1
  dimension: output_ontology
  text: We use a definition of model fairness similar to equality of odds defined in [10]. As in that work, we assume the
    existence of a test set with reliable labels across a range of groups. Given such a test set, we consider unintended bias
    to be present in the model if the model performance, according to relevant performance metrics, varies across the set
    of designated groups.
- id: Q6
  page: 1
  dimension: output_content
  text: It is important to highlight that the assumption of reliable labels is significant and doesn't hold in all use cases.
    We mitigate the impact of this assumption by demonstrating our results against both a synthetic test set with labels that
    are constructed to be reliable and a large human-annotated test set with high rating redundancy.
- id: Q7
  page: 1
  dimension: output_form
  text: We propose a suite of threshold agnostic performance metrics to measure the extent of unintended model bias. Many
    prior methods for measuring unintended bias in classification systems rely on selecting a threshold, a choice that can
    drastically change results.
- id: Q8
  page: 1
  dimension: output_form
  text: For these models, threshold dependant metrics can obscure the view of unintended bias and thus be misleading to practitioners.
    Threshold agnostic metrics capture the behavior of the underlying model itself, and thus can allow a more comprehensive
    comparison of the model's performance and limitations.
- id: Q9
  page: 1
  dimension: output_content
  text: Daniel Borkan, Lucas Dixon, Jeffrey Sorensen, Nithum Thain, and Lucy Vasserman.
- id: Q10
  page: 1
  dimension: output_content
  text: Jigsaw
- id: Q11
  page: 2
  dimension: output_form
  text: We therefore propose a suite of five metrics, derived from ROC-AUC, Equality Gap, and Mann-Whitney U metrics, each
    of which captures a different aspect of model performance, and a different potential type of unintended bias.
- id: Q12
  page: 2
  dimension: input_content
  text: We apply these metrics with two test sets, again making the assumption that the labels are reliable. One is a synthetic
    test set, identical to the one presented in [5]. The other, introduced in this work, is a new human-labeled dataset of
    nearly 2 million comments, specifically created for evaluation of unintended bias. This includes 450,000 comments annotated
    with the identities that are referenced in the text.
- id: Q13
  page: 2
  dimension: input_ontology
  text: We demonstrate our proposed metrics and datasets on two publicly accessible models that are trained to detect toxicity
    in text (provided by the Perspective API [11].) One of these models is claimed to be trained using a bias mitigation technique,
    as described in [5] and [13].
- id: Q14
  page: 2
  dimension: output_form
  text: Most metrics for unintended bias rely on dividing the test data up by identity or demographic based subgroups and
    computing metrics for each group. For our metrics, we also divide data by subgroup. However, instead of calculating metrics
    on the subgroup data exclusively, our metrics compare the subgroup to the rest of the data, which we call the "background"
    data.
- id: Q15
  page: 2
  dimension: output_form
  text: A core benefit of AUC is that it is threshold agnostic.
- id: Q16
  page: 2
  dimension: output_form
  text: Our proposed metrics differ from these early approaches because they are threshold agnostic, robust to class imbalances
    in the dataset, and because they provide more nuanced insight into the types of bias present in the model, as we will
    see in Section 3.3.
- id: Q17
  page: 3
  dimension: output_form
  text: An important quality of the AUC metric is that it is robust to data imbalances in the amount of negative and positive
    examples in the test set.
- id: Q18
  page: 3
  dimension: output_content
  text: This is especially relevant when measuring unintended bias, because in real-world data, the amount of examples in
    each identity subgroup, and the balance between negative and positive examples can vary widely across groups (in fact,
    this variation is often a source of bias).
- id: Q19
  page: 3
  dimension: output_form
  text: Enforcing that for each AUC, either all negative or all positive examples (or both in Subgroup AUC) come from one
    identity group, means that mis-orderings involving that particular subset cannot be drowned out by results from other
    groups, ensuring that these metrics are robust to data imbalances likely to occur in real data.
- id: Q20
  page: 3
  dimension: output_form
  text: We now introduce two additional threshold agnostic metrics, building from a strict generalization of the Equality
    Gap metric.
- id: Q21
  page: 3
  dimension: output_form
  text: The Equality Gap is the difference between the true positive rates of the subgroup (TPR(Dд)) and the background (TPR(D)),
    at a specific threshold.
- id: Q22
  page: 3
  dimension: output_form
  text: For each threshold, t, if you plot the true positive rate of the subgroup as x(t) and the true positive rate of the
    background as y(t) then the Positive Average Equality Gap is the area between the curve (x(t),y(t)) and the line y = x,
    i.e. Positive AEG = ∫₀¹ (y(t) − x(t)) dx(t)
- id: Q23
  page: 3
  dimension: output_form
  text: There is also the analogous definition with true negative rates in place of true positive ones.
- id: Q24
  page: 3
  dimension: output_form
  text: These are clearly separate sentences. They are two consecutive but independent statements about the Average Equality
    Gap metrics.  SEPARATE
- id: Q25
  page: 4
  dimension: output_form
  text: At each of these extremes, it represents a different type of bias where the TPR of the subgroup is consistently higher
    or lower, respectively, than that of the background.
- id: Q26
  page: 4
  dimension: output_form
  text: The optimal value of the Average Equality Gap metric is 0, which means the subgroup and background distributions have
    identical means.
- id: Q27
  page: 4
  dimension: output_form
  text: If Equality of Opportunity holds for every threshold then the Average Equality Gap will be 0.
- id: Q28
  page: 4
  dimension: output_form
  text: If the Average Equality Gap is 0 then Equality of Opportunity must hold for some non-trivial threshold 0 < t < 1.
- id: Q29
  page: 5
  dimension: input_content
  text: We demonstrate this suite of metrics using the publicly available toxicity classifiers provided by the Perspective
    API ([11]).
- id: Q30
  page: 5
  dimension: input_content
  text: We use two test sets, 1) a synthetically generated, bias-focused test set following [5] and 2) a large dataset of
    online comments with human labels for both identity and toxicity.
- id: Q31
  page: 5
  dimension: output_form
  text: Overall, Subgroup AUC and BPSN and BNSP AUCs identify any bias significant enough to cause mis-orderings between negative
    and postive examples, i.e. bias that interferes with selecting a single threshold that works similarly across groups.
- id: Q32
  page: 5
  dimension: output_form
  text: Subgroup AUC highlights when those mis-orderings are caused by poor model understanding within the subgroup, and BPSN
    and BNSP AUCs highlight when the misorderings are caused by score shifts.
- id: Q33
  page: 5
  dimension: output_form
  text: The AEGs go beyond the AUCs to identify bias in the distribution itself, even when (non-trivial) perfect thresholding
    is possible.
- id: Q34
  page: 5
  dimension: output_form
  text: Both AEGs and BPSN and BNSP AUCs provide insight into the directionality of score shifts.
- id: Q35
  page: 5
  dimension: output_form
  text: It's important to note that the correct handling of subtle variations in distributions must be decided on case by
    case basis.
- id: Q36
  page: 5
  dimension: output_form
  text: And, as with any other suite of metrics, it's always possible that there is subtle bias that the metrics cannot detect.
- id: Q37
  page: 6
  dimension: input_ontology
  text: Using our metrics, we compare two versions of Perspective API's toxicity classifier, the initial TOXICITY@1 and the
    latest TOXICITY@6.
- id: Q38
  page: 6
  dimension: output_ontology
  text: TOXICITY@1 was shown to have significant unintended bias around identity words like "gay" and "transgender", both
    by independent analysis and by the Perspective team [13].
- id: Q39
  page: 6
  dimension: input_ontology
  text: TOXICITY@6 was built using the bias mitigation techniques presented in [5] and, and therefore we expect to see reduced
    unintended bias between these two models across our new metrics.
- id: Q40
  page: 6
  dimension: input_content
  text: The synthetic dataset contains 77k examples generated from templates using 50 identity terms, 50% toxic and 50% non-toxic
    across all terms.
- id: Q41
  page: 6
  dimension: input_form
  text: These examples are constructed explicitly to measure unintended bias based on identity terms.
- id: Q42
  page: 6
  dimension: input_form
  text: The examples are simple sentences that should be clearly toxic or clearly non-toxic, regardless of identity terms
    present.
- id: Q43
  page: 6
  dimension: output_form
  text: In Table 3, we show Subgroup AUC, BPSN AUC, BNSP AUC, Negative AEG, and Positive AEG for both TOXICITY models on the
    synthetic dataset.
- id: Q44
  page: 6
  dimension: input_content
  text: The dataset contains 50 identity terms, here we show results for the lowest performing 20 subgroups.
- id: Q45
  page: 6
  dimension: input_content
  text: Synthetic test sets, while useful for capturing issues not present in real data, may not provide accurate results
    for real scenarios with different data distributions.
- id: Q46
  page: 6
  dimension: input_content
  text: In addition, synthetic sets are limited to the specific identity terms that are manually curated, and therefore are
    unlikely to capture the true diversity of ways that identities are discussed in real conversation.
- id: Q47
  page: 6
  dimension: output_content
  text: To facilitate unintended bias evaluation on real data, we designed techniques to have humans label the identity content
    within real data.
- id: Q48
  page: 6
  dimension: output_content
  text: We presented crowd raters with a comment and asked a set of questions including, for example, "What genders are referenced
    in the comment?" and "What races or ethnicities are referenced in the comment?".
- id: Q49
  page: 6
  dimension: output_content
  text: For each question, raters selected the set of identities present in the comment from a provided list.
- id: Q50
  page: 6
  dimension: output_content
  text: Using human labeling for identity content allows us to capture nuanced identity content
- id: Q51
  page: 7
  dimension: output_content
  text: The set of identities labelled by raters is not comprehensive and does not provide universal coverage.
- id: Q52
  page: 7
  dimension: input_content
  text: This set was designed to balance the coverage of identities, crowd rater accuracy, and ensure that each labeled identity
    has enough examples in the final data set to provide meaningful results.
- id: Q53
  page: 7
  dimension: output_content
  text: This data was also labeled for toxicity using the same crowd rating guidelines as published by the Perspective API
    ([18], [19]).
- id: Q54
  page: 7
  dimension: output_ontology
  text: This labeling asks raters to rate the toxicity of a comment, selecting from "Very Toxic", "Toxic", "Hard to Say",
    and "Not Toxic".
- id: Q55
  page: 7
  dimension: output_ontology
  text: Raters were also asked about several subtypes of toxicity, although these labels were not used for the analysis in
    this work.
- id: Q56
  page: 7
  dimension: input_content
  text: Using these rating techniques we created a dataset of 1.8 million comments, sourced from online comment forums, containing
    labels for toxicity and identity.
- id: Q57
  page: 7
  dimension: input_content
  text: While all of the comments were labeled for toxicity, and a subset of 450,000 comments was labeled for identity.
- id: Q58
  page: 7
  dimension: output_content
  text: Some comments labeled for identity were preselected using models built from previous iterations of identity labeling
    to ensure that crowd raters would see identity content frequently.
- id: Q59
  page: 7
  dimension: output_content
  text: Table 5 shows the toxicity percentage for a selection of identities, illustrating that there is an imbalance in toxicity
    between different identities, emphasizing the value of metrics that are robust to these data skews.
- id: Q60
  page: 8
  dimension: input_content
  text: To enable further research in this field, this entire dataset and annotations will be released under a Creative Commons
    license at https://git.io/fhpcC.
- id: Q61
  page: 8
  dimension: output_form
  text: Applying the AUC and AEG metrics to this real dataset reveals several new insights about the two toxicity models.
- id: Q62
  page: 8
  dimension: input_form
  text: Table 6 compares results for both TOXICITY@1 and TOXICITY@6 on all metrics, for both short comments (less than 100
    characters) and all comments.
- id: Q63
  page: 8
  dimension: input_ontology
  text: We present results on short comments separately because, according to [13], the bias mitigation implemented between
    TOXICITY@1 and TOXICITY@6 focused on short comments.
- id: Q64
  page: 8
  dimension: input_form
  text: The identities shown in Table 6 are all identities that contained more than 100 examples of short comments.
- id: Q65
  page: 8
  dimension: input_content
  text: Real data reveals more unintended bias than synthetic data. Comparing the real data results to the synthetic data
    results in Table 3, we find lower values and more variation across identity subgroups in the real data than we do in synthetic
    data.
- id: Q66
  page: 8
  dimension: input_content
  text: The synthetic data is intentionally very simple, so it is best at revealing very large discrepancies in performance
    that are tied very narrowly to specific identity terms, while the real data is much more broad and nuanced, but also potentially
    noisier.
- id: Q67
  page: 8
  dimension: output_form
  text: Bias tends to skew towards toxicity. Across both models and both short and long comments, we see lower values for
    Subgroup AUC and BPSN AUC and higher values for BNSP AUC.
- id: Q68
  page: 8
  dimension: output_form
  text: We also tend to see positive values for Negative AEG and negative values for Positive AEG.
- id: Q69
  page: 8
  dimension: output_ontology
  text: Together, all of these metrics indicate that the models have a tendency to skew non-toxic comments that discuss identity
    towards toxicity.
- id: Q70
  page: 8
  dimension: output_form
  text: We introduced a new suite of metrics for unintended bias, based on ROC-AUC and Mann-Whitney U scores.
- id: Q71
  page: 8
  dimension: output_form
  text: These metrics provide a detailed and nuanced view of the types of bias present in a model and overcome limitations
    of similar metrics like Equality Gap in that they are threshold agnostic.
- id: Q72
  page: 9
  dimension: output_form
  text: We developed and applied an evaluation method for our introduced metrics using a variety of example illustrative distributions.
- id: Q73
  page: 9
  dimension: output_form
  text: This highlights the differences in various metric behaviors for different kinds of bias.
- id: Q74
  page: 9
  dimension: output_form
  text: We then demonstrated our metrics using existing toxicity classifiers that are provided by the Perspective API [11].
- id: Q75
  page: 10
  dimension: input_content
  text: This involved adapting existing synthetic datasets used for unintended bias measurement of text classifiers.
- id: Q76
  page: 10
  dimension: input_content
  text: Finally we extend beyond the synthetic test set methodology, leveraging the improved nuance of the newly introduced
    metrics by crowdsourcing a large new corpus of nearly 2 million annotations of comments, providing one of the first studies
    of unintended bias based on identity references in text classification on real data.
- id: Q77
  page: 10
  dimension: output_ontology
  text: Our evaluation using this new dataset highlights how the new metrics also reveal new challenges for bias mitigation,
    highlighting that bias is still present in models that have undergone some bias mitigation.
- id: Q78
  page: 10
  dimension: output_form
  text: Developing effective strategies for choosing optimal thresholds to minimize unintended bias.
- id: Q79
  page: 10
  dimension: output_content
  text: Evaluating the relative benefit of the newly introduced dataset compared to sub-string matching of terms that reference
    an identity.
- id: Q80
  page: 10
  dimension: output_form
  text: A more systematic definition of the kinds of synthetic distributions that can be used to evaluate and categorize metrics
    for unintended bias.
- id: Q81
  page: 10
  dimension: output_ontology
  text: Developing a full taxonomy of different possible biases and a systematic approach for these metrics to be used in
    their diagnosis.
coverage_strengths:
- user_priority: Threshold-agnostic bias measurement pipeline
  benchmark_coverage: 'The benchmark''s five-metric suite (Subgroup AUC, BPSN AUC, BNSP AUC, Positive AEG,

    Negative AEG) is explicitly designed to be threshold-agnostic and robust to class

    imbalances [Q11, Q16, Q17], which is directly useful for a deployment where identity

    subgroup sizes will be unequal across religious and gender categories. The metrics

    are designed to reveal directional score shifts [Q34] — useful for auditing whether

    a deployed model systematically over-flags queries mentioning Muslim or Hindu

    identity terms as toxic.

    '
  dimension: output_form
- user_priority: Detecting identity-group-linked bias in toxicity scores
  benchmark_coverage: 'The paper empirically demonstrates that models tend to skew non-toxic identity-

    mentioning comments toward higher toxicity scores [Q69], and confirms this pattern

    holds across both short and long comments [Q67, Q68]. This directional finding

    is operationally relevant: a health chatbot in Gazipur will produce many non-toxic

    messages mentioning religious identity (Muslim, Hindu), gender, or community — and

    the metric framework provides a principled method for auditing whether the underlying

    classifier penalizes such mentions.

    '
  dimension: output_ontology
- user_priority: Real-data evaluation methodology
  benchmark_coverage: 'The benchmark introduces a large human-labeled real-data corpus (1.8 million

    comments, 450,000 with identity labels) [Q56, Q57] alongside a synthetic set,

    and documents that real data reveals more unintended bias and more variation across

    identity subgroups than synthetic data [Q65]. This methodological lesson — that

    synthetic benchmarks underestimate real-world bias — is directly applicable to

    planning the Gazipur evaluation: any synthetic Banglish toxicity test set would

    similarly underestimate the true bias present in real user interactions.

    '
  dimension: input_content
- user_priority: Data imbalance robustness for minority identity subgroups
  benchmark_coverage: 'The AUC-based metrics are explicitly designed so that mis-orderings involving a

    particular identity subset cannot be "drowned out by results from other groups"

    [Q19], addressing the real-world pattern of unequal identity subgroup sizes [Q18].

    This is structurally relevant to the Gazipur deployment''s multi-religious context,

    where Hindu and Christian minority communities would have far fewer examples than

    the Muslim majority in any collected corpus.

    '
  dimension: output_form
