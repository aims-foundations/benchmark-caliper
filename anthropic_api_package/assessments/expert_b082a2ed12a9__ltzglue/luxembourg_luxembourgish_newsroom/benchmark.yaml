coverage_strengths:
- user_priority: Headline acceptability task (newsroom auto-publish/flag system)
  benchmark_coverage: 'LTZGLUE includes a dedicated headline acceptability (HA) task formulated as binary classification of
    whether a headline matches its article body [Q15], explicitly described as a novel contribution for Luxembourgish rather
    than a GLUE port [Q69]. Task instances are drawn from authentic RTL news articles [Q16], and a full prompt template for
    LLM evaluation is documented [Q148].

    '
  dimension: input_ontology
- user_priority: Topic classification with standard international news categories
  benchmark_coverage: 'The topic classification task uses five domain labels — SPORTS, CULTURE, TECHNOLOGY, BUSINESS, ANIMALS
    [Q48] — corresponding to standard international news categories, which the newsroom confirmed matches its editorial taxonomy
    without requiring Luxembourg-specific sub-categories [Q153]. The task is the easiest in the benchmark with near-ceiling
    encoder performance [Q99], providing a reliable baseline for deployment calibration.

    '
  dimension: input_ontology
- user_priority: Linguistic acceptability and NER tasks for Luxembourgish news
  benchmark_coverage: 'LTZGLUE provides both binary and multiclass linguistic acceptability tasks [Q29] alongside a merged
    NER dataset combining JUDGEWEL (Wikipedia/Wikidata, ~27k sentences) [Q34, Q38] and a human-annotated RTL news comment
    corpus [Q40], with unified BIO tagging over five entity types [Q152]. Together with HA and TC, these form a complete four-task
    coverage of the deployment''s operational requirements [Q67, Q70].

    '
  dimension: input_ontology
- user_priority: Luxembourgish journalistic text as input data source
  benchmark_coverage: 'RTL — Luxembourg''s dominant media outlet — is the principal data source for headline acceptability,
    sentiment analysis, topic classification, and a portion of NER [Q12, Q16, Q24, Q40, Q46], ensuring that a substantial
    proportion of benchmark instances consist of authentic Luxembourgish journalistic text directly relevant to the newsroom
    deployment context.

    '
  dimension: input_content
- user_priority: Text-only modality matching deployment infrastructure
  benchmark_coverage: 'All LTZGLUE tasks operate on plain text input [Q17], with no multimodal components. This directly matches
    the deployment''s text-only processing pipeline and eliminates signal-distribution mismatch at the modality level.

    '
  dimension: input_form
- user_priority: Per-task classification scores with F1 evaluation
  benchmark_coverage: 'All tasks report macro-F1 scores [Q93, Q96] in a label-output paradigm (not MCQA) where valid labels
    are provided directly in prompts [Q84]. Encoder results are averaged over three runs with standard deviations [Q89, Q96],
    and full validation and test results across all eight tasks are provided in appendix tables [Q156, Q158, Q159], supporting
    per-task threshold calibration consistent with the deployment''s per-task confidence score architecture.

    '
  dimension: output_form
coverage_gap_analysis:
- user_priority: Code-switching (French/German/English within Luxembourgish articles)
  benchmark_coverage: 'The authors explicitly acknowledge that most data sources reflect formal writing or institutional usage
    and do not fully represent informal and multilingual contexts [Q112]. Only the human-annotated NER corpus from RTL online
    comments is noted as covering informal and code-mixed writing [Q41], but code-switched coverage is not systematically
    characterised or quantified across the benchmark. The intent detection source register (user commands for a voice assistant)
    is flagged as untranslatable due to no equivalent LTZ reference corpus [Q55, Q56], illustrating the broader register mismatch.
    Models trained on this benchmark may under-represent multilingual practices [Q120].

    '
  gap_type: partial
  web_search_target: LTZGLUE code-switching French German Luxembourgish NLP benchmark evaluation coverage
- user_priority: Annotators with professional journalistic background for acceptability labels
  benchmark_coverage: 'Annotators are described only as "student assistants" [Q114] and "native speakers of LTZ" [Q25]. No
    documentation indicates any annotators were professional journalists or editors. Cohen''s Kappa for sentiment analysis
    is 0.45 [Q27], below robust annotation thresholds, and RTE labels were verified primarily by ChatGPT-5-MINI [Q64] rather
    than human domain experts. The authors caution against using benchmark performance as evidence of cultural or demographic
    coverage [Q121].

    '
  gap_type: full
  web_search_target: Luxembourgish journalistic register annotation professional editors NLP ground truth
- user_priority: Flexible professional-journalistic register vs. formal orthographic standard
  benchmark_coverage: 'Luxembourgish has ongoing standardisation processes and substantial orthographic variation [Q7]. Linguistic
    acceptability error categories (Verb, Adj, Syntax, Ortho) [Q31] are grounded in formal linguistic error types, and the
    Ortho category uses spellchecker data from Spellchecker.lu [Q31], which may enforce formal rather than journalistic norms.
    There is no explicit documentation of whether orthographic normalisation was applied, or whether the benchmark''s acceptability
    ground truth reflects formal or journalistic register standards.

    '
  gap_type: full
  web_search_target: Luxembourgish orthographic variation journalistic register LOD spellchecker professional norms NLP
- user_priority: NER entity types covering cross-border and multilingual proper nouns
  benchmark_coverage: 'The harmonised NER label set covers LOC, PER, ORG, MISC, DATE in BIO format [Q152], with GPE merged
    into LOC [Q44]. The GPE–LOC merge reduces granularity for cross-border entities (EU institutions, Belgian/French/German
    place names and officials) that are high-frequency in Luxembourgish professional journalism. Multilingual proper nouns
    in code-switched text are not explicitly characterised in the label taxonomy documentation.

    '
  gap_type: partial
  web_search_target: Luxembourgish NER cross-border entities EU institutions Grande Region named entity recognition benchmark
- user_priority: Data provenance reflecting authentic professional newsroom language
  benchmark_coverage: 'The benchmark explicitly uses a resource-conscious, multi-source construction strategy combining existing
    datasets with targeted annotation and LLM-assisted augmentation [Q109]. RTE instances were improved and verified by ChatGPT-5.1
    and ChatGPT-5-MINI [Q61, Q63, Q64], the JUDGEWEL NER corpus was automatically constructed [Q34, Q37], and the German machine-translated
    xSID training set is used for intent detection [Q54]. The authors note potential data contamination from LLM pre-training
    on RTL and Wikipedia content [Q82, Q111] and acknowledge that automatic preprocessing biases cannot be fully quantified
    [Q113].

    '
