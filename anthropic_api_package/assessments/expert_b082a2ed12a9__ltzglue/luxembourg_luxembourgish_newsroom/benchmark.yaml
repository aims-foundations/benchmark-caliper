- id: Q1
  page: 1
  dimension: input_ontology
  text: This paper presents LTZGLUE, the first Natural Language Understanding (NLU) benchmark for Luxembourgish (LTZ) based
    on the popular GLUE benchmark for English.
- id: Q2
  page: 1
  dimension: input_ontology
  text: Our tasks include common natural language processing tasks in binary and multi-class classification settings, including
    named entity recognition, topic classification, and intent classification.
- id: Q3
  page: 1
  dimension: output_form
  text: We evaluate various pre-trained language models for LTZ to present an overview of the current capabilities of these
    models on the LTZ language.
- id: Q4
  page: 1
  dimension: input_content
  text: Small and under-researched languages are particularly difficult to evaluate, as is the case with Luxembourgish (LTZ),
    the national language of Luxembourg, with around 400k speakers.
- id: Q5
  page: 1
  dimension: input_content
  text: LTZ only has a handful of NLU tasks available (Lothritz et al., 2022; Philippy et al., 2024; Plum et al., 2026).
- id: Q6
  page: 1
  dimension: input_content
  text: As most of these are in the news domain, and the majority of the down-stream tasks comprise less than a thousand instances,
    model evaluation is not always dependable.
- id: Q7
  page: 1
  dimension: input_form
  text: Additional factors, such as the ongoing standardisation of the language (Gilles, 2019), vast amounts of variation
    (Lutgen et al., 2025), and decentralised resources, make it extremely challenging to evaluate LTZ language understanding
    in language models.
- id: Q8
  page: 1
  dimension: input_ontology
  text: 'Our contributions are: (1) LTZGLUE: the first unified GLUE benchmark for LTZ, with 8 tasks.'
- id: Q9
  page: 1
  dimension: input_ontology
  text: '(2) LTZ-E1 (mini/base): 2 new encoder language models for LTZ, which achieve competitive performance when fine-tuned
    on LTZGLUE.'
- id: Q10
  page: 1
  dimension: input_content
  text: Alistair Plum1, Felicia Körner2,3, Anne-Marie Lutgen1, Laura Bernardy1, Fred Philippy1, Emilia Milano1, Nils Rehlinger1,
    Cédric Lothritz4, Tharindu Ranasinghe5, Barbara Plank2,3, Christoph Purschke1 1University of Luxembourg, Luxembourg, 2LMU
    Munich, Germany 3Munich Center for Machine Learning, Germany 4LIST, Luxembourg, 5Lancaster University, UK
- id: Q11
  page: 2
  dimension: input_ontology
  text: In this section, we introduce the eight tasks for LTZGLUE. The set spans binary and multi-class sentence and token-level
    classification tasks. Together, these tasks cover a broad spectrum of linguistic and semantic phenomena and provide the
    first unified benchmark for evaluating LTZ NLP models.
- id: Q12
  page: 2
  dimension: input_content
  text: 'Unless stated otherwise, the textual data used across most tasks stems from two main sources: (i)'
- id: Q13
  page: 2
  dimension: input_content
  text: 'LTZ, the focus of this benchmark, is regarded as under-researched, and research is ongoing. Joshi et al. (2020) classify
    Luxembourgish as one of the "scraping-by" languages: although some unlabeled data exists, meaningful progress will require
    coordinated efforts to raise awareness and collect labeled datasets, as such resources are currently almost nonexistent.'
- id: Q14
  page: 2
  dimension: input_ontology
  text: Yet progress remains uneven across tasks, and existing resources vary widely in size, domain, and annotation quality.
    No unified benchmark currently exists to evaluate LTZ language understanding consistently, a gap we aim to fill.
- id: Q15
  page: 3
  dimension: input_ontology
  text: We formulate headline acceptability (HA) as a binary classification task where the model must decide whether a given
    headline matches the accompanying article body.
- id: Q16
  page: 3
  dimension: input_content
  text: To construct this dataset, we use RTL news articles. We keep only documents from the twenty most frequent categories.
    We then filter articles by body length and title length, remove exact duplicate titles, randomly shuffle the remaining
    instances, and retain a fixed subset of 30k examples.
- id: Q17
  page: 3
  dimension: input_form
  text: This subset is split equally, with one half serving as the positive class with original headlines, and the other half
    providing the article bodies for which we assign swapped headlines.
- id: Q18
  page: 3
  dimension: input_form
  text: We compute TF–IDF representations of the article texts using unigrams and bigrams, an LTZ stopword list, a minimum
    document frequency of two, and a large feature cap to preserve topical detail.
- id: Q19
  page: 3
  dimension: input_form
  text: For every article body in the negative half, we search its nearest neighbours to identify a donor headline, with a
    minimum 30-day distance so that we avoid headlines tied to the same event.
- id: Q20
  page: 3
  dimension: input_form
  text: To prevent trivial matches, we reject candidates whose headlines show high positional similarity, measured as the
    fraction of identical tokens in aligned positions (threshold 0.25).
- id: Q21
  page: 3
  dimension: input_form
  text: We store original and swapped titles, reshuffle, and split into train (20k), development (3k), and test (6k) sets.
- id: Q22
  page: 3
  dimension: input_content
  text: The resulting negative examples remain topically related but are temporally and structurally mismatched, forcing models
    to attend to article content rather than surface cues.
- id: Q23
  page: 3
  dimension: input_ontology
  text: We formulate the sentiment analysis (SA) task as a classification task where the model has to predict positive, negative,
    and neutral sentiment.
- id: Q24
  page: 3
  dimension: input_content
  text: We use articles from RTL, randomly selected from the commentary and letter to the editor sections.
- id: Q25
  page: 3
  dimension: output_content
  text: In total, we extract 4,583 sentences, which are then annotated by two native speakers of LTZ.
- id: Q26
  page: 3
  dimension: output_content
  text: Annotators are instructed to label each sentence, and to use unsure only when they would otherwise randomly use the
    other labels.
- id: Q27
  page: 3
  dimension: output_content
  text: We calculated Cohen's Kappa at 0.45.
- id: Q28
  page: 3
  dimension: output_content
  text: For the final set, the annotators agree on a label in cases of label disagreement.
- id: Q29
  page: 3
  dimension: input_ontology
  text: We introduce a linguistic acceptability dataset consisting of four distinct linguistic subtypes, which can either
    be used as a binary (LA (BINARY)) or multiclass (LA (MULTI)) classification dataset.
- id: Q30
  page: 3
  dimension: input_content
  text: The sentences are derived from the Luxembourgish Online Dictionary (LOD) and are manipulated using the tags available
    in the dataset.
- id: Q31
  page: 3
  dimension: output_ontology
  text: The first class interferes with the subject-verb agreement by changing the conjugated form of the main verb or auxiliary
    verb. The second class similarly modifies the declined form of the adjective and therefore violates the agreement in case,
    number, and gender. For the third class, we manipulate the syntax by deleting 2-3 random words from the sentence, depending
    on the length. The last class impacts the orthography, which is achieved by using data provided by Spellchecker.lu, a
    semiautomatic spellchecking website frequently used in Luxembourg. We changed one random word in the sentence by using
    the least frequent variant in the spellchecker data.
- id: Q32
  page: 4
  dimension: input_form
  text: The multiclass dataset and binary dataset have a 70-10-20 split, and the distribution is shown in Table 2.
- id: Q33
  page: 4
  dimension: output_ontology
  text: The binary dataset distinguishes between correct (1) and incorrect (0), for which the label 0 encompasses the categories
    Verb, Adj, Syntax and Ortho.
- id: Q34
  page: 4
  dimension: input_content
  text: The JUDGEWEL dataset (Plum et al., 2026) introduces an automatically constructed corpus for named entity recognition
    (NER) in LTZ, derived from Wikipedia and Wikidata.
- id: Q35
  page: 4
  dimension: output_ontology
  text: Using Wikipedia's hyperlink structure, entities are matched to their corresponding Wikidata types and labelled in
    BIO format.
- id: Q36
  page: 4
  dimension: input_form
  text: Candidate sentences are selected to maximise diversity, and a set of quality heuristics filters incomplete or overlapping
    entities.
- id: Q37
  page: 4
  dimension: output_content
  text: The resulting sentences are then evaluated using LLMs acting as judges, with minimal human verification to calibrate
    quality thresholds.
- id: Q38
  page: 4
  dimension: input_content
  text: The final dataset contains roughly 27k sentences across five entity types (see Table 3).
- id: Q39
  page: 4
  dimension: output_content
  text: Models trained on JUDGEWEL achieve performance comparable to human-annotated data, demonstrating that automatically
    constructed resources can provide effective supervision.
- id: Q40
  page: 4
  dimension: input_content
  text: The NER dataset introduced by Lothritz et al. (2022), by contrast, is a fully human-annotated corpus derived from
    RTL online news comments.
- id: Q41
  page: 4
  dimension: input_content
  text: It covers a wider range of text types and registers, including informal and code-mixed writing, and focuses on four
    primary entity categories (PER, ORG, LOC, GPE).
- id: Q42
  page: 4
  dimension: output_content
  text: Annotation was conducted manually, yielding a smaller but high-precision dataset.
- id: Q43
  page: 4
  dimension: input_content
  text: The two datasets are merged to increase both coverage and domain balance.
- id: Q44
  page: 4
  dimension: output_ontology
  text: To ensure compatibility, the tag set is harmonised by merging the GPE and LOC categories into a single location label,
    while retaining PER, ORG, and MISC unchanged.
- id: Q45
  page: 4
  dimension: input_content
  text: This unified resource thus aligns the structured reliability of JUDGEWEL with the domain and stylistic breadth of
    the NER set by (Lothritz et al., 2022), providing a large-scale, multi-domain NER dataset for LTZ.
- id: Q46
  page: 4
  dimension: input_content
  text: To construct the news topic classification (TC) dataset, we collected news articles from RTL, which provides content
    pre-assigned to editorial categories.
- id: Q47
  page: 4
  dimension: input_form
  text: We applied a series of preprocessing steps to ensure data quality. Specifically, we removed articles identified as
    non-Luxembourgish by OpenLID (Burchell et al., 2023), as well as those containing fewer than 40 words or more than 400
    words.
- id: Q48
  page: 4
  dimension: output_ontology
  text: 'From the available categories, we focused on five principal domains: SPORTS, CULTURE, TECHNOLOGY, BUSINESS, and ANIMALS.'
- id: Q49
  page: 4
  dimension: input_form
  text: Given the substantial over-representation of the SPORTS category, we performed downsampling to mitigate class imbalance.
- id: Q50
  page: 4
  dimension: input_form
  text: The resulting dataset was split into training, development, and test sets (category distribution is summarized in
    Table 4).
- id: Q51
  page: 4
  dimension: input_content
  text: We constructed a new LTZ dataset for intent detection (ID) by translating the English xSID test and validation datasets
    (van der Goot et al., 2021).
- id: Q52
  page: 4
  dimension: output_content
  text: The translations were performed by an LTZ native speaker. In cases of uncertainty, additional native LTZ speakers
    were consulted.
- id: Q53
  page: 4
  dimension: input_form
  text: Since LTZ is linguistically closely related to German, the German
- id: Q54
  page: 5
  dimension: input_content
  text: Since this task is originally intended to be crosslingual, we use the machine translated German training set (van
    der Goot et al., 2021).
- id: Q55
  page: 5
  dimension: input_content
  text: The main challenge in translating the English dataset stems from its register. The source segments consist of user
    commands for a voice-controlled AI assistant, representing a specialised spoken register for which there is no equivalent
    reference corpus in LTZ. This register is marked by domain-specific terminology and collocations (e.g., set an alarm,
    set a reminder, add to playlist), as well as non-standard spelling (e.g., all lowercase, missing punctuation).
- id: Q56
  page: 5
  dimension: output_content
  text: Due to the lack of LTZ references in this register, it was not possible to systematically verify the translated terminology.
- id: Q57
  page: 5
  dimension: input_form
  text: After translating the dataset, we transferred the BIO tags by first using token-level fuzzy matching between the LTZ
    and the German dataset, followed by manual verification.
- id: Q58
  page: 5
  dimension: output_ontology
  text: Table 5 shows the label distribution and size of each data split.
- id: Q59
  page: 5
  dimension: input_ontology
  text: Recognizing Textual Entailment (RTE) (Haim et al., 2006) is a classic NLU task featured in the original GLUE benchmark.
    Given a pair of texts A and B, the task consists of determining whether A is a logical premise of B.
- id: Q60
  page: 5
  dimension: input_content
  text: Lothritz et al. (2023) released a machine-translated Luxembourgish version of the dataset using Google Translate.
    However, due to numerous grammar and vocabulary related mistakes introduced in this process, we set out to improve the
    quality of the dataset.
- id: Q61
  page: 5
  dimension: input_form
  text: Specifically, we first prompted CHATGPT-5.1 to assess and improve the translated sentence pairs unless they were already
    of very high quality, while explicitly keeping the original meaning to avoid label conflicts (see Appendix 7.4).
- id: Q62
  page: 5
  dimension: output_content
  text: In addition, we perform two verification steps to make sure that (a) the quality of the improved texts is high enough
    and (b) that the labels are correct.
- id: Q63
  page: 5
  dimension: output_content
  text: To achieve (a), we prompted CHATGPT-5-MINI to judge the texts in the improved data and label their quality as either
    low, medium, or high, keeping only data rated at least medium, removing nearly 25% of the entire dataset (see Appendix
    7.5).
- id: Q64
  page: 5
  dimension: output_content
  text: For (b), we prompted CHATGPT-5-MINI to verify whether the dataset labels remained correct after the first translation
    and improvement, outputting true or false for each sentence pair (see Appendix 7.6). Nearly 10% of the labels were false.
- id: Q65
  page: 5
  dimension: output_content
  text: We found that the quality improvement step often corrected intentional logical contradictions or factual inaccuracies
    rather than keeping the original semantics. We therefore adjusted the sentences manually such that they corresponded to
    the ground truth again, while keeping false positives intact.
- id: Q66
  page: 5
  dimension: input_content
  text: The filtering reduced between 22 and 28% of instances in the data, resulting in a final dataset of 1,876, 197, and
    626 sentence pairs for the training, development, and test set, respectively.
- id: Q67
  page: 5
  dimension: input_ontology
  text: Together, the eight tasks in LTZGLUE form a broad and balanced evaluation suite, covering four binary and four multi-class
    settings, sentence- and document-level inputs, as well as a token-level sequence-labelling task.
- id: Q68
  page: 5
  dimension: input_ontology
  text: Despite the low-research status of LTZ, this places LTZGLUE in the same general range as the original English GLUE
    benchmark, which comprises nine diverse NLU tasks (Wang et al., 2019b).
- id: Q69
  page: 5
  dimension: input_ontology
  text: In addition, a substantial proportion of the LTZGLUE tasks are newly created for LTZ rather than direct translations
    or simple repackaging, allowing the benchmark to reflect phenomena and usage patterns specific to the language.
- id: Q70
  page: 6
  dimension: input_ontology
  text: In this landscape, supporting eight tasks for LTZ, including token-level NER and several newly constructed text-level
    tasks, is a strong indicator of the maturity and breadth of the emerging LTZ NLP ecosystem.
- id: Q71
  page: 6
  dimension: input_ontology
  text: This design allows us to assess current LTZ NLU performance across fundamentally different modelling paradigms, while
    maintaining a clear separation between task-specific supervision and general-purpose language understanding.
- id: Q72
  page: 6
  dimension: input_form
  text: 'We train two encoder language models for LTZ: LTZ-E1-mini with 68M and LTZ-E1-base with 110M non-embedding parameters.'
- id: Q73
  page: 6
  dimension: input_form
  text: We closely follow the Ettin recipe (Weller et al., 2026), which is based on MODERNBERT (Warner et al., 2025).
- id: Q74
  page: 6
  dimension: input_content
  text: The pre-training set is compiled from a variety of sources of LTZ. A large portion of the data stems from RTL (see
    Section 3), including news articles (News), transcribed radio interviews (Radio), and user comments (Comments). We also
    include transcribed podcasts (Podcasts) and transcribed political speeches and debates from the Chambre des Députés (Chamber).
    In addition, we use 1M sentences from the web crawl of the Leipzig Collection (Web, this excludes RTL), text crawled from
    LTZ chat rooms (Webchat), a Wikipedia crawl from October 2023 (Wikipedia), and finally, example sentences from the LOD
    retrieved in March 2024.
- id: Q75
  page: 6
  dimension: input_form
  text: We filter out sentences containing fewer than three words (as tokenized by whitespace), totalling 11.7M sentences,
    which corresponds to roughly 233M tokens using our tokenizer.
- id: Q76
  page: 6
  dimension: output_form
  text: We evaluate a set of supervised encoder-based models that explicitly support LTZ, either through direct pre-training
    or multilingual coverage.
- id: Q77
  page: 6
  dimension: output_form
  text: As a representative baseline, we include multilingual BERT (MBERT-base) (Devlin et al., 2019), which still remains
    widely used for multilingual transfer and low-resource evaluation.
- id: Q78
  page: 6
  dimension: output_form
  text: We additionally evaluate a more recent multilingual BERT (MMBERT-base) variant with updated pre-training data and
    tokenisation.
- id: Q79
  page: 6
  dimension: output_form
  text: To complement these general-purpose multilingual models, we include LUXEMBERT, a language-specific model trained on
    LTZ data (Lothritz et al., 2022), which provides a stronger inductive bias for the language's lexical and orthographic
    properties.
- id: Q80
  page: 6
  dimension: output_form
  text: Finally, we evaluate XLM-RoBERTa (XLM-R-base) (Conneau et al., 2020), a large-scale multilingual model trained on
    substantially more data and languages than MBERT-base, and commonly used as a strong reference point for multilingual
    NLU.
- id: Q81
  page: 6
  dimension: output_form
  text: In addition to supervised encoder-based models, we evaluate a set of LLMs in a prompt-based zero-shot setting. This
    group includes QWEN3-235B, LLAMA-3.3, GEMMA-3-27B, and GPT5-MINI, which represent a range of model sizes, training regimes,
    and degrees of multilingual coverage.
- id: Q82
  page: 6
  dimension: output_content
  text: None of these models are fine-tuned on LTZGLUE, although some of the text data (RTL, Wikipedia) is very likely to
    have been processed during training.
- id: Q83
  page: 6
  dimension: output_form
  text: The models are evaluated using prompts that describe each task, allowing us to assess their ability to generalise
    to LTZ without task-specific supervision.
- id: Q84
  page: 6
  dimension: output_form
  text: We did not use a Multiple Choice Question Answering (MCQA)-setup, but provided the labels that should be used as output.
- id: Q85
  page: 6
  dimension: output_form
  text: This evaluation setting reflects the growing use of LLMs as general-purpose language understanding systems, particularly
    in scenarios where annotated data is scarce or unavailable.
- id: Q86
  page: 6
  dimension: output_form
  text: However, prompt-based evaluation introduces additional sources of variability, including prompt sensitivity and differences
    in instruction-following behaviour across models. As a result, performance should be interpreted as indicative rather
    than directly comparable to supervised results.
- id: Q87
  page: 6
  dimension: output_form
  text: Nevertheless, including these models provides a complementary perspective on the current capabilities of large-scale
    multilingual and instruction-tuned systems for LTZ NLU.
- id: Q88
  page: 7
  dimension: output_form
  text: We evaluate the models described in Section 4 across all tasks in the benchmark.
- id: Q89
  page: 7
  dimension: output_form
  text: For encoder-based models, results are reported as averages over multiple runs (see Appendix 7.2 for more details).
- id: Q90
  page: 7
  dimension: output_form
  text: Prompted LLMs do not always produce well-formed outputs and may return an incorrect number of predictions for a given
    task; such outputs are discarded prior to evaluation.
- id: Q91
  page: 7
  dimension: output_form
  text: All reported scores are computed on the remaining valid predictions per model.
- id: Q92
  page: 7
  dimension: output_form
  text: For the supervised models, since the linguistic acceptability and sentiment analysis datasets are highly imbalanced,
    when fine-tuning on these tasks we use class-balanced loss based on effective size (Cui et al., 2019) with a beta of 0.99.
- id: Q93
  page: 7
  dimension: output_form
  text: Table 6 shows F1 scores for all models across all tasks (see Appendix 7.9 for full results).
- id: Q94
  page: 7
  dimension: output_form
  text: Encoder-based models perform strongly across most settings, particularly on structurally complex and label-sensitive
    tasks, confirming findings from prior work on multilingual and low-resource NLU (Wu and Dredze, 2019; Conneau et al.,
    2020).
- id: Q95
  page: 7
  dimension: output_form
  text: Prompted large language models, by contrast, show more variable behaviour and perform competitively only on a set
    of semantically coarse-grained tasks, consistent with recent observations that prompting alone is often insufficient for
    strong performance on structured NLU tasks (Wei et al., 2022; Liu et al., 2023).
- id: Q96
