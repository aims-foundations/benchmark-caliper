- user_priority: Benchmark output ontology aligned with journalistic (not formal-linguistic) correctness criteria
  benchmark_coverage: 'The linguistic acceptability label schema derives from formal linguistic error types (verb agreement,
    adjective agreement, syntactic deletion, orthographic variant) [Q31], and the headline acceptability binary schema is
