- id: Q72
  page: 7
  dimension: output_form
  text: Table 5 compares language-specific models with the original LLAMA-2-7B, and instruction-tuned models with LLAMA-2-7B-CHAT.
- id: Q73
  page: 7
  dimension: output_form
  text: Our findings show minimal gains, with some models even underperforming post-adaptation.
- id: Q74
  page: 8
  dimension: input_ontology
  text: In this paper, we introduced MILU—Multilingual Indic Language Understanding Benchmark-a comprehensive benchmark specifically
    designed to evaluate LLMs across 11 Indic languages, spanning diverse domains and culturally relevant subjects.
- id: Q75
  page: 8
  dimension: output_form
  text: We evaluate 45 different LLMs and find that the majority of LLMs struggle on MILU, with GPT4o achieving the highest
    average accuracy.
- id: Q76
  page: 8
  dimension: input_form
  text: The analysis also shows that models perform significantly better in high-resource languages than low-resource ones,
