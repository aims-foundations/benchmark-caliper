- id: Q69
  page: 7
  dimension: output_content
  text: This suggests that the training corpora for these models lack sufficient culturally specific data.
- id: Q70
  page: 7
  dimension: output_content
  text: Bridging this gap requires a more inclusive data distribution that ensures equitable representation of all cultures
    and languages.
- id: Q71
  page: 7
  dimension: output_form
  text: As most Indic LLMs are built on English base models like LLAMA-2-7B, we assess the impact of language adaptation on
