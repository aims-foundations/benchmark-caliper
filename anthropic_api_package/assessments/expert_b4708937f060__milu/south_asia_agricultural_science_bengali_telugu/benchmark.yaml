    from existing popular benchmarks.
- id: Q27
  page: 4
  dimension: input_form
  text: Despite our best efforts to maintain the quality of questions collected, some amount of noise or errors may still
    be present. To address potential noise in the questions, we employ multiple layers of manual and automated cleaning filters.
- id: Q28
  page: 4
  dimension: input_form
  text: Initially, we manually review a large sample of questions to detect and eliminate potential sources of noise.
- id: Q29
  page: 4
  dimension: input_form
  text: During the collection process, we exclude any reading-comprehension-style questions, images-based questions, and those
    with more than four answer options to ensure uniformity and consistency.
- id: Q30
  page: 4
  dimension: input_form
  text: To remove incorrect language entries, we utilize a combination of INDICLID (Madhani et al., 2023) and Unicode-based
    filtering (Khan et al., 2024), ensuring that the questions are in the correct language.
- id: Q31
  page: 4
  dimension: input_form
  text: To further refine the dataset, we remove any duplicate questions to retain only the unique ones.
- id: Q32
  page: 4
  dimension: input_form
  text: As a final step, we manually verify a sample of questions from each language to ensure accuracy and correct any remaining
    errors.
- id: Q33
  page: 4
  dimension: output_ontology
  text: Upon examination, we found that approximately 45% of questions were accurately labeled with a topic name, while the
    remaining questions lacked this information.
- id: Q34
  page: 4
  dimension: input_form
  text: To address this issue, we first translate the untagged questions into English using INDICTRANS2 (Gala et al., 2023)
    and then prompt GPT-4O-MINI model to assign an appropriate topic name to the question.
- id: Q35
  page: 4
  dimension: output_ontology
  text: Finally, in total, we get around 20K tags. However, these tags are highly fine-grained, often having a heavy overlap.
- id: Q36
  page: 4
  dimension: output_ontology
  text: To organize them, we embed the tags using the NV-EMBED-V2 (Lee et al., 2024) model and apply K-means clustering to
    group tags into 50 clusters.
- id: Q37
  page: 4
  dimension: output_content
  text: We manually review these clusters and assign appropriate subject labels.
- id: Q38
