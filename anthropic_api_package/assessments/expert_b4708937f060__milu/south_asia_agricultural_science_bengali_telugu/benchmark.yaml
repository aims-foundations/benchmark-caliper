- id: Q44
  page: 5
  dimension: output_form
  text: We evaluate 42 different models on MILU, including large proprietary models, open-source multilingual models, and
    popular fine-tuned models specific to Indic languages.
- id: Q45
  page: 5
  dimension: output_form
  text: Both the base versions and instruction fine-tuned variants of these models, wherever applicable, are evaluated to
    measure the improvements gained from fine-tuning.
- id: Q46
  page: 5
  dimension: output_form
  text: All models, except for proprietary models and LLAMA-3.1-405B, are tested under 0-shot, 1-shot, and 5-shot setups.
- id: Q47
  page: 5
  dimension: input_content
  text: We maintain a separate validation set of approximately 9,000 questions to serve as examples for few-shot evaluations.
- id: Q48
  page: 5
  dimension: output_form
  text: For non-API-based models, we use the LM-EVALUATION-HARNESS (Gao et al., 2024; Biderman et al., 2024) to ensure clean
    and reproducible evaluations.
- id: Q49
  page: 5
  dimension: output_form
  text: We use the log-likelihood method, where the probability of a given output string is computed by conditioning it on
    some provided input (Brown et al., 2020).
- id: Q50
  page: 5
  dimension: output_form
  text: Specifically, the log-likelihood of an answer (a) given the question (x), i.e., logP(a|x), is calculated by concatenating
    the answer (a) with question (x), and then summing up the log probabilities, of each target token.
- id: Q51
  page: 5
  dimension: output_form
  text: For multiple choice questions, given k possible answer strings, we select the answer string (ai) with the highest
    conditional log probability, i.e., argmax(logP(a1|x), ..., logP(ak|x)).
- id: Q52
  page: 5
  dimension: output_form
  text: The API-based models are evaluated using the generative approach due to the lack of support for prompt log probabilities.
- id: Q53
