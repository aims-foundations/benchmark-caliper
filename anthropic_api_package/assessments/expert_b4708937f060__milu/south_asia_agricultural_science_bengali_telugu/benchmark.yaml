coverage_strengths:
- user_priority: Indic language coverage including Bengali
  benchmark_coverage: MILU includes Bengali (bn) among its 11 Indic languages, with questions sourced from Bengali-language
    regional and state exams [Q25]. The benchmark collected over 150K questions across these 11 languages before capping at
    79K released [Q25, Q42].
  dimension: input_form
- user_priority: Cross-domain South Asian knowledge including science and environmental fields
  benchmark_coverage: MILU includes an Environmental Sciences domain and a Science domain among its 8 top-level domains [Q38],
    providing at least surface-level coverage of the scientific and environmental categories the deployment requires. Subject-level
    statistics are documented across all 11 languages [Q99].
  dimension: input_ontology
- user_priority: Evaluation of both frontier LLMs and regional Indic-specific small LLMs
  benchmark_coverage: MILU evaluates ~16 Indic-language-specific LLMs [Q56] alongside frontier models like GPT-4o, Gemini-1.5-Pro,
    and the LLAMA and GEMMA model families [Q44, Q64], enabling direct comparison between regional small LLMs and frontier
    models in the deployment's target language context.
  dimension: output_form
- user_priority: Regional state-level knowledge for Indian agricultural zones (Telangana/Andhra Pradesh)
  benchmark_coverage: Regional state exams are explicitly described as 'particularly valuable as they cover various state-level
    topics and emphasize the official language of each state' [Q24], with state-level civil service exams across India documented
    in the source overview [Q98]. Telugu (te) is one of the 11 covered languages.
  dimension: input_content
- user_priority: Bengali-language agricultural and regional knowledge
  benchmark_coverage: Bengali questions are drawn from both national and West Bengal state-level exams [Q23, Q24], providing
    some representation of regional Indian Bengali content. The benchmark flags that regional state exams capture 'state-level
    topics' [Q24], which includes West Bengal agricultural and environmental content in principle.
  dimension: input_content
coverage_gap_analysis:
- user_priority: Bangladesh-specific agro-ecological knowledge (haor/beel wetlands, boro/aman rice cycles, char-land agriculture)
  benchmark_coverage: NOT DOCUMENTED — MILU was constructed entirely from Indian competitive exams [Q9, Q11]. There is no
    representation of Bangladeshi agricultural institutions, exam bodies, or agro-ecological systems. The benchmark explicitly
    states its India-first design [Q9] and restricts coverage to 11 Indic languages based on Indian exam availability [Q82].
  gap_type: full
  web_search_target: MILU benchmark Bangladesh agricultural content haor wetland Bengali questions validation
- user_priority: Mymensingh dialect and Bangladeshi Bengali agricultural terminology
  benchmark_coverage: Bengali questions originate from West Bengal state and Indian national exam corpora [Q24, Q25]. Bangladeshi
    Standard Bengali and Mymensingh dialect agricultural vocabulary (beel/haor/char land-tenure terms) are structurally absent.
    Machine-translated Bengali questions [Q43] derive from Indian English sources and may carry Indian Bengali register conventions.
  gap_type: full
  web_search_target: Bangladeshi Bengali NLP benchmark Mymensingh dialect agricultural terminology LLM evaluation
- user_priority: Trans-border water and agricultural policy knowledge (Farakka/Ganges, Teesta water sharing)
  benchmark_coverage: NOT DOCUMENTED — No India–Bangladesh cross-border content is present; Indian exam answer keys encode
    nationally partial perspectives on shared water systems. The Law and Governance domain [Q38] covers Indian law and policy
    exclusively, with no documentation of bilateral treaty content.
  gap_type: full
  web_search_target: India Bangladesh water sharing agreement Teesta Ganges AI benchmark cross-border agricultural policy
    evaluation
- user_priority: Depth of agricultural and environmental science coverage for professional use
  benchmark_coverage: MILU contains an 'Environmental Sciences' domain [Q38] but the user confirmed coverage is surface-level.
    Domain-wise analysis shows models perform poorly in culturally relevant areas [Q6, Q16], and the authors attribute this
    to insufficient culturally specific data [Q69]. No quantitative breakdown of question counts specifically for agriculture
    or soil/crop science is documented.
  gap_type: partial
  web_search_target: MILU benchmark environmental sciences agriculture subject question distribution domain statistics
- user_priority: Telangana/Andhra Pradesh sub-regional agro-ecological knowledge (dry-land cropping, coastal aquaculture)
  benchmark_coverage: Telugu (te) is one of MILU's 11 languages and state-level exams are included [Q24, Q98], but no documentation
    confirms that Telugu-language questions address sub-regional agro-ecological specifics such as Telangana dry-land cropping
    or Andhra coastal aquaculture. State exam coverage defaults to civil service and general knowledge domains.
  gap_type: partial
  web_search_target: MILU Telugu benchmark Telangana Andhra Pradesh agricultural content dry-land cropping aquaculture evaluation
- user_priority: Bangladeshi annotators or validators for answer key authority
  benchmark_coverage: Annotation was conducted by AI4Bharat volunteers [Q87] and Indian exam portal subject experts [Q22];
    all institutional affiliations are Indian [Q8, Q86]. No cross-border or Bangladeshi input into annotation is documented.
    The authors acknowledge that training corpora 'lack sufficient culturally specific data' [Q69] but do not propose cross-border
    annotation remediation.
  gap_type: full
  web_search_target: MILU benchmark annotation Bangladeshi validators cross-border ground truth agricultural science answer
    keys
- user_priority: Natural domain-expert query style rather than exam-register MCQ prompts
  benchmark_coverage: MILU enforces a standardized MCQ format [Q29] and the evaluation framework explicitly prompts for structured
    JSON responses [Q53]. The log-likelihood evaluation method [Q49, Q50] is acknowledged as potentially divergent from generation-based
    evaluation [Q85]. No documentation addresses alignment between exam-style prompts and natural expert query phrasing.
  gap_type: partial
  web_search_target: MILU open-ended evaluation generation-based Bengali agricultural domain expert query evaluation alternative
