  amharic_specific_slot_filling_f1: '[NEEDS VERIFICATION — per-language breakdown
    for Amharic not surfaced in registry summary]'
  amharic_initial_fleiss_kappa_before_review: '[NEEDS VERIFICATION]'
  amharic_fleiss_kappa_after_review: '[NEEDS VERIFICATION]'
