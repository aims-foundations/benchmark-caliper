description: 'INJONGO is the first large-scale multicultural intent detection and slot-filling (ID-SF)

  dataset covering 16 African languages plus English. It contains 3,200 annotated utterances

  per African language across 5 domains (Banking, Home, Travel, Utility, Kitchen & Dining),

  40 intent categories, and 23 slot types. Utterances were elicited from native speakers with

  explicit instruction to replace Western entities with locally appropriate cultural equivalents,

  rather than translating from English. The dataset covers languages from two dominant African

  language families: 13 Niger-Congo and 3 Afro-Asiatic, and is positioned as a culturally

  grounded alternative to Western-centric NLU benchmarks such as CLINC and MASSIVE.

  '
documentation_excerpts: '## Key characteristics relevant to validity analysis:


  ### Input Ontology

  INJONGO defines the ID-SF task as mapping user requests to predefined semantic categories

  and extracting slot entities within task-oriented dialogue systems [Q2, Q3]. The taxonomy

  encompasses 40 intent categories organized across five domains — Banking, Home, Travel,

  Utility, and Kitchen & Dining — explicitly selected from a pool of 150 CLINC intents as

  "most suitable to African contexts" [Q39, Q117]. Cross-lingual transfer experiments compare

  the African-centric INJONGO taxonomy against Western-centric CLINC, providing direct

  evidence that the ontology was designed with pan-African applicability as an explicit

  criterion [Q101]. Encoder-only, encoder-decoder, and LLM-based model categories are all

  evaluated, reflecting a broad task framing [Q61].


  The benchmark explicitly acknowledges that its domain coverage is constrained: "healthcare

  and education" are identified as absent but "essential for real-world applications" [Q107].

  Analogously, sub-intents specific to Ethiopian utility workflows — prepaid/STS meter

  top-ups, mobile-money platforms such as Telebirr or CBE Birr, tiered-pricing disputes, and

  outage-schedule reporting — are not documented as represented. The closest comparable

  benchmark in African NLP, MasakhaNER, is noted to cover only four coarse entity types and

  "are not fine-grained and well adapted to several domains such as banking and travel" [Q25],

  underscoring that INJONGO is a genuine ontological advance but still bounded by its 40-intent

  ceiling. The fixed uniform distribution of examples across intents is also acknowledged as

  potentially unrepresentative of real-world interaction frequencies [Q111].


  ### Input Content

  The dataset was designed to address two documented failings of prior multilingual NLU datasets:

  the translationese effect and cultural irrelevance [Q13]. Rather than translating English

  utterances, annotators were given sample CLINC sentences for a given intent and asked to

  generate culturally relevant alternatives with locally appropriate slot entities [Q37]. The

  Xhosa annotator example — substituting South African currency (Rand), and banks (FNB, Absa)

  for generic entities [Q40, Q41] — illustrates this cultural grounding principle. The English

  component consists of 1,779 practice utterances generated by annotators across all 16 African

  languages, rather than canonical Western English [Q58, Q59], and a 4,000-instance CLINC sample

  is retained only for contrastive evaluation [Q60].


  Coverage spans 13 Niger-Congo and 3 Afro-Asiatic languages [Q33], with speaker populations

  ranging from Swahili (98 million) to Wolof (5 million) [Q34]. Amharic is one of the three

  Afro-Asiatic languages, and the dataset is described as "the first large-scale multicultural

  intent detection and slot-filling dataset covering 16 African languages" [Q4], correcting

  the prior state-of-the-art (MASSIVE) which included only three African languages and left

  many utterances "culturally irrelevant to the target language communities" [Q14]. Performance

  differences across languages are partly attributed to differential availability of monolingual

  web data [Q88], with Swahili (1 billion+ tokens) achieving near-English performance [Q89],

  implying Amharic may be systematically disadvantaged relative to higher-resource African

  languages. Code-switching between Amharic and English is not documented as an explicit

  design criterion or measured as a property of the Amharic split.


  ### Input Form

  The benchmark is text-only [Q43], which aligns with the Telegram and SMS deployment channels.

  The annotation was performed in native script on the LabelStudio platform [Q43], and the

  Ethiopic (Ge''ez) script is the expected representation for Amharic. The paper does not

  document script normalization procedures or confirm Unicode encoding standards for the

  Amharic instances. Inference infrastructure accommodates both API-based closed-source

  models (GPT-4o, Gemini 1.5 Pro [Q131]) and open-source models via vLLM and TGI [Q132],

  all under FP32 precision on NVIDIA H100/L40S GPUs [Q129]. The dataset is released under

  CC BY 4.0 [Q23] and partitioned 70/10/20% for train/dev/test, stratified by intent [Q57].

  No documentation of SMS-specific signal degradation, romanized Amharic (Amharic written

  in Latin characters), or Ethiopic-Arabic numeral mixing is provided.


  ### Output Ontology

  The slot label ontology was initially set at 34 types [Q118], subsequently reduced to 23

  final types by merging similar or low-frequency categories [Q54, Q55, Q119]. The complete

  final set is enumerated in the annotation guide: ACCOUNT_TYPE, ARTIST_NAME, BANK_NAME,

  BILL_TYPE, CALENDAR_EVENT, CITY_OR_PROVINCE, COUNTRY, CURRENCY, DATE, DISH_OR_FOOD,

  HOTEL_NAME, LANGUAGE_NAME, MEAL_PERIOD, MONEY, MUSIC_GENRE, NUMBER, PAYMENT_COMPANY,

  PERSONAL_NAME, PLACE_NAME, RESTAURANT_NAME, SHOPPING_ITEM, SONG_NAME, TIME [Q144]. Several

  of these (ACCOUNT_TYPE, BANK_NAME, MONEY, PAYMENT_COMPANY, CITY_OR_PROVINCE, PLACE_NAME)

  are directly relevant to Ethiopian utility billing contexts. However, the ontology does not

  include a dedicated METER_ID, UTILITY_ACCOUNT_NUMBER, or ADDRESS_SUBUNIT type that would

  capture kebele numbers or informal neighborhood designations common in Ethiopian utility

  accounts. Nine infrequent slot types (from NATIONALITY through PLUG TYPE) were eliminated

  during preprocessing [Q52], and no justification is provided for why these rather than

  utility-specific slots were excluded.


  The 40-intent taxonomy is described as selected from 150 CLINC intents as best suited to

  African contexts [Q39], but the specific intent labels are not fully enumerated in the

  registry beyond domain-level examples ("transfer," "pay bill," "exchange rate," "book

  flight"). Intent detection performance for open LLMs is poor, attributed partly to "the

  large label space (i.e. 40) for the classification task" [Q86], suggesting the 40-intent

  ceiling may itself introduce measurement noise for deployment systems with narrower scopes.


  ### Output Content

  Each utterance was annotated by three independent native-speaker annotators to enable

  majority-vote agreement checking [Q42, Q45]. The annotation process required two rounds

  of review to achieve consistent quality [Q109], and initial Fleiss'' Kappa scores varied

  substantially across languages, from 0.618 (Zulu) to 0.934 (Shona) [Q47], with post-review

  scores reaching 0.912–1.00 across all languages [Q48]. The largest pre-to-post improvements

  were in Sesotho (+0.327) and Zulu (+0.294) [Q49], and ambiguous slot types were identified

  as a primary source of disagreement [Q53].


  Annotator demographics are partially documented: all utterances were generated by native

  speakers [Q7], remuneration was managed through a Kenya-based logistics company at

  per-country rates [Q44], and a complete annotation guide with disambiguation rules was

  developed [Q149]. The annotation guide specifies rules such as: temporal spans under one

  day → TIME, over one day → DATE [Q153, Q154]; bank name annotation excludes the word

  "bank" unless attached to the proper name (e.g., "Ecobank") [Q152]; bill-type annotation

  includes the word "bill" as part of the span [Q155]; named place entities require explicit

  naming (not generic "mall" or "airport") [Q156]. However, the paper does not document

  whether Amharic annotators had domain familiarity with Ethiopian utility billing

  terminology (prepaid meter accounts, Telebirr transaction records, kebele-level address

  conventions), and the Kappa breakdown by language is not reported in detail sufficient

  to isolate Amharic-specific annotation quality. Ground-truth validity for the Ethiopian

  utility deployment should reflect validation by utility customer service agents and billing

  staff, a population not represented in the annotation pool.


  ### Output Form

  Intent detection is evaluated with accuracy and slot-filling with F1-score [Q84], averaged

  over five random seeds for fine-tuning [Q63] and five prompting templates for LLM evaluations

  [Q73]. The output format for slot-filling uses `$$` as a separator between entity type and

  value [Q146], and prompts are language-specific and tailored to task requirements [Q138].

  Models are instructed to return `$$` only if no entities are found [Q145], and annotators

  are instructed not to skip any utterance even if no entities are present [Q157]. The output

  representation is thus a structured text string rather than a binary or probabilistic

  classification, and the F1 metric is applied to this structured extraction task.


  The benchmark confirms that "slot-filling task is difficult for all LLMs including on English"

  [Q85], with the highest average LLM performance at 33.3% F1 (GPT-4o) compared to the

  best fine-tuned model''s 85.6% F1 [Q19, Q78]. Supervised fine-tuning on Gemma 2 9B

  outperforms 4-shot prompting by +15.8 accuracy and +34.1 F1 [Q98]. The output modality

  is text throughout, matching the deployment context; no speech, image, or open-ended

  generation outputs are evaluated.

  '
