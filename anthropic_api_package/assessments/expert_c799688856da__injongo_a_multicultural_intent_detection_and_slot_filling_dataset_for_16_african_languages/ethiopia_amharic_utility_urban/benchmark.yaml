coverage_strengths:
- user_priority: Intent detection and slot-filling for Ethiopian utility chatbot
  benchmark_coverage: INJONGO is purpose-built for joint ID-SF in African task-oriented dialogue, including a Utility domain
    among its five domains [Q5, Q18], making it the closest existing large-scale African benchmark for the deployment task
  dimension: input_ontology
- user_priority: Amharic language coverage
  benchmark_coverage: Amharic is one of the 16 African languages covered, representing one of three Afro-Asiatic languages
    in the dataset; 3,200 annotated utterances are provided per language [Q33, Q56], directly supporting Amharic model training
    and evaluation
  dimension: input_content
- user_priority: Cultural grounding of slot entities (local banks, currency, payment companies)
  benchmark_coverage: Native-speaker elicitation explicitly required annotators to substitute locally appropriate slot entities
    for Western defaults — illustrated by South African bank and currency replacements [Q40, Q41]; the principle was applied
    across all 16 languages including Amharic, with PAYMENT_COMPANY and BANK_NAME among the retained 23 slot types [Q144]
  dimension: input_content
- user_priority: African-centric vs. Western-centric training data for cross-lingual transfer
  benchmark_coverage: Cross-lingual transfer experiments directly compare INJONGO (African-centric) vs. CLINC (Western-centric)
    English source data, showing INJONGO yields substantially better transfer at 10-shot (16.1 vs. 4.0 accuracy gain) and
    in translate-test (+29 accuracy gain) [Q101, Q102, Q103]
  dimension: input_ontology
- user_priority: Slot ontology covering payment amounts, account types, and location entities
  benchmark_coverage: The 23-type final slot ontology includes ACCOUNT_TYPE, BANK_NAME, BILL_TYPE, CITY_OR_PROVINCE, CURRENCY,
    MONEY, PAYMENT_COMPANY, and PLACE_NAME [Q144], covering the core financial and geographic slot categories relevant to
    Ethiopian utility billing interactions
  dimension: output_ontology
- user_priority: Annotation quality control with native-speaker annotators
  benchmark_coverage: Three independent annotators per utterance, majority-vote quality control, two rounds of review, and
    post-review Fleiss' Kappa of 0.912–1.00 across all languages [Q42, Q45, Q48] provide documented evidence of high annotation
    quality at the corpus level
  dimension: output_content
- user_priority: Text-based deployment over Telegram
  benchmark_coverage: Benchmark is entirely text-based and annotated in native script on LabelStudio [Q43]; text modality,
    label-based output format, and accuracy/F1 evaluation metrics [Q84] align with the deployment's intent classification
    and slot extraction requirements
  dimension: output_form
coverage_gap_analysis:
- user_priority: Ethiopian-specific utility intents (prepaid/STS meter top-ups, Telebirr/CBE Birr mobile-money workflows,
    outage reporting)
  benchmark_coverage: The Utility domain is present but scoped to pan-African contexts; the paper acknowledges the 5-domain
    / 40-intent taxonomy misses domains 'essential for real-world applications' [Q107] and the fixed uniform distribution
    may not reflect natural interaction frequencies [Q111]. Ethiopian-specific prepaid meter, mobile-money, and power-shedding
    intents are not documented.
  gap_type: partial
  web_search_target: INJONGO Utility domain intent list prepaid meter Telebirr Ethiopia slot-filling
- user_priority: Amharic-English code-switching coverage in utterances
  benchmark_coverage: Code-switching is not mentioned as an explicit design criterion; the native-speaker elicitation procedure
    [Q37] aimed for cultural relevance but does not document intra-sentential code-switching as a target phenomenon. The paper
    attributes performance differences to monolingual data availability [Q88] without addressing code-switching density.
  gap_type: full
  web_search_target: INJONGO Amharic code-switching English utterances dataset composition code-mixed
- user_priority: Regional dialect and substrate interference (Oromo, Tigrinya) in Amharic split
  benchmark_coverage: The paper covers Oromo and Tigrinya as separate languages [Q33] but does not document whether the Amharic
    split reflects regional capital variation (Dire Dawa, Hawassa, Mekelle) or defaults to Addis Ababa prestige Amharic. Intra-language
    sociolinguistic variation within the Amharic split is NOT DOCUMENTED.
  gap_type: full
  web_search_target: Amharic dialectal variation Dire Dawa Hawassa Mekelle NLP dataset regional capital
- user_priority: Informal address and kebele-level slot values for Ethiopian utility accounts
  benchmark_coverage: The 23-slot ontology includes CITY_OR_PROVINCE and PLACE_NAME [Q144], and the annotation guide specifies
    that place entities require explicit naming [Q156], but no KEBELE, ADDRESS_SUBUNIT, or METER_ID slot type is documented.
    Ethiopian administrative sub-unit naming conventions are not addressed.
  gap_type: partial
  web_search_target: Ethiopian utility billing address kebele sub-kebele slot NLP information extraction
- user_priority: Ethiopic Unicode encoding fidelity compatible with Telegram tokenizer inputs
  benchmark_coverage: The annotation platform (LabelStudio [Q43]) and inference infrastructure [Q129, Q131, Q132] are documented,
    but Ethiopic script normalization, Unicode version conformance, or encoding consistency checks for the Amharic split are
    NOT DOCUMENTED in the paper.
  gap_type: full
  web_search_target: INJONGO Amharic Ethiopic Unicode normalization Ge'ez script encoding Telegram NLP dataset
- user_priority: Annotator domain familiarity with Ethiopian utility billing (validated by utility agents or billing staff)
  benchmark_coverage: Native-speaker annotators were recruited and remunerated through a Kenya-based logistics company at
    per-country rates [Q44]; the annotation guide provides disambiguation rules [Q149–Q157], but no documentation confirms
    that Amharic annotators had domain familiarity with Ethiopian utility terminology, and utility-domain utterances were
    not validated by customer service agents or billing staff.
  gap_type: full
  web_search_target: African NLP annotation domain expert utility billing Amharic annotator qualification validation
- user_priority: Ground-truth slot labels validated by Ethiopian Electric Utility or Addis Ababa Water billing staff
  benchmark_coverage: Annotation quality is documented through Fleiss' Kappa and majority voting [Q45, Q48], but the annotator
    pool is pan-African crowdworkers rather than Ethiopian utility customer service agents. The post-review Kappa range (0.912–1.00)
    is reported across all languages [Q48] without Amharic-specific breakdown, leaving label accuracy for utility-domain Amharic
    slots unvalidated against the deployment's ground-truth authority.
  gap_type: full
  web_search_target: intent detection slot filling annotation utility domain expert validation Ethiopian Electric Utility
